<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificación de Solicitudes - Soluciones Efectivas</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #f4f7f9; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <div id="root" class="flex-1 flex flex-col"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icons = {
            Search: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
            RefreshCw: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>,
            ArrowLeft: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>,
            Edit2: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>,
            CheckCircle: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>,
            XCircle: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>,
            MessageCircle: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>,
            Phone: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>,
            Clock: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
            X: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
            User: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
            FileText: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
        };

        // ⚠️ PEGA AQUÍ TU URL CORRECTA Y ACTUALIZADA
        const API_URL = 'https://script.google.com/macros/s/AKfycbz770i0j3vK5-9M2Z2EheDh9GX2x2j2KbjfFm_yNadBg5db3tEc5so58KWeIX5SwTmAZw/exec';

        // Componente Toast
        const Toast = ({ show, message, type, onClose }) => {
            if (!show) return null;
            return (
                <div className={`fixed bottom-6 left-1/2 transform -translate-x-1/2 px-6 py-4 rounded-2xl shadow-2xl z-[100] flex items-center gap-4 animate-in slide-in-from-bottom-8 fade-in duration-300 border ${type === 'error' ? 'bg-red-600 border-red-500 text-white' : 'bg-slate-800 border-slate-700 text-white'}`}>
                    {type === 'error' ? <Icons.XCircle className="w-6 h-6 shrink-0 text-red-300"/> : <Icons.CheckCircle className="w-6 h-6 shrink-0 text-emerald-400"/>}
                    <span className="font-bold text-sm tracking-wide">{message}</span>
                    <button onClick={onClose} className="ml-2 p-1 hover:bg-white/20 rounded-full transition-colors shrink-0"><Icons.X className="w-4 h-4"/></button>
                </div>
            );
        };

        function SolicitudesApp() {
            const [data, setData] = useState([]);
            const [headers, setHeaders] = useState([]);
            const [loading, setLoading] = useState(false);
            
            // Filtros
            const [searchTerm, setSearchTerm] = useState('');
            const [statusFilter, setStatusFilter] = useState('ALL');

            // Modal de Gestión
            const [editModal, setEditModal] = useState({ show: false, row: null, newStatus: '', newComment: '' });
            const [isSaving, setIsSaving] = useState(false);
            
            const [toast, setToast] = useState({ show: false, message: '', type: 'success' });

            const showToast = (message, type = 'success') => {
                setToast({ show: true, message, type });
                setTimeout(() => setToast(prev => ({ ...prev, show: false })), 4000);
            };

            const fetchData = async () => {
                setLoading(true);
                try {
                    const separator = API_URL.includes('?') ? '&' : '?';
                    const response = await fetch(`${API_URL}${separator}type=onboarding&t=${new Date().getTime()}`);
                    if (!response.ok) throw new Error("Error en servidor");
                    
                    const text = await response.text();
                    const jsonData = JSON.parse(text);
                    
                    if (Array.isArray(jsonData) && jsonData.length > 0) {
                        setHeaders(Object.keys(jsonData[0]));
                        setData(jsonData.reverse()); 
                    } else {
                        setData([]);
                    }
                } catch (error) {
                    showToast("Error al cargar las solicitudes: " + error.message, "error");
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => {
                fetchData();
            }, []);

            // Buscador dinámico de columnas
            const findCol = (row, keywords) => {
                const key = Object.keys(row).find(k => keywords.some(kw => String(k).toUpperCase().includes(kw)));
                return key ? row[key] : '';
            };
            const findColName = (keywords) => {
                return headers.find(k => keywords.some(kw => String(k).toUpperCase().includes(kw)));
            };

            // Helpers de Formato
            const parseDate = (val) => {
                if (!val) return '-';
                const d = new Date(val);
                return isNaN(d.getTime()) ? val : d.toLocaleString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
            };
            
            const getWhatsAppLink = (phone, text = "Hola") => {
                const clean = String(phone).replace(/\D/g, '');
                return clean ? `https://wa.me/57${clean}?text=${encodeURIComponent(text)}` : '#';
            };

            // Estilos de Estatus Corporativos y Minimalistas
            const getStatusBadge = (status) => {
                const s = String(status).toUpperCase();
                if (s.includes('VERIFICADO')) return <span className="bg-emerald-50/80 text-emerald-700 border border-emerald-200/60 px-3 py-1.5 rounded-lg text-[10px] font-black tracking-widest flex items-center justify-center gap-1.5"><Icons.CheckCircle className="w-3.5 h-3.5"/> VERIFICADO</span>;
                if (s.includes('RECHAZADO')) return <span className="bg-rose-50/80 text-rose-700 border border-rose-200/60 px-3 py-1.5 rounded-lg text-[10px] font-black tracking-widest flex items-center justify-center gap-1.5"><Icons.XCircle className="w-3.5 h-3.5"/> RECHAZADO</span>;
                if (s.includes('REVISIÓN') || s.includes('INFO')) return <span className="bg-amber-50/80 text-amber-700 border border-amber-200/60 px-3 py-1.5 rounded-lg text-[10px] font-black tracking-widest flex items-center justify-center gap-1.5"><Icons.AlertTriangle className="w-3.5 h-3.5"/> EN REVISIÓN</span>;
                return <span className="bg-slate-100 text-slate-600 border border-slate-200 px-3 py-1.5 rounded-lg text-[10px] font-black tracking-widest flex items-center justify-center gap-1.5"><Icons.Clock className="w-3.5 h-3.5"/> PENDIENTE</span>;
            };

            const filteredData = useMemo(() => {
                return data.filter(row => {
                    const status = String(findCol(row, ['ESTADO'])).toUpperCase();
                    
                    if (statusFilter === 'VERIFICADOS' && !status.includes('VERIFICADO')) return false;
                    if (statusFilter === 'PENDIENTES' && (status.includes('VERIFICADO') || status.includes('RECHAZADO'))) return false;
                    if (statusFilter === 'RECHAZADOS' && !status.includes('RECHAZADO')) return false;

                    if (searchTerm) {
                        const searchLower = searchTerm.toLowerCase();
                        const matches = Object.values(row).some(val => String(val).toLowerCase().includes(searchLower));
                        if (!matches) return false;
                    }
                    return true;
                });
            }, [data, searchTerm, statusFilter]);

            // KPIs
            const kpis = useMemo(() => {
                let verified = 0, pending = 0, rejected = 0;
                data.forEach(row => {
                    const s = String(findCol(row, ['ESTADO'])).toUpperCase();
                    if (s.includes('VERIFICADO')) verified++;
                    else if (s.includes('RECHAZADO')) rejected++;
                    else pending++;
                });
                return { total: data.length, verified, pending, rejected };
            }, [data]);

            const handleSaveGestion = async () => {
                if (!editModal.row) return;
                setIsSaving(true);
                
                const idVal = findCol(editModal.row, ['CEDULA', 'CC']);
                const colEstadoName = findColName(['ESTADO']);
                const colComentariosName = findColName(['COMENTARIOS']) || 'COMENTARIOS';

                let updates = [];
                
                if (editModal.newStatus && colEstadoName) {
                    updates.push({ column: colEstadoName, value: editModal.newStatus, append: false, cleanWrite: true });
                }
                
                if (editModal.newComment) {
                    updates.push({ column: colComentariosName, value: editModal.newComment, append: true, cleanWrite: false });
                }

                if (updates.length === 0) {
                    setIsSaving(false);
                    setEditModal({ show: false, row: null, newStatus: '', newComment: '' });
                    return;
                }

                try {
                    const payload = { 
                        type: 'onboarding', 
                        id: idVal, 
                        updates: updates 
                    };
                    
                    await fetch(API_URL, { 
                        method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(payload) 
                    });

                    const newData = data.map(r => {
                        if (findCol(r, ['CEDULA']) === idVal) {
                            let updatedRow = { ...r };
                            if (editModal.newStatus && colEstadoName) {
                                updatedRow[colEstadoName] = editModal.newStatus;
                            }
                            if (editModal.newComment) {
                                const dateStr = new Date().toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit' });
                                const oldVal = updatedRow[colComentariosName] || '';
                                updatedRow[colComentariosName] = oldVal ? `[${dateStr}] ${editModal.newComment} | ${oldVal}` : `[${dateStr}] ${editModal.newComment}`;
                            }
                            return updatedRow;
                        }
                        return r;
                    });
                    
                    setData(newData);
                    showToast("Gestión registrada correctamente.");
                    setEditModal({ show: false, row: null, newStatus: '', newComment: '' });
                } catch (e) {
                    showToast("Error al guardar: " + e.message, "error");
                } finally {
                    setIsSaving(false);
                }
            };

            return (
                <div className="flex-1 flex flex-col">
                    {/* ENCABEZADO CORPORATIVO */}
                    <header className="glass-panel border-b border-slate-200 px-6 py-4 flex items-center justify-between shadow-sm sticky top-0 z-40 transition-all">
                        <div className="flex items-center gap-6">
                            <button onClick={() => window.location.href = 'index.html'} className="p-2.5 bg-white border border-slate-200 text-slate-500 rounded-full hover:bg-indigo-50 hover:text-indigo-600 hover:border-indigo-200 transition-all shadow-sm hover:shadow">
                                <Icons.ArrowLeft className="w-5 h-5"/>
                            </button>
                            
                            <img src="https://raw.githubusercontent.com/TECNOMARIN/MULTIMARCAS/refs/heads/main/SOLUCIONES%20PNG.png" alt="Logo Soluciones Efectivas" className="h-10 md:h-12 object-contain" />
                            
                            <div className="h-8 w-px bg-slate-300 hidden md:block"></div>
                            
                            <div className="hidden md:block">
                                <h1 className="text-xl font-black text-slate-800 leading-tight tracking-tight">
                                    Tablero de Solicitudes
                                </h1>
                                <p className="text-[10px] font-bold text-indigo-500 uppercase tracking-widest mt-0.5">Validación y Análisis de Referencias</p>
                            </div>
                        </div>
                        
                        <div className="flex items-center gap-3">
                            <button onClick={fetchData} disabled={loading} className="flex items-center gap-2 px-5 py-2.5 bg-gradient-to-r from-blue-600 to-indigo-600 text-white rounded-lg hover:from-blue-700 hover:to-indigo-700 transition-all shadow-md font-bold text-xs disabled:opacity-50 disabled:shadow-none">
                                <Icons.RefreshCw className={`w-4 h-4 ${loading ? 'animate-spin' : ''}`} /> Actualizar
                            </button>
                        </div>
                    </header>

                    <div className="max-w-7xl mx-auto w-full p-4 md:p-6 space-y-6 flex-1">
                        <Toast show={toast.show} message={toast.message} type={toast.type} onClose={() => setToast(prev => ({ ...prev, show: false }))} />

                        {/* TARJETAS KPI REDISEÑADAS */}
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6">
                            <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 relative overflow-hidden flex flex-col justify-center">
                                <div className="absolute top-0 left-0 w-1 h-full bg-slate-800"></div>
                                <div className="flex justify-between items-center">
                                    <div>
                                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Total Solicitudes</p>
                                        <p className="text-3xl font-black text-slate-800">{kpis.total}</p>
                                    </div>
                                    <div className="p-3 bg-slate-50 text-slate-400 rounded-xl transition-colors">
                                        <Icons.FileText className="w-6 h-6"/>
                                    </div>
                                </div>
                            </div>
                            
                            <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 relative overflow-hidden flex flex-col justify-center">
                                <div className="absolute top-0 left-0 w-1 h-full bg-indigo-500"></div>
                                <div className="flex justify-between items-center">
                                    <div>
                                        <p className="text-[10px] font-bold text-indigo-500 uppercase tracking-widest mb-1">Pendientes</p>
                                        <p className="text-3xl font-black text-slate-800">{kpis.pending}</p>
                                    </div>
                                    <div className="p-3 bg-indigo-50 text-indigo-500 rounded-xl transition-colors">
                                        <Icons.Clock className="w-6 h-6"/>
                                    </div>
                                </div>
                            </div>

                            <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 relative overflow-hidden flex flex-col justify-center">
                                <div className="absolute top-0 left-0 w-1 h-full bg-emerald-500"></div>
                                <div className="flex justify-between items-center">
                                    <div>
                                        <p className="text-[10px] font-bold text-emerald-500 uppercase tracking-widest mb-1">Verificados</p>
                                        <p className="text-3xl font-black text-slate-800">{kpis.verified}</p>
                                    </div>
                                    <div className="p-3 bg-emerald-50 text-emerald-500 rounded-xl transition-colors">
                                        <Icons.CheckCircle className="w-6 h-6"/>
                                    </div>
                                </div>
                            </div>

                            <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 relative overflow-hidden flex flex-col justify-center">
                                <div className="absolute top-0 left-0 w-1 h-full bg-rose-500"></div>
                                <div className="flex justify-between items-center">
                                    <div>
                                        <p className="text-[10px] font-bold text-rose-500 uppercase tracking-widest mb-1">Rechazados</p>
                                        <p className="text-3xl font-black text-slate-800">{kpis.rejected}</p>
                                    </div>
                                    <div className="p-3 bg-rose-50 text-rose-500 rounded-xl transition-colors">
                                        <Icons.XCircle className="w-6 h-6"/>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* BARRA DE BÚSQUEDA Y FILTROS */}
                        <div className="flex flex-col md:flex-row gap-4 bg-white p-4 rounded-2xl border border-slate-200 shadow-sm">
                            <div className="flex-1 relative">
                                <input type="text" placeholder="Buscar por nombre, cédula o teléfono..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} className="w-full bg-slate-50 border border-slate-200 p-3 pl-11 rounded-xl text-sm outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white font-medium transition-all placeholder:text-slate-400"/>
                                <Icons.Search className="w-4 h-4 text-slate-400 absolute left-4 top-1/2 -translate-y-1/2 pointer-events-none"/>
                            </div>
                            <div className="w-full md:w-64">
                                <select value={statusFilter} onChange={e=>setStatusFilter(e.target.value)} className="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl text-sm outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white font-bold text-slate-600 cursor-pointer transition-all">
                                    <option value="ALL">Mostrar Todos los Estados</option>
                                    <option value="PENDIENTES">Solo Pendientes</option>
                                    <option value="VERIFICADOS">Solo Verificados</option>
                                    <option value="RECHAZADOS">Solo Rechazados</option>
                                </select>
                            </div>
                        </div>

                        {/* TABLA DE SOLICITUDES - DISEÑO FLUIDO */}
                        <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                            <div className="overflow-x-auto custom-scrollbar min-h-[500px]">
                                <table className="w-full text-left text-sm whitespace-nowrap">
                                    <thead className="bg-white text-slate-400 text-[10px] uppercase tracking-widest sticky top-0 z-10 border-b-2 border-slate-100">
                                        <tr>
                                            <th className="px-6 py-4 font-black">Expediente del Cliente y Contactos</th>
                                            <th className="px-6 py-4 font-black w-40 text-center">Dictamen</th>
                                            <th className="px-6 py-4 font-black w-1/4">Bitácora de Verificación</th>
                                            <th className="px-6 py-4 text-center font-black w-32">Acción</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {loading && data.length === 0 ? (
                                            <tr><td colSpan="4" className="py-20 text-center"><Icons.RefreshCw className="w-8 h-8 animate-spin text-indigo-500 mx-auto"/></td></tr>
                                        ) : filteredData.length > 0 ? filteredData.map((row, idx) => {
                                            
                                            const cNombre = findCol(row, ['NOMBRE']);
                                            const cCedula = findCol(row, ['CEDULA']);
                                            const cTel = findCol(row, ['TELEFONO', 'CELULAR']);
                                            
                                            const r1Nom = findCol(row, ['REFERENCIA 1']);
                                            const r1Tel = findCol(row, ['TEL REFERENCIA 1']);
                                            const r2Nom = findCol(row, ['REFERENCIA 2']);
                                            const r2Tel = findCol(row, ['TEL REFERENCIA 2']);
                                            
                                            const estado = findCol(row, ['ESTADO']);
                                            const comentariosStr = findCol(row, ['COMENTARIOS']);
                                            const fecha = findCol(row, ['FECHA']);

                                            // 🧠 Lógica para mostrar solo el último comentario
                                            const allComments = comentariosStr ? String(comentariosStr).split('|').map(c => c.trim()).filter(c => c) : [];
                                            const latestComment = allComments.length > 0 ? allComments[0] : null;
                                            const hasMoreComments = allComments.length > 1;

                                            return (
                                                <tr key={idx} className="hover:bg-slate-50/50 transition-colors items-start group">
                                                    
                                                    {/* COLUMNA 1: CLIENTE Y CONTACTOS (ESTILO CHIPS CRM) */}
                                                    <td className="px-6 py-5 align-top w-2/5">
                                                        <div className="flex flex-col min-w-[320px]">
                                                            {/* Cabecera Cliente */}
                                                            <div className="flex items-center gap-3 mb-1">
                                                                <div className="w-9 h-9 rounded-full bg-gradient-to-br from-indigo-500 to-blue-600 text-white flex items-center justify-center font-bold text-sm shadow-sm shrink-0">
                                                                    {cNombre ? cNombre.charAt(0) : '?'}
                                                                </div>
                                                                <div>
                                                                    <h3 className="text-sm font-black text-slate-800 leading-tight">{cNombre}</h3>
                                                                    <div className="flex items-center gap-2 mt-0.5">
                                                                        <span className="text-[10px] font-mono font-bold text-slate-500 bg-slate-100 px-1.5 py-0.5 rounded border border-slate-200">C.C. {cCedula}</span>
                                                                        <span className="text-[10px] text-slate-400 font-medium flex items-center"><Icons.Clock className="w-3 h-3 mr-1 opacity-70"/>{parseDate(fecha)}</span>
                                                                    </div>
                                                                </div>
                                                            </div>

                                                            {/* Píldoras de Contacto (Fluido Horizontal) */}
                                                            <div className="flex flex-wrap gap-2 mt-4 ml-[48px]">
                                                                
                                                                {/* Chip Titular */}
                                                                <div className="flex items-center bg-blue-50/70 border border-blue-200/60 rounded-full pl-3 pr-1.5 py-1 hover:bg-blue-100/50 hover:border-blue-300 transition-colors shadow-sm">
                                                                    <div className="flex flex-col mr-2">
                                                                        <span className="text-[8px] font-black uppercase text-blue-600 tracking-widest leading-none mb-0.5">Titular</span>
                                                                        <span className="text-xs font-mono font-bold text-slate-800 leading-none">{cTel}</span>
                                                                    </div>
                                                                    <div className="flex gap-1 border-l border-blue-200/60 pl-1.5">
                                                                        <a href={getWhatsAppLink(cTel, `Hola ${cNombre}, nos comunicamos del área de validación de créditos.`)} target="_blank" className="p-1.5 text-emerald-500 bg-white hover:bg-emerald-500 hover:text-white rounded-full shadow-sm transition-all border border-emerald-100" title="WhatsApp Titular"><Icons.MessageCircle className="w-3.5 h-3.5"/></a>
                                                                        <a href={`tel:${cTel}`} className="p-1.5 text-blue-500 bg-white hover:bg-blue-500 hover:text-white rounded-full shadow-sm transition-all border border-blue-100" title="Llamar"><Icons.Phone className="w-3.5 h-3.5"/></a>
                                                                    </div>
                                                                </div>

                                                                {/* Chip Ref 1 */}
                                                                {r1Tel && (
                                                                <div className="flex items-center bg-white border border-slate-200 rounded-full pl-3 pr-1.5 py-1 hover:bg-slate-50 hover:border-slate-300 transition-colors shadow-sm">
                                                                    <div className="flex flex-col mr-2 max-w-[100px]">
                                                                        <span className="text-[8px] font-black uppercase text-slate-400 tracking-widest leading-none mb-0.5 truncate" title={r1Nom}>R1: {r1Nom.split(' ')[0]}</span>
                                                                        <span className="text-xs font-mono font-bold text-slate-700 leading-none">{r1Tel}</span>
                                                                    </div>
                                                                    <div className="flex gap-1 border-l border-slate-100 pl-1.5">
                                                                        <a href={getWhatsAppLink(r1Tel, `Hola ${r1Nom}, nos comunicamos para validar una referencia de ${cNombre}.`)} target="_blank" className="p-1.5 text-slate-400 bg-slate-50 hover:bg-emerald-500 hover:text-white hover:border-emerald-500 rounded-full shadow-sm transition-all border border-slate-100" title="WhatsApp Ref 1"><Icons.MessageCircle className="w-3.5 h-3.5"/></a>
                                                                        <a href={`tel:${r1Tel}`} className="p-1.5 text-slate-400 bg-slate-50 hover:bg-slate-700 hover:text-white hover:border-slate-700 rounded-full shadow-sm transition-all border border-slate-100" title="Llamar"><Icons.Phone className="w-3.5 h-3.5"/></a>
                                                                    </div>
                                                                </div>
                                                                )}

                                                                {/* Chip Ref 2 */}
                                                                {r2Tel && (
                                                                <div className="flex items-center bg-white border border-slate-200 rounded-full pl-3 pr-1.5 py-1 hover:bg-slate-50 hover:border-slate-300 transition-colors shadow-sm">
                                                                    <div className="flex flex-col mr-2 max-w-[100px]">
                                                                        <span className="text-[8px] font-black uppercase text-slate-400 tracking-widest leading-none mb-0.5 truncate" title={r2Nom}>R2: {r2Nom.split(' ')[0]}</span>
                                                                        <span className="text-xs font-mono font-bold text-slate-700 leading-none">{r2Tel}</span>
                                                                    </div>
                                                                    <div className="flex gap-1 border-l border-slate-100 pl-1.5">
                                                                        <a href={getWhatsAppLink(r2Tel, `Hola ${r2Nom}, nos comunicamos para validar una referencia de ${cNombre}.`)} target="_blank" className="p-1.5 text-slate-400 bg-slate-50 hover:bg-emerald-500 hover:text-white hover:border-emerald-500 rounded-full shadow-sm transition-all border border-slate-100" title="WhatsApp Ref 2"><Icons.MessageCircle className="w-3.5 h-3.5"/></a>
                                                                        <a href={`tel:${r2Tel}`} className="p-1.5 text-slate-400 bg-slate-50 hover:bg-slate-700 hover:text-white hover:border-slate-700 rounded-full shadow-sm transition-all border border-slate-100" title="Llamar"><Icons.Phone className="w-3.5 h-3.5"/></a>
                                                                    </div>
                                                                </div>
                                                                )}

                                                            </div>
                                                        </div>
                                                    </td>

                                                    {/* ESTADO */}
                                                    <td className="px-6 py-5 align-middle text-center border-l border-slate-50">
                                                        <div className="flex justify-center">
                                                            {getStatusBadge(estado)}
                                                        </div>
                                                    </td>
                                                    
                                                    {/* COMENTARIOS (ULTRA-COMPRIMIDO) */}
                                                    <td className="px-6 py-5 align-top whitespace-normal border-l border-slate-50 w-1/4">
                                                        {latestComment ? (
                                                            <div className="flex flex-col gap-2">
                                                                <div className="text-[11px] text-slate-600 bg-white p-3 rounded-xl border border-slate-200 leading-relaxed shadow-sm line-clamp-2" title={latestComment}>
                                                                    {latestComment}
                                                                </div>
                                                                {hasMoreComments && (
                                                                    <span className="text-[9px] font-black text-indigo-500 uppercase tracking-widest pl-1">
                                                                        + {allComments.length - 1} anotación(es) anterior(es)
                                                                    </span>
                                                                )}
                                                            </div>
                                                        ) : (
                                                            <span className="text-[11px] text-slate-400 font-medium italic mt-1 flex items-center gap-1.5">
                                                                <div className="w-1.5 h-1.5 rounded-full bg-slate-300"></div> Sin anotaciones
                                                            </span>
                                                        )}
                                                    </td>
                                                    
                                                    {/* ACCIÓN */}
                                                    <td className="px-6 py-5 align-middle text-center border-l border-slate-50">
                                                        <button 
                                                            onClick={() => setEditModal({ show: true, row, newStatus: String(estado), newComment: '' })}
                                                            className="px-5 py-2.5 bg-white border border-slate-200 text-slate-700 rounded-xl font-bold shadow-sm hover:border-indigo-300 hover:text-indigo-600 hover:shadow transition-all text-xs flex items-center justify-center gap-2 w-full max-w-[120px] mx-auto"
                                                        >
                                                            <Icons.Edit2 className="w-3.5 h-3.5"/> Gestionar
                                                        </button>
                                                    </td>
                                                </tr>
                                            );
                                        }) : (
                                            <tr><td colSpan="5" className="py-24 text-center">
                                                <div className="flex flex-col items-center gap-3">
                                                    <div className="p-4 bg-slate-50 rounded-full border border-slate-100"><Icons.Search className="w-6 h-6 text-slate-300"/></div>
                                                    <p className="text-slate-500 font-medium">No se encontraron solicitudes.</p>
                                                </div>
                                            </td></tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        {/* MODAL GESTIÓN */}
                        {editModal.show && (
                            <div className="fixed inset-0 z-[80] flex items-center justify-center bg-slate-900/60 p-4 backdrop-blur-sm animate-in fade-in duration-200">
                                 <div className="bg-white w-full max-w-lg rounded-3xl shadow-2xl overflow-hidden flex flex-col border border-slate-200">
                                    <div className="p-5 border-b border-slate-100 bg-white flex justify-between items-center">
                                        <div className="flex items-center gap-3">
                                            <div className="p-2 bg-indigo-50 rounded-lg text-indigo-600 border border-indigo-100"><Icons.Edit2 className="w-4 h-4"/></div>
                                            <div>
                                                <h3 className="font-black text-slate-800 text-base leading-tight">Auditoría de Solicitud</h3>
                                                <p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest">{findCol(editModal.row, ['NOMBRE'])}</p>
                                            </div>
                                        </div>
                                        <button onClick={() => !isSaving && setEditModal({ show: false, row: null, newStatus: '', newComment: '' })} className="p-2 text-slate-400 hover:bg-slate-100 rounded-full transition-colors">
                                            <Icons.X className="w-5 h-5"/>
                                        </button>
                                    </div>
                                    <div className="p-6 space-y-5 bg-slate-50/50">
                                        
                                        {/* HISTORIAL TIPO CHAT */}
                                        <div className="mb-4">
                                            <label className="text-[10px] font-bold text-slate-500 uppercase tracking-wider block mb-2 px-1">Historial de Bitácora</label>
                                            <div className="bg-white p-3 rounded-2xl border border-slate-200 text-xs text-slate-600 max-h-40 overflow-y-auto custom-scrollbar shadow-inner space-y-2">
                                                {findCol(editModal.row, ['COMENTARIOS']) ? (
                                                    String(findCol(editModal.row, ['COMENTARIOS'])).split('|').filter(c => c.trim()).map((c, i) => (
                                                        <div key={i} className="p-2.5 bg-slate-50 rounded-xl border border-slate-100 leading-relaxed font-medium">
                                                            {c.trim()}
                                                        </div>
                                                    ))
                                                ) : (
                                                    <span className="text-slate-400 italic block p-2">Aún no hay anotaciones para este cliente.</span>
                                                )}
                                            </div>
                                        </div>

                                        <div>
                                            <label className="text-[10px] font-bold text-slate-500 uppercase tracking-wider block mb-2 px-1">Decisión (Estado)</label>
                                            <select 
                                                value={editModal.newStatus}
                                                onChange={(e) => setEditModal({ ...editModal, newStatus: e.target.value })}
                                                className="w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-sm font-bold text-slate-700 transition-all cursor-pointer bg-white shadow-sm"
                                            >
                                                <option value="Aprobado (En proceso)">Pendiente / Aprobado Automático</option>
                                                <option value="VERIFICADO OK">🟢 VERIFICADO (Luz Verde)</option>
                                                <option value="EN REVISIÓN">🟠 EN REVISIÓN (Falta Info)</option>
                                                <option value="RECHAZADO">🔴 RECHAZADO (No Cumple)</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-bold text-slate-500 uppercase tracking-wider block mb-2 px-1">Anotación Nueva</label>
                                            <textarea 
                                                value={editModal.newComment}
                                                onChange={(e) => setEditModal({ ...editModal, newComment: e.target.value })}
                                                className="w-full p-4 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-sm min-h-[90px] transition-all bg-white resize-none shadow-sm"
                                                placeholder="Ej: Llamé al titular y confirma. Ref 1 no contesta..."
                                                autoFocus
                                            />
                                        </div>
                                    </div>
                                    <div className="p-5 border-t border-slate-100 bg-white flex justify-end gap-3 rounded-b-2xl">
                                        <button 
                                            onClick={() => setEditModal({ show: false, row: null, newStatus: '', newComment: '' })} 
                                            className="px-6 py-2.5 text-slate-500 font-bold text-sm hover:bg-slate-100 rounded-full transition-colors border border-transparent hover:border-slate-200"
                                            disabled={isSaving}
                                        >
                                            Cancelar
                                        </button>
                                        <button 
                                            onClick={handleSaveGestion}
                                            disabled={isSaving || (!editModal.newComment.trim() && editModal.newStatus === findCol(editModal.row, ['ESTADO']))}
                                            className="px-6 py-2.5 bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold text-sm rounded-full hover:from-blue-700 hover:to-indigo-700 transition-all shadow-md hover:shadow-lg disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2"
                                        >
                                            {isSaving ? <><Icons.RefreshCw className="w-4 h-4 animate-spin"/> Procesando...</> : 'Guardar Gestión'}
                                        </button>
                                    </div>
                                 </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SolicitudesApp />);
    </script>
</body>
</html>
