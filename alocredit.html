<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión Soluciones Efectivas CTG - ALOCREDIT</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel para JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- html2pdf.js para generación de PDF directa -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: #f1f5f9;
        }

        /* CONFIGURACIÓN ESTRICTA CARTA PARA PDF */
        .letter-size {
            width: 8.5in !important;
            height: 11in !important;
            padding: 0.4in 0.6in !important; 
            margin: 0 auto;
            background: white;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            position: relative;
            overflow: hidden; 
        }

        @media print {
            body { background: white; }
            .print\:hidden { display: none !important; }
            .letter-size { box-shadow: none !important; margin: 0 !important; }
            @page { size: letter; margin: 0; }
        }

        .custom-scroll::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f8fafc; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #4F46E5; border-radius: 10px; border: 2px solid #f8fafc; }
        
        .animate-spin-slow { animation: spin 2s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                Printer: <path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2M6 14h12v8H6z" />,
                Building2: <path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2m12-10h2a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2h-2M10 6h4m-4 4h4m-4 4h4m-4 4h4" />,
                MapPin: <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0zM12 7a3 3 0 1 0 0 6 3 3 0 0 0 0-6z" />,
                Phone: <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" />,
                Search: <><circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" /></>,
                X: <><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></>,
                Calculator: <><rect x="4" y="2" width="16" height="20" rx="2" /><line x1="8" y1="6" x2="16" y2="6" /><line x1="16" y1="14" x2="16" y2="18" /><path d="M16 10h.01M12 10h.01M8 10h.01M12 14h.01M8 14h.01M12 18h.01M8 18h.01" /></>,
                Download: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><path d="M7 10l5 5 5-5" /><path d="M12 15V3" /></>,
                ChevronDown: <path d="m6 9 6 6 6-6" />,
                ChevronUp: <path d="m18 15-6-6-6 6" />,
                ArrowLeft: <><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></>,
                ShieldCheck: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10zM9 12l2 2 4-4" />,
                Loader: <path d="M21 12a9 9 0 1 1-6.219-8.56" />,
                UserPlus: <><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" /><circle cx="8.5" cy="7" r="4" /><line x1="20" y1="8" x2="20" y2="14" /><line x1="17" y1="11" x2="23" y2="11" /></>,
                Upload: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="17 8 12 3 7 8" /><line x1="12" y1="3" x2="12" y2="15" /></>,
                CheckCircle2: <><circle cx="12" cy="12" r="10" /><path d="m9 12 2 2 4-4" /></>,
                CreditCard: <><rect x="1" y="4" width="22" height="16" rx="2" /><line x1="1" y1="10" x2="23" y2="10" /></>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={name === 'Loader' ? `animate-spin-slow ${className}` : className}>
                    {icons[name]}
                </svg>
            );
        };

        const App = () => {
            const companyInfo = {
                name: "SOLUCIONES EFECTIVAS CTG S.A.S",
                nit: "901.831.921-2",
                address: "Calle 31 # 80 - 16, Cond. Atlantic, T5 Apt 1102",
                city: "Cartagena, Bolívar",
                email: "ctgsolucionesefectivas@gmail.com",
                phone: "322 255 9184",
                bank: "Bancolombia",
                tipoCuenta: "Ahorros",
                numeroCuenta: "788-000110-50",
                logoUrl: "https://raw.githubusercontent.com/TECNOMARIN/MULTIMARCAS/main/SOLUCIONES%20PNG.png"
            };

            const fallbackData = [
                { brand: 'TECNO', ref: 'SPARK GO2 64GB + 3+3RAM', cost: '265.000', sale: '730.000', initial: '146.000', receive: '219.000', return: '43.800', commTienda: '102.200', commDist: '83.800' }
            ];

            const [retailData, setRetailData] = useState([]);
            const [isLoadingPrices, setIsLoadingPrices] = useState(true);

            // Formulario y Estados
            const [formData, setFormData] = useState({
                fecha: new Date().toLocaleDateString('es-CO', { day: 'numeric', month: 'long', year: 'numeric' }),
                nombreCliente: '',
                cedulaCliente: '',
                expedicionCedula: '',
                direccionCliente: '',
                ciudadCliente: 'Cartagena',
                telefonoCliente: '',
                imei: '',
                valorCuota: ''
            });

            // Validación para mostrar Autorización (Antifraude siempre se muestra)
            const isAutorizacionReady = formData.nombreCliente.trim() !== '' && formData.cedulaCliente.trim() !== '' && formData.expedicionCedula.trim() !== '';

            const [showPriceModal, setShowPriceModal] = useState(false);
            const [selectedBrand, setSelectedBrand] = useState('TODAS LAS MARCAS');
            const [searchTerm, setSearchTerm] = useState('');
            const [isGenerating, setIsGenerating] = useState(false);

            const [showAffiliateModal, setShowAffiliateModal] = useState(false);
            const [submitStatus, setSubmitStatus] = useState(null); 
            const [affiliateForm, setAffiliateForm] = useState({ 
                tienda: '', 
                emailTienda: '',
                telefonoTienda: '',
                nombreVendedor: '',
                emailVendedor: '',
                telefonoVendedor: ''
            });
            const [affiliateFiles, setAffiliateFiles] = useState({});

            const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzH2a6_gdBJ6uEzmms8qneHg5XnpThtWALqEjgZ9YYcEyMdG1ikYWb68POhtVELJdrdRA/exec"; 

            useEffect(() => {
                const fetchPrecios = async () => {
                    try {
                        const response = await fetch(GOOGLE_SCRIPT_URL + "?action=getPrecios");
                        const data = await response.json();
                        if (data && !data.error && data.length > 0) {
                            setRetailData(data);
                        } else {
                            setRetailData(fallbackData); 
                        }
                    } catch (error) {
                        setRetailData(fallbackData); 
                    } finally {
                        setIsLoadingPrices(false);
                    }
                };
                fetchPrecios();
            }, []);

            const filteredData = useMemo(() => {
                return retailData.filter(item => {
                    const matchesSearch = item.ref?.toLowerCase().includes(searchTerm.toLowerCase()) || item.brand?.toLowerCase().includes(searchTerm.toLowerCase());
                    const matchesBrand = selectedBrand === 'TODAS LAS MARCAS' || item.brand === selectedBrand;
                    return matchesSearch && matchesBrand;
                });
            }, [searchTerm, selectedBrand, retailData]);

            const brandsList = ['TODAS LAS MARCAS', ...new Set(retailData.map(item => item.brand))];

            // Generadores de PDF
            const handleGeneratePDF = () => {
                setIsGenerating(true);
                const element = document.getElementById('pdf-content');
                const opt = {
                    margin: 0,
                    filename: `Autorizacion_Alocredit_${formData.nombreCliente || 'Aliado'}.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2, useCORS: true, letterRendering: true, logging: false },
                    jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
                };
                html2pdf().from(element).set(opt).save().then(() => setIsGenerating(false)).catch(() => setIsGenerating(false));
            };

            const handleGeneratePDFAntifraude = () => {
                setIsGenerating(true);
                const element = document.getElementById('pdf-content-antifraude');
                const opt = {
                    margin: 0,
                    filename: `Antifraude_Alocredit_${formData.nombreCliente || 'Cliente'}.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2, useCORS: true, letterRendering: true, logging: false },
                    jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
                };
                html2pdf().from(element).set(opt).save().then(() => setIsGenerating(false)).catch(() => setIsGenerating(false));
            };

            // Helpers y Formato Matemático Correjido
            const formatRoundToThousand = (val) => {
                if (val === null || val === undefined || val === '') return '0';
                let num;
                if (typeof val === 'number') {
                    num = val;
                } else {
                    const strVal = String(val).replace(/\./g, '').trim();
                    num = parseFloat(strVal);
                }
                if (isNaN(num)) return val;
                const rounded = Math.round(num / 1000) * 1000;
                return rounded.toLocaleString('es-CO');
            };

            const parseCurrency = (val) => {
                if (val === null || val === undefined || val === '') return 0;
                if (typeof val === 'number') return val;
                const strVal = String(val).replace(/\./g, '').trim();
                return parseFloat(strVal) || 0;
            };

            const handleFileChange = (e, fileType) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        const base64String = reader.result.split(',')[1];
                        setAffiliateFiles(prev => ({
                            ...prev,
                            [fileType]: { filename: file.name, mimeType: file.type, data: base64String }
                        }));
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleAffiliateSubmit = async (e) => {
                e.preventDefault();
                setSubmitStatus('loading');
                try {
                    const payload = {
                        action: 'afiliar',
                        linea: 'Alocredit',
                        tienda: affiliateForm.tienda,
                        emailTienda: affiliateForm.emailTienda,
                        telefonoTienda: affiliateForm.telefonoTienda,
                        nombreVendedor: affiliateForm.nombreVendedor,
                        emailVendedor: affiliateForm.emailVendedor,
                        telefonoVendedor: affiliateForm.telefonoVendedor,
                        archivos: affiliateFiles
                    };
                    await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'text/plain' },
                        body: JSON.stringify(payload)
                    });
                    setSubmitStatus('success');
                } catch (error) {
                    setSubmitStatus('error');
                }
            };

            const scrollToTop = (id) => {
                const el = document.getElementById(id);
                if (el) el.scrollTo({ top: 0, behavior: 'smooth' });
            };
            const scrollToBottom = (id) => {
                const el = document.getElementById(id);
                if (el) el.scrollTo({ top: el.scrollHeight, behavior: 'smooth' });
            };

            return (
                <div className="min-h-screen py-8 px-4 flex flex-col items-center">
                    
                    {/* NAVEGACIÓN - ALOCREDIT ACTIVO */}
                    <div className="w-full max-w-4xl mb-4 print:hidden flex flex-wrap gap-3 justify-between items-center">
                        <div className="flex gap-2">
                            <button onClick={() => window.location.href = 'index.html'} className="flex items-center gap-2 px-5 py-2.5 bg-white text-[#2C4C8C] rounded-xl shadow-md font-black text-[10px] uppercase tracking-widest hover:bg-slate-100 transition-all border-2 border-transparent">
                                <Icon name="ArrowLeft" size={14} /> Regresar App
                            </button>
                        </div>

                        <div className="flex gap-2 bg-white p-1 rounded-2xl shadow-lg border border-slate-100">
                            <button 
                                onClick={() => window.location.href = 'retailb.html'}
                                className="flex items-center gap-2 px-4 py-2 bg-transparent text-slate-400 rounded-xl font-black text-[10px] uppercase tracking-widest hover:bg-slate-50 transition-all"
                            >
                                <Icon name="CreditCard" size={14} /> PayJoy
                            </button>
                            <button 
                                onClick={() => window.location.href = 'alocredit.html'}
                                className="flex items-center gap-2 px-4 py-2 bg-indigo-600 text-white rounded-xl font-black text-[10px] uppercase tracking-widest shadow-md scale-105 transition-all"
                            >
                                <Icon name="CreditCard" size={14} /> Alocredit
                            </button>
                            <button 
                                onClick={() => window.location.href = 'credismart.html'}
                                className="flex items-center gap-2 px-4 py-2 bg-transparent text-slate-400 rounded-xl font-black text-[10px] uppercase tracking-widest hover:bg-slate-50 transition-all"
                            >
                                <Icon name="CreditCard" size={14} /> Credismart
                            </button>
                        </div>
                    </div>

                    {/* PANEL CENTRAL ALOCREDIT */}
                    <div className="w-full max-w-4xl bg-white p-6 rounded-3xl shadow-xl mb-8 print:hidden border-t-[10px] border-indigo-600">
                        <div className="flex flex-col md:flex-row justify-between items-center mb-6 gap-6">
                            <div className="flex items-center gap-4">
                                <img src={companyInfo.logoUrl} alt="Logo" className="h-14 w-auto" />
                                <div>
                                    <h2 className="text-xl font-black text-[#2C4C8C] uppercase tracking-tighter italic leading-none">Gestión Soluciones</h2>
                                    <p className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-1">Línea Activa: <span className="text-indigo-600">ALOCREDIT</span></p>
                                </div>
                            </div>
                            <div className="flex gap-3 flex-wrap justify-center md:justify-end">
                                <button onClick={() => { setShowAffiliateModal(true); setSubmitStatus(null); }} className="flex items-center gap-2 px-4 py-2.5 bg-blue-900 text-white rounded-xl font-black text-xs shadow-lg hover:bg-black transition-all uppercase tracking-widest">
                                    <Icon name="UserPlus" size={16} /> Afiliar
                                </button>
                                <button onClick={() => setShowPriceModal(true)} className="flex items-center gap-2 px-4 py-2.5 bg-indigo-600 text-white rounded-xl font-black text-xs shadow-lg hover:bg-indigo-700 transition-all uppercase tracking-widest">
                                    <Icon name="Calculator" size={16} /> Precios
                                </button>
                                {/* BOTÓN PDF AUTORIZACIÓN */}
                                <button onClick={handleGeneratePDF} disabled={isGenerating || !isAutorizacionReady} className={`flex items-center gap-2 px-4 py-2.5 ${isGenerating || !isAutorizacionReady ? 'bg-gray-400 cursor-not-allowed' : 'bg-[#2C4C8C] hover:bg-black'} text-white rounded-xl font-black text-xs shadow-lg transition-all uppercase tracking-widest`}>
                                    {isGenerating ? <Icon name="Loader" size={16} /> : <Icon name="Download" size={16} />} PDF Autorización
                                </button>
                                {/* BOTÓN PDF ANTIFRAUDE */}
                                <button onClick={handleGeneratePDFAntifraude} disabled={isGenerating} className={`flex items-center gap-2 px-4 py-2.5 ${isGenerating ? 'bg-gray-400 cursor-not-allowed' : 'bg-red-600 hover:bg-red-700'} text-white rounded-xl font-black text-xs shadow-lg transition-all uppercase tracking-widest`}>
                                    {isGenerating ? <Icon name="Loader" size={16} /> : <Icon name="ShieldCheck" size={16} />} PDF Antifraude
                                </button>
                            </div>
                        </div>

                        {/* FORMULARIO DE RECOPILACIÓN */}
                        <div className="bg-indigo-50/40 p-5 rounded-[25px] border border-indigo-100 space-y-4">
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <div><label className="block text-[10px] font-black text-indigo-800 uppercase mb-1 tracking-widest">Nombre Completo</label><input type="text" placeholder="Ej: Juan Pérez" className="w-full rounded-xl border-2 border-indigo-50 p-3 font-bold shadow-sm outline-none focus:border-indigo-500 text-sm" value={formData.nombreCliente} onChange={(e) => setFormData({...formData, nombreCliente: e.target.value})} /></div>
                                <div><label className="block text-[10px] font-black text-indigo-800 uppercase mb-1 tracking-widest">Cédula</label><input type="text" placeholder="No. Documento" className="w-full rounded-xl border-2 border-indigo-50 p-3 font-bold shadow-sm outline-none focus:border-indigo-500 text-sm" value={formData.cedulaCliente} onChange={(e) => setFormData({...formData, cedulaCliente: e.target.value})} /></div>
                                <div><label className="block text-[10px] font-black text-indigo-800 uppercase mb-1 italic text-indigo-700">Expedida en:</label><input type="text" placeholder="Ciudad" className="w-full rounded-xl border-2 border-indigo-50 p-3 font-bold shadow-sm outline-none focus:border-indigo-500 text-sm" value={formData.expedicionCedula} onChange={(e) => setFormData({...formData, expedicionCedula: e.target.value})} /></div>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4 border-t border-indigo-100 pt-4">
                                <div><label className="block text-[10px] font-black text-indigo-800 uppercase mb-1 tracking-widest">Dirección Domicilio</label><input type="text" placeholder="Ej: Calle 1 # 2-3" className="w-full rounded-xl border-2 border-indigo-50 p-3 font-bold shadow-sm outline-none focus:border-indigo-500 text-sm" value={formData.direccionCliente} onChange={(e) => setFormData({...formData, direccionCliente: e.target.value})} /></div>
                                <div><label className="block text-[10px] font-black text-indigo-800 uppercase mb-1 tracking-widest">Ciudad Domicilio</label><input type="text" placeholder="Ej: Cartagena" className="w-full rounded-xl border-2 border-indigo-50 p-3 font-bold shadow-sm outline-none focus:border-indigo-500 text-sm" value={formData.ciudadCliente} onChange={(e) => setFormData({...formData, ciudadCliente: e.target.value})} /></div>
                                <div><label className="block text-[10px] font-black text-indigo-800 uppercase mb-1 tracking-widest">Teléfono Celular</label><input type="text" placeholder="Ej: 300 123 4567" className="w-full rounded-xl border-2 border-indigo-50 p-3 font-bold shadow-sm outline-none focus:border-indigo-500 text-sm" value={formData.telefonoCliente} onChange={(e) => setFormData({...formData, telefonoCliente: e.target.value})} /></div>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 border-t border-indigo-100 pt-4">
                                <div><label className="block text-[10px] font-black text-indigo-800 uppercase mb-1 tracking-widest">IMEI del Equipo</label><input type="text" placeholder="Ej: 351234567890123" className="w-full rounded-xl border-2 border-indigo-50 p-3 font-bold shadow-sm outline-none focus:border-indigo-500 text-sm" value={formData.imei} onChange={(e) => setFormData({...formData, imei: e.target.value})} /></div>
                                <div><label className="block text-[10px] font-black text-indigo-800 uppercase mb-1 tracking-widest">Valor de Cuota</label><input type="text" placeholder="Ej: 50.000" className="w-full rounded-xl border-2 border-indigo-50 p-3 font-bold shadow-sm outline-none focus:border-indigo-500 text-sm" value={formData.valorCuota} onChange={(e) => setFormData({...formData, valorCuota: e.target.value})} /></div>
                            </div>
                        </div>
                    </div>

                    {/* MODAL PRECIOS ALOCREDIT (MATEMÁTICA CORREGIDA) */}
                    {showPriceModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-indigo-900/90 backdrop-blur-md print:hidden">
                            <div className="bg-white rounded-[40px] shadow-2xl w-full max-w-7xl max-h-[95vh] flex flex-col overflow-hidden animate-in zoom-in duration-300 border-8 border-white">
                                <div className="p-6 bg-indigo-600 text-white flex justify-between items-center shrink-0">
                                    <h3 className="text-xl font-black uppercase italic tracking-tighter leading-none">Lista Rentabilidad - ALOCREDIT</h3>
                                    <div className="flex gap-4 items-center">
                                        {isLoadingPrices && <span className="text-xs font-bold flex items-center gap-2 bg-white/20 px-3 py-1 rounded-full"><Icon name="Loader" size={14}/> Conectando...</span>}
                                        <button onClick={() => setShowPriceModal(false)} className="hover:bg-white/20 p-2 rounded-full transition-all"><Icon name="X" size={28}/></button>
                                    </div>
                                </div>
                                <div className="p-5 bg-slate-50 border-b flex flex-col md:flex-row gap-4 shrink-0">
                                    <div className="relative flex-1 group"><div className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-indigo-600"><Icon name="Search" size={18} /></div><input type="text" placeholder="Buscar modelo..." className="w-full pl-12 pr-6 py-3 rounded-2xl border-2 border-slate-200 font-bold outline-none focus:border-indigo-500 bg-white" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} /></div>
                                    <div className="relative w-full md:w-64">
                                        <select className="w-full pl-6 pr-10 py-3 rounded-2xl border-2 border-slate-200 font-black text-[11px] uppercase tracking-widest outline-none focus:border-indigo-500 bg-white appearance-none cursor-pointer text-indigo-800" value={selectedBrand} onChange={(e) => setSelectedBrand(e.target.value)}>
                                            {brandsList.map(brand => (<option key={brand} value={brand}>{brand}</option>))}
                                        </select>
                                        <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400"><Icon name="ChevronDown" size={16} /></div>
                                    </div>
                                </div>
                                <div id="scroll-precios" className="flex-1 overflow-auto custom-scroll bg-white px-4">
                                    <table className="min-w-full divide-y divide-slate-100">
                                        <thead className="sticky top-0 bg-white z-10 text-[9px] font-black text-slate-400 uppercase tracking-widest shadow-sm">
