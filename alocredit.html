<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión Soluciones Efectivas CTG - ALOCREDIT</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM (Production) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel para JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: #f1f5f9;
        }

        .custom-scroll::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f8fafc; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #4F46E5; border-radius: 10px; border: 2px solid #f8fafc; } /* Indigo scrollbar for Alocredit */
        
        .animate-spin-slow { animation: spin 2s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                Building2: <path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2m12-10h2a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2h-2M10 6h4m-4 4h4m-4 4h4m-4 4h4" />,
                Search: <><circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" /></>,
                X: <><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></>,
                Calculator: <><rect x="4" y="2" width="16" height="20" rx="2" /><line x1="8" y1="6" x2="16" y2="6" /><line x1="16" y1="14" x2="16" y2="18" /><path d="M16 10h.01M12 10h.01M8 10h.01M12 14h.01M8 14h.01M12 18h.01M8 18h.01" /></>,
                ChevronDown: <path d="m6 9 6 6 6-6" />,
                ChevronUp: <path d="m18 15-6-6-6 6" />,
                ArrowLeft: <><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></>,
                Loader: <path d="M21 12a9 9 0 1 1-6.219-8.56" />,
                UserPlus: <><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" /><circle cx="8.5" cy="7" r="4" /><line x1="20" y1="8" x2="20" y2="14" /><line x1="17" y1="11" x2="23" y2="11" /></>,
                Upload: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="17 8 12 3 7 8" /><line x1="12" y1="3" x2="12" y2="15" /></>,
                CheckCircle2: <><circle cx="12" cy="12" r="10" /><path d="m9 12 2 2 4-4" /></>,
                CreditCard: <><rect x="1" y="4" width="22" height="16" rx="2" /><line x1="1" y1="10" x2="23" y2="10" /></>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={name === 'Loader' ? `animate-spin-slow ${className}` : className}>
                    {icons[name]}
                </svg>
            );
        };

        const App = () => {
            const companyInfo = {
                name: "SOLUCIONES EFECTIVAS CTG S.A.S",
                logoUrl: "https://raw.githubusercontent.com/TECNOMARIN/MULTIMARCAS/main/SOLUCIONES%20PNG.png"
            };

            const fallbackData = [
                { brand: 'TECNO', ref: 'SPARK GO2 64GB + 3+3RAM', cost: '265.000', sale: '730.000', initial: '146.000', receive: '219.000', return: '43.800', commTienda: '102.200', commDist: '83.800' }
            ];

            const [retailData, setRetailData] = useState([]);
            const [isLoadingPrices, setIsLoadingPrices] = useState(true);

            const [showPriceModal, setShowPriceModal] = useState(false);
            const [selectedBrand, setSelectedBrand] = useState('TODAS LAS MARCAS');
            const [searchTerm, setSearchTerm] = useState('');

            const [showAffiliateModal, setShowAffiliateModal] = useState(false);
            const [submitStatus, setSubmitStatus] = useState(null); 
            const [affiliateForm, setAffiliateForm] = useState({ 
                tienda: '', 
                emailTienda: '',
                telefonoTienda: '',
                nombreVendedor: '',
                emailVendedor: '',
                telefonoVendedor: ''
            });
            const [affiliateFiles, setAffiliateFiles] = useState({});

            const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzH2a6_gdBJ6uEzmms8qneHg5XnpThtWALqEjgZ9YYcEyMdG1ikYWb68POhtVELJdrdRA/exec"; 

            useEffect(() => {
                const fetchPrecios = async () => {
                    try {
                        const response = await fetch(GOOGLE_SCRIPT_URL + "?action=getPrecios");
                        const data = await response.json();
                        if (data && !data.error && data.length > 0) {
                            setRetailData(data);
                        } else {
                            setRetailData(fallbackData); 
                        }
                    } catch (error) {
                        setRetailData(fallbackData); 
                    } finally {
                        setIsLoadingPrices(false);
                    }
                };
                fetchPrecios();
            }, []);

            const filteredData = useMemo(() => {
                return retailData.filter(item => {
                    const matchesSearch = item.ref?.toLowerCase().includes(searchTerm.toLowerCase()) || item.brand?.toLowerCase().includes(searchTerm.toLowerCase());
                    const matchesBrand = selectedBrand === 'TODAS LAS MARCAS' || item.brand === selectedBrand;
                    return matchesSearch && matchesBrand;
                });
            }, [searchTerm, selectedBrand, retailData]);

            const brandsList = ['TODAS LAS MARCAS', ...new Set(retailData.map(item => item.brand))];

            const formatRoundToThousand = (val) => {
                if (!val) return '0';
                const strVal = String(val).replace(/\./g, '').trim();
                const num = parseFloat(strVal);
                if (isNaN(num)) return val;
                const rounded = Math.round(num / 1000) * 1000;
                return rounded.toLocaleString('es-CO');
            };

            const parseCurrency = (val) => {
                if (!val) return 0;
                const strVal = String(val).replace(/\./g, '').trim();
                return parseFloat(strVal) || 0;
            };

            const handleFileChange = (e, fileType) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        const base64String = reader.result.split(',')[1];
                        setAffiliateFiles(prev => ({
                            ...prev,
                            [fileType]: { filename: file.name, mimeType: file.type, data: base64String }
                        }));
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleAffiliateSubmit = async (e) => {
                e.preventDefault();
                setSubmitStatus('loading');
                try {
                    const payload = {
                        action: 'afiliar',
                        linea: 'Alocredit', // Guardando explícitamente como línea Alocredit
                        tienda: affiliateForm.tienda,
                        emailTienda: affiliateForm.emailTienda,
                        telefonoTienda: affiliateForm.telefonoTienda,
                        nombreVendedor: affiliateForm.nombreVendedor,
                        emailVendedor: affiliateForm.emailVendedor,
                        telefonoVendedor: affiliateForm.telefonoVendedor,
                        archivos: affiliateFiles
                    };
                    await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'text/plain' },
                        body: JSON.stringify(payload)
                    });
                    setSubmitStatus('success');
                } catch (error) {
                    setSubmitStatus('error');
                }
            };

            const scrollToTop = (id) => {
                const el = document.getElementById(id);
                if (el) el.scrollTo({ top: 0, behavior: 'smooth' });
            };
            const scrollToBottom = (id) => {
                const el = document.getElementById(id);
                if (el) el.scrollTo({ top: el.scrollHeight, behavior: 'smooth' });
            };

            return (
                <div className="min-h-screen py-8 px-4 flex flex-col items-center">
                    
                    {/* ACCESO RÁPIDO Y NAVEGACIÓN */}
                    <div className="w-full max-w-4xl mb-4 flex flex-wrap gap-3 justify-between items-center">
                        <div className="flex gap-2">
                            <button onClick={() => window.location.reload()} className="flex items-center gap-2 px-5 py-2.5 bg-white text-[#2C4C8C] rounded-xl shadow-md font-black text-[10px] uppercase tracking-widest hover:bg-slate-100 transition-all border-2 border-transparent">
                                <Icon name="ArrowLeft" size={14} /> Regresar App
                            </button>
                        </div>

                        <div className="flex gap-2 bg-white p-1 rounded-2xl shadow-lg border border-slate-100">
                            <button 
                                onClick={() => window.location.href = 'index.html'}
                                className="flex items-center gap-2 px-4 py-2 bg-blue-600 text-white rounded-xl font-black text-[10px] uppercase tracking-widest hover:bg-black transition-all shadow-sm"
                            >
                                <Icon name="CreditCard" size={14} /> PayJoy
                            </button>
                            <button 
                                onClick={() => window.location.href = 'credismart.html'}
                                className="flex items-center gap-2 px-4 py-2 bg-teal-600 text-white rounded-xl font-black text-[10px] uppercase tracking-widest hover:bg-black transition-all shadow-sm"
                            >
                                <Icon name="CreditCard" size={14} /> Credismart
                            </button>
                        </div>
                    </div>

                    {/* PANEL DE CONTROL CENTRAL - ALOCREDIT */}
                    <div className="w-full max-w-4xl bg-white p-8 rounded-3xl shadow-xl mb-8 border-t-[10px] border-indigo-600">
                        <div className="flex flex-col md:flex-row justify-between items-center gap-6">
                            <div className="flex items-center gap-4">
                                <img src={companyInfo.logoUrl} alt="Logo" className="h-16 w-auto" />
                                <div>
                                    <h2 className="text-2xl font-black text-[#2C4C8C] uppercase tracking-tighter italic leading-none">Gestión Soluciones</h2>
                                    <p className="text-xs font-bold text-gray-500 uppercase tracking-widest mt-1">
                                        Línea Activa: <span className="text-indigo-600 font-black">ALOCREDIT</span>
                                    </p>
                                </div>
                            </div>
                            <div className="flex gap-3 flex-wrap justify-center md:justify-end">
                                <button onClick={() => { setShowAffiliateModal(true); setSubmitStatus(null); }} className="flex items-center gap-2 px-5 py-3 bg-[#2C4C8C] text-white rounded-xl font-black text-sm shadow-lg hover:bg-black transition-all uppercase tracking-widest">
                                    <Icon name="UserPlus" size={18} /> Afiliar Aliado
                                </button>
                                <button onClick={() => setShowPriceModal(true)} className="flex items-center gap-2 px-5 py-3 bg-indigo-600 text-white rounded-xl font-black text-sm shadow-lg hover:bg-indigo-700 transition-all uppercase tracking-widest">
                                    <Icon name="Calculator" size={18} /> Ver Precios
                                </button>
                            </div>
                        </div>
                        
                        <div className="mt-8 p-6 bg-indigo-50/50 rounded-[25px] border border-indigo-100 flex items-center justify-center text-center">
                            <div>
                                <h3 className="text-indigo-800 font-black uppercase tracking-widest text-sm mb-2">Módulo de Alocredit</h3>
                                <p className="text-indigo-600/80 font-bold text-xs max-w-md mx-auto">
                                    En este módulo puedes gestionar la lista de precios actualizada y realizar nuevas afiliaciones específicamente para la línea de crédito Alocredit.
                                </p>
                            </div>
                        </div>
                    </div>

                    {/* MODAL DE AFILIACIÓN */}
                    {showAffiliateModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-indigo-900/90 backdrop-blur-md">
                            <div className="bg-white rounded-[40px] shadow-2xl w-full max-w-4xl max-h-[95vh] flex flex-col overflow-hidden animate-in zoom-in duration-200 border-8 border-white">
                                <div className="p-6 bg-indigo-600 text-white flex justify-between items-center shrink-0">
                                    <div className="flex items-center gap-4">
                                        <Icon name="UserPlus" size={28}/>
                                        <div>
                                            <h3 className="text-xl font-black uppercase tracking-tighter leading-none italic">Afiliar Nuevo Aliado</h3>
                                            <p className="text-[10px] text-indigo-200 uppercase tracking-widest mt-1">Conexión con Retail B - Alocredit</p>
                                        </div>
                                    </div>
                                    <button onClick={() => setShowAffiliateModal(false)} className="hover:bg-white/20 p-2 rounded-full transition-all"><Icon name="X" size={28}/></button>
                                </div>
                                
                                <div id="scroll-afiliar" className="p-6 bg-slate-50 flex-1 overflow-y-auto custom-scroll relative">
                                    {submitStatus === 'loading' ? (
                                        <div className="py-20 flex flex-col items-center justify-center text-indigo-600">
                                            <Icon name="Loader" size={64} className="mb-6" />
                                            <h4 className="text-xl font-black uppercase tracking-widest">Enviando Documentos...</h4>
                                            <p className="text-sm font-bold text-gray-500 mt-2 text-center">Guardando datos en Sheets para Alocredit.</p>
                                        </div>
                                    ) : submitStatus === 'success' ? (
                                        <div className="py-20 flex flex-col items-center justify-center text-green-600">
                                            <Icon name="CheckCircle2" size={64} className="mb-6" />
                                            <h4 className="text-2xl font-black uppercase tracking-widest text-indigo-800">¡Afiliación Completada!</h4>
                                            <p className="text-sm font-bold text-gray-500 mt-2 text-center max-w-md">La tienda y sus documentos han sido vinculados correctamente a la base de datos de Alocredit.</p>
                                        </div>
                                    ) : (
                                        <form id="afiliar-form" onSubmit={handleAffiliateSubmit} className="space-y-8 pb-4">
                                            <div>
                                                <h4 className="text-[11px] font-black text-indigo-800 uppercase tracking-widest border-b-2 border-indigo-100 pb-2 mb-4">1. Datos de la Tienda Comercial</h4>
                                                <div className="grid grid-cols-1 md:grid-cols-3 gap-5">
                                                    <div>
                                                        <label className="block text-[10px] font-black text-gray-500 uppercase mb-2 tracking-widest">Nombre de la Tienda</label>
                                                        <input required type="text" className="w-full rounded-xl border-2 border-slate-200 p-3.5 font-bold shadow-sm outline-none focus:border-indigo-500 bg-white text-sm" value={affiliateForm.tienda} onChange={(e) => setAffiliateForm({...affiliateForm, tienda: e.target.value})} />
                                                    </div>
                                                    <div>
                                                        <label className="block text-[10px] font-black text-gray-500 uppercase mb-2 tracking-widest">Correo</label>
                                                        <input required type="email" className="w-full rounded-xl border-2 border-slate-200 p-3.5 font-bold shadow-sm outline-none focus:border-indigo-500 bg-white text-sm" value={affiliateForm.emailTienda} onChange={(e) => setAffiliateForm({...affiliateForm, emailTienda: e.target.value})} />
                                                    </div>
                                                    <div>
                                                        <label className="block text-[10px] font-black text-gray-500 uppercase mb-2 tracking-widest">Teléfono</label>
                                                        <input required type="text" className="w-full rounded-xl border-2 border-slate-200 p-3.5 font-bold shadow-sm outline-none focus:border-indigo-500 bg-white text-sm" value={affiliateForm.telefonoTienda} onChange={(e) => setAffiliateForm({...affiliateForm, telefonoTienda: e.target.value})} />
                                                    </div>
                                                </div>
                                            </div>

                                            <div>
                                                <h4 className="text-[11px] font-black text-indigo-800 uppercase tracking-widest border-b-2 border-indigo-100 pb-2 mb-4">2. Datos del Asesor / Vendedor</h4>
                                                <div className="grid grid-cols-1 md:grid-cols-3 gap-5">
                                                    <div>
                                                        <label className="block text-[10px] font-black text-gray-500 uppercase mb-2 tracking-widest">Nombre Asesor</label>
                                                        <input required type="text" className="w-full rounded-xl border-2 border-slate-200 p-3.5 font-bold shadow-sm outline-none focus:border-indigo-500 bg-white text-sm" value={affiliateForm.nombreVendedor} onChange={(e) => setAffiliateForm({...affiliateForm, nombreVendedor: e.target.value})} />
                                                    </div>
                                                    <div>
                                                        <label className="block text-[10px] font-black text-gray-500 uppercase mb-2 tracking-widest">Correo Asesor</label>
                                                        <input required type="email" className="w-full rounded-xl border-2 border-slate-200 p-3.5 font-bold shadow-sm outline-none focus:border-indigo-500 bg-white text-sm" value={affiliateForm.emailVendedor} onChange={(e) => setAffiliateForm({...affiliateForm, emailVendedor: e.target.value})} />
                                                    </div>
                                                    <div>
                                                        <label className="block text-[10px] font-black text-gray-500 uppercase mb-2 tracking-widest">Teléfono / Celular</label>
                                                        <input required type="text" className="w-full rounded-xl border-2 border-slate-200 p-3.5 font-bold shadow-sm outline-none focus:border-indigo-500 bg-white text-sm" value={affiliateForm.telefonoVendedor} onChange={(e) => setAffiliateForm({...affiliateForm, telefonoVendedor: e.target.value})} />
                                                    </div>
                                                </div>
                                            </div>

                                            <div>
                                                <h4 className="text-[11px] font-black text-indigo-800 uppercase tracking-widest border-b-2 border-indigo-100 pb-2 mb-4">3. Documentación Obligatoria</h4>
                                                <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
                                                    {[
                                                        { id: 'camara', t: 'C. de Comercio', s: 'Impresión < 30 días' },
                                                        { id: 'autorizacion', t: 'Autorización', s: 'Firmada y autenticada' },
                                                        { id: 'cedulaF', t: 'Cédula Frente', s: 'Representante Legal' },
                                                        { id: 'cedulaR', t: 'Cédula Reverso', s: 'Representante Legal' },
                                                        { id: 'foto1', t: 'Foto Fachada', s: 'Exterior c/ Nomenclatura' },
                                                        { id: 'video', t: 'Video 360°', s: 'Desde fachada a interior' }
                                                    ].map(doc => (
                                                        <label key={doc.id} className={`flex flex-col items-center justify-center p-4 border-2 border-dashed rounded-xl cursor-pointer transition-all bg-white ${affiliateFiles[doc.id] ? 'border-indigo-500 bg-indigo-50' : 'border-slate-300 hover:bg-slate-100'}`}>
                                                            <Icon name={affiliateFiles[doc.id] ? "CheckCircle2" : "Upload"} size={28} className={affiliateFiles[doc.id] ? "text-indigo-600" : "text-gray-300"} />
                                                            <span className={`text-[11px] font-black uppercase mt-2 ${affiliateFiles[doc.id] ? "text-indigo-600" : "text-gray-600"}`}>{doc.t}</span>
                                                            <span className="text-[9px] text-gray-400 font-bold text-center mt-1 leading-tight">{doc.s}</span>
                                                            <input type="file" className="hidden" onChange={(e) => handleFileChange(e, doc.id)} required />
                                                        </label>
                                                    ))}
                                                </div>
                                            </div>
                                            <button type="submit" className="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black uppercase tracking-[3px] shadow-xl hover:bg-indigo-700 transition-all">Registrar Aliado Alocredit</button>
                                        </form>
                                    )}
                                </div>
                                <div className="p-4 bg-white border-t flex justify-between items-center shrink-0">
                                    <div className="flex gap-2">
                                        <button onClick={() => scrollToTop('scroll-afiliar')} className="p-2 bg-slate-100 text-indigo-800 rounded-xl hover:bg-slate-200 transition-colors shadow-sm"><Icon name="ChevronUp" size={20}/></button>
                                        <button onClick={() => scrollToBottom('scroll-afiliar')} className="p-2 bg-slate-100 text-indigo-800 rounded-xl hover:bg-slate-200 transition-colors shadow-sm"><Icon name="ChevronDown" size={20}/></button>
                                    </div>
                                    <button onClick={() => setShowAffiliateModal(false)} className="px-6 py-3 bg-gray-100 text-gray-600 rounded-xl font-black text-[11px] hover:bg-gray-200 transition-all uppercase tracking-[2px]">Cerrar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL DE PRECIOS */}
                    {showPriceModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-indigo-900/90 backdrop-blur-md">
                            <div className="bg-white rounded-[40px] shadow-2xl w-full max-w-7xl max-h-[95vh] flex flex-col overflow-hidden animate-in zoom-in duration-300 border-8 border-white">
                                <div className="p-6 bg-indigo-600 text-white flex justify-between items-center shrink-0">
                                    <h3 className="text-xl font-black uppercase italic tracking-tighter leading-none">Lista de Rentabilidad - ALOCREDIT</h3>
                                    <div className="flex gap-4 items-center">
                                        {isLoadingPrices && <span className="text-xs font-bold flex items-center gap-2 bg-white/20 px-3 py-1 rounded-full"><Icon name="Loader" size={14}/> Conectando a Sheets...</span>}
                                        <button onClick={() => setShowPriceModal(false)} className="hover:bg-white/20 p-2 rounded-full transition-all"><Icon name="X" size={28}/></button>
                                    </div>
                                </div>
                                <div className="p-5 bg-slate-50 border-b flex flex-col md:flex-row gap-4 shrink-0">
                                    <div className="relative flex-1 group"><div className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"><Icon name="Search" size={18} /></div><input type="text" placeholder="Buscar modelo o marca..." className="w-full pl-12 pr-6 py-3 rounded-2xl border-2 border-slate-200 font-bold outline-none focus:border-indigo-500 bg-white" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} /></div>
                                    <select className="px-6 py-3 rounded-2xl border-2 border-slate-200 font-black text-[11px] uppercase tracking-widest outline-none focus:border-indigo-500 bg-white text-indigo-800" value={selectedBrand} onChange={(e) => setSelectedBrand(e.target.value)}>
                                        {brandsList.map(brand => (<option key={brand} value={brand}>{brand}</option>))}
                                    </select>
                                </div>
                                <div id="scroll-precios" className="flex-1 overflow-auto custom-scroll bg-white px-4">
                                    <table className="min-w-full divide-y divide-slate-100">
                                        <thead className="sticky top-0 bg-white z-10 text-[9px] font-black text-slate-400 uppercase tracking-widest shadow-sm">
                                            <tr><th className="px-4 py-4 text-left">Referencia</th><th className="px-2 py-4">Costo</th><th className="px-2 py-4">Venta</th><th className="px-4 py-4 bg-indigo-50 text-indigo-600">Inicial plataforma</th><th className="px-2 py-4 text-blue-600">Recibe Tienda</th><th className="px-2 py-4 text-indigo-800">Te Consignamos</th><th className="px-4 py-4 bg-indigo-800 text-white rounded-tr-lg">Comisión</th></tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-50 font-bold text-[11px] uppercase">
                                            {filteredData.map((item, idx) => (
                                                <tr key={idx} className="hover:bg-indigo-50/30 transition-all">
                                                    <td className="px-4 py-4"><span className="text-[9px] text-indigo-500 block font-black">{item.brand}</span>{item.ref}</td>
                                                    <td className="px-2 py-4 text-center text-slate-400 italic">${formatRoundToThousand(item.cost)}</td>
                                                    <td className="px-2 py-4 text-center">${formatRoundToThousand(item.sale)}</td>
                                                    <td className="px-4 py-4 text-center text-indigo-600 bg-indigo-50/30">${formatRoundToThousand(item.initial)}</td>
                                                    <td className="px-2 py-4 text-center text-blue-600">${formatRoundToThousand(item.receive)}</td>
                                                    <td className="px-2 py-4 text-center text-indigo-800 font-black bg-indigo-50/50">${formatRoundToThousand(parseCurrency(item.cost) - parseCurrency(item.return))}</td>
                                                    <td className="px-4 py-4 text-center bg-indigo-800/5">
                                                        <span className="text-base font-black text-indigo-800 italic">${formatRoundToThousand(item.commTienda)}</span>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                                <div className="p-4 bg-white border-t flex justify-between items-center shrink-0">
                                    <div className="flex gap-2">
                                        <button onClick={() => scrollToTop('scroll-precios')} className="p-2 bg-slate-100 text-indigo-800 rounded-xl"><Icon name="ChevronUp" size={20}/></button>
                                        <button onClick={() => scrollToBottom('scroll-precios')} className="p-2 bg-slate-100 text-indigo-800 rounded-xl"><Icon name="ChevronDown" size={20}/></button>
                                    </div>
                                    <button onClick={() => setShowPriceModal(false)} className="px-6 py-3 bg-indigo-600 text-white rounded-xl font-black text-[11px] uppercase tracking-widest shadow-lg hover:bg-indigo-700">Cerrar Precios</button>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        };

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
