                                    <button onClick={deleteEntidad} disabled={isSavingEdit} className="px-4 py-2 bg-rose-50 text-rose-600 font-bold rounded-xl hover:bg-rose-100 transition-colors disabled:opacity-50 text-xs flex items-center gap-1"><Icon name="Trash2" size={14}/> Eliminar</button>
                                    <button onClick={saveEditEntidad} disabled={isSavingEdit} className="px-6 py-2 bg-[#67B74D] text-white font-black rounded-xl hover:bg-[#559e3d] shadow-md transition-all flex items-center gap-2 disabled:opacity-50 text-sm">
                                        {isSavingEdit ? <Icon name="RefreshCw" className="animate-spin" size={16}/> : <Icon name="Save" size={16}/>} Actualizar
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL DE CAMBIO DE ESTADO */}
                    {statusModal.show && (
                        <div className="fixed inset-0 z-[8000] flex items-center justify-center bg-slate-900/70 p-4 backdrop-blur-sm animate-in fade-in">
                            <div className="bg-white w-full max-w-sm rounded-3xl shadow-2xl overflow-hidden flex flex-col animate-pop-in">
                                <div className="p-5 bg-[#1e3a6d] text-white flex justify-between items-center">
                                    <h3 className="font-black text-lg">Cambiar Estado</h3>
                                    <button onClick={() => setStatusModal({show:false, id:null, current:'Pendiente'})} className="hover:bg-white/20 p-1.5 rounded-full"><Icon name="X" size={20}/></button>
                                </div>
                                <div className="p-6 bg-slate-50 space-y-4">
                                    <p className="text-xs text-slate-500 font-medium">Actualizando el estado del crédito seleccionado.</p>
                                    <div>
                                        <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest block mb-1">Nuevo Estado</label>
                                        <select 
                                            value={statusModal.current} 
                                            onChange={e => setStatusModal({...statusModal, current: e.target.value})} 
                                            className="w-full bg-white border border-slate-200 py-3 px-3 rounded-xl text-sm font-bold outline-none focus:ring-2 focus:ring-[#1e3a6d]"
                                        >
                                            <option value="Pendiente">Pendiente</option>
                                            <option value="En revisión">En revisión</option>
                                            <option value="Aprobado">Aprobado</option>
                                            <option value="Rechazado">Rechazado</option>
                                            <option value="Anulado">Anulado</option>
                                        </select>
                                    </div>
                                    <p className="text-[10px] text-amber-600 font-bold bg-amber-50 p-2 rounded-lg border border-amber-200">
                                        <Icon name="Info" size={12} className="inline mr-1"/> El estado "Desembolsado" solo se puede aplicar desde Tesorería.
                                    </p>
                                </div>
                                <div className="p-4 bg-white border-t border-slate-100 flex justify-between items-center">
                                    <button onClick={() => setStatusModal({show:false, id:null, current:'Pendiente'})} className="px-4 py-2 bg-slate-100 text-slate-600 font-bold rounded-xl hover:bg-slate-200 transition-colors text-xs">Cancelar</button>
                                    <button onClick={saveStatus} disabled={isSavingEdit} className="px-6 py-2 bg-[#67B74D] text-white font-black rounded-xl hover:bg-[#559e3d] shadow-md transition-all flex items-center gap-2 disabled:opacity-50 text-sm">
                                        {isSavingEdit ? <Icon name="RefreshCw" className="animate-spin" size={16}/> : <Icon name="Save" size={16}/>} Guardar
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const TesoreriaView = ({ db, apiCall, showToast }) => {
            const [activeTab, setActiveTab] = useState('pendientes');
            const [searchTerm, setSearchTerm] = useState('');
            const [isSaving, setIsSaving] = useState(false);
            const [confirmModal, setConfirmModal] = useState({ show: false, row: null });
            const [selectedCuentaOrigen, setSelectedCuentaOrigen] = useState('');
            const [showCuentasModal, setShowCuentasModal] = useState(false);
            const [nuevaCuenta, setNuevaCuenta] = useState({ banco: '', tipo_cuenta: 'Ahorros', numero_cuenta: '' });
            const [isSavingCuenta, setIsSavingCuenta] = useState(false);

            const [fDesde, setFDesde] = useState(() => {
                const d = new Date();
                d.setDate(1);
                return d.toISOString().split('T')[0];
            });
            const [fHasta, setFHasta] = useState(() => new Date().toISOString().split('T')[0]);

            const getNombreFinanciera = (idFin) => {
                const fin = (db.financieras || []).find(f => String(f.id_financiera).trim() === String(idFin).trim());
                return fin ? fin.nombre_financiera : idFin;
            };

            const getNombreTienda = (idCli) => {
                const cli = (db.clientes || []).find(c => String(c.id_cliente).trim() === String(idCli).trim());
                return cli ? cli.nombre_cliente : 'Aliado No Encontrado';
            };

            const getDatosBancarios = (idCli) => {
                const cli = (db.clientes || []).find(c => String(c.id_cliente).trim() === String(idCli).trim());
                const bancoData = (db.bancos || []).find(b => String(b.id_cliente).trim() === String(idCli).trim());
                
                if (!cli && !bancoData) return null;
                
                const banco = bancoData ? bancoData.banco : (cli ? cli.banco : '');
                const tipo = bancoData ? bancoData.tipo_cuenta : (cli ? cli.tipo_cuenta : '');
                const cuenta = bancoData ? bancoData.cuenta_bancaria : (cli ? cli.cuenta_bancaria : '');
                const nit = bancoData ? bancoData.cedula_nit : (cli ? cli.cedula_nit : '');
                const nombreComercio = bancoData && bancoData.nombre_comercio ? bancoData.nombre_comercio : (cli ? cli.nombre_cliente : 'Desconocido');

                if (!banco && !cuenta) return null;

                return { titular: nombreComercio, nit, banco, tipo, cuenta, nombre_tienda: cli ? cli.nombre_cliente : nombreComercio };
            };

            const filteredPendientes = useMemo(() => {
                const term = searchTerm.toLowerCase();
                return (db.simulaciones || []).filter(s => {
                    const est = String(s.estado || s.Estado || '').toLowerCase().trim();
                    if (est !== 'aprobado') return false;

                    if (term) {
                        const nTienda = getNombreTienda(s.id_cliente).toLowerCase();
                        const nCli = String(s.nombre || s.Nombre || '').toLowerCase();
                        const doc = String(s.cc || s.CC || '').toLowerCase();
                        const nFin = String(getNombreFinanciera(s.id_financiera)).toLowerCase();
                        if (!nCli.includes(term) && !doc.includes(term) && !nTienda.includes(term) && !nFin.includes(term)) return false;
                    }
                    return true;
                }).reverse();
            }, [db.simulaciones, searchTerm, db.clientes, db.financieras]);

            const parseP = (fechaStr) => {
                if(!fechaStr) return 0;
                const b = String(fechaStr).split('/');
                if(b.length === 3) return new Date(b[2], b[1]-1, b[0]).getTime();
                return new Date(fechaStr).getTime();
            };

            const filteredHistorial = useMemo(() => {
                const term = searchTerm.toLowerCase();
                const t1 = fDesde ? new Date(fDesde + 'T00:00:00').getTime() : 0;
                const t2 = fHasta ? new Date(fHasta + 'T23:59:59').getTime() : Infinity;

                return (db.simulaciones || []).filter(s => {
                    const est = String(s.estado || s.Estado || '').toLowerCase().trim();
                    if (est !== 'desembolsado') return false;

                    const t = parseP(s.fecha || s.Fecha);
                    if (t1 && t2 && t && (t < t1 || t > t2)) return false;

                    if (term) {
                        const nTienda = getNombreTienda(s.id_cliente).toLowerCase();
                        const nCli = String(s.nombre || s.Nombre || '').toLowerCase();
                        const doc = String(s.cc || s.CC || '').toLowerCase();
                        const nFin = String(getNombreFinanciera(s.id_financiera)).toLowerCase();
                        if (!nCli.includes(term) && !doc.includes(term) && !nTienda.includes(term) && !nFin.includes(term)) return false;
                    }
                    return true;
                }).reverse();
            }, [db.simulaciones, fDesde, fHasta, searchTerm, db.clientes, db.financieras]);

            const exportarExcel = () => {
                if (filteredHistorial.length === 0) return showToast("No hay datos para exportar", "error");
                const exportData = filteredHistorial.map(s => ({
                    "Fecha": s.fecha || s.Fecha,
                    "Tienda Aliada": getNombreTienda(s.id_cliente),
                    "Entidad": getNombreFinanciera(s.id_financiera),
                    "Cédula Cliente": s.cc || s.CC || '-',
                    "Nombre Cliente": s.nombre || s.Nombre || '-',
                    "Valor Dispersado": parsePrice(s.valor_a_consignar),
                    "Estado": s.estado || s.Estado,
                    "Cuenta Origen (Salida)": s['CUENTA ORIGEN'] || s.cuenta_origen || 'No registrada'
                }));
                const worksheet = window.XLSX.utils.json_to_sheet(exportData);
                const workbook = window.XLSX.utils.book_new();
                window.XLSX.utils.book_append_sheet(workbook, worksheet, "Desembolsos");
                window.XLSX.writeFile(workbook, `Desembolsos_${fDesde}_al_${fHasta}.xlsx`);
            };

            const exportarPDF = () => {
                if (filteredHistorial.length === 0) return showToast("No hay datos para exportar", "error");
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF('landscape');
                doc.setFontSize(16);
                doc.text("Historial de Desembolsos", 14, 15);
                doc.setFontSize(10);
                doc.text(`Periodo: ${fDesde} al ${fHasta}`, 14, 22);

                const tableColumn = ["Fecha", "Tienda", "Entidad", "Documento", "Cliente", "Valor Dispersado", "Origen de Fondos"];
                const tableRows = filteredHistorial.map(s => [
                    s.fecha || s.Fecha,
                    getNombreTienda(s.id_cliente).substring(0, 20),
                    getNombreFinanciera(s.id_financiera),
                    s.cc || s.CC || '-',
                    String(s.nombre || s.Nombre || '-').substring(0, 20),
                    formatCurrency(parsePrice(s.valor_a_consignar)),
                    s['CUENTA ORIGEN'] || s.cuenta_origen || 'No registrada'
                ]);

                doc.autoTable({
                    head: [tableColumn],
                    body: tableRows,
                    startY: 28,
                    theme: 'grid',
                    styles: { fontSize: 8 },
                    headStyles: { fillColor: [16, 185, 129] }
                });
                doc.save(`Desembolsos_${fDesde}_al_${fHasta}.pdf`);
            };

            const openConfirmModal = (row) => {
                setConfirmModal({ show: true, row });
                setSelectedCuentaOrigen(''); 
            };

            const executeDesembolso = async () => {
                if (!confirmModal.row || !selectedCuentaOrigen) return; 
                setIsSaving(true);
                const r = confirmModal.row;
                const payload = {
                    id_simulacion: r.id_simulacion || r.id || r.cc,
                    cc: r.cc || r.CC,
                    estado: 'Desembolsado',
                    cuenta_origen: selectedCuentaOrigen
                };
                const success = await apiCall('actualizarEstadoSimulacion', payload, "Dinero dispersado exitosamente");
                if (success) setConfirmModal({ show: false, row: null });
                setIsSaving(false);
            };

            const handleCrearCuenta = async (e) => {
                e.preventDefault();
                setIsSavingCuenta(true);
                const success = await apiCall('crearCuentaTesoreria', nuevaCuenta, "Cuenta agregada exitosamente");
                if (success) setNuevaCuenta({ banco: '', tipo_cuenta: 'Ahorros', numero_cuenta: '' });
                setIsSavingCuenta(false);
            };

            const handleToggleCuentaEstado = async (c) => {
                const newStatus = c.estado === 'activo' ? 'inactivo' : 'activo';
                await apiCall('updateCuentaTesoreria', { ...c, estado: newStatus }, "Estado de cuenta actualizado");
            };

            return (
                <div className="flex flex-col h-full animate-fade-in pb-20 max-w-7xl mx-auto w-full">
                    
                    <div className="flex justify-between items-center bg-white p-4 rounded-2xl border border-slate-200 shadow-sm shrink-0 mb-6">
                        <div className="flex items-center gap-4">
                            <div className="w-12 h-12 bg-emerald-100 text-emerald-600 rounded-xl flex items-center justify-center shadow-inner">
                                <Icon name="Wallet" size={24}/>
                            </div>
                            <div>
                                <h2 className="text-xl font-black text-slate-800 tracking-tight leading-none">Caja y Bancos</h2>
                                <p className="text-xs font-bold text-slate-500 uppercase tracking-widest mt-1">Gestión de Desembolsos</p>
                            </div>
                        </div>
                        <button onClick={() => setShowCuentasModal(true)} className="p-3 bg-slate-50 text-slate-500 hover:text-indigo-600 hover:bg-indigo-50 rounded-xl transition-colors border border-slate-200 shadow-sm" title="Configurar Cuentas">
                            <Icon name="Settings" size={20} />
                        </button>
                    </div>

                    <div className="flex overflow-x-auto bg-white rounded-2xl shadow-sm border border-slate-200 mb-6 p-1.5 custom-scrollbar gap-1 shrink-0">
                        <button onClick={() => setActiveTab('pendientes')} className={`flex items-center gap-2 px-5 py-2.5 rounded-xl text-xs font-black uppercase tracking-wider whitespace-nowrap transition-colors ${activeTab === 'pendientes' ? 'bg-emerald-500 text-white shadow-md' : 'text-slate-500 hover:bg-slate-100'}`}>
                            <Icon name="Clock" size={16} /> Por Dispersar
                        </button>
                        <button onClick={() => setActiveTab('historial')} className={`flex items-center gap-2 px-5 py-2.5 rounded-xl text-xs font-black uppercase tracking-wider whitespace-nowrap transition-colors ${activeTab === 'historial' ? 'bg-[#1e3a6d] text-white shadow-md' : 'text-slate-500 hover:bg-slate-100'}`}>
                            <Icon name="FileText" size={16} /> Historial
                        </button>
                    </div>

                    <div className="flex-1 flex flex-col overflow-hidden bg-white rounded-3xl border border-slate-200 shadow-sm p-4 md:p-6">
                        {activeTab === 'pendientes' ? (
                            <div className="flex flex-col h-full">
                                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-slate-50 p-4 rounded-xl border border-slate-100 mb-4 shrink-0">
                                    <div>
                                        <h3 className="font-black text-slate-700 text-sm uppercase tracking-widest">Cola de Pagos</h3>
                                        <p className="text-xs text-slate-500 font-medium mt-0.5">Tienes <strong className="text-emerald-600">{filteredPendientes.length}</strong> solicitudes listas.</p>
                                    </div>
                                    <div className="relative w-full sm:w-72">
                                        <input type="text" placeholder="Buscar por cédula o nombre..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} className="w-full bg-white border border-slate-200 py-2.5 pl-10 pr-4 rounded-xl text-sm outline-none focus:ring-2 focus:ring-emerald-500 font-medium transition-all shadow-sm" />
                                        <Icon name="Search" size={16} className="text-slate-400 absolute left-3 top-1/2 -translate-y-1/2 pointer-events-none"/>
                                    </div>
                                </div>

                                <div className="flex-1 overflow-auto custom-scrollbar border border-slate-200 rounded-xl">
                                    <table className="w-full text-left whitespace-nowrap">
                                        <thead className="bg-slate-800 text-white text-[10px] uppercase tracking-widest sticky top-0 z-10 shadow-md">
                                            <tr>
                                                <th className="px-5 py-4 font-bold">Expediente (Cliente y Tienda)</th>
                                                <th className="px-5 py-4 font-bold text-center border-l border-slate-700">Entidad</th>
                                                <th className="px-5 py-4 font-bold border-l border-slate-700">Datos Bancarios del Aliado</th>
                                                <th className="px-5 py-4 font-black text-right text-emerald-400 border-l border-slate-700">Valor a Dispersar</th>
                                                <th className="px-5 py-4 font-bold text-center border-l border-slate-700">Acción</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100 text-sm">
                                            {filteredPendientes.length > 0 ? filteredPendientes.map((row, idx) => {
                                                const bankData = getDatosBancarios(row.id_cliente);
                                                return (
                                                    <tr key={idx} className="hover:bg-slate-50 transition-colors group">
                                                        <td className="px-5 py-4 align-top">
                                                            <div className="flex flex-col gap-1.5">
                                                                <div className="flex items-center gap-1.5 mb-1">
                                                                    <span className="inline-flex items-center gap-1 text-[10px] font-black text-indigo-600 uppercase tracking-widest bg-indigo-50 border border-indigo-100 px-2 py-0.5 rounded-md shadow-sm">
                                                                        <Icon name="Store" size={12} /> {getNombreTienda(row.id_cliente)}
                                                                    </span>
                                                                </div>
                                                                <div className="font-black text-slate-800 leading-tight text-base">{row.nombre || row.Nombre || '-'}</div>
                                                                <div className="flex items-center gap-2">
                                                                    <span className="text-[10px] font-mono font-bold text-slate-500 bg-slate-100 px-1.5 py-0.5 rounded border border-slate-200">C.C. {row.cc || row.CC}</span>
                                                                    <span className="text-[10px] text-slate-400 font-medium">{parseDate(row.fecha || row.Fecha)}</span>
                                                                </div>
                                                            </div>
                                                        </td>
                                                        <td className="px-5 py-4 align-middle text-center border-l border-slate-100">
                                                            <span className="inline-flex items-center justify-center bg-indigo-50 text-indigo-700 border border-indigo-200 px-2.5 py-1 rounded-md text-[10px] font-black tracking-widest shadow-sm mt-1">
                                                                {getNombreFinanciera(row.id_financiera)}
                                                            </span>
                                                        </td>
                                                        <td className="px-5 py-4 align-top border-l border-slate-100">
                                                            {bankData ? (
                                                                <div className="flex items-start gap-3 bg-slate-50 border border-slate-200 p-2.5 rounded-xl shadow-sm">
                                                                    <div className="w-8 h-8 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center shrink-0"><Icon name="Landmark" size={16} /></div>
                                                                    <div className="flex flex-col">
                                                                        <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest leading-none mb-1">{bankData.banco} - {bankData.tipo}</span>
                                                                        <span className="font-black text-[#1e3a6d] tracking-wider bg-white px-2 py-1 rounded border border-slate-200 shadow-sm text-sm">{bankData.cuenta}</span>
                                                                    </div>
                                                                </div>
                                                            ) : (
                                                                <div className="bg-orange-50 border border-orange-200 rounded-lg p-3 flex flex-col items-center justify-center text-orange-600 h-full mt-1">
                                                                    <Icon name="AlertCircle" size={16} className="mb-1" />
                                                                    <span className="text-[10px] font-bold uppercase tracking-widest text-center">Sin Datos<br/>Bancarios</span>
                                                                </div>
                                                            )}
                                                        </td>
                                                        <td className="px-5 py-4 align-middle text-right border-l border-slate-100 bg-emerald-50/30">
                                                            <div className="text-2xl font-black text-emerald-600 tracking-tight">{formatCurrency(row.valor_a_consignar)}</div>
                                                        </td>
                                                        <td className="px-5 py-4 align-middle text-center border-l border-slate-100">
                                                            <button onClick={() => openConfirmModal(row)} className="w-full px-4 py-3 bg-emerald-500 text-white rounded-xl font-black text-xs uppercase tracking-widest shadow-md hover:bg-emerald-600 hover:-translate-y-0.5 transition-all flex items-center justify-center gap-2">
                                                                <Icon name="Send" size={16} /> Desembolsar
                                                            </button>
                                                        </td>
                                                    </tr>
                                                );
                                            }) : <tr><td colSpan="5" className="px-5 py-12 text-center text-slate-400 font-bold"><Icon name="CheckCircle" size={32} className="mx-auto mb-2 opacity-50"/> Bandeja Vacía. No hay pagos pendientes.</td></tr>}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        ) : (
                            <div className="flex flex-col h-full">
                                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-slate-50 p-4 rounded-xl border border-slate-100 mb-4 shrink-0">
                                    <div className="flex items-center gap-4 flex-wrap">
                                        <div className="flex flex-col"><span className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Desde</span><input type="date" value={fDesde} onChange={e=>setFDesde(e.target.value)} className="bg-white border border-slate-200 rounded-lg px-3 py-2 text-sm font-bold text-slate-700 outline-none focus:ring-2 focus:ring-[#1e3a6d] shadow-sm"/></div>
                                        <div className="flex flex-col"><span className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Hasta</span><input type="date" value={fHasta} onChange={e=>setFHasta(e.target.value)} className="bg-white border border-slate-200 rounded-lg px-3 py-2 text-sm font-bold text-slate-700 outline-none focus:ring-2 focus:ring-[#1e3a6d] shadow-sm"/></div>
                                    </div>
                                    <div className="flex items-center gap-2 w-full sm:w-auto">
                                        <div className="relative w-full sm:w-64">
                                            <input type="text" placeholder="Buscar..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} className="w-full bg-white border border-slate-200 py-2.5 pl-9 pr-3 rounded-xl text-sm outline-none focus:ring-2 focus:ring-[#1e3a6d] font-medium shadow-sm" />
                                            <Icon name="Search" size={16} className="text-slate-400 absolute left-3 top-1/2 -translate-y-1/2 pointer-events-none"/>
                                        </div>
                                        <button onClick={exportarExcel} className="flex items-center gap-2 p-2.5 bg-emerald-50 text-emerald-700 hover:bg-emerald-100 rounded-xl transition-colors border border-emerald-200 shadow-sm font-bold text-sm" title="Exportar a Excel">
                                            <Icon name="Download" size={18} /> <span className="hidden md:inline">Excel</span>
                                        </button>
                                        <button onClick={exportarPDF} className="flex items-center gap-2 p-2.5 bg-rose-50 text-rose-700 hover:bg-rose-100 rounded-xl transition-colors border border-rose-200 shadow-sm font-bold text-sm" title="Exportar a PDF">
                                            <Icon name="Download" size={18} /> <span className="hidden md:inline">PDF</span>
                                        </button>
                                    </div>
                                </div>
                                
                                <div className="flex-1 overflow-auto custom-scrollbar border border-slate-200 rounded-xl">
                                    <table className="w-full text-left whitespace-nowrap">
                                        <thead className="bg-slate-800 text-white text-[10px] uppercase tracking-widest sticky top-0 z-10 shadow-md">
                                            <tr>
                                                <th className="px-5 py-4 font-bold">Fecha</th>
                                                <th className="px-5 py-4 font-bold border-l border-slate-700">Expediente</th>
                                                <th className="px-5 py-4 font-bold text-center border-l border-slate-700">Entidad</th>
                                                <th className="px-5 py-4 font-bold text-center border-l border-slate-700">Origen Fondos</th>
                                                <th className="px-5 py-4 font-bold text-center border-l border-slate-700">Estado</th>
                                                <th className="px-5 py-4 font-black text-right text-emerald-400 border-l border-slate-700">Valor Dispersado</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100 text-sm">
                                            {filteredHistorial.length > 0 ? filteredHistorial.map((row, idx) => (
                                                <tr key={idx} className="hover:bg-slate-50 transition-colors">
                                                    <td className="px-5 py-4 font-medium text-slate-500">{parseDate(row.fecha || row.Fecha)}</td>
                                                    <td className="px-5 py-4 border-l border-slate-100">
                                                        <div className="flex flex-col gap-1">
                                                            <span className="text-[9px] font-black text-indigo-600 uppercase tracking-widest">{getNombreTienda(row.id_cliente)}</span>
                                                            <strong className="text-slate-800">{row.nombre || row.Nombre}</strong>
                                                            <span className="text-[10px] font-mono text-slate-500">CC. {row.cc || row.CC}</span>
                                                        </div>
                                                    </td>
                                                    <td className="px-5 py-4 text-center border-l border-slate-100"><span className="bg-slate-100 text-slate-600 px-2 py-1 rounded text-[10px] font-black tracking-widest">{getNombreFinanciera(row.id_financiera)}</span></td>
                                                    <td className="px-5 py-4 text-center border-l border-slate-100 text-xs font-bold text-slate-500">{row['CUENTA ORIGEN'] || row.cuenta_origen || '-'}</td>
                                                    <td className="px-5 py-4 text-center border-l border-slate-100"><span className="bg-emerald-800 text-white px-2 py-1 rounded text-[9px] font-black uppercase tracking-widest">Desembolsado</span></td>
                                                    <td className="px-5 py-4 text-right border-l border-slate-100 font-black text-lg text-slate-800">{formatCurrency(row.valor_a_consignar)}</td>
                                                </tr>
                                            )) : <tr><td colSpan="6" className="px-5 py-12 text-center text-slate-400 font-bold">Sin resultados en este periodo.</td></tr>}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* MODAL CONFIRMACIÓN DESEMBOLSO PREMIUM */}
                    {confirmModal.show && confirmModal.row && (
                        <div className="fixed inset-0 z-[8000] flex items-center justify-center bg-slate-900/70 p-4 backdrop-blur-sm animate-in fade-in">
                            <div className="bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden flex flex-col animate-pop-in">
                                <div className="p-6 bg-emerald-500 text-white text-center relative">
                                    <button onClick={() => !isSaving && setConfirmModal({ show: false, row: null })} className="absolute top-4 right-4 p-1.5 bg-black/10 hover:bg-black/20 rounded-full transition-colors"><Icon name="X" size={18} /></button>
                                    <div className="w-16 h-16 bg-white text-emerald-500 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg"><Icon name="Landmark" size={32} /></div>
                                    <h3 className="font-black text-2xl tracking-tight">Confirmar Desembolso</h3>
                                    <p className="text-emerald-100 font-medium text-sm mt-1">Se actualizará la base de datos.</p>
                                </div>
                                <div className="p-8 bg-slate-50 space-y-4">
                                    <div className="text-center">
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Valor a Transferir</p>
                                        <p className="text-4xl font-black text-slate-800">{formatCurrency(confirmModal.row.valor_a_consignar)}</p>
                                    </div>
                                    <div className="bg-white border border-slate-200 rounded-2xl p-4 shadow-sm mt-4">
                                        <div className="flex justify-between items-center border-b border-slate-100 pb-2 mb-2">
                                            <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Tienda Aliada</span>
                                            <span className="font-black text-indigo-600 text-xs uppercase truncate max-w-[200px]">{getNombreTienda(confirmModal.row.id_cliente)}</span>
                                        </div>
                                        <div className="flex justify-between items-center border-b border-slate-100 pb-2 mb-2">
                                            <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Cliente Final</span>
                                            <span className="font-bold text-slate-700 text-sm truncate max-w-[200px]">{confirmModal.row.nombre || confirmModal.row.Nombre}</span>
                                        </div>
                                        <div className="flex justify-between items-center">
                                            <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Cédula</span>
                                            <span className="font-mono font-bold text-slate-600 text-xs">{confirmModal.row.cc || confirmModal.row.CC}</span>
                                        </div>
                                        <div className="mt-4 pt-3 border-t border-slate-100">
                                            <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest block mb-2">Cuenta de Origen (Obligatorio)</label>
                                            <select value={selectedCuentaOrigen} onChange={e => setSelectedCuentaOrigen(e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-3 text-sm font-bold text-slate-700 outline-none focus:ring-2 focus:ring-emerald-500 transition-colors">
                                                <option value="">-- Selecciona desde dónde pagas --</option>
                                                {(db.cuentas_tesoreria || []).filter(c => c.estado === 'activo').map((c, i) => (
                                                    <option key={i} value={`${c.banco} - ${c.numero_cuenta}`}>{c.banco} ({c.tipo_cuenta}) - {c.numero_cuenta}</option>
                                                ))}
                                            </select>
                                        </div>
                                    </div>
                                </div>
                                <div className="p-6 bg-white border-t border-slate-100 flex gap-3">
                                    <button onClick={() => setConfirmModal({ show: false, row: null })} disabled={isSaving} className="flex-1 py-3.5 bg-slate-100 text-slate-600 font-bold rounded-xl hover:bg-slate-200 transition-colors disabled:opacity-50 text-sm">Cancelar</button>
                                    <button onClick={executeDesembolso} disabled={isSaving || !selectedCuentaOrigen} className="flex-[2] py-3.5 bg-emerald-500 text-white font-black rounded-xl hover:bg-emerald-600 shadow-md hover:-translate-y-0.5 transition-all flex items-center justify-center gap-2 disabled:opacity-50 text-sm uppercase tracking-wide">
                                        {isSaving ? <><Icon name="RefreshCw" size={18} className="animate-spin" /> Procesando...</> : <><Icon name="CheckCircle" size={18} /> Confirmar Pago</>}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL GESTIÓN DE CUENTAS */}
                    {showCuentasModal && (
                        <div className="fixed inset-0 z-[8000] flex items-center justify-center bg-slate-900/70 p-4 backdrop-blur-sm animate-in fade-in">
                            <div className="bg-white w-full max-w-2xl rounded-3xl shadow-2xl flex flex-col overflow-hidden animate-pop-in max-h-[90vh]">
                                <div className="p-5 bg-slate-800 text-white flex justify-between items-center shrink-0">
                                    <div>
                                        <h3 className="font-black text-lg flex items-center gap-2"><Icon name="Landmark"/> Cuentas de Tesorería</h3>
                                        <p className="text-xs text-slate-400 font-medium mt-0.5">Administra las cuentas de salida de fondos.</p>
                                    </div>
                                    <button onClick={() => setShowCuentasModal(false)} className="p-2 hover:bg-white/20 rounded-full transition-colors"><Icon name="X"/></button>
                                </div>
                                <div className="p-6 bg-slate-50 flex-1 overflow-y-auto custom-scrollbar">
                                    <form onSubmit={handleCrearCuenta} className="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm mb-6">
                                        <h4 className="text-sm font-black text-slate-800 mb-4 uppercase tracking-widest">Agregar Nueva Cuenta</h4>
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                            <div><label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-1">Banco</label><input required type="text" value={nuevaCuenta.banco} onChange={e => setNuevaCuenta({...nuevaCuenta, banco: e.target.value})} className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold outline-none focus:ring-2 focus:ring-indigo-500" /></div>
                                            <div>
                                                <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-1">Tipo</label>
                                                <select value={nuevaCuenta.tipo_cuenta} onChange={e => setNuevaCuenta({...nuevaCuenta, tipo_cuenta: e.target.value})} className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold outline-none focus:ring-2 focus:ring-indigo-500">
                                                    <option value="Ahorros">Ahorros</option>
                                                    <option value="Corriente">Corriente</option>
                                                    <option value="Billetera Digital">Billetera Digital</option>
                                                    <option value="Convenio">Convenio</option>
                                                    <option value="Efectivo / Caja">Efectivo / Caja</option>
                                                </select>
                                            </div>
                                            <div><label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-1">Número</label><input required type="text" value={nuevaCuenta.numero_cuenta} onChange={e => setNuevaCuenta({...nuevaCuenta, numero_cuenta: e.target.value})} className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold outline-none focus:ring-2 focus:ring-indigo-500" /></div>
                                        </div>
                                        <div className="mt-4 flex justify-end">
                                            <button type="submit" disabled={isSavingCuenta} className="px-6 py-2.5 bg-indigo-600 text-white font-bold text-xs uppercase tracking-widest rounded-xl shadow-md hover:bg-indigo-700 transition-colors flex items-center gap-2"><Icon name="PlusCircle" size={16} /> Guardar Cuenta</button>
                                        </div>
                                    </form>
                                    <div className="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
                                        <table className="w-full text-left text-sm">
                                            <thead className="bg-slate-100 text-slate-500 text-[10px] uppercase tracking-widest"><tr><th className="px-4 py-3">Banco</th><th className="px-4 py-3">Tipo</th><th className="px-4 py-3">Número</th><th className="px-4 py-3 text-center">Estado</th><th className="px-4 py-3 text-center">Acción</th></tr></thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {(db.cuentas_tesoreria || []).map((c, i) => (
                                                    <tr key={i} className="hover:bg-slate-50">
                                                        <td className="px-4 py-3 font-black text-slate-700">{c.banco}</td><td className="px-4 py-3 text-slate-500">{c.tipo_cuenta}</td><td className="px-4 py-3 font-mono font-bold text-slate-600">{c.numero_cuenta}</td>
                                                        <td className="px-4 py-3 text-center"><span className={`px-2 py-1 rounded text-[9px] font-black uppercase tracking-widest ${c.estado === 'activo' ? 'bg-emerald-100 text-emerald-700' : 'bg-rose-100 text-rose-700'}`}>{c.estado}</span></td>
                                                        <td className="px-4 py-3 text-center"><button onClick={() => handleToggleCuentaEstado(c)} className={`px-3 py-1.5 rounded-lg text-xs font-bold transition-colors ${c.estado === 'activo' ? 'text-rose-600 bg-rose-50 hover:bg-rose-100' : 'text-emerald-600 bg-emerald-50 hover:bg-emerald-100'}`}>{c.estado === 'activo' ? 'Desactivar' : 'Activar'}</button></td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [currentUser, setCurrentUser] = useState(null);
            const [userPerms, setUserPerms] = useState({ isGlobalAdmin: false, isRegionalAdmin: false, isSemiAdmin: false, isTesoreria: false, hasPrivileges: false, un: '' });
            
            const [db, setDb] = useState({ clientes: [], financieras: [], cuotas: [], porcentajes: [], simulaciones: [], roles: [], roles_permisos: [], bancos: [], cuentas_tesoreria: [], notificacion: null });
            const [distribuidorPrices, setDistribuidorPrices] = useState([]);
            
            const [activeView, setActiveView] = useState('sim'); 
            const [isSidebarCollapsed, setIsSidebarCollapsed] = useState(false);
            
            const [loading, setLoading] = useState(false);
            const [initialLoading, setInitialLoading] = useState(true);
            const [loginLoading, setLoginLoading] = useState(false);
            const [toast, setToast] = useState({ show: false, message: '', type: 'success' });
            
            const [qrModal, setQrModal] = useState({ show: false, url: '', title: '' });
            const [preciosModal, setPreciosModal] = useState({ show: false, loading: false });

            const showToast = useCallback((message, type = 'success') => {
                setToast({ show: true, message, type });
                setTimeout(() => setToast({ show: false, message: '', type: 'success' }), 3500);
            }, []);

            const fetchData = useCallback(async (isRefresh = false) => {
                setLoading(true);
                let resJson = null;
                let retries = 3;
                
                while (retries > 0 && !resJson) {
                    try {
                        const separator = SCRIPT_URL.includes('?') ? '&' : '?';
                        const response = await fetch(`${SCRIPT_URL}${separator}action=getData`, { method: 'GET', mode: 'cors' });
                        if (!response.ok) throw new Error("Network error");
                        resJson = await response.json();
                        
                        if (resJson.status === 'success' && resJson.data) {
                            setDb(resJson.data);
                            if(isRefresh) showToast("Datos sincronizados.", "success");
                        } else {
                            throw new Error(resJson.message || "Failed to load DB");
                        }
                    } catch (error) {
                        retries--;
                        if (retries > 0) await new Promise(r => setTimeout(r, 1500));
                        else {
                            console.error("Fetch Data Error:", error);
                            showToast("Error de conexión. Intenta de nuevo.", "error");
                        }
                    }
                }
                setLoading(false);
                setInitialLoading(false);
            }, [showToast]);

            useEffect(() => {
                const savedSession = sessionStorage.getItem('soluciones_user_session_v4');
                if (savedSession) {
                    try {
                        const user = JSON.parse(savedSession);
                        setCurrentUser(user);
                        setupPermissions(user);
                    } catch (e) {
                        sessionStorage.removeItem('soluciones_user_session_v4');
                    }
                }
                fetchData();
            }, [fetchData]);

            useEffect(() => {
                if (currentUser) {
                    const interval = setInterval(() => { fetchData(false); }, 300000);
                    return () => clearInterval(interval);
                }
            }, [currentUser, fetchData]);

            const setupPermissions = (user) => {
                const uName = String(user.nombre_cliente).toLowerCase().trim();
                setUserPerms({
                    isGlobalAdmin: uName === 'administrador',
                    isRegionalAdmin: uName.startsWith('admin-'),
                    isSemiAdmin: uName.startsWith('cia'),
                    isTesoreria: uName === 'tesoreria' || uName === 'tesorería',
                    hasPrivileges: (uName === 'administrador' || uName.startsWith('admin-') || uName.startsWith('cia') || uName === 'tesoreria' || uName === 'tesorería'),
                    un: user.un || user.UN || user.UnidaddeNegocio || user['UNIDAD DE NEGOCIO'] || user['Unidad de Negocio'] || ''
                });
            };

            const handleLogin = async (user, pass) => {
                setLoginLoading(true);
                
                if(db.clientes.length === 0) {
                   await fetchData();
                }

                const f = db.clientes.find(c => String(c.nombre_cliente).toLowerCase().trim() === user.toLowerCase().trim() && String(c.contrasena) === pass);
                
                if (f) {
                    setCurrentUser(f);
                    setupPermissions(f);
                    sessionStorage.setItem('soluciones_user_session_v4', JSON.stringify(f));
                    setActiveView('sim');
                } else {
                    showToast("Credenciales incorrectas o usuario no existe.", "error");
                }
                setLoginLoading(false);
            };

            const handleLogout = () => {
                setCurrentUser(null);
                setUserPerms({ isGlobalAdmin: false, isRegionalAdmin: false, isSemiAdmin: false, isTesoreria: false, hasPrivileges: false, un: '' });
                sessionStorage.removeItem('soluciones_user_session_v4');
                setActiveView('sim');
            };

            const apiCall = async (action, data, successMsg) => {
                setLoading(true);
                try {
                    const separator = SCRIPT_URL.includes('?') ? '&' : '?';
                    const payloadParam = data ? `&data=${encodeURIComponent(JSON.stringify(data))}` : '';
                    const response = await fetch(`${SCRIPT_URL}${separator}action=${action}${payloadParam}`, { method: 'GET', mode: 'cors' });
                    
                    if (!response.ok) throw new Error("Network error");
                    const resJson = await response.json();

                    if (resJson.status === 'success') {
                        await fetchData(false);
                        if(successMsg) showToast(successMsg, "success");
                        return true;
                    } else {
                        throw new Error(resJson.message);
                    }
                } catch (error) {
                    console.error(`API Error (${action}):`, error);
                    showToast(`Error: ${error.message}`, "error");
                    return false;
                } finally {
                    setLoading(false);
                }
            };

            const loadDistribuidorPrices = async () => {
                setPreciosModal({ show: true, loading: true });
                try {
                    const separator = SCRIPT_URL.includes('?') ? '&' : '?';
                    const response = await fetch(`${SCRIPT_URL}${separator}action=getPrecios`, { method: 'GET', mode: 'cors' });
                    if(response.ok){
                        const data = await response.json();
                        if(!data.error) setDistribuidorPrices(data);
                    }
                } catch (e) {
                    showToast("Error cargando precios.", "error");
                } finally {
                    setPreciosModal(prev => ({ ...prev, loading: false }));
                }
            };

            const NavItem = ({ id, icon, label, onClick, hidden = false }) => {
                if (hidden) return null;
                const isActive = activeView === id;
                return (
                    <button 
                        onClick={() => onClick ? onClick() : setActiveView(id)} 
                        className={`group relative flex items-center shrink-0 transition-all duration-200 overflow-hidden
                            ${isActive ? 'bg-[#2C4C8C] text-white shadow-md' : 'text-slate-500 hover:bg-slate-200 hover:text-slate-800'}
                            ${isSidebarCollapsed ? 'justify-center w-12 h-12 rounded-2xl mx-auto' : 'justify-start w-full px-4 py-3.5 rounded-xl'}`}
                        title={isSidebarCollapsed ? label : ''}
                    >
                        <Icon name={icon} size={isSidebarCollapsed ? 20 : 18} className={`shrink-0 transition-transform duration-200 ${isActive && isSidebarCollapsed ? 'scale-110' : ''} ${!isActive && 'group-hover:scale-110'}`} />
                        <span className={`whitespace-nowrap transition-all duration-300 font-black text-xs uppercase tracking-widest ${isSidebarCollapsed ? 'opacity-0 w-0 ml-0 hidden' : 'opacity-100 w-auto ml-3'}`}>
                            {label}
                        </span>
                    </button>
                );
            };

            if (initialLoading) {
                return <div className="h-screen w-screen flex flex-col items-center justify-center bg-gradient-to-br from-[#1e3a6d] to-[#2C4C8C]"><Icon name="RefreshCw" size={48} className="text-white animate-spin mb-4" /><p className="text-white font-bold tracking-widest uppercase text-sm">Cargando Plataforma...</p></div>;
            }

            if (!currentUser) {
                return (
                    <div className="h-screen w-screen flex items-center justify-center p-4 bg-gradient-to-br from-[#1e3a6d] to-[#2C4C8C]">
                        <Toast show={toast.show} message={toast.message} type={toast.type} onClose={() => setToast({ ...toast, show: false })} />
                        <LoginView onLogin={handleLogin} loginLoading={loginLoading} />
                    </div>
                );
            }

            return (
                <div className="h-screen w-screen flex flex-col md:flex-row bg-white relative overflow-hidden animate-fade-in">
                    <Toast show={toast.show} message={toast.message} type={toast.type} onClose={() => setToast({ ...toast, show: false })} />
                    
                    {loading && (
                        <div className="absolute top-4 right-6 z-50 bg-white/90 backdrop-blur px-3 py-1.5 rounded-full shadow-sm flex items-center gap-2 text-xs font-bold text-[#2C4C8C]">
                            <Icon name="RefreshCw" size={14} className="animate-spin" /> Sincronizando...
                        </div>
                    )}

                    <div className="md:hidden bg-white border-b border-slate-200 px-5 py-4 flex justify-between items-center shrink-0 z-20">
                        <img src="https://raw.githubusercontent.com/TECNOMARIN/MULTIMARCAS/main/SOLUCIONES%20PNG.png" alt="Logo" className="h-8 object-contain" />
                        <div className="flex items-center gap-3">
                            <div className="w-8 h-8 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center font-bold text-sm">
                                {currentUser?.nombre_cliente?.charAt(0).toUpperCase()}
                            </div>
                        </div>
                    </div>

                    <div className={`bg-slate-50 border-r border-slate-200 flex flex-col shrink-0 transition-all duration-300 relative z-30
                        ${isSidebarCollapsed ? 'w-[80px]' : 'w-64'} 
                        hidden md:flex h-full`}
                    >
                        <button onClick={() => setIsSidebarCollapsed(!isSidebarCollapsed)} className="absolute -right-3.5 top-8 bg-white border border-slate-200 rounded-full p-1.5 text-slate-400 hover:text-[#2C4C8C] shadow-md z-40 transition-transform hover:scale-110">
                            <Icon name={isSidebarCollapsed ? "ChevronRight" : "ChevronLeft"} size={16} />
                        </button>

                        <div className={`flex justify-center items-center h-20 shrink-0 border-b border-slate-200 bg-white transition-all duration-300 overflow-hidden ${isSidebarCollapsed ? 'px-2' : 'px-6'}`}>
                            <img src="https://raw.githubusercontent.com/TECNOMARIN/MULTIMARCAS/main/SOLUCIONES%20PNG.png" alt="Logo" className={`object-contain transition-all duration-300 ${isSidebarCollapsed ? 'h-8' : 'h-10'}`} />
                        </div>

                        <div className={`border-b border-slate-200 bg-white flex flex-col items-center text-center transition-all duration-300 overflow-hidden ${isSidebarCollapsed ? 'h-0 py-0 opacity-0' : 'h-auto py-5 opacity-100 px-4'}`}>
                            <div className="w-12 h-12 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center font-black text-xl mb-3 shadow-inner">{currentUser?.nombre_cliente?.charAt(0).toUpperCase()}</div>
                            <h3 className="text-sm font-black text-slate-800 line-clamp-2 w-full leading-tight" title={currentUser?.nombre_cliente}>{currentUser?.nombre_cliente}</h3>
                            {userPerms.hasPrivileges && !userPerms.isGlobalAdmin && (
                                <span className="bg-blue-50 text-blue-700 border border-blue-200 px-2 py-0.5 rounded text-[9px] font-black uppercase tracking-widest mt-2 w-fit mx-auto truncate max-w-full">UN: {userPerms.un}</span>
                            )}
                        </div>

                        <div className="flex flex-col flex-1 overflow-y-auto custom-scrollbar p-3 space-y-1.5 mt-2 pb-20">
                            {!isSidebarCollapsed && <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest px-3 mb-1 mt-2">Principal</p>}
                            <NavItem id="sim" icon="Calculator" label="Calculadora" />
                            <NavItem id="ext" icon="Smartphone" label="Crédito en Línea" />

                            {userPerms.hasPrivileges && (
                                <>
                                    {!isSidebarCollapsed && <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest px-3 mb-1 mt-4">Gestión y Caja</p>}
                                    <NavItem id="dash" icon="PieChart" label="Dashboard" hidden={!userPerms.isGlobalAdmin && !userPerms.isRegionalAdmin} />
                                    <NavItem id="tes" icon="Landmark" label="Tesorería" hidden={!(userPerms.isGlobalAdmin || userPerms.isRegionalAdmin || userPerms.isTesoreria)} />
                                </>
                            )}

                            {(userPerms.hasPrivileges) && (
                                <>
                                    {!isSidebarCollapsed && <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest px-3 mb-1 mt-4">Administración</p>}
                                    <NavItem id="con" icon="Database" label="Consultas" hidden={!(userPerms.isGlobalAdmin || userPerms.isRegionalAdmin || userPerms.isTesoreria)} />
                                    <NavItem id="adm" icon="Settings" label="Configuración" hidden={!userPerms.hasPrivileges} />
                                </>
                            )}
                        </div>

                        <div className="p-3 border-t border-slate-200 bg-white shrink-0">
                            <button onClick={handleLogout} className={`flex items-center justify-center p-3 text-rose-500 hover:bg-rose-50 rounded-xl transition-colors border border-transparent hover:border-rose-100 group ${isSidebarCollapsed ? 'w-12 h-12 mx-auto' : 'w-full gap-2 px-4'}`} title={isSidebarCollapsed ? "Cerrar Sesión" : ""}>
                                <Icon name="LogOut" size={isSidebarCollapsed ? 20 : 16} className={`${isSidebarCollapsed && 'group-hover:scale-110 transition-transform'}`} /> 
                                {!isSidebarCollapsed && <span className="text-xs font-black uppercase tracking-widest">Cerrar Sesión</span>}
                            </button>
                        </div>
                    </div>

                    <div className="md:hidden bg-white border-t border-slate-200 flex overflow-x-auto custom-scrollbar p-2 gap-2 shrink-0 z-20">
                        <button onClick={() => setActiveView('sim')} className={`flex-1 min-w-[100px] flex flex-col items-center justify-center p-2 rounded-xl text-[10px] font-black uppercase tracking-wider transition-all ${activeView === 'sim' ? 'bg-[#2C4C8C] text-white shadow-md' : 'text-slate-500 hover:bg-slate-100'}`}><Icon name="Calculator" size={18} className="mb-1"/> Simulador</button>
                        <button onClick={() => setActiveView('ext')} className={`flex-1 min-w-[100px] flex flex-col items-center justify-center p-2 rounded-xl text-[10px] font-black uppercase tracking-wider transition-all ${activeView === 'ext' ? 'bg-[#2C4C8C] text-white shadow-md' : 'text-slate-500 hover:bg-slate-100'}`}><Icon name="Smartphone" size={18} className="mb-1"/> Créditos</button>
                        {(userPerms.isGlobalAdmin || userPerms.isRegionalAdmin || userPerms.isTesoreria) && <button onClick={() => setActiveView('tes')} className={`flex-1 min-w-[100px] flex flex-col items-center justify-center p-2 rounded-xl text-[10px] font-black uppercase tracking-wider transition-all ${activeView === 'tes' ? 'bg-[#2C4C8C] text-white shadow-md' : 'text-slate-500 hover:bg-slate-100'}`}><Icon name="Landmark" size={18} className="mb-1"/> Caja</button>}
                        {userPerms.hasPrivileges && <button onClick={() => setActiveView('adm')} className={`flex-1 min-w-[100px] flex flex-col items-center justify-center p-2 rounded-xl text-[10px] font-black uppercase tracking-wider transition-all ${activeView === 'adm' ? 'bg-[#2C4C8C] text-white shadow-md' : 'text-slate-500 hover:bg-slate-100'}`}><Icon name="Settings" size={18} className="mb-1"/> Config</button>}
                        <button onClick={handleLogout} className="flex-1 min-w-[100px] flex flex-col items-center justify-center p-2 rounded-xl text-[10px] font-black uppercase tracking-wider transition-all text-rose-500 hover:bg-rose-50"><Icon name="LogOut" size={18} className="mb-1"/> Salir</button>
                    </div>

                    <div className="flex-1 flex flex-col h-full overflow-hidden bg-slate-50/50 relative">
                        {db.notificacion && db.notificacion.activo && db.notificacion.mensaje && activeView === 'sim' && (
                            <div className={`px-6 py-4 border-b flex items-start gap-3 ${db.notificacion.tipo === 'urgente' ? 'bg-rose-50 border-rose-200 text-rose-800' : 'bg-blue-50 border-blue-200 text-blue-800'} shrink-0 z-10`}>
                                <Icon name={db.notificacion.tipo === 'urgente' ? 'AlertTriangle' : 'Info'} size={20} className="shrink-0 mt-0.5" />
                                <div>
                                    <strong className="text-xs uppercase tracking-widest block mb-0.5">Aviso Importante</strong>
                                    <p className="text-sm font-semibold leading-relaxed">{db.notificacion.mensaje}</p>
                                </div>
                            </div>
                        )}

                        <div className="flex-1 overflow-y-auto custom-scrollbar p-4 md:p-8 relative">
                            {activeView === 'sim' && <CalculatorView db={db} currentUser={currentUser} userPerms={userPerms} apiCall={apiCall} showToast={showToast} />}
                            {activeView === 'ext' && <OnlineCreditView onOpenQr={(url, title) => setQrModal({show: true, url, title})} loadDistribuidorPrices={loadDistribuidorPrices} />}
                            {activeView === 'dash' && (userPerms.isGlobalAdmin || userPerms.isRegionalAdmin) && <DashboardView db={db} userPerms={userPerms} />}
                            {activeView === 'adm' && userPerms.hasPrivileges && <AdminView db={db} apiCall={apiCall} showToast={showToast} />}
                            {activeView === 'con' && (userPerms.isGlobalAdmin || userPerms.isRegionalAdmin || userPerms.isTesoreria) && <QueriesView db={db} userPerms={userPerms} apiCall={apiCall} showToast={showToast} />}
                            {activeView === 'tes' && (userPerms.isGlobalAdmin || userPerms.isRegionalAdmin || userPerms.isTesoreria) && <TesoreriaView db={db} apiCall={apiCall} showToast={showToast} />}
                        </div>
                    </div>

                    {preciosModal.show && (
                        <div className="fixed inset-0 z-[7000] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm px-4 animate-in fade-in">
                            <div className="bg-white rounded-3xl shadow-2xl max-w-5xl w-full max-h-[90vh] flex flex-col animate-pop-in border border-slate-200">
                                <div className="bg-amber-400 p-6 flex justify-between items-center shrink-0">
                                    <h3 className="text-amber-900 font-black text-xl tracking-tight">Lista de Precios - Mayorista</h3>
                                    <button onClick={() => setPreciosModal({show: false, loading: false})} className="text-amber-900 hover:bg-white/30 p-2 rounded-full transition-colors"><Icon name="X" size={24}/></button>
                                </div>
                                <div className="p-6 flex-1 overflow-y-auto custom-scrollbar bg-slate-50">
                                    {preciosModal.loading ? (
                                        <div className="flex flex-col items-center justify-center py-24 text-amber-600">
                                            <Icon name="RefreshCw" size={48} className="animate-spin mb-4" />
                                            <p className="font-bold text-lg">Consultando el servidor...</p>
                                        </div>
                                    ) : (
                                        <div className="rounded-2xl border border-slate-200 overflow-hidden bg-white shadow-sm">
                                            <table className="w-full text-sm text-left">
                                                <thead className="text-[10px] uppercase tracking-widest text-slate-500 bg-slate-50 sticky top-0 shadow-sm border-b border-slate-200">
                                                    <tr>
                                                        <th className="p-4 font-black">Marca</th>
                                                        <th className="p-4 font-black">Referencia</th>
                                                        <th className="p-4 font-black text-right">Costo Neto</th>
                                                        <th className="p-4 font-black text-right">Venta Público</th>
                                                        <th className="p-4 font-black text-right text-teal-600">Inicial Plataforma</th>
                                                        <th className="p-4 font-black text-right text-orange-600">Recibe Tienda</th>
                                                        <th className="p-4 font-black text-right text-indigo-600">Utilidad ALO</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-100">
                                                    {distribuidorPrices.length > 0 ? distribuidorPrices.map((item, i) => {
                                                        const cost = parsePrice(item.cost);
                                                        const sale = parsePrice(item.sale);
                                                        const initial = parsePrice(item.initial);
                                                        const receive = parsePrice(item.receive);
                                                        const alocreditComm = Math.round((receive * 0.45) / 1000) * 1000;
                                                        
                                                        return (
                                                            <tr key={i} className="hover:bg-slate-50 transition-colors">
                                                                <td className="p-4 font-black text-[#67B74D]">{item.brand}</td>
                                                                <td className="p-4 font-bold text-slate-700">{item.ref}</td>
                                                                <td className="p-4 text-right text-slate-500 font-medium">{formatCurrency(cost)}</td>
                                                                <td className="p-4 text-right font-black text-slate-800">{formatCurrency(sale)}</td>
                                                                <td className="p-4 text-right font-black text-teal-600 bg-teal-50/30">{formatCurrency(initial)}</td>
                                                                <td className="p-4 text-right font-black text-orange-600 bg-orange-50/30">{formatCurrency(receive)}</td>
                                                                <td className="p-4 text-right font-black text-indigo-600 bg-indigo-50/30">{formatCurrency(alocreditComm)}</td>
                                                            </tr>
                                                        )
                                                    }) : <tr><td colSpan="7" className="p-12 text-center text-slate-400 font-medium">No hay precios disponibles en la base de datos.</td></tr>}
                                                </tbody>
                                            </table>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {qrModal.show && (
                        <div className="fixed inset-0 z-[8000] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm px-4 animate-in fade-in">
                            <div className="bg-white rounded-3xl shadow-2xl max-w-sm w-full overflow-hidden animate-pop-in text-center border border-slate-200">
                                <div className="bg-[#2C4C8C] p-5 flex justify-between items-center">
                                    <h3 className="text-white font-black text-lg tracking-tight">{qrModal.title}</h3>
                                    <button onClick={() => setQrModal({show: false, url: '', title: ''})} className="text-white/80 hover:bg-white/20 p-1.5 rounded-full transition-colors"><Icon name="X" size={20}/></button>
                                </div>
                                <div className="p-8 flex flex-col items-center bg-slate-50">
                                    <p className="text-xs font-bold text-slate-500 mb-6 uppercase tracking-widest text-center">Escanea para abrir el portal<br/>directo en tu celular</p>
                                    <div className="p-4 bg-white border border-slate-200 rounded-2xl shadow-sm inline-block">
                                        <img src={`https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(qrModal.url)}`} alt="QR Code" className="w-52 h-52" />
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
