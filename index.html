                if (estLower === 'en revisión' || estLower === 'en revision') return 'bg-amber-50 text-amber-600 border-amber-200';
                return 'bg-slate-100 text-slate-600 border-slate-200';
            };

            const filteredClientes = useMemo(() => {
                const term = searchTerm.toLowerCase();
                const myUN = String(userPerms.un).trim().toLowerCase();
                return (db.clientes || []).filter(c => {
                    const matchName = String(c.nombre_cliente).toLowerCase().includes(term);
                    const matchAsesor = fAsesor ? String(c.asesor || '').toLowerCase() === fAsesor.toLowerCase() : true;
                    const clientUN = String(c.un || c.UN || c.UnidaddeNegocio || c['UNIDAD DE NEGOCIO'] || c['Unidad de Negocio'] || '').trim().toLowerCase();
                    const matchUN = userPerms.isGlobalAdmin ? true : (clientUN === myUN);
                    return matchName && matchAsesor && matchUN;
                });
            }, [db.clientes, searchTerm, fAsesor, userPerms]);

            const asesoresUnicos = useMemo(() => {
                const s = new Set();
                (db.clientes || []).forEach(c => { if(c.asesor) s.add(String(c.asesor).trim()); });
                return Array.from(s).sort();
            }, [db.clientes]);

            // --- FUNCIONES DE APERTURA DE MODALES ---
            const openEditAliado = (cli) => {
                // Initialize factores from db.porcentajes
                const factores = db.financieras.map(f => {
                    const p = db.porcentajes.find(porc => String(porc.id_cliente).trim() === String(cli.id_cliente).trim() && String(porc.id_financiera).trim() === String(f.id_financiera).trim());
                    return { id_fin: f.id_financiera, valor: p ? p.factor_cliente : '' };
                });
                setEditAliadoModal({ show: true, data: { ...cli, factores: factores } });
            };
            const openEditRol = (rol) => setEditRolModal({ show: true, data: { ...rol } });
            const openEditEntidad = (fin) => setEditEntidadModal({ show: true, data: { ...fin } });

            // --- FUNCIONES PARA GUARDAR EDICIONES ---
            const saveEditAliado = async () => {
                setIsSavingEdit(true);
                // Filter out empty factores before sending
                const payload = {
                    ...editAliadoModal.data,
                    factores: editAliadoModal.data.factores.filter(f => f.valor !== '')
                };
                const success = await apiCall('updateCliente', payload, "Aliado actualizado");
                if (success) setEditAliadoModal({ show: false, data: null });
                setIsSavingEdit(false);
            };

            const deleteAliado = async () => {
                if(!window.confirm("¿Seguro que desea eliminar este Aliado?")) return;
                setIsSavingEdit(true);
                const success = await apiCall('deleteCliente', { id_cliente: editAliadoModal.data.id_cliente }, "Aliado eliminado");
                if (success) setEditAliadoModal({ show: false, data: null });
                setIsSavingEdit(false);
            };

            const handleAliadoFactorChange = (id_fin, value) => {
                setEditAliadoModal(prev => ({
                    ...prev,
                    data: {
                        ...prev.data,
                        factores: prev.data.factores.map(f => f.id_fin === id_fin ? { ...f, valor: value } : f)
                    }
                }));
            };

            const saveEditRol = async () => {
                setIsSavingEdit(true);
                const success = await apiCall('updateRol', editRolModal.data, "Rol actualizado");
                if (success) setEditRolModal({ show: false, data: null });
                setIsSavingEdit(false);
            };

            const deleteRol = async () => {
                if(!window.confirm("¿Seguro que desea eliminar este Rol?")) return;
                setIsSavingEdit(true);
                const success = await apiCall('deleteRol', { id_rol: editRolModal.data.id_rol }, "Rol eliminado");
                if (success) setEditRolModal({ show: false, data: null });
                setIsSavingEdit(false);
            };

            const saveEditEntidad = async () => {
                setIsSavingEdit(true);
                const success = await apiCall('updateFinanciera', editEntidadModal.data, "Entidad actualizada");
                if (success) setEditEntidadModal({ show: false, data: null });
                setIsSavingEdit(false);
            };

            const deleteEntidad = async () => {
                if(!window.confirm("¿Seguro que desea eliminar esta Entidad?")) return;
                setIsSavingEdit(true);
                const success = await apiCall('deleteFinanciera', { id_financiera: editEntidadModal.data.id_financiera }, "Entidad eliminada");
                if (success) setEditEntidadModal({ show: false, data: null });
                setIsSavingEdit(false);
            };

            const saveStatus = async () => {
                setIsSavingEdit(true);
                const success = await apiCall('actualizarEstadoSimulacion', { id_simulacion: statusModal.id, estado: statusModal.current }, "Estado actualizado");
                if (success) setStatusModal({ show: false, id: null, current: 'Pendiente' });
                setIsSavingEdit(false);
            };

            return (
                <div className="max-w-6xl mx-auto animate-fade-in w-full pb-20 flex flex-col h-full">
                    {/* TABS NAVEGACIÓN CONSULTAS */}
                    <div className="flex overflow-x-auto bg-white rounded-2xl shadow-sm border border-slate-200 mb-6 p-1.5 custom-scrollbar gap-1 shrink-0">
                        <button onClick={()=>setActiveTab('historial')} className={`px-4 py-2.5 rounded-xl text-xs font-black uppercase tracking-wider whitespace-nowrap transition-colors ${activeTab==='historial' ? 'bg-[#1e3a6d] text-white shadow-md' : 'text-slate-500 hover:bg-slate-100'}`}>Historial</button>
                        <button onClick={()=>setActiveTab('aliados')} className={`px-4 py-2.5 rounded-xl text-xs font-black uppercase tracking-wider whitespace-nowrap transition-colors ${activeTab==='aliados' ? 'bg-[#1e3a6d] text-white shadow-md' : 'text-slate-500 hover:bg-slate-100'}`}>Directorio Aliados</button>
                        {userPerms.isGlobalAdmin && (
                            <>
                                <button onClick={()=>setActiveTab('roles')} className={`px-4 py-2.5 rounded-xl text-xs font-black uppercase tracking-wider whitespace-nowrap transition-colors ${activeTab==='roles' ? 'bg-[#1e3a6d] text-white shadow-md' : 'text-slate-500 hover:bg-slate-100'}`}>Roles</button>
                                <button onClick={()=>setActiveTab('entidades')} className={`px-4 py-2.5 rounded-xl text-xs font-black uppercase tracking-wider whitespace-nowrap transition-colors ${activeTab==='entidades' ? 'bg-[#1e3a6d] text-white shadow-md' : 'text-slate-500 hover:bg-slate-100'}`}>Entidades</button>
                            </>
                        )}
                    </div>

                    <div className="bg-white p-4 md:p-6 rounded-3xl shadow-sm border border-slate-200 flex-1 flex flex-col overflow-hidden">
                        {activeTab === 'historial' && (
                            <div className="flex flex-col h-full">
                                <div className="bg-slate-50 p-4 rounded-xl border border-slate-100 mb-4 shrink-0 space-y-3">
                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                                        <div><label className="text-[10px] font-black text-slate-500 uppercase tracking-widest block mb-1 px-1">Desde</label><input type="date" value={fDesde} onChange={e=>setFDesde(e.target.value)} className="w-full bg-white border border-slate-200 py-2 px-3 rounded-lg text-xs font-bold text-slate-700 outline-none focus:border-[#1e3a6d]" /></div>
