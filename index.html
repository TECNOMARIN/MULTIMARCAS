            0% { transform: scale(0.95); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        }

        const formatCurrency = (val) => {
            return new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', minimumFractionDigits: 0 }).format(Number(val) || 0);
        };

        const parsePrice = (v) => {
            if (v === null || v === undefined || v === '') return 0;
            let num = 0;
            if (typeof v === 'number') {
                num = v;
            } else {
                let clean = v.toString().replace(/[\$\s]/g, '').replace(/\./g, '').replace(/,/g, '.');
                num = parseFloat(clean) || 0;
            }
            if (Math.abs(num) > 0 && Math.abs(num) < 10000) num = num * 1000;
            return Math.round(num / 1000) * 1000;
        };

        const findCol = (row, keywords) => {
            if (!row) return '';
            const key = Object.keys(row).find(k => keywords.some(kw => String(k).toUpperCase().trim() === kw || String(k).toUpperCase().includes(kw)));
            return key ? row[key] : '';
        };

        const parseDate = (val) => {
            if (!val) return '-';
            const d = new Date(val);
            return isNaN(d.getTime()) ? val : d.toLocaleString('es-CO', { day: '2-digit', month: '2-digit', year: 'numeric' });
        };

            if (!show) return null;

                    </div>

            );

        const LoginView = ({ onLogin, loginLoading }) => {

                        </div>
                        <div>

        const CalculatorView = ({ db, currentUser, userPerms, apiCall, showToast }) => {
            const [searchTienda, setSearchTienda] = useState('');
            const [selectedCliente, setSelectedCliente] = useState(currentUser?.id_cliente || '');
            const [selectedFinanciera, setSelectedFinanciera] = useState('');
            const [selectedPlan, setSelectedPlan] = useState('');
            const [numCuotas, setNumCuotas] = useState('');

            const [precioVenta, setPrecioVenta] = useState('');
            const [valorConsignar, setValorConsignar] = useState('');
            const [cuotaAprox, setCuotaAprox] = useState(0);

            const [clientData, setClientData] = useState({ cc: '', celular: '', nombre: '', correo: '' });
            const [brillaData, setBrillaData] = useState({ direccion: '', articulo: '', ref1Nom: '', ref1Tel: '', ref2Nom: '', ref2Tel: '' });
            const [crmMsg, setCrmMsg] = useState(null);
            const [isSaving, setIsSaving] = useState(false);

            // Filtro de Tiendas para Admin
            const filteredTiendas = useMemo(() => {
                const term = searchTienda.toLowerCase();
                const myUN = String(userPerms.un).trim().toLowerCase();
                return (db.clientes || []).filter(c => {
                    const matchName = String(c.nombre_cliente).toLowerCase().includes(term);
                    const clientUN = String(c.un || c.UN || c.UnidaddeNegocio || c['UNIDAD DE NEGOCIO'] || c['Unidad de Negocio'] || '').trim().toLowerCase();
                    const matchUN = userPerms.isGlobalAdmin ? true : (clientUN === myUN);
                    return matchName && matchUN;
                });
            }, [db.clientes, searchTienda, userPerms]);

            // Filtrar Entidades disponibles según el Aliado
            const availableFinancieras = useMemo(() => {
                if (!selectedCliente) return [];
                const cli = db.clientes.find(c => String(c.id_cliente).trim() === String(selectedCliente).trim());
                let assignedIds = [];
                if (cli && cli.rol) {
                    assignedIds = db.roles_permisos.filter(p => String(p.ROL).trim() === String(cli.rol).trim()).map(p => String(p.id_financiera).trim());
                } else {
                    assignedIds = db.porcentajes.filter(p => String(p.id_cliente).trim() === String(selectedCliente).trim()).map(p => String(p.id_financiera).trim());
                }
                return db.financieras.filter(f => assignedIds.includes(String(f.id_financiera).trim()));
            }, [db, selectedCliente]);

            // Filtrar Planes disponibles según Entidad
            const availablePlanes = useMemo(() => {
                if (!selectedFinanciera) return [];
                return db.cuotas.filter(c => String(c.id_financiera).trim() === String(selectedFinanciera).trim());
            }, [db, selectedFinanciera]);

            // Opciones de Número de Cuotas
            const cuotasOptions = useMemo(() => {
                if (!selectedPlan) return [];
                const p = db.cuotas.find(c => String(c.id_cuota).trim() === String(selectedPlan).trim());
                if (!p) return [];
                const max = parsePrice(p.numero_cuotas);
                const opts = [];
                for(let i=1; i<=max; i++) opts.push(i);
                return opts;
            }, [db, selectedPlan]);

            const showBrilla = useMemo(() => {
                if (!selectedFinanciera) return false;
                const f = db.financieras.find(fi => String(fi.id_financiera).trim() === String(selectedFinanciera).trim());
                return f && String(f.nombre_financiera).toLowerCase().includes("brilla");
            }, [db, selectedFinanciera]);

            const activeStoreName = useMemo(() => {
                if (!selectedCliente) return "Aliado Comercial";
                const c = db.clientes.find(x => String(x.id_cliente).trim() === String(selectedCliente).trim());
                return c ? c.nombre_cliente : "Aliado Comercial";
            }, [db, selectedCliente]);

            // Función Matemática Principal (Bidireccional)
            const calcMath = useCallback((source, pVentaStr, vConsignarStr, nCuotas) => {
                if (!selectedCliente || !selectedFinanciera || !selectedPlan || !nCuotas) {
                    setCuotaAprox(0);
                    return null;
                }

                let factor = null;
                const cli = db.clientes.find(c => String(c.id_cliente).trim() === String(selectedCliente).trim());
                
                if (cli && cli.rol) {
                    const pRol = db.roles_permisos.find(rp => String(rp.ROL).trim() === String(cli.rol).trim() && String(rp.id_financiera).trim() === String(selectedFinanciera).trim());
                    if (pRol) factor = parseFloat(pRol.factor_cliente);
                }
                if (!factor) {
                    const rel = db.porcentajes.find(rp => String(rp.id_cliente).trim() === String(selectedCliente).trim() && String(rp.id_financiera).trim() === String(selectedFinanciera).trim());
                    if (rel) factor = parseFloat(rel.factor_cliente);
                }

                const cuo = db.cuotas.find(c => String(c.id_cuota).trim() === String(selectedPlan).trim());
                const finObj = db.financieras.find(f => String(f.id_financiera).trim() === String(selectedFinanciera).trim());

                if (!factor || !cuo || nCuotas <= 0) {
                    setCuotaAprox(0);
                    return null;
                }

                let p = 0;
                let cons = 0;

                if (source === 'venta') {
                    p = parsePrice(pVentaStr);
                    if (p <= 0) { setValorConsignar(''); setCuotaAprox(0); return null; }
                    cons = p / factor;
                    setValorConsignar(formatCurrency(cons));
                } else if (source === 'consignar') {
                    cons = parsePrice(vConsignarStr);
                    if (cons <= 0) { setPrecioVenta(''); setCuotaAprox(0); return null; }
                    p = cons * factor;
                    setPrecioVenta(formatCurrency(p));
                } else {
                     p = parsePrice(precioVenta);
                     cons = parsePrice(valorConsignar);
                }

                const tI = parseFloat(cuo.tasa_interes) / 100;
                const tF = parseFloat(cuo.tasa_fianza) / 100;
                const cB = (cons + (cons * tI * nCuotas)) / nCuotas;
                const vC = cB + (cB * tF);

                setCuotaAprox(vC);

                let utilidadReal = 0;
                if (finObj) {
                    const factorFinanciera = parseFloat(finObj.factor_financiera);
                    const factorDecimal = factorFinanciera >= 1 ? (factorFinanciera / 100) : factorFinanciera;
                    
                    let montoNetoRecibido = 0;
                    if (factorDecimal >= 0.50) montoNetoRecibido = cons * factorDecimal;
                    else montoNetoRecibido = cons - (cons * factorDecimal);
                    
                    utilidadReal = montoNetoRecibido - p;
                }

                return {
                    id_cliente: selectedCliente, id_financiera: selectedFinanciera, id_cuota: selectedPlan,
                    precio_producto: p, valor_a_consignar: cons, valor_cuota: vC, n_cuotas: nCuotas, utilidad: utilidadReal
                };
            }, [selectedCliente, selectedFinanciera, selectedPlan, db]);

            // Handlers para Inputs Monetarios
            const handlePriceChange = (e) => {
                let val = e.target.value.replace(/\D/g, "");
                if (val === "") { setPrecioVenta(""); setValorConsignar(""); setCuotaAprox(0); return; }
                const formatted = "$ " + new Intl.NumberFormat('es-CO').format(parseInt(val));
                setPrecioVenta(formatted);
                calcMath('venta', formatted, valorConsignar, parseInt(numCuotas)||0);
            };

            const handleConsignarChange = (e) => {
                let val = e.target.value.replace(/\D/g, "");
                if (val === "") { setValorConsignar(""); setPrecioVenta(""); setCuotaAprox(0); return; }
                const formatted = "$ " + new Intl.NumberFormat('es-CO').format(parseInt(val));
                setValorConsignar(formatted);
                calcMath('consignar', precioVenta, formatted, parseInt(numCuotas)||0);
            };

            const handleCuotasChange = (e) => {
                setNumCuotas(e.target.value);
                calcMath('recalc', precioVenta, valorConsignar, parseInt(e.target.value)||0);
            };

            const handleCcBlur = () => {
                const searchDoc = clientData.cc.replace(/\D/g, '');
                if (!searchDoc) return;

                let foundClient = null;
                if (db.simulaciones && db.simulaciones.length > 0) {
                    for (let i = db.simulaciones.length - 1; i >= 0; i--) {
                        const s = db.simulaciones[i];
                        const sDoc = String(s.cc || s.CC || s.DOCUMENTO || s.cedula || s.CEDULA || '').replace(/\D/g, '');
                        if (sDoc === searchDoc) {
                            foundClient = {
                                nombre: s.nombre || s.NOMBRE || s.Nombre || '',
                                celular: s.celular || s.CELULAR || s.Celular || s.telefono || s.TELEFONO || '',
                                correo: s.correo || s.CORREO || s.Correo || s.email || s.EMAIL || ''
                            };
                            break;
                        }
                    }
                }

                if (foundClient) {
                    setClientData(prev => ({ ...prev, nombre: foundClient.nombre, celular: foundClient.celular, correo: foundClient.correo }));
                    setCrmMsg({ type: 'success', text: '¡Datos encontrados!' });
                } else {
                    setCrmMsg({ type: 'info', text: 'Cliente nuevo' });
                }
                setTimeout(() => setCrmMsg(null), 3000);
            };

            const clearInputs = () => {
                setClientData({ cc: '', celular: '', nombre: '', correo: '' });
                setBrillaData({ direccion: '', articulo: '', ref1Nom: '', ref1Tel: '', ref2Nom: '', ref2Tel: '' });
                setPrecioVenta('');
                setValorConsignar('');
                setCuotaAprox(0);
                setCrmMsg(null);
            };

            const validateAndSave = async () => {
                // Validación para Precio Venta y Total Crédito
                if (!precioVenta || parsePrice(precioVenta) === 0 || !valorConsignar || parsePrice(valorConsignar) === 0) {
                    showToast("El Precio Venta y el Total Crédito no pueden ser $ 0.", "error");
                    return;
                }

                if (!selectedCliente || !selectedFinanciera || !selectedPlan || !numCuotas || !precioVenta || !clientData.cc || !clientData.celular || !clientData.nombre) {
                    showToast("Complete todos los campos obligatorios.", "error");
                    return;
                }

                setIsSaving(true);
                const calcResult = calcMath('recalc', precioVenta, valorConsignar, parseInt(numCuotas)||0);
                if(!calcResult) { setIsSaving(false); return; }

                const dataToSave = {
                    ...calcResult,
                    cc: clientData.cc,
                    nombre: clientData.nombre,
                    correo: clientData.correo,
                    celular: clientData.celular
                };

                // WhatsApp Logic
                const storeName = activeStoreName;
                const asesorName = currentUser?.asesor || "No asignado";
                const bankObj = db.financieras.find(f => String(f.id_financiera).trim() === String(selectedFinanciera).trim());
                const bankName = bankObj ? bankObj.nombre_financiera : "Entidad";
                const planObj = db.cuotas.find(c => String(c.id_cuota).trim() === String(selectedPlan).trim());
                
                let message = `*NUEVA SIMULACION - SOLUCIONES EFECTIVAS CTG*\n\n*DATOS DE LA TIENDA*\n*●* Tienda: ${storeName}\n*●* Asesor: ${asesorName}\n*●* Entidad: ${bankName}\n*●* Plan: ${planObj ? planObj.tipo_cuota : ''} (${numCuotas} cuotas)\n\n*DETALLES FINANCIEROS*\n*●* Precio Venta: ${formatCurrency(calcResult.precio_producto)}\n*●* Total Credito: ${formatCurrency(calcResult.valor_a_consignar)}\n*●* Cuota Aprox: ${formatCurrency(calcResult.valor_cuota)}\n\n*DATOS DEL CLIENTE*\n*●* Nombre: ${clientData.nombre}\n*●* Documento: ${clientData.cc}\n*●* Celular: ${clientData.celular}\n*●* Correo: ${clientData.correo}`;

                if(showBrilla) {
                    message += `\n*●* Dirección: ${brillaData.direccion || '-'}\n*●* Artículo: ${brillaData.articulo || '-'}\n\n*REFERENCIAS*\n*●* Ref 1: ${brillaData.ref1Nom || '-'} (${brillaData.ref1Tel || '-'})\n*●* Ref 2: ${brillaData.ref2Nom || '-'} (${brillaData.ref2Tel || '-'})`;
                }

                window.open(`https://wa.me/?text=${encodeURIComponent(message)}`, '_blank');
                
                const success = await apiCall('guardarSimulacion', dataToSave, "Simulación registrada exitosamente");
                if (success) clearInputs();
                setIsSaving(false);
            };

            return (
                <div className="max-w-xl mx-auto space-y-6 animate-fade-in w-full pb-20">
                    <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 flex items-center justify-between gap-4">
                        <div className="flex items-center gap-4">
                            <div className="w-12 h-12 bg-emerald-100 text-emerald-600 rounded-xl flex items-center justify-center shrink-0">
                                <Icon name="Store" size={24} />
                            </div>
                            <div>
                                <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none mb-1">Punto de Venta</p>
                                <h2 className="text-lg font-black text-[#1e3a6d] leading-tight truncate max-w-[200px] sm:max-w-[300px]" title={activeStoreName}>{activeStoreName}</h2>
                            </div>
                        </div>
                        {userPerms.hasPrivileges && !userPerms.isGlobalAdmin && (
                            <span className="bg-blue-50 text-blue-700 border border-blue-200 px-2.5 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest shrink-0">UN: {userPerms.un}</span>
                        )}
                    </div>

                    <div className="bg-white p-6 sm:p-8 rounded-3xl shadow-sm border border-slate-200">
                        {userPerms.hasPrivileges && (
                            <div className="mb-5 bg-slate-50 p-4 rounded-xl border border-slate-100">
                                <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest block mb-2 px-1">Filtrar Aliado (Admin)</label>
                                <div className="relative mb-2">
                                    <input type="text" value={searchTienda} onChange={e=>setSearchTienda(e.target.value)} placeholder="🔍 Buscar aliado..." className="w-full bg-white border border-slate-200 py-2.5 px-4 rounded-lg text-sm outline-none focus:border-indigo-500 font-medium" />
                                </div>
                                <select value={selectedCliente} onChange={e=>{setSelectedCliente(e.target.value); setSelectedFinanciera(''); setSelectedPlan(''); setNumCuotas('');}} className="w-full bg-white border border-slate-200 py-2.5 px-4 rounded-lg text-sm font-bold text-slate-700 outline-none focus:border-indigo-500">
                                    <option value="" disabled>Seleccione tienda...</option>
                                    {filteredTiendas.map(c => <option key={c.id_cliente} value={c.id_cliente}>{c.nombre_cliente}</option>)}
                                </select>
                            </div>
                        )}

                        <div className="space-y-4 mb-6">
                            <div>
                                <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest block mb-2 px-1">Entidad Financiera</label>
                                <select value={selectedFinanciera} onChange={e=>{setSelectedFinanciera(e.target.value); setSelectedPlan(''); setNumCuotas('');}} className="w-full bg-slate-50 border border-slate-200 py-3.5 px-4 rounded-xl text-sm font-bold text-slate-800 outline-none focus:border-[#67B74D]">
                                    <option value="">Seleccione entidad...</option>
                                    {availableFinancieras.map(f => <option key={f.id_financiera} value={f.id_financiera}>{f.nombre_financiera}</option>)}
                                </select>
                            </div>
                            
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest block mb-2 px-1">Plan Elegido</label>
                                    <select value={selectedPlan} onChange={e=>{setSelectedPlan(e.target.value); setNumCuotas('');}} className="w-full bg-slate-50 border border-slate-200 py-3.5 px-4 rounded-xl text-sm font-bold text-slate-800 outline-none focus:border-[#67B74D]">
                                        <option value="">Plan...</option>
                                        {availablePlanes.map(p => <option key={p.id_cuota} value={p.id_cuota}>{String(p.tipo_cuota).toUpperCase()} ({p.numero_cuotas})</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest block mb-2 px-1">Cuotas</label>
                                    <select value={numCuotas} onChange={handleCuotasChange} className="w-full bg-slate-50 border border-slate-200 py-3.5 px-4 rounded-xl text-sm font-bold text-slate-800 outline-none focus:border-[#67B74D]">
                                        <option value="">Cuotas...</option>
                                        {cuotasOptions.map(n => <option key={n} value={n}>{n} Cuota{n>1?'s':''}</option>)}
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div className="mb-6">
                            <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest block mb-2 px-1">Precio Venta (Contado $)</label>
                            <input type="text" value={precioVenta} onChange={handlePriceChange} placeholder="$ 0" className="w-full bg-white border-2 border-slate-200 py-4 px-5 rounded-2xl text-lg font-black text-[#1e3a6d] outline-none focus:border-[#67B74D] shadow-sm transition-all" />
                        </div>

                        <div className="bg-gradient-to-br from-[#1e3a6d] to-[#2C4C8C] rounded-2xl p-6 mb-8 text-center flex gap-4 shadow-lg">
                            <div className="flex-1 flex flex-col items-center justify-center border-r border-white/20 pr-4">
                                <p className="text-[10px] font-black text-[#67B74D] uppercase tracking-widest mb-2">Total Crédito (Editar)</p>
                                <input type="text" value={valorConsignar} onChange={handleConsignarChange} placeholder="$ 0" className="w-full bg-white/10 border border-white/30 text-white font-black text-xl text-center py-2 rounded-xl outline-none focus:bg-white/20 focus:border-white transition-all placeholder:text-white/50" />
                            </div>
                            <div className="flex-1 flex flex-col items-center justify-center pl-2">
                                <p className="text-[10px] font-black text-[#67B74D] uppercase tracking-widest mb-2">Cuota (Aprox.)</p>
                                <p className="text-2xl font-black text-white">{formatCurrency(cuotaAprox)}</p>
                            </div>
                        </div>

                        <div className="border-l-4 border-[#67B74D] pl-5 bg-slate-50/50 py-2 rounded-r-2xl mb-6">
                            <h3 className="text-xs font-black text-[#67B74D] uppercase tracking-widest mb-4">Datos del Solicitante</h3>
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <div>
                                    <input type="text" value={clientData.cc} onChange={e=>setClientData({...clientData, cc: e.target.value})} onBlur={handleCcBlur} placeholder="CC / Documento" className="w-full bg-white border border-slate-200 py-3 px-4 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-[#67B74D]" />
                                    {crmMsg && <p className={`text-[10px] font-bold mt-1 pl-1 ${crmMsg.type === 'success' ? 'text-[#67B74D]' : 'text-indigo-500'}`}>{crmMsg.text}</p>}
                                </div>
                                <div><input type="text" value={clientData.celular} onChange={e=>setClientData({...clientData, celular: e.target.value})} placeholder="Celular" className="w-full bg-white border border-slate-200 py-3 px-4 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-[#67B74D]" /></div>
                                <div className="sm:col-span-2"><input type="text" value={clientData.nombre} onChange={e=>setClientData({...clientData, nombre: e.target.value})} placeholder="Nombre Completo" className="w-full bg-white border border-slate-200 py-3 px-4 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-[#67B74D]" /></div>
                                <div className="sm:col-span-2"><input type="email" value={clientData.correo} onChange={e=>setClientData({...clientData, correo: e.target.value})} placeholder="Correo electrónico" className="w-full bg-white border border-slate-200 py-3 px-4 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-[#67B74D]" /></div>
                            </div>

                            {showBrilla && (
                                <div className="mt-4 pt-4 border-t border-slate-200 grid grid-cols-1 sm:grid-cols-2 gap-4 animate-in fade-in duration-300">
                                    <div className="sm:col-span-2"><input type="text" value={brillaData.direccion} onChange={e=>setBrillaData({...brillaData, direccion: e.target.value})} placeholder="Dirección" className="w-full bg-white border border-slate-200 py-3 px-4 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-[#67B74D]" /></div>
                                    <div className="sm:col-span-2"><input type="text" value={brillaData.articulo} onChange={e=>setBrillaData({...brillaData, articulo: e.target.value})} placeholder="Artículo específico" className="w-full bg-white border border-slate-200 py-3 px-4 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-[#67B74D]" /></div>
                                    <div><input type="text" value={brillaData.ref1Nom} onChange={e=>setBrillaData({...brillaData, ref1Nom: e.target.value})} placeholder="Nombre Ref 1" className="w-full bg-white border border-slate-200 py-3 px-4 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-[#67B74D]" /></div>
                                    <div><input type="text" value={brillaData.ref1Tel} onChange={e=>setBrillaData({...brillaData, ref1Tel: e.target.value})} placeholder="Teléfono Ref 1" className="w-full bg-white border border-slate-200 py-3 px-4 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-[#67B74D]" /></div>
                                    <div><input type="text" value={brillaData.ref2Nom} onChange={e=>setBrillaData({...brillaData, ref2Nom: e.target.value})} placeholder="Nombre Ref 2" className="w-full bg-white border border-slate-200 py-3 px-4 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-[#67B74D]" /></div>
                                    <div><input type="text" value={brillaData.ref2Tel} onChange={e=>setBrillaData({...brillaData, ref2Tel: e.target.value})} placeholder="Teléfono Ref 2" className="w-full bg-white border border-slate-200 py-3 px-4 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-[#67B74D]" /></div>
                                </div>
                            )}
                        </div>

                        <div className="flex gap-3">
                            <button onClick={clearInputs} className="p-4 bg-slate-100 text-slate-500 rounded-xl hover:bg-slate-200 transition-colors" title="Limpiar Formulario">
                                <Icon name="Trash2" size={20} />
                            </button>
                            <button onClick={validateAndSave} disabled={isSaving} className="flex-1 py-4 bg-gradient-to-r from-[#67B74D] to-[#559e3d] text-white rounded-xl font-black text-sm uppercase tracking-widest shadow-lg hover:shadow-xl hover:-translate-y-0.5 transition-all flex items-center justify-center gap-2 disabled:opacity-50">
                                {isSaving ? <><Icon name="RefreshCw" size={18} className="animate-spin" /> Registrando...</> : <><Icon name="Send" size={18} /> Enviar y Registrar</>}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const OnlineCreditView = ({ onOpenQr, loadDistribuidorPrices }) => {
            const bancarizados = [
                { id: 'brilla', name: 'Cupo Brilla', desc: 'Usa tu Cupo Brilla Surtigas para tecnología y hogar.', color: 'red', url: 'https://wa.me/?text=' + encodeURIComponent('Hola, quisiera contactar a un asesor de Soluciones Efectivas CTG para solicitar información sobre el crédito con Brilla Surtigas.') },
                { id: 'sumas', name: 'Sumas Pay', desc: 'Financiación 100% digital y sin papeles para tecnología.', color: 'pink', url: 'https://solicitud.mundosumas.com/v2/home/mai' },
                { id: 'bogota', name: 'Banco de Bogotá', desc: 'Crédito fácil y sin trámites físicos. Respuesta inmediata.', color: 'blue', url: 'https://slm.bancodebogota.com/lyzz2kdc' },
                { id: 'addi', name: 'Addi', desc: 'Compra lo que quieras y paga después. Cuotas con 0% de interés.', color: 'indigo', url: 'https://preapproval.addi.com/?allySlug=addi-preapproval' },
                { id: 'siste', name: 'Sistecredito', desc: 'Activa tu crédito personal y llévate lo que necesites ahora mismo.', color: 'emerald', url: 'https://personas.credinet.co/login' },
                { id: 'vanti', name: 'Vanti Listo', desc: 'Financia tus proyectos a través de tu factura de gas natural Vanti.', color: 'cyan', url: 'https://autogestion.vantilisto.com/v3/opening-opportunity' }
            ];

            const reportados = [
                { id: 'payjoy', name: 'PayJoy', desc: 'Financia tu smartphone a cuotas, sin vida crediticia.', color: 'blue', url: 'https://app.payjoy.com/d2c/co' },
                { id: 'alocredit', name: 'Alocredit', desc: 'Accede a tu nuevo celular en minutos, aprobación ágil.', color: 'indigo', url: 'https://wa.me/?text=' + encodeURIComponent('Hola, quisiera contactar a un asesor para solicitar crédito con Alocredit.') },
                { id: 'krediya', name: 'Krediya', desc: 'Tecnología a tu alcance con facilidades de pago diseñadas para ti.', color: 'emerald', url: 'https://wa.me/?text=' + encodeURIComponent('Hola, quisiera contactar a un asesor para solicitar crédito con Krediya.') },
                { id: 'credismart', name: 'Credismart', desc: 'Opciones de crédito para todos los perfiles.', color: 'rose', url: 'https://wa.me/?text=' + encodeURIComponent('Hola, quisiera contactar a un asesor para solicitar crédito con Credismart.') }
            ];

            return (
                <div className="space-y-8 animate-fade-in max-w-6xl mx-auto pb-20">
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center bg-white p-6 rounded-2xl border border-slate-200 shadow-sm shrink-0 gap-4">
                        <div>
                            <h2 className="text-2xl font-black text-[#1e3a6d] tracking-tight">Crédito en Línea</h2>
                            <p className="text-sm font-medium text-slate-500 mt-1">Acceso a portales de originación y autogestión</p>
                        </div>
                        <button onClick={loadDistribuidorPrices} className="flex items-center gap-2 px-5 py-2.5 bg-amber-400 text-amber-900 rounded-xl font-black text-xs uppercase tracking-widest shadow-md hover:bg-amber-500 transition-colors w-full sm:w-auto justify-center">
                            <Icon name="Banknote" size={16}/> Precios Mayorista
                        </button>
                    </div>

                    <div>
                        <div className="flex items-center gap-3 mb-6">
                            <div className="w-10 h-10 bg-indigo-100 text-indigo-600 rounded-xl flex items-center justify-center shadow-inner">
                                <Icon name="Landmark" size={20}/>
                            </div>
                            <h3 className="text-lg font-black text-slate-800 uppercase tracking-tight">Créditos Bancarizados y Cupos</h3>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                            {bancarizados.map(c => (
                                <div key={c.id} className={`bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden flex flex-col hover:shadow-lg transition-all hover:-translate-y-1 border-t-[6px] border-t-${c.color}-500`}>
                                    <div className="p-6 flex-1 flex flex-col items-center text-center">
                                        <h3 className={`text-xl font-black text-slate-800 uppercase tracking-tight mb-2`}>{c.name}</h3>
                                        <p className="text-sm text-slate-500 font-medium">{c.desc}</p>
                                    </div>
                                    <div className="p-4 bg-slate-50 border-t border-slate-100 flex gap-2">
                                        <button onClick={() => onOpenQr(c.url, c.name)} className="p-3.5 bg-white text-slate-600 hover:text-[#2C4C8C] rounded-xl shadow-sm border border-slate-200 transition-colors" title="Ver código QR">
                                            <Icon name="QrCode" size={20}/>
                                        </button>
                                        <button onClick={() => window.open(c.url, '_blank')} className={`flex-1 py-3.5 bg-${c.color}-500 text-white rounded-xl font-black text-xs uppercase tracking-widest shadow-md hover:bg-${c.color}-600 transition-colors flex items-center justify-center gap-2`}>
                                            {c.id === 'brilla' ? 'Contactar Asesor' : 'Abrir Portal'} <Icon name="ExternalLink" size={16}/>
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="h-px w-full bg-slate-200 my-8"></div>

                    <div>
                        <div className="flex items-center gap-3 mb-6">
                            <div className="w-10 h-10 bg-rose-100 text-rose-600 rounded-xl flex items-center justify-center shadow-inner">
                                <Icon name="Flame" size={20}/>
                            </div>
                            <h3 className="text-lg font-black text-slate-800 uppercase tracking-tight">Financiación de Smartphones (Reportados)</h3>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6">
                            {reportados.map(c => (
                                <div key={c.id} className={`bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden flex flex-col hover:shadow-lg transition-all hover:-translate-y-1 border-t-[6px] border-t-${c.color}-500`}>
                                    <div className="p-6 flex-1 flex flex-col items-center text-center">
                                        <h3 className={`text-xl font-black text-slate-800 uppercase tracking-tight mb-2`}>{c.name}</h3>
                                        <p className="text-sm text-slate-500 font-medium">{c.desc}</p>
                                    </div>
                                    <div className="p-4 bg-slate-50 border-t border-slate-100 flex gap-2">
                                        <button onClick={() => onOpenQr(c.url, c.name)} className="p-3.5 bg-white text-slate-600 hover:text-[#2C4C8C] rounded-xl shadow-sm border border-slate-200 transition-colors" title="Ver código QR">
                                            <Icon name="QrCode" size={20}/>
                                        </button>
                                        <button onClick={() => window.open(c.url, '_blank')} className={`flex-1 py-3.5 bg-slate-800 text-white rounded-xl font-black text-[10px] uppercase tracking-widest shadow-md hover:bg-black transition-colors flex items-center justify-center gap-1.5`}>
                                            {c.id === 'payjoy' ? 'Portal Oficial' : 'Asesor WhatsApp'} <Icon name={c.id === 'payjoy' ? 'ExternalLink' : 'Send'} size={14}/>
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                </div>
            );
        };

        const DashboardView = ({ db, userPerms }) => {
            const [fDesde, setFDesde] = useState(() => {
                const d = new Date();
                return new Date(d.getFullYear(), d.getMonth(), 1).toISOString().split('T')[0];
            });
            const [fHasta, setFHasta] = useState(() => new Date().toISOString().split('T')[0]);
            const [fTienda, setFTienda] = useState('');
            const [fAsesor, setFAsesor] = useState('');

            const parseP = (fechaStr) => {
                if(!fechaStr) return 0;
                const b = String(fechaStr).split('/');
                if(b.length === 3) return new Date(b[2], b[1]-1, b[0]).getTime();
                return new Date(fechaStr).getTime();
            };

            const myUN = String(userPerms.un).trim().toLowerCase();

            const allowedSimulations = useMemo(() => {
                return (db.simulaciones || []).filter(s => {
                    if (userPerms.isGlobalAdmin) return true;
                    const foundC = db.clientes.find(c => String(c.id_cliente).trim() === String(s.id_cliente).trim());
                    if (!foundC) return false;
                    const clientUN = String(foundC.un || foundC.UN || '').trim().toLowerCase();
                    return clientUN === myUN;
                });
            }, [db.simulaciones, db.clientes, userPerms.isGlobalAdmin, myUN]);

            const filteredSimulations = useMemo(() => {
                const t1 = fDesde ? new Date(fDesde + 'T00:00:00').getTime() : null;
                const t2 = fHasta ? new Date(fHasta + 'T23:59:59').getTime() : null;

                return allowedSimulations.filter(s => {
                    const t = parseP(s.fecha || s.Fecha);
                    if (t1 && t2 && (t < t1 || t > t2)) return false;
                    if (fTienda && String(s.id_cliente).trim() !== String(fTienda).trim()) return false;
                    
                    if (fAsesor) {
                        const foundC = db.clientes.find(c => String(c.id_cliente).trim() === String(s.id_cliente).trim());
                        if (!foundC || String(foundC.asesor || '').trim() !== String(fAsesor).trim()) return false;
                    }
                    return true;
                });
            }, [allowedSimulations, fDesde, fHasta, fTienda, fAsesor, db.clientes]);

            const stats = useMemo(() => {
                let totalDesembolsado = 0;
                let totalUtilidad = 0;
                let totalSolicitudes = filteredSimulations.length;
                let aprobadas = 0;
                let rechazadas = 0;
                let pendientes = 0;
                
                const tiendasMap = {};

                filteredSimulations.forEach(s => {
                    const est = String(s.estado || s.Estado || 'Pendiente').toLowerCase();
                    if (est === 'desembolsado') {
                        totalDesembolsado += parsePrice(s.valor_a_consignar);
                        totalUtilidad += parsePrice(s.utilidad);
                        aprobadas++;
                    } else if (est === 'aprobado') {
                        aprobadas++;
                    } else if (est === 'rechazado' || est === 'anulado') {
                        rechazadas++;
                    } else {
                        pendientes++;
                    }

                    if (est === 'desembolsado' || est === 'aprobado') {
                        const tId = s.id_cliente;
                        tiendasMap[tId] = (tiendasMap[tId] || 0) + parsePrice(s.valor_a_consignar);
                    }
                });

                const topTiendas = Object.keys(tiendasMap)
                    .map(id => {
                        const cli = db.clientes.find(c => String(c.id_cliente).trim() === String(id).trim());
                        return { nombre: cli ? cli.nombre_cliente : 'Aliado', total: tiendasMap[id] };
                    })
                    .sort((a, b) => b.total - a.total)
                    .slice(0, 5);

                const tasaAprobacion = totalSolicitudes > 0 ? Math.round((aprobadas / totalSolicitudes) * 100) : 0;

                return { totalDesembolsado, totalUtilidad, totalSolicitudes, aprobadas, rechazadas, pendientes, topTiendas, tasaAprobacion };
            }, [filteredSimulations, db.clientes]);

            const filterClientsList = useMemo(() => {
                return (db.clientes || []).filter(c => {
                    if (userPerms.isGlobalAdmin) return true;
                    return String(c.un || c.UN || '').trim().toLowerCase() === myUN;
                });
            }, [db.clientes, userPerms.isGlobalAdmin, myUN]);

            const filterAsesoresList = useMemo(() => {
                const s = new Set();
                filterClientsList.forEach(c => { if(c.asesor) s.add(String(c.asesor).trim()); });
                return Array.from(s).sort();
            }, [filterClientsList]);

            return (
                <div className="max-w-6xl mx-auto animate-fade-in w-full pb-20">
                    <div className="flex items-center gap-3 mb-6">
                        <div className="w-10 h-10 bg-indigo-100 text-indigo-600 rounded-xl flex items-center justify-center shadow-inner">
                            <Icon name="PieChart" size={20}/>
                        </div>
                        <div>
                            <h2 className="text-2xl font-black text-slate-800 tracking-tight leading-none">Panel de Rendimiento</h2>
                            <p className="text-xs font-bold text-slate-500 uppercase tracking-widest mt-1">Métricas en tiempo real</p>
                        </div>
                    </div>

                    <div className="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm mb-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                        <div><label className="text-[10px] font-black text-slate-500 uppercase tracking-widest block mb-1 px-1">Desde</label><input type="date" value={fDesde} onChange={e=>setFDesde(e.target.value)} className="w-full bg-slate-50 border border-slate-200 py-2.5 px-3 rounded-xl text-xs font-bold text-slate-700 outline-none focus:border-indigo-500" /></div>
                        <div><label className="text-[10px] font-black text-slate-500 uppercase tracking-widest block mb-1 px-1">Hasta</label><input type="date" value={fHasta} onChange={e=>setFHasta(e.target.value)} className="w-full bg-slate-50 border border-slate-200 py-2.5 px-3 rounded-xl text-xs font-bold text-slate-700 outline-none focus:border-indigo-500" /></div>
                        <div>
                            <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest block mb-1 px-1">Tienda</label>
                            <select value={fTienda} onChange={e=>setFTienda(e.target.value)} className="w-full bg-slate-50 border border-slate-200 py-2.5 px-3 rounded-xl text-xs font-bold text-slate-700 outline-none focus:border-indigo-500">
                                <option value="">Todas las Tiendas</option>
                                {filterClientsList.map(c=><option key={c.id_cliente} value={c.id_cliente}>{c.nombre_cliente}</option>)}
                            </select>
                        </div>
                        <div>
                            <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest block mb-1 px-1">Asesor</label>
                            <select value={fAsesor} onChange={e=>setFAsesor(e.target.value)} className="w-full bg-slate-50 border border-slate-200 py-2.5 px-3 rounded-xl text-xs font-bold text-slate-700 outline-none focus:border-indigo-500">
                                <option value="">Todos los Asesores</option>
                                {filterAsesoresList.map(a=><option key={a} value={a}>{a}</option>)}
                            </select>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                        <div className="bg-gradient-to-br from-[#1e3a6d] to-[#2C4C8C] rounded-3xl p-6 text-white shadow-lg relative overflow-hidden">
                            <Icon name="Banknote" size={100} className="absolute -bottom-4 -right-4 text-white/10 rotate-12"/>
                            <p className="text-xs font-black text-blue-200 uppercase tracking-widest mb-1 relative z-10">Colocación Desembolsada</p>
                            <h3 className="text-3xl font-black tracking-tight relative z-10">{formatCurrency(stats.totalDesembolsado)}</h3>
                        </div>
                        <div className="bg-gradient-to-br from-emerald-500 to-emerald-600 rounded-3xl p-6 text-white shadow-lg relative overflow-hidden">
                            <Icon name="TrendingUp" size={100} className="absolute -bottom-4 -right-4 text-white/10 rotate-12"/>
                            <p className="text-xs font-black text-emerald-200 uppercase tracking-widest mb-1 relative z-10">Utilidad Generada</p>
                            <h3 className="text-3xl font-black tracking-tight relative z-10">{formatCurrency(stats.totalUtilidad)}</h3>
                        </div>
                        <div className="bg-gradient-to-br from-indigo-500 to-indigo-600 rounded-3xl p-6 text-white shadow-lg relative overflow-hidden flex flex-col justify-center">
                            <Icon name="CheckCircle" size={100} className="absolute -bottom-4 -right-4 text-white/10 rotate-12"/>
                            <p className="text-xs font-black text-indigo-200 uppercase tracking-widest mb-1 relative z-10">Efectividad Aprobación</p>
                            <div className="flex items-end gap-2 relative z-10">
                                <h3 className="text-4xl font-black tracking-tight leading-none">{stats.tasaAprobacion}%</h3>
                                <p className="text-sm font-bold text-indigo-200 mb-1">({stats.aprobadas} de {stats.totalSolicitudes})</p>
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className="bg-white rounded-3xl p-6 border border-slate-200 shadow-sm">
                            <h3 className="text-sm font-black text-slate-800 uppercase tracking-widest mb-5 flex items-center gap-2"><Icon name="BarChart2" size={18} className="text-[#1e3a6d]"/> Estado de Solicitudes</h3>
                            <div className="space-y-4">
                                <div>
                                    <div className="flex justify-between text-xs font-bold mb-1"><span className="text-emerald-600">Aprobadas / Desembolsadas</span><span className="text-slate-600">{stats.aprobadas}</span></div>
                                    <div className="w-full bg-slate-100 rounded-full h-2.5 overflow-hidden"><div className="bg-emerald-500 h-2.5 rounded-full" style={{width: `${stats.totalSolicitudes > 0 ? (stats.aprobadas/stats.totalSolicitudes)*100 : 0}%`}}></div></div>
                                </div>
                                <div>
                                    <div className="flex justify-between text-xs font-bold mb-1"><span className="text-amber-500">Pendientes / Revisión</span><span className="text-slate-600">{stats.pendientes}</span></div>
                                    <div className="w-full bg-slate-100 rounded-full h-2.5 overflow-hidden"><div className="bg-amber-400 h-2.5 rounded-full" style={{width: `${stats.totalSolicitudes > 0 ? (stats.pendientes/stats.totalSolicitudes)*100 : 0}%`}}></div></div>
                                </div>
                                <div>
                                    <div className="flex justify-between text-xs font-bold mb-1"><span className="text-rose-500">Rechazadas / Anuladas</span><span className="text-slate-600">{stats.rechazadas}</span></div>
                                    <div className="w-full bg-slate-100 rounded-full h-2.5 overflow-hidden"><div className="bg-rose-500 h-2.5 rounded-full" style={{width: `${stats.totalSolicitudes > 0 ? (stats.rechazadas/stats.totalSolicitudes)*100 : 0}%`}}></div></div>
                                </div>
                            </div>
                        </div>

                        <div className="bg-white rounded-3xl p-6 border border-slate-200 shadow-sm">
                            <h3 className="text-sm font-black text-slate-800 uppercase tracking-widest mb-5 flex items-center gap-2"><Icon name="Store" size={18} className="text-[#1e3a6d]"/> Top 5 Tiendas (Aprobado)</h3>
                            <div className="space-y-3">
                                {stats.topTiendas.length > 0 ? stats.topTiendas.map((t, i) => (
                                    <div key={i} className="flex items-center justify-between p-3 rounded-xl bg-slate-50 border border-slate-100">
                                        <div className="flex items-center gap-3">
                                            <div className="w-6 h-6 rounded-full bg-[#1e3a6d] text-white flex items-center justify-center text-[10px] font-black">{i+1}</div>
                                            <span className="font-bold text-sm text-slate-700 truncate max-w-[150px] sm:max-w-[200px]" title={t.nombre}>{t.nombre}</span>
                                        </div>
                                        <span className="font-black text-[#67B74D] text-sm">{formatCurrency(t.total)}</span>
                                    </div>
                                )) : <p className="text-sm text-slate-500 font-medium text-center py-4">No hay datos de tiendas en este periodo.</p>}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const AdminView = ({ db, apiCall, showToast }) => {
            const [activeTab, setActiveTab] = useState('aliados');
            const [isSaving, setIsSaving] = useState(false);

            const [aliadoForm, setAliadoForm] = useState({ nom: '', pass: '', rol: '', un: 'Atlantico' });
            const [rolForm, setRolForm] = useState('');
            const [vincRolForm, setVincRolForm] = useState({ rol: '', fin: '', factor: '' });
            const [vincTiendaForm, setVincTiendaForm] = useState({ cli: '', fin: '', factor: '' });
            const [entidadForm, setEntidadForm] = useState({ nom: '', fac: '' });
            const [planForm, setPlanForm] = useState({ fin: '', tipo: 'Mensual', num: '', int: '', fia: '' });
            const [anuncioForm, setAnuncioForm] = useState({ msg: db.notificacion?.mensaje || '', tipo: db.notificacion?.tipo || 'info', est: db.notificacion?.activo ? 'true' : 'false' });

            const rolesList = db.roles || [];
            const finList = db.financieras || [];
            const cliList = db.clientes || [];

            const handleSave = async (action, payload, clearFn) => {
                setIsSaving(true);
                const success = await apiCall(action, payload, "Operación exitosa");
                if(success && clearFn) clearFn();
                setIsSaving(false);
            };

            return (
                <div className="max-w-4xl mx-auto animate-fade-in w-full pb-20">
                    <div className="flex overflow-x-auto bg-white rounded-2xl shadow-sm border border-slate-200 mb-6 p-1.5 custom-scrollbar gap-1">
                        <button onClick={()=>setActiveTab('aliados')} className={`px-4 py-2.5 rounded-xl text-xs font-black uppercase tracking-wider whitespace-nowrap transition-colors ${activeTab==='aliados' ? 'bg-[#1e3a6d] text-white shadow-md' : 'text-slate-500 hover:bg-slate-100'}`}>Nuevo Aliado</button>
                        <button onClick={()=>setActiveTab('roles')} className={`px-4 py-2.5 rounded-xl text-xs font-black uppercase tracking-wider whitespace-nowrap transition-colors ${activeTab==='roles' ? 'bg-[#1e3a6d] text-white shadow-md' : 'text-slate-500 hover:bg-slate-100'}`}>Roles y Permisos</button>
                        <button onClick={()=>setActiveTab('entidades')} className={`px-4 py-2.5 rounded-xl text-xs font-black uppercase tracking-wider whitespace-nowrap transition-colors ${activeTab==='entidades' ? 'bg-[#1e3a6d] text-white shadow-md' : 'text-slate-500 hover:bg-slate-100'}`}>Entidades y Planes</button>
                        <button onClick={()=>setActiveTab('anuncios')} className={`px-4 py-2.5 rounded-xl text-xs font-black uppercase tracking-wider whitespace-nowrap transition-colors ${activeTab==='anuncios' ? 'bg-[#1e3a6d] text-white shadow-md' : 'text-slate-500 hover:bg-slate-100'}`}>Anuncio Global</button>
                    </div>

                    <div className="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-200">
                        {activeTab === 'aliados' && (
                            <div className="space-y-8">
                                <div>
                                    <h3 className="text-sm font-black text-[#1e3a6d] uppercase tracking-widest mb-4 border-b pb-2">Nuevo Aliado Comercial</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <input type="text" placeholder="Nombre Comercial" value={aliadoForm.nom} onChange={e=>setAliadoForm({...aliadoForm, nom: e.target.value})} className="w-full bg-slate-50 border border-slate-200 py-3 px-4 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-[#67B74D]" />
                                        <input type="text" placeholder="Contraseña" value={aliadoForm.pass} onChange={e=>setAliadoForm({...aliadoForm, pass: e.target.value})} className="w-full bg-slate-50 border border-slate-200 py-3 px-4 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-[#67B74D]" />
                                        <select value={aliadoForm.un} onChange={e=>setAliadoForm({...aliadoForm, un: e.target.value})} className="w-full bg-slate-50 border border-slate-200 py-3 px-4 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-[#67B74D]">
                                            <option value="Atlantico">Atlántico</option>
                                            <option value="Bolivar">Bolívar</option>
                                            <option value="Magdalena">Magdalena</option>
                                        </select>
                                        <select value={aliadoForm.rol} onChange={e=>setAliadoForm({...aliadoForm, rol: e.target.value})} className="w-full bg-slate-50 border border-slate-200 py-3 px-4 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-[#67B74D]">
                                            <option value="">Sin Rol (Personalizado)</option>
                                            {rolesList.map(r=><option key={r.id_rol} value={r.id_rol}>{r.nombre_rol}</option>)}
                                        </select>
                                    </div>
                                    <button disabled={isSaving} onClick={() => handleSave('crearCliente', {nombre: aliadoForm.nom, contrasena: aliadoForm.pass, rol: aliadoForm.rol, un: aliadoForm.un, asesor: ''}, () => setAliadoForm({nom:'', pass:'', rol:'', un:'Atlantico'}))} className="mt-4 px-6 py-3 bg-[#67B74D] text-white rounded-xl font-black text-xs uppercase tracking-widest shadow-md hover:bg-[#559e3d] flex items-center gap-2">
                                        {isSaving ? <Icon name="RefreshCw" className="animate-spin" size={16}/> : <Icon name="PlusCircle" size={16}/>} Registrar Aliado
                                    </button>
                                </div>
                                
                                <div>
                                    <h3 className="text-sm font-black text-[#1e3a6d] uppercase tracking-widest mb-4 border-b pb-2">Vincular Factor Personalizado a Tienda</h3>
                                    <p className="text-xs text-slate-400 mb-3">Úsalo solo si la tienda no tiene rol o necesita una excepción.</p>
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                        <select value={vincTiendaForm.cli} onChange={e=>setVincTiendaForm({...vincTiendaForm, cli: e.target.value})} className="w-full bg-slate-50 border border-slate-200 py-3 px-4 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-[#1e3a6d]">
                                            <option value="">Tienda...</option>
                                            {cliList.map(c=><option key={c.id_cliente} value={c.id_cliente}>{c.nombre_cliente}</option>)}
                                        </select>
                                        <select value={vincTiendaForm.fin} onChange={e=>setVincTiendaForm({...vincTiendaForm, fin: e.target.value})} className="w-full bg-slate-50 border border-slate-200 py-3 px-4 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-[#1e3a6d]">
                                            <option value="">Entidad...</option>
                                            {finList.map(f=><option key={f.id_financiera} value={f.id_financiera}>{f.nombre_financiera}</option>)}
                                        </select>
                                        <input type="number" step="0.01" placeholder="Factor (Ej: 0.85)" value={vincTiendaForm.factor} onChange={e=>setVincTiendaForm({...vincTiendaForm, factor: e.target.value})} className="w-full bg-slate-50 border border-slate-200 py-3 px-4 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-[#1e3a6d]" />
                                    </div>
                                    <button disabled={isSaving} onClick={() => handleSave('asignarFactorCliente', {id_cliente: vincTiendaForm.cli, id_financiera: vincTiendaForm.fin, factor_cliente: vincTiendaForm.factor}, () => setVincTiendaForm({cli:'', fin:'', factor:''}))} className="mt-4 px-6 py-3 bg-[#1e3a6d] text-white rounded-xl font-black text-xs uppercase tracking-widest shadow-md hover:bg-black flex items-center gap-2">
                                        {isSaving ? <Icon name="RefreshCw" className="animate-spin" size={16}/> : <Icon name="Save" size={16}/>} Guardar Vinculación
                                    </button>
                                </div>
                            </div>
                        )}

                        {activeTab === 'roles' && (
                            <div className="space-y-8">
                                <div>
                                    <h3 className="text-sm font-black text-[#1e3a6d] uppercase tracking-widest mb-4 border-b pb-2">Crear Nuevo Rol</h3>
                                    <div className="flex gap-4">
                                        <input type="text" placeholder="Nombre del Rol (Ej: Mayorista)" value={rolForm} onChange={e=>setRolForm(e.target.value)} className="flex-1 bg-slate-50 border border-slate-200 py-3 px-4 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-[#67B74D]" />
                                        <button disabled={isSaving} onClick={() => handleSave('crearRol', {nombre: rolForm}, () => setRolForm(''))} className="px-6 py-3 bg-[#67B74D] text-white rounded-xl font-black text-xs uppercase tracking-widest shadow-md hover:bg-[#559e3d] flex items-center gap-2">
                                            {isSaving ? <Icon name="RefreshCw" className="animate-spin" size={16}/> : <Icon name="PlusCircle" size={16}/>} Crear
                                        </button>
                                    </div>
                                </div>
                                
                                <div>
                                    <h3 className="text-sm font-black text-[#1e3a6d] uppercase tracking-widest mb-4 border-b pb-2">Asignar Factor Predeterminado a Rol</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                        <select value={vincRolForm.rol} onChange={e=>setVincRolForm({...vincRolForm, rol: e.target.value})} className="w-full bg-slate-50 border border-slate-200 py-3 px-4 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-[#1e3a6d]">
                                            <option value="">Rol...</option>
                                            {rolesList.map(r=><option key={r.id_rol} value={r.id_rol}>{r.nombre_rol}</option>)}
                                        </select>
                                        <select value={vincRolForm.fin} onChange={e=>setVincRolForm({...vincRolForm, fin: e.target.value})} className="w-full bg-slate-50 border border-slate-200 py-3 px-4 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-[#1e3a6d]">
                                            <option value="">Entidad...</option>
                                            {finList.map(f=><option key={f.id_financiera} value={f.id_financiera}>{f.nombre_financiera}</option>)}
                                        </select>
                                        <input type="number" step="0.01" placeholder="Factor (Ej: 0.85)" value={vincRolForm.factor} onChange={e=>setVincRolForm({...vincRolForm, factor: e.target.value})} className="w-full bg-slate-50 border border-slate-200 py-3 px-4 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-[#1e3a6d]" />
                                    </div>
                                    <button disabled={isSaving} onClick={() => handleSave('asignarFactorRol', {id_rol: vincRolForm.rol, id_financiera: vincRolForm.fin, factor_cliente: vincRolForm.factor}, () => setVincRolForm({rol:'', fin:'', factor:''}))} className="mt-4 px-6 py-3 bg-[#1e3a6d] text-white rounded-xl font-black text-xs uppercase tracking-widest shadow-md hover:bg-black flex items-center gap-2">
                                        {isSaving ? <Icon name="RefreshCw" className="animate-spin" size={16}/> : <Icon name="Save" size={16}/>} Guardar Permiso
                                    </button>
                                </div>
                            </div>
                        )}

                        {activeTab === 'entidades' && (
                            <div className="space-y-8">
                                <div>
                                    <h3 className="text-sm font-black text-[#1e3a6d] uppercase tracking-widest mb-4 border-b pb-2">Nueva Entidad Financiera</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <input type="text" placeholder="Nombre Entidad" value={entidadForm.nom} onChange={e=>setEntidadForm({...entidadForm, nom: e.target.value})} className="w-full bg-slate-50 border border-slate-200 py-3 px-4 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-[#67B74D]" />
                                        <input type="number" step="0.01" placeholder="Factor Base Operador" value={entidadForm.fac} onChange={e=>setEntidadForm({...entidadForm, fac: e.target.value})} className="w-full bg-slate-50 border border-slate-200 py-3 px-4 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-[#67B74D]" />
                                    </div>
                                    <button disabled={isSaving} onClick={() => handleSave('crearFinanciera', {nombre: entidadForm.nom, factor: entidadForm.fac}, () => setEntidadForm({nom:'', fac:''}))} className="mt-4 px-6 py-3 bg-[#67B74D] text-white rounded-xl font-black text-xs uppercase tracking-widest shadow-md hover:bg-[#559e3d] flex items-center gap-2">
                                        {isSaving ? <Icon name="RefreshCw" className="animate-spin" size={16}/> : <Icon name="PlusCircle" size={16}/>} Registrar Entidad
                                    </button>
                                </div>
                                
                                <div>
                                    <h3 className="text-sm font-black text-[#1e3a6d] uppercase tracking-widest mb-4 border-b pb-2">Agregar Plan a Entidad</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                                        <select value={planForm.fin} onChange={e=>setPlanForm({...planForm, fin: e.target.value})} className="w-full bg-slate-50 border border-slate-200 py-3 px-4 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-[#1e3a6d]">
                                            <option value="">Entidad...</option>
                                            {finList.map(f=><option key={f.id_financiera} value={f.id_financiera}>{f.nombre_financiera}</option>)}
                                        </select>
                                        <select value={planForm.tipo} onChange={e=>setPlanForm({...planForm, tipo: e.target.value})} className="w-full bg-slate-50 border border-slate-200 py-3 px-4 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-[#1e3a6d]">
                                            <option value="Mensual">Mensual</option>
                                            <option value="Quincenal">Quincenal</option>
                                            <option value="Semanal">Semanal</option>
                                        </select>
                                        <input type="number" placeholder="Máx Cuotas (Ej: 24)" value={planForm.num} onChange={e=>setPlanForm({...planForm, num: e.target.value})} className="w-full bg-slate-50 border border-slate-200 py-3 px-4 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-[#1e3a6d]" />
                                        <input type="number" step="0.01" placeholder="% Interés" value={planForm.int} onChange={e=>setPlanForm({...planForm, int: e.target.value})} className="w-full bg-slate-50 border border-slate-200 py-3 px-4 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-[#1e3a6d]" />
                                        <input type="number" step="0.01" placeholder="% Fianza/Seguro" value={planForm.fia} onChange={e=>setPlanForm({...planForm, fia: e.target.value})} className="w-full bg-slate-50 border border-slate-200 py-3 px-4 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-[#1e3a6d]" />
                                    </div>
                                    <button disabled={isSaving} onClick={() => handleSave('crearPlanCuota', {id_financiera: planForm.fin, tipo_cuota: planForm.tipo, numero_cuotas: planForm.num, tasa_interes: planForm.int, tasa_fianza: planForm.fia}, () => setPlanForm({...planForm, num:'', int:'', fia:''}))} className="px-6 py-3 bg-[#1e3a6d] text-white rounded-xl font-black text-xs uppercase tracking-widest shadow-md hover:bg-black flex items-center gap-2">
                                        {isSaving ? <Icon name="RefreshCw" className="animate-spin" size={16}/> : <Icon name="PlusCircle" size={16}/>} Registrar Plan
                                    </button>
                                </div>
                            </div>
                        )}

                        {activeTab === 'anuncios' && (
                            <div>
                                <h3 className="text-sm font-black text-[#1e3a6d] uppercase tracking-widest mb-4 border-b pb-2">Transmitir Anuncio Global</h3>
                                <p className="text-xs text-slate-400 mb-4">Este mensaje aparecerá inmediatamente en la Calculadora de todas las tiendas activas.</p>
                                
                                <textarea value={anuncioForm.msg} onChange={e=>setAnuncioForm({...anuncioForm, msg: e.target.value})} placeholder="Escribe el aviso aquí..." className="w-full bg-slate-50 border border-slate-200 py-3 px-4 rounded-xl text-sm font-medium text-slate-700 outline-none focus:border-[#1e3a6d] min-h-[100px] mb-4"></textarea>
                                
                                <div className="grid grid-cols-2 gap-4 mb-4">
                                    <select value={anuncioForm.tipo} onChange={e=>setAnuncioForm({...anuncioForm, tipo: e.target.value})} className="w-full bg-slate-50 border border-slate-200 py-3 px-4 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-[#1e3a6d]">
                                        <option value="info">Informativo (Azul)</option>
                                        <option value="urgente">Urgente (Rojo)</option>
                                    </select>
                                    <select value={anuncioForm.est} onChange={e=>setAnuncioForm({...anuncioForm, est: e.target.value})} className="w-full bg-slate-50 border border-slate-200 py-3 px-4 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-[#1e3a6d]">
                                        <option value="true">Activo (Visible)</option>
                                        <option value="false">Inactivo (Oculto)</option>
                                    </select>
                                </div>
                                <button disabled={isSaving} onClick={() => handleSave('setNotificacion', {mensaje: anuncioForm.msg, tipo: anuncioForm.tipo, activo: anuncioForm.est === 'true'})} className="w-full px-6 py-4 bg-[#1e3a6d] text-white rounded-xl font-black text-xs uppercase tracking-widest shadow-md hover:bg-black flex items-center justify-center gap-2">
                                    {isSaving ? <Icon name="RefreshCw" className="animate-spin" size={16}/> : <Icon name="Send" size={16}/>} Publicar Anuncio
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const QueriesView = ({ db, userPerms, apiCall, showToast }) => {
            const [activeTab, setActiveTab] = useState('historial');
            const [searchTerm, setSearchTerm] = useState('');

            // Filtros Historial
            const [fDesde, setFDesde] = useState(() => {
                const d = new Date();
                return new Date(d.getFullYear(), d.getMonth(), 1).toISOString().split('T')[0];
            });
            const [fHasta, setFHasta] = useState(() => new Date().toISOString().split('T')[0]);
            const [fTienda, setFTienda] = useState('');
            const [fEntidad, setFEntidad] = useState('');
            const [fAsesor, setFAsesor] = useState('');
            const [fEstado, setFEstado] = useState('');

            // --- ESTADOS PARA MODALES DE EDICIÓN ---
            const [editAliadoModal, setEditAliadoModal] = useState({ show: false, data: null });
            const [editRolModal, setEditRolModal] = useState({ show: false, data: null });
            const [editEntidadModal, setEditEntidadModal] = useState({ show: false, data: null });
            const [isSavingEdit, setIsSavingEdit] = useState(false);

            // --- ESTADO PARA MODAL DE ESTADO (Historial) ---
            const [statusModal, setStatusModal] = useState({ show: false, id: null, current: 'Pendiente' });

            const parseP = (fechaStr) => {
                if(!fechaStr) return 0;
                const b = String(fechaStr).split('/');
                if(b.length === 3) return new Date(b[2], b[1]-1, b[0]).getTime();
                return new Date(fechaStr).getTime();
            };

            const filteredHistory = useMemo(() => {
                const t1 = fDesde ? new Date(fDesde + 'T00:00:00').getTime() : null;
                const t2 = fHasta ? new Date(fHasta + 'T23:59:59').getTime() : null;
                const myUN = String(userPerms.un).trim().toLowerCase();

                return (db.simulaciones || []).filter(s => {
                    const t = parseP(s.fecha || s.Fecha);
                    if (t1 && t2 && (t < t1 || t > t2)) return false;
                    
                    if (fTienda && String(s.id_cliente).trim() !== String(fTienda).trim()) return false;
                    if (fEntidad && String(s.id_financiera).trim() !== String(fEntidad).trim()) return false;
                    
                    const foundC = db.clientes.find(c => String(c.id_cliente).trim() === String(s.id_cliente).trim());
                    if (!foundC) return false;

                    if (!userPerms.isGlobalAdmin) {
                        const clientUN = String(foundC.un || foundC.UN || foundC.UnidaddeNegocio || foundC['UNIDAD DE NEGOCIO'] || foundC['Unidad de Negocio'] || '').trim().toLowerCase();
                        if (clientUN !== myUN) return false;
                    }

                    if (fAsesor && String(foundC.asesor || '').trim() !== String(fAsesor).trim()) return false;
                    
                    if (fEstado) {
                        const estLower = String(s.estado || s.Estado || 'Pendiente').toLowerCase();
                        if (estLower !== String(fEstado).toLowerCase()) return false;
                    }

                    if (searchTerm) {
                        const term = searchTerm.toLowerCase();
                        const nCli = String(s.nombre || s.Nombre || '').toLowerCase();
                        const doc = String(s.cc || s.CC || '').toLowerCase();
                        const nTienda = String(foundC.nombre_cliente || '').toLowerCase();
                        if (!nCli.includes(term) && !doc.includes(term) && !nTienda.includes(term)) return false;
                    }
                    
                    return true;
                }).reverse();
            }, [db, fDesde, fHasta, fTienda, fEntidad, fAsesor, fEstado, searchTerm, userPerms]);

            const exportarExcel = () => {
                if (filteredHistory.length === 0) {
                    if (showToast) showToast("No hay datos para exportar", "error");
                    else alert("No hay datos para exportar");
                    return;
                }
                const exportData = filteredHistory.map(s => {
                    const foundC = db.clientes.find(c => String(c.id_cliente).trim() === String(s.id_cliente).trim());
                    const tienda = foundC ? foundC.nombre_cliente : 'Aliado';
                    const foundE = db.financieras.find(fi => String(fi.id_financiera).trim() === String(s.id_financiera).trim());
                    const entidad = foundE ? foundE.nombre_financiera : 'Entidad';

                    return {
                        "Fecha": s.fecha || s.Fecha,
                        "Tienda / Aliado": tienda,
                        "Entidad Financiera": entidad,
                        "Documento Cliente": s.cc || s.CC || '-',
                        "Nombre Cliente": s.nombre || s.Nombre || '-',
                        "Total Crédito": parsePrice(s.valor_a_consignar),
                        "Utilidad": parsePrice(s.utilidad),
                        "Cuota": parsePrice(s.valor_cuota),
                        "Plazo": s.n_cuotas,
                        "Estado": s.estado || s.Estado || 'Pendiente'
                    };
                });
                const worksheet = window.XLSX.utils.json_to_sheet(exportData);
                const workbook = window.XLSX.utils.book_new();
                window.XLSX.utils.book_append_sheet(workbook, worksheet, "Historial");
                window.XLSX.writeFile(workbook, `Historial_${new Date().toISOString().slice(0,10)}.xlsx`);
            };

            const exportarPDF = () => {
                if (filteredHistory.length === 0) {
                    if (showToast) showToast("No hay datos para exportar", "error");
                    else alert("No hay datos para exportar");
                    return;
                }
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF('landscape');
                
                doc.setFontSize(16);
                doc.setTextColor(44, 76, 140); // --brand-blue
                doc.text("Historial de Créditos y Simulaciones", 14, 15);
                
                doc.setFontSize(10);
                doc.setTextColor(100, 116, 139); // slate-500
                doc.text(`Filtro activo - Descargado el: ${new Date().toLocaleDateString('es-CO')}`, 14, 22);
                
                const tableColumn = ["Fecha", "Tienda", "Entidad", "Documento", "Cliente", "Crédito", "Utilidad", "Estado"];
                const tableRows = filteredHistory.map(s => {
                    const foundC = db.clientes.find(c => String(c.id_cliente).trim() === String(s.id_cliente).trim());
                    const tienda = foundC ? foundC.nombre_cliente : 'Aliado';
                    const foundE = db.financieras.find(fi => String(fi.id_financiera).trim() === String(s.id_financiera).trim());
                    const entidad = foundE ? foundE.nombre_financiera : 'Entidad';
                    
                    return [
                        s.fecha || s.Fecha,
                        tienda.substring(0, 20),
                        entidad,
                        s.cc || s.CC || '-',
                        String(s.nombre || s.Nombre || '-').substring(0, 20),
                        formatCurrency(parsePrice(s.valor_a_consignar)),
                        formatCurrency(parsePrice(s.utilidad)),
                        s.estado || s.Estado || 'Pendiente'
                    ];
                });

                doc.autoTable({
                    head: [tableColumn],
                    body: tableRows,
                    startY: 28,
                    theme: 'grid',
                    styles: { fontSize: 8 },
                    headStyles: { fillColor: [44, 76, 140] }, // Color Azul
                    alternateRowStyles: { fillColor: [248, 250, 252] }
                });
                doc.save(`Historial_${new Date().toISOString().slice(0,10)}.pdf`);
            };

            const getStatusBadge = (estLower) => {
                if (estLower === 'aprobado') return 'bg-emerald-50 text-emerald-600 border-emerald-200';
                if (estLower === 'desembolsado') return 'bg-emerald-800 text-white border-emerald-900';
                if (estLower === 'rechazado' || estLower === 'anulado') return 'bg-rose-50 text-rose-600 border-rose-200';
