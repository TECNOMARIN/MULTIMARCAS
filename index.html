        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap');

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f1f5f9;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }

        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Animations */
        @keyframes popIn {
            0% { transform: scale(0.95); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop-in { animation: popIn 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        @keyframes slideInDown {
            from { transform: translate(-50%, -100%); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }
        .toast-enter { animation: slideInDown 0.4s ease-out forwards; }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .animate-fade-in { animation: fadeIn 0.3s ease-in-out forwards; }
    </style>
</head>

                Trash2: <><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></>,
                Save: <><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></>,
                BarChart2: <><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></>,

            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || icons.HelpCircle}
                </svg>
            );
        };

        const formatCurrency = (val) => {
            return new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', minimumFractionDigits: 0 }).format(Number(val) || 0);
        };

        const parsePrice = (v) => {
            if (v === null || v === undefined || v === '') return 0;
            let num = 0;
            if (typeof v === 'number') {
                num = v;
            } else {
                let clean = v.toString().replace(/[\$\s]/g, '').replace(/\./g, '').replace(/,/g, '.');
                num = parseFloat(clean) || 0;
            }
            if (Math.abs(num) > 0 && Math.abs(num) < 10000) num = num * 1000;
            return Math.round(num / 1000) * 1000;
        };

        const findCol = (row, keywords) => {
            if (!row) return '';
            const key = Object.keys(row).find(k => keywords.some(kw => String(k).toUpperCase().trim() === kw || String(k).toUpperCase().includes(kw)));
            return key ? row[key] : '';
        };

        const parseDate = (val) => {
            if (!val) return '-';
            const d = new Date(val);
            return isNaN(d.getTime()) ? val : d.toLocaleString('es-CO', { day: '2-digit', month: '2-digit', year: 'numeric' });
        };

        const Toast = ({ show, message, type, onClose }) => {
            if (!show) return null;
            const isError = type === 'error';
            return (
                <div className={`fixed top-4 right-4 px-6 py-4 rounded-2xl shadow-2xl z-[100000] flex items-center gap-4 toast-enter border-l-4 ${isError ? 'bg-white border-rose-500' : 'bg-white border-emerald-500'}`}>
                    <div className={isError ? 'text-rose-500' : 'text-emerald-500'}>
                        <Icon name={isError ? 'XCircle' : 'CheckCircle'} size={24} />
                    </div>
                    <span className="font-bold text-sm text-[#1e3a6d]">{message}</span>
                </div>
            );
        };

        const LoginView = ({ onLogin }) => {
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [showPassword, setShowPassword] = useState(false);

            return (
                <div className="bg-white w-full max-w-md rounded-[24px] shadow-2xl overflow-hidden animate-pop-in relative z-10 border border-slate-100">
                    <div className="pt-10 pb-6 px-8 text-center flex flex-col items-center">
                        <img src="https://raw.githubusercontent.com/TECNOMARIN/MULTIMARCAS/main/SOLUCIONES%20PNG.png" alt="Logo" className="h-16 object-contain mb-6" />
                        <h2 className="text-2xl font-black text-[#1e3a6d] tracking-tight">Portal Maestro</h2>
                        <p className="text-xs font-bold text-slate-400 mt-1 uppercase tracking-widest">Inicia sesión para continuar</p>
                    </div>
                    <form onSubmit={(e) => { e.preventDefault(); onLogin(username, password); }} className="px-8 pb-10 space-y-5">
                        <div>
                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2 px-1">Usuario</label>
                            <div className="relative">
                                <Icon name="Store" size={18} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" />
                                <input required type="text" value={username} onChange={e=>setUsername(e.target.value)} className="w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-[#2C4C8C] outline-none text-sm font-bold text-slate-700 transition-all" placeholder="Nombre Comercial" />
                            </div>
                        </div>
                        <div>
                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2 px-1">Contraseña</label>
                            <div className="relative">
                                <Icon name="Key" size={18} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" />
                                <input required type={showPassword ? "text" : "password"} value={password} onChange={e=>setPassword(e.target.value)} className="w-full pl-11 pr-12 py-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-[#2C4C8C] outline-none text-sm font-bold text-slate-700 transition-all" placeholder="••••••••" />
                                <button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
                                    <Icon name={showPassword ? "EyeOff" : "Eye"} size={18} />
                                </button>
                            </div>
                        </div>
                        <button type="submit" className="w-full py-4 mt-2 bg-[#2C4C8C] text-white rounded-xl font-black text-sm tracking-widest uppercase hover:bg-black transition-all shadow-lg flex items-center justify-center gap-2">
                            <Icon name="LogIn" size={18}/> Ingresar al Portal
                        </button>
                    </form>
                </div>
            );
        };

        const CalculatorView = ({ db, currentUser, userPerms, apiCall, showToast }) => {
            const [searchTienda, setSearchTienda] = useState('');
            const [selectedCliente, setSelectedCliente] = useState(currentUser?.id_cliente || '');
            const [selectedFinanciera, setSelectedFinanciera] = useState('');
            const [selectedPlan, setSelectedPlan] = useState('');
            const [numCuotas, setNumCuotas] = useState('');

            const [precioVenta, setPrecioVenta] = useState('');
            const [valorConsignar, setValorConsignar] = useState('');
            const [cuotaAprox, setCuotaAprox] = useState(0);

            const [clientData, setClientData] = useState({ cc: '', celular: '', nombre: '', correo: '' });
            const [brillaData, setBrillaData] = useState({ direccion: '', articulo: '', ref1Nom: '', ref1Tel: '', ref2Nom: '', ref2Tel: '' });
            const [crmMsg, setCrmMsg] = useState(null);
            const [isSaving, setIsSaving] = useState(false);

            // Filtro de Tiendas para Admin
            const filteredTiendas = useMemo(() => {
                const term = searchTienda.toLowerCase();
                const myUN = String(userPerms.un).trim().toLowerCase();
                return (db.clientes || []).filter(c => {
                    const matchName = String(c.nombre_cliente).toLowerCase().includes(term);
                    const clientUN = String(c.un || c.UN || c.UnidaddeNegocio || c['UNIDAD DE NEGOCIO'] || c['Unidad de Negocio'] || '').trim().toLowerCase();
                    const matchUN = userPerms.isGlobalAdmin ? true : (clientUN === myUN);
                    return matchName && matchUN;
                });
            }, [db.clientes, searchTienda, userPerms]);

            // Filtrar Entidades disponibles según el Aliado
            const availableFinancieras = useMemo(() => {
                if (!selectedCliente) return [];
                const cli = db.clientes.find(c => String(c.id_cliente).trim() === String(selectedCliente).trim());
                let assignedIds = [];
                if (cli && cli.rol) {
                    assignedIds = db.roles_permisos.filter(p => String(p.ROL).trim() === String(cli.rol).trim()).map(p => String(p.id_financiera).trim());
                } else {
                    assignedIds = db.porcentajes.filter(p => String(p.id_cliente).trim() === String(selectedCliente).trim()).map(p => String(p.id_financiera).trim());
                }
                return db.financieras.filter(f => assignedIds.includes(String(f.id_financiera).trim()));
            }, [db, selectedCliente]);

            // Filtrar Planes disponibles según Entidad
            const availablePlanes = useMemo(() => {
                if (!selectedFinanciera) return [];
                return db.cuotas.filter(c => String(c.id_financiera).trim() === String(selectedFinanciera).trim());
            }, [db, selectedFinanciera]);

            // Opciones de Número de Cuotas
            const cuotasOptions = useMemo(() => {
                if (!selectedPlan) return [];
                const p = db.cuotas.find(c => String(c.id_cuota).trim() === String(selectedPlan).trim());
                if (!p) return [];
                const max = parsePrice(p.numero_cuotas);
                const opts = [];
                for(let i=1; i<=max; i++) opts.push(i);
                return opts;
            }, [db, selectedPlan]);

            const showBrilla = useMemo(() => {
                if (!selectedFinanciera) return false;
                const f = db.financieras.find(fi => String(fi.id_financiera).trim() === String(selectedFinanciera).trim());
                return f && String(f.nombre_financiera).toLowerCase().includes("brilla");
            }, [db, selectedFinanciera]);

            const activeStoreName = useMemo(() => {
                if (!selectedCliente) return "Aliado Comercial";
                const c = db.clientes.find(x => String(x.id_cliente).trim() === String(selectedCliente).trim());
                return c ? c.nombre_cliente : "Aliado Comercial";
            }, [db, selectedCliente]);

            // Función Matemática Principal (Bidireccional)
            const calcMath = useCallback((source, pVentaStr, vConsignarStr, nCuotas) => {
                if (!selectedCliente || !selectedFinanciera || !selectedPlan || !nCuotas) {
                    setCuotaAprox(0);
                    return null;
                }

                let factor = null;
                const cli = db.clientes.find(c => String(c.id_cliente).trim() === String(selectedCliente).trim());
                
                if (cli && cli.rol) {
                    const pRol = db.roles_permisos.find(rp => String(rp.ROL).trim() === String(cli.rol).trim() && String(rp.id_financiera).trim() === String(selectedFinanciera).trim());
                    if (pRol) factor = parseFloat(pRol.factor_cliente);
                }
                if (!factor) {
                    const rel = db.porcentajes.find(rp => String(rp.id_cliente).trim() === String(selectedCliente).trim() && String(rp.id_financiera).trim() === String(selectedFinanciera).trim());
                    if (rel) factor = parseFloat(rel.factor_cliente);
                }

                const cuo = db.cuotas.find(c => String(c.id_cuota).trim() === String(selectedPlan).trim());
                const finObj = db.financieras.find(f => String(f.id_financiera).trim() === String(selectedFinanciera).trim());

                if (!factor || !cuo || nCuotas <= 0) {
                    setCuotaAprox(0);
                    return null;
                }

                let p = 0;
                let cons = 0;

                if (source === 'venta') {
                    p = parsePrice(pVentaStr);
                    if (p <= 0) { setValorConsignar(''); setCuotaAprox(0); return null; }
                    cons = p / factor;
                    setValorConsignar(formatCurrency(cons));
                } else if (source === 'consignar') {
                    cons = parsePrice(vConsignarStr);
                    if (cons <= 0) { setPrecioVenta(''); setCuotaAprox(0); return null; }
                    p = cons * factor;
                    setPrecioVenta(formatCurrency(p));
                } else {
                     // Solo recalcular cuota
                     p = parsePrice(precioVenta);
                     cons = parsePrice(valorConsignar);
                }

                const tI = parseFloat(cuo.tasa_interes) / 100;
                const tF = parseFloat(cuo.tasa_fianza) / 100;
                const cB = (cons + (cons * tI * nCuotas)) / nCuotas;
                const vC = cB + (cB * tF);

                setCuotaAprox(vC);

                let utilidadReal = 0;
                if (finObj) {
                    const factorFinanciera = parseFloat(finObj.factor_financiera);
                    const factorDecimal = factorFinanciera >= 1 ? (factorFinanciera / 100) : factorFinanciera;
                    
                    let montoNetoRecibido = 0;
                    if (factorDecimal >= 0.50) montoNetoRecibido = cons * factorDecimal;
                    else montoNetoRecibido = cons - (cons * factorDecimal);
                    
                    utilidadReal = montoNetoRecibido - p;
                }

                return {
                    id_cliente: selectedCliente, id_financiera: selectedFinanciera, id_cuota: selectedPlan,
                    precio_producto: p, valor_a_consignar: cons, valor_cuota: vC, n_cuotas: nCuotas, utilidad: utilidadReal
                };
            }, [selectedCliente, selectedFinanciera, selectedPlan, db]);

            // Handlers para Inputs Monetarios
            const handlePriceChange = (e) => {
                let val = e.target.value.replace(/\D/g, "");
                if (val === "") { setPrecioVenta(""); setValorConsignar(""); setCuotaAprox(0); return; }
                const formatted = "$ " + new Intl.NumberFormat('es-CO').format(parseInt(val));
                setPrecioVenta(formatted);
                calcMath('venta', formatted, valorConsignar, parseInt(numCuotas)||0);
            };

            const handleConsignarChange = (e) => {
                let val = e.target.value.replace(/\D/g, "");
                if (val === "") { setValorConsignar(""); setPrecioVenta(""); setCuotaAprox(0); return; }
                const formatted = "$ " + new Intl.NumberFormat('es-CO').format(parseInt(val));
                setValorConsignar(formatted);
                calcMath('consignar', precioVenta, formatted, parseInt(numCuotas)||0);
            };

            const handleCuotasChange = (e) => {
                setNumCuotas(e.target.value);
                calcMath('recalc', precioVenta, valorConsignar, parseInt(e.target.value)||0);
            };

            const handleCcBlur = () => {
                const searchDoc = clientData.cc.replace(/\D/g, '');
                if (!searchDoc) return;

                let foundClient = null;
                if (db.simulaciones && db.simulaciones.length > 0) {
                    for (let i = db.simulaciones.length - 1; i >= 0; i--) {
                        const s = db.simulaciones[i];
                        const sDoc = String(s.cc || s.CC || s.DOCUMENTO || s.cedula || s.CEDULA || '').replace(/\D/g, '');
                        if (sDoc === searchDoc) {
                            foundClient = {
                                nombre: s.nombre || s.NOMBRE || s.Nombre || '',
                                celular: s.celular || s.CELULAR || s.Celular || s.telefono || s.TELEFONO || '',
                                correo: s.correo || s.CORREO || s.Correo || s.email || s.EMAIL || ''
                            };
                            break;
                        }
                    }
                }

                if (foundClient) {
                    setClientData(prev => ({ ...prev, nombre: foundClient.nombre, celular: foundClient.celular, correo: foundClient.correo }));
                    setCrmMsg({ type: 'success', text: '¡Datos encontrados!' });
                } else {
                    setCrmMsg({ type: 'info', text: 'Cliente nuevo' });
                }
                setTimeout(() => setCrmMsg(null), 3000);
            };

            const clearInputs = () => {
                setClientData({ cc: '', celular: '', nombre: '', correo: '' });
                setBrillaData({ direccion: '', articulo: '', ref1Nom: '', ref1Tel: '', ref2Nom: '', ref2Tel: '' });
                setPrecioVenta('');
                setValorConsignar('');
                setCuotaAprox(0);
                setCrmMsg(null);
            };

            const validateAndSave = async () => {
                if (!selectedCliente || !selectedFinanciera || !selectedPlan || !numCuotas || !precioVenta || !clientData.cc || !clientData.celular || !clientData.nombre) {
                    showToast("Complete todos los campos obligatorios.", "error");
                    return;
                }

                // Add validation for 0 values in price or credit
                if (parsePrice(precioVenta) === 0 || parsePrice(valorConsignar) === 0) {
                    showToast("El precio de venta o el valor a consignar no pueden ser cero.", "error");
                    return;
                }

                setIsSaving(true);
                const calcResult = calcMath('recalc', precioVenta, valorConsignar, parseInt(numCuotas)||0);
                if(!calcResult) { setIsSaving(false); return; }

                const dataToSave = {
                    ...calcResult,
                    cc: clientData.cc,
                    nombre: clientData.nombre,
                    correo: clientData.correo,
                    celular: clientData.celular
                };

                // WhatsApp Logic
                const storeName = activeStoreName;
                const asesorName = currentUser?.asesor || "No asignado";
                const bankObj = db.financieras.find(f => String(f.id_financiera).trim() === String(selectedFinanciera).trim());
                const bankName = bankObj ? bankObj.nombre_financiera : "Entidad";
                const planObj = db.cuotas.find(c => String(c.id_cuota).trim() === String(selectedPlan).trim());
                
                let message = `*NUEVA SIMULACION - SOLUCIONES EFECTIVAS CTG*\n\n*DATOS DE LA TIENDA*\n*●* Tienda: ${storeName}\n*●* Asesor: ${asesorName}\n*●* Entidad: ${bankName}\n*●* Plan: ${planObj ? planObj.tipo_cuota : ''} (${numCuotas} cuotas)\n\n*DETALLES FINANCIEROS*\n*●* Precio Venta: ${formatCurrency(calcResult.precio_producto)}\n*●* Total Credito: ${formatCurrency(calcResult.valor_a_consignar)}\n*●* Cuota Aprox: ${formatCurrency(calcResult.valor_cuota)}\n\n*DATOS DEL CLIENTE*\n*●* Nombre: ${clientData.nombre}\n*●* Documento: ${clientData.cc}\n*●* Celular: ${clientData.celular}\n*●* Correo: ${clientData.correo}`;

                if(showBrilla) {
                    message += `\n*●* Dirección: ${brillaData.direccion || '-'}\n*●* Artículo: ${brillaData.articulo || '-'}\n\n*REFERENCIAS*\n*●* Ref 1: ${brillaData.ref1Nom || '-'} (${brillaData.ref1Tel || '-'})\n*●* Ref 2: ${brillaData.ref2Nom || '-'} (${brillaData.ref2Tel || '-'})`;
                }

                window.open(`https://wa.me/?text=${encodeURIComponent(message)}`, '_blank');
                
                const success = await apiCall('guardarSimulacion', dataToSave, "Simulación registrada exitosamente");
                if (success) clearInputs();
                setIsSaving(false);
            };

            return (
                <div className="max-w-xl mx-auto space-y-6 animate-fade-in w-full pb-20">
                    
                    {/* Banner de Bienvenida y Tienda */}
                    <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 flex items-center justify-between gap-4">
                        <div className="flex items-center gap-4">
                            <div className="w-12 h-12 bg-emerald-100 text-emerald-600 rounded-xl flex items-center justify-center shrink-0">
                                <Icon name="Store" size={24} />
                            </div>
                            <div>
                                <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none mb-1">Punto de Venta</p>
                                <h2 className="text-lg font-black text-[#1e3a6d] leading-tight truncate max-w-[200px] sm:max-w-[300px]" title={activeStoreName}>{activeStoreName}</h2>
                            </div>
                        </div>
                        {userPerms.hasPrivileges && !userPerms.isGlobalAdmin && (
                            <span className="bg-blue-50 text-blue-700 border border-blue-200 px-2.5 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest shrink-0">UN: {userPerms.un}</span>
                        )}
                    </div>

                    <div className="bg-white p-6 sm:p-8 rounded-3xl shadow-sm border border-slate-200">
                        {/* Selector de Aliado (Solo Admin) */}
                        {userPerms.hasPrivileges && (
                            <div className="mb-5 bg-slate-50 p-4 rounded-xl border border-slate-100">
                                <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest block mb-2 px-1">Filtrar Aliado (Admin)</label>
                                <div className="relative mb-2">
                                    <input type="text" value={searchTienda} onChange={e=>setSearchTienda(e.target.value)} placeholder="🔍 Buscar aliado..." className="w-full bg-white border border-slate-200 py-2.5 px-4 rounded-lg text-sm outline-none focus:border-indigo-500 font-medium" />
                                </div>
                                <select value={selectedCliente} onChange={e=>{setSelectedCliente(e.target.value); setSelectedFinanciera(''); setSelectedPlan(''); setNumCuotas('');}} className="w-full bg-white border border-slate-200 py-2.5 px-4 rounded-lg text-sm font-bold text-slate-700 outline-none focus:border-indigo-500">
                                    <option value="" disabled>Seleccione tienda...</option>
                                    {filteredTiendas.map(c => <option key={c.id_cliente} value={c.id_cliente}>{c.nombre_cliente}</option>)}
                                </select>
                            </div>
                        )}

                        {/* Dropdowns Financieros */}
                        <div className="space-y-4 mb-6">
                            <div>
                                <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest block mb-2 px-1">Entidad Financiera</label>
                                <select value={selectedFinanciera} onChange={e=>{setSelectedFinanciera(e.target.value); setSelectedPlan(''); setNumCuotas('');}} className="w-full bg-slate-50 border border-slate-200 py-3.5 px-4 rounded-xl text-sm font-bold text-slate-800 outline-none focus:border-[#67B74D]">
                                    <option value="">Seleccione entidad...</option>
                                    {availableFinancieras.map(f => <option key={f.id_financiera} value={f.id_financiera}>{f.nombre_financiera}</option>)}
                                </select>
                            </div>
                            
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest block mb-2 px-1">Plan Elegido</label>
                                    <select value={selectedPlan} onChange={e=>{setSelectedPlan(e.target.value); setNumCuotas('');}} className="w-full bg-slate-50 border border-slate-200 py-3.5 px-4 rounded-xl text-sm font-bold text-slate-800 outline-none focus:border-[#67B74D]">
                                        <option value="">Plan...</option>
                                        {availablePlanes.map(p => <option key={p.id_cuota} value={p.id_cuota}>{String(p.tipo_cuota).toUpperCase()} ({p.numero_cuotas})</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest block mb-2 px-1">Cuotas</label>
                                    <select value={numCuotas} onChange={handleCuotasChange} className="w-full bg-slate-50 border border-slate-200 py-3.5 px-4 rounded-xl text-sm font-bold text-slate-800 outline-none focus:border-[#67B74D]">
                                        <option value="">Cuotas...</option>
                                        {cuotasOptions.map(n => <option key={n} value={n}>{n} Cuota{n>1?'s':''}</option>)}
                                    </select>
                                </div>
                            </div>
                        </div>

                        {/* Inputs Monetarios */}
                        <div className="mb-6">
                            <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest block mb-2 px-1">Precio Venta (Contado $)</label>
                            <input type="text" value={precioVenta} onChange={handlePriceChange} placeholder="$ 0" className="w-full bg-white border-2 border-slate-200 py-4 px-5 rounded-2xl text-lg font-black text-[#1e3a6d] outline-none focus:border-[#67B74D] shadow-sm transition-all" />
                        </div>

                        {/* Panel de Resultados Azules */}
                        <div className="bg-gradient-to-br from-[#1e3a6d] to-[#2C4C8C] rounded-2xl p-6 mb-8 text-center flex gap-4 shadow-lg">
                            <div className="flex-1 flex flex-col items-center justify-center border-r border-white/20 pr-4">
                                <p className="text-[10px] font-black text-[#67B74D] uppercase tracking-widest mb-2">Total Crédito (Editar)</p>
                                <input type="text" value={valorConsignar} onChange={handleConsignarChange} placeholder="$ 0" className="w-full bg-white/10 border border-white/30 text-white font-black text-xl text-center py-2 rounded-xl outline-none focus:bg-white/20 focus:border-white transition-all placeholder:text-white/50" />
                            </div>
                            <div className="flex-1 flex flex-col items-center justify-center pl-2">
                                <p className="text-[10px] font-black text-[#67B74D] uppercase tracking-widest mb-2">Cuota (Aprox.)</p>
                                <p className="text-2xl font-black text-white">{formatCurrency(cuotaAprox)}</p>
                            </div>
                        </div>

                        {/* Datos del Cliente */}
                        <div className="border-l-4 border-[#67B74D] pl-5 bg-slate-50/50 py-2 rounded-r-2xl mb-6">
                            <h3 className="text-xs font-black text-[#67B74D] uppercase tracking-widest mb-4">Datos del Solicitante</h3>
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <div>
                                    <input type="text" value={clientData.cc} onChange={e=>setClientData({...clientData, cc: e.target.value})} onBlur={handleCcBlur} placeholder="CC / Documento" className="w-full bg-white border border-slate-200 py-3 px-4 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-[#67B74D]" />
                                    {crmMsg && <p className={`text-[10px] font-bold mt-1 pl-1 ${crmMsg.type === 'success' ? 'text-[#67B74D]' : 'text-indigo-500'}`}>{crmMsg.text}</p>}
                                </div>
                                <div><input type="text" value={clientData.celular} onChange={e=>setClientData({...clientData, celular: e.target.value})} placeholder="Celular" className="w-full bg-white border border-slate-200 py-3 px-4 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-[#67B74D]" /></div>
                                <div className="sm:col-span-2"><input type="text" value={clientData.nombre} onChange={e=>setClientData({...clientData, nombre: e.target.value})} placeholder="Nombre Completo" className="w-full bg-white border border-slate-200 py-3 px-4 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-[#67B74D]" /></div>
                                <div className="sm:col-span-2"><input type="email" value={clientData.correo} onChange={e=>setClientData({...clientData, correo: e.target.value})} placeholder="Correo electrónico" className="w-full bg-white border border-slate-200 py-3 px-4 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-[#67B74D]" /></div>
                            </div>

                            {/* Campos Brilla */}
                            {showBrilla && (
                                <div className="mt-4 pt-4 border-t border-slate-200 grid grid-cols-1 sm:grid-cols-2 gap-4 animate-in fade-in duration-300">
                                    <div className="sm:col-span-2"><input type="text" value={brillaData.direccion} onChange={e=>setBrillaData({...brillaData, direccion: e.target.value})} placeholder="Dirección" className="w-full bg-white border border-slate-200 py-3 px-4 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-[#67B74D]" /></div>
                                    <div className="sm:col-span-2"><input type="text" value={brillaData.articulo} onChange={e=>setBrillaData({...brillaData, articulo: e.target.value})} placeholder="Artículo específico" className="w-full bg-white border border-slate-200 py-3 px-4 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-[#67B74D]" /></div>
                                    <div><input type="text" value={brillaData.ref1Nom} onChange={e=>setBrillaData({...brillaData, ref1Nom: e.target.value})} placeholder="Nombre Ref 1" className="w-full bg-white border border-slate-200 py-3 px-4 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-[#67B74D]" /></div>
                                    <div><input type="text" value={brillaData.ref1Tel} onChange={e=>setBrillaData({...brillaData, ref1Tel: e.target.value})} placeholder="Teléfono Ref 1" className="w-full bg-white border border-slate-200 py-3 px-4 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-[#67B74D]" /></div>
                                    <div><input type="text" value={brillaData.ref2Nom} onChange={e=>setBrillaData({...brillaData, ref2Nom: e.target.value})} placeholder="Nombre Ref 2" className="w-full bg-white border border-slate-200 py-3 px-4 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-[#67B74D]" /></div>
                                    <div><input type="text" value={brillaData.ref2Tel} onChange={e=>setBrillaData({...brillaData, ref2Tel: e.target.value})} placeholder="Teléfono Ref 2" className="w-full bg-white border border-slate-200 py-3 px-4 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-[#67B74D]" /></div>
                                </div>
                            )}
                        </div>

                        {/* Botones de Acción */}
                        <div className="flex gap-3">
                            <button onClick={clearInputs} className="p-4 bg-slate-100 text-slate-500 rounded-xl hover:bg-slate-200 transition-colors" title="Limpiar Formulario">
                                <Icon name="Trash2" size={20} />
                            </button>
                            <button onClick={validateAndSave} disabled={isSaving} className="flex-1 py-4 bg-gradient-to-r from-[#67B74D] to-[#559e3d] text-white rounded-xl font-black text-sm uppercase tracking-widest shadow-lg hover:shadow-xl hover:-translate-y-0.5 transition-all flex items-center justify-center gap-2 disabled:opacity-50">
                                {isSaving ? <><Icon name="RefreshCw" size={18} className="animate-spin" /> Registrando...</> : <><Icon name="Send" size={18} /> Enviar y Registrar</>}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const AdminView = ({ db, apiCall, showToast }) => {
            const [activeTab, setActiveTab] = useState('aliados');
            const [isSaving, setIsSaving] = useState(false);

            // Formularios
            const [aliadoForm, setAliadoForm] = useState({ nom: '', pass: '', rol: '', un: 'Atlantico' });
            const [rolForm, setRolForm] = useState('');
            const [vincRolForm, setVincRolForm] = useState({ rol: '', fin: '', factor: '' });
            const [vincTiendaForm, setVincTiendaForm] = useState({ cli: '', fin: '', factor: '' });
            const [entidadForm, setEntidadForm] = useState({ nom: '', fac: '' });
            const [planForm, setPlanForm] = useState({ fin: '', tipo: 'Mensual', num: '', int: '', fia: '' });
            const [anuncioForm, setAnuncioForm] = useState({ msg: db.notificacion?.mensaje || '', tipo: db.notificacion?.tipo || 'info', est: db.notificacion?.activo ? 'true' : 'false' });

            const rolesList = db.roles || [];
            const finList = db.financieras || [];
            const cliList = db.clientes || [];

            const handleSave = async (action, payload, clearFn) => {
                setIsSaving(true);
                const success = await apiCall(action, payload, "Operación exitosa");
                if(success && clearFn) clearFn();
                setIsSaving(false);
            };

            return (
                <div className="max-w-4xl mx-auto animate-fade-in w-full pb-20">
                    <div className="flex overflow-x-auto bg-white rounded-2xl shadow-sm border border-slate-200 mb-6 p-1.5 custom-scrollbar gap-1">
                        <button onClick={()=>setActiveTab('aliados')} className={`px-4 py-2.5 rounded-xl text-xs font-black uppercase tracking-wider whitespace-nowrap transition-colors ${activeTab==='aliados' ? 'bg-[#1e3a6d] text-white shadow-md' : 'text-slate-500 hover:bg-slate-100'}`}>Aliados</button>
                        <button onClick={()=>setActiveTab('roles')} className={`px-4 py-2.5 rounded-xl text-xs font-black uppercase tracking-wider whitespace-nowrap transition-colors ${activeTab==='roles' ? 'bg-[#1e3a6d] text-white shadow-md' : 'text-slate-500 hover:bg-slate-100'}`}>Roles y Permisos</button>
                        <button onClick={()=>setActiveTab('entidades')} className={`px-4 py-2.5 rounded-xl text-xs font-black uppercase tracking-wider whitespace-nowrap transition-colors ${activeTab==='entidades' ? 'bg-[#1e3a6d] text-white shadow-md' : 'text-slate-500 hover:bg-slate-100'}`}>Entidades y Planes</button>
                        <button onClick={()=>setActiveTab('anuncios')} className={`px-4 py-2.5 rounded-xl text-xs font-black uppercase tracking-wider whitespace-nowrap transition-colors ${activeTab==='anuncios' ? 'bg-[#1e3a6d] text-white shadow-md' : 'text-slate-500 hover:bg-slate-100'}`}>Anuncio Global</button>
                    </div>

                    <div className="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-200">
                        {activeTab === 'aliados' && (
                            <div className="space-y-8">
                                <div>
                                    <h3 className="text-sm font-black text-[#1e3a6d] uppercase tracking-widest mb-4 border-b pb-2">Nuevo Aliado Comercial</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <input type="text" placeholder="Nombre Comercial" value={aliadoForm.nom} onChange={e=>setAliadoForm({...aliadoForm, nom: e.target.value})} className="w-full bg-slate-50 border border-slate-200 py-3 px-4 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-[#67B74D]" />
                                        <input type="text" placeholder="Contraseña" value={aliadoForm.pass} onChange={e=>setAliadoForm({...aliadoForm, pass: e.target.value})} className="w-full bg-slate-50 border border-slate-200 py-3 px-4 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-[#67B74D]" />
                                        <select value={aliadoForm.un} onChange={e=>setAliadoForm({...aliadoForm, un: e.target.value})} className="w-full bg-slate-50 border border-slate-200 py-3 px-4 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-[#67B74D]">
                                            <option value="Atlantico">Atlántico</option>
                                            <option value="Bolivar">Bolívar</option>
                                            <option value="Magdalena">Magdalena</option>
                                        </select>
                                        <select value={aliadoForm.rol} onChange={e=>setAliadoForm({...aliadoForm, rol: e.target.value})} className="w-full bg-slate-50 border border-slate-200 py-3 px-4 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-[#67B74D]">
                                            <option value="">Sin Rol (Personalizado)</option>

                        {activeTab === 'roles' && (

                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                        <select value={vincRolForm.rol} onChange={e=>setVincRolForm({...vincRolForm, rol: e.target.value})} className="w-full bg-slate-50 border border-slate-200 py-3 px-4 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-[#1e3a6d]">
                                            <option value="">Rol...</option>

                                            <option value="">Entidad...</option>
                                            {finList.map(f=><option key={f.id_financiera} value={f.id_financiera}>{f.nombre_financiera}</option>)}

                                        <input type="number" step="0.01" placeholder="Factor (Ej: 0.85)" value={vincRolForm.factor} onChange={e=>setVincRolForm({...vincRolForm, factor: e.target.value})} className="w-full bg-slate-50 border border-slate-200 py-3 px-4 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-[#1e3a6d]" />

                                        {isSaving ? <Icon name="RefreshCw" className="animate-spin" size={16}/> : <Icon name="Save" size={16}/>} Guardar Permiso
                                    </button>
                                </div>

                        )}

                        {activeTab === 'entidades' && (
                            <div className="space-y-8">
                                <div>
