                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <input type="text" placeholder="Nombre Entidad" value={entidadForm.nom} onChange={e=>setEntidadForm({...entidadForm, nom: e.target.value})} className="w-full bg-slate-50 border border-slate-200 py-3 px-4 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-[#67B74D]" />
                                        <input type="number" step="0.01" placeholder="Factor Base Operador" value={entidadForm.fac} onChange={e=>setEntidadForm({...entidadForm, fac: e.target.value})} className="w-full bg-slate-50 border border-slate-200 py-3 px-4 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-[#67B74D]" />
                                    </div>
                                    <button disabled={isSaving} onClick={() => handleSave('crearFinanciera', {nombre: entidadForm.nom, factor: entidadForm.fac}, () => setEntidadForm({nom:'', fac:''}))} className="mt-4 px-6 py-3 bg-[#67B74D] text-white rounded-xl font-black text-xs uppercase tracking-widest shadow-md hover:bg-[#559e3d] flex items-center gap-2">
                                        {isSaving ? <Icon name="RefreshCw" className="animate-spin" size={16}/> : <Icon name="PlusCircle" size={16}/>} Registrar Entidad
                                    </button>
                                </div>
                                
                                <div>
                                    <h3 className="text-sm font-black text-[#1e3a6d] uppercase tracking-widest mb-4 border-b pb-2">Agregar Plan a Entidad</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                                        <select value={planForm.fin} onChange={e=>setPlanForm({...planForm, fin: e.target.value})} className="w-full bg-slate-50 border border-slate-200 py-3 px-4 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-[#1e3a6d]">
                                            <option value="">Entidad...</option>
                                            {finList.map(f=><option key={f.id_financiera} value={f.id_financiera}>{f.nombre_financiera}</option>)}
                                        </select>
                                        <select value={planForm.tipo} onChange={e=>setPlanForm({...planForm, tipo: e.target.value})} className="w-full bg-slate-50 border border-slate-200 py-3 px-4 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-[#1e3a6d]">
                                            <option value="Mensual">Mensual</option>
                                            <option value="Quincenal">Quincenal</option>
                                            <option value="Semanal">Semanal</option>
                                        </select>
                                        <input type="number" placeholder="Máx Cuotas (Ej: 24)" value={planForm.num} onChange={e=>setPlanForm({...planForm, num: e.target.value})} className="w-full bg-slate-50 border border-slate-200 py-3 px-4 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-[#1e3a6d]" />
                                        <input type="number" step="0.01" placeholder="% Interés" value={planForm.int} onChange={e=>setPlanForm({...planForm, int: e.target.value})} className="w-full bg-slate-50 border border-slate-200 py-3 px-4 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-[#1e3a6d]" />
                                        <input type="number" step="0.01" placeholder="% Fianza/Seguro" value={planForm.fia} onChange={e=>setPlanForm({...planForm, fia: e.target.value})} className="w-full bg-slate-50 border border-slate-200 py-3 px-4 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-[#1e3a6d]" />
                                    </div>
                                    <button disabled={isSaving} onClick={() => handleSave('crearPlanCuota', {id_financiera: planForm.fin, tipo_cuota: planForm.tipo, numero_cuotas: planForm.num, tasa_interes: planForm.int, tasa_fianza: planForm.fia}, () => setPlanForm({...planForm, num:'', int:'', fia:''}))} className="px-6 py-3 bg-[#1e3a6d] text-white rounded-xl font-black text-xs uppercase tracking-widest shadow-md hover:bg-black flex items-center gap-2">
                                        {isSaving ? <Icon name="RefreshCw" className="animate-spin" size={16}/> : <Icon name="PlusCircle" size={16}/>} Registrar Plan
                                    </button>
                                </div>
                            </div>
                        )}

                        {activeTab === 'anuncios' && (
                            <div>
                                <h3 className="text-sm font-black text-[#1e3a6d] uppercase tracking-widest mb-4 border-b pb-2">Transmitir Anuncio Global</h3>
                                <p className="text-xs text-slate-400 mb-4">Este mensaje aparecerá inmediatamente en la Calculadora de todas las tiendas activas.</p>
                                
                                <textarea value={anuncioForm.msg} onChange={e=>setAnuncioForm({...anuncioForm, msg: e.target.value})} placeholder="Escribe el aviso aquí..." className="w-full bg-slate-50 border border-slate-200 py-3 px-4 rounded-xl text-sm font-medium text-slate-700 outline-none focus:border-[#1e3a6d] min-h-[100px] mb-4"></textarea>
                                
                                <div className="grid grid-cols-2 gap-4 mb-4">
                                    <select value={anuncioForm.tipo} onChange={e=>setAnuncioForm({...anuncioForm, tipo: e.target.value})} className="w-full bg-slate-50 border border-slate-200 py-3 px-4 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-[#1e3a6d]">
                                        <option value="info">Informativo (Azul)</option>
                                        <option value="urgente">Urgente (Rojo)</option>
                                    </select>
                                    <select value={anuncioForm.est} onChange={e=>setAnuncioForm({...anuncioForm, est: e.target.value})} className="w-full bg-slate-50 border border-slate-200 py-3 px-4 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-[#1e3a6d]">
                                        <option value="true">Activo (Visible)</option>
                                        <option value="false">Inactivo (Oculto)</option>
                                    </select>
                                </div>
                                <button disabled={isSaving} onClick={() => handleSave('setNotificacion', {mensaje: anuncioForm.msg, tipo: anuncioForm.tipo, activo: anuncioForm.est === 'true'})} className="w-full px-6 py-4 bg-[#1e3a6d] text-white rounded-xl font-black text-xs uppercase tracking-widest shadow-md hover:bg-black flex items-center justify-center gap-2">
                                    {isSaving ? <Icon name="RefreshCw" className="animate-spin" size={16}/> : <Icon name="Send" size={16}/>} Publicar Anuncio
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const QueriesView = ({ db, userPerms }) => {
            const [activeTab, setActiveTab] = useState('historial');
            const [searchTerm, setSearchTerm] = useState('');

            // Filtros Historial
            const [fDesde, setFDesde] = useState('');
            const [fHasta, setFHasta] = useState('');
            const [fTienda, setFTienda] = useState('');
            const [fEntidad, setFEntidad] = useState('');
            const [fAsesor, setFAsesor] = useState('');
            const [fEstado, setFEstado] = useState('');

            const parseP = (fechaStr) => {
                if(!fechaStr) return 0;
                const b = String(fechaStr).split('/');
                if(b.length === 3) return new Date(b[2], b[1]-1, b[0]).getTime();
                return new Date(fechaStr).getTime();
            };

            const filteredHistory = useMemo(() => {
                const t1 = fDesde ? new Date(fDesde + 'T00:00:00').getTime() : null;
                const t2 = fHasta ? new Date(fHasta + 'T23:59:59').getTime() : null;
                const myUN = String(userPerms.un).trim().toLowerCase();

                return (db.simulaciones || []).filter(s => {
                    const t = parseP(s.fecha || s.Fecha);
                    if (t1 && t2 && (t < t1 || t > t2)) return false;
                    
                    if (fTienda && String(s.id_cliente).trim() !== String(fTienda).trim()) return false;
                    if (fEntidad && String(s.id_financiera).trim() !== String(fEntidad).trim()) return false;
                    
                    const foundC = db.clientes.find(c => String(c.id_cliente).trim() === String(s.id_cliente).trim());
                    if (!foundC) return false;

                    if (!userPerms.isGlobalAdmin) {
                        const clientUN = String(foundC.un || foundC.UN || foundC.UnidaddeNegocio || foundC['UNIDAD DE NEGOCIO'] || foundC['Unidad de Negocio'] || '').trim().toLowerCase();
                        if (clientUN !== myUN) return false;
                    }

                    if (fAsesor && String(foundC.asesor || '').trim() !== String(fAsesor).trim()) return false;
                    
                    if (fEstado) {
                        const estLower = String(s.estado || s.Estado || 'Pendiente').toLowerCase();
                        if (estLower !== String(fEstado).toLowerCase()) return false;
                    }

                    if (searchTerm) {
                        const term = searchTerm.toLowerCase();
                        const nCli = String(s.nombre || s.Nombre || '').toLowerCase();
                        const doc = String(s.cc || s.CC || '').toLowerCase();
                        const nTienda = String(foundC.nombre_cliente || '').toLowerCase();
                        if (!nCli.includes(term) && !doc.includes(term) && !nTienda.includes(term)) return false;
                    }
                    
                    return true;
                }).reverse();
            }, [db, fDesde, fHasta, fTienda, fEntidad, fAsesor, fEstado, searchTerm, userPerms]);

            const exportarExcel = () => {
                if (filteredHistory.length === 0) return alert("No hay datos");
                const exportData = filteredHistory.map(s => {
                    const foundC = db.clientes.find(c => String(c.id_cliente).trim() === String(s.id_cliente).trim());
                    const tienda = foundC ? foundC.nombre_cliente : 'Aliado';
                    const foundE = db.financieras.find(fi => String(fi.id_financiera).trim() === String(s.id_financiera).trim());
                    const entidad = foundE ? foundE.nombre_financiera : 'Entidad';

                    return {
                        "Fecha": s.fecha || s.Fecha,
                        "Tienda / Aliado": tienda,
                        "Entidad Financiera": entidad,
                        "Documento Cliente": s.cc || s.CC || '-',
                        "Nombre Cliente": s.nombre || s.Nombre || '-',
                        "Total Crédito": parsePrice(s.valor_a_consignar),
                        "Utilidad": parsePrice(s.utilidad),
                        "Cuota": parsePrice(s.valor_cuota),
                        "Plazo": s.n_cuotas,
                        "Estado": s.estado || s.Estado || 'Pendiente'
                    };
                });
                const worksheet = window.XLSX.utils.json_to_sheet(exportData);
                const workbook = window.XLSX.utils.book_new();
                window.XLSX.utils.book_append_sheet(workbook, worksheet, "Historial");
                window.XLSX.writeFile(workbook, `Historial_${new Date().toISOString().slice(0,10)}.xlsx`);
            };

            const exportarPDF = () => {
                if (filteredHistory.length === 0) return alert("No hay datos");
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF('landscape');
                doc.setFontSize(16);
                doc.text("Historial de Créditos y Simulaciones", 14, 15);
                doc.setFontSize(10);
                
                const tableColumn = ["Fecha", "Tienda", "Entidad", "Documento", "Cliente", "Crédito", "Utilidad", "Estado"];
                const tableRows = filteredHistory.map(s => {
                    const foundC = db.clientes.find(c => String(c.id_cliente).trim() === String(s.id_cliente).trim());
                    const tienda = foundC ? foundC.nombre_cliente : 'Aliado';
                    const foundE = db.financieras.find(fi => String(fi.id_financiera).trim() === String(s.id_financiera).trim());
                    const entidad = foundE ? foundE.nombre_financiera : 'Entidad';
                    return [
                        s.fecha || s.Fecha,
                        tienda.substring(0, 20),
                        entidad,
                        s.cc || s.CC || '-',
                        String(s.nombre || s.Nombre || '-').substring(0, 20),
                        formatCurrency(parsePrice(s.valor_a_consignar)),
                        formatCurrency(parsePrice(s.utilidad)),
                        s.estado || s.Estado || 'Pendiente'
                    ];
                });

                doc.autoTable({
                    head: [tableColumn],
                    body: tableRows,
                    startY: 25,
                    theme: 'grid',
                    styles: { fontSize: 8 },
                    headStyles: { fillColor: [44, 76, 140] }
                });
                doc.save(`Historial_${new Date().toISOString().slice(0,10)}.pdf`);
            };

            const getStatusBadge = (estLower) => {
                let badgeClass = 'bg-slate-100 text-slate-600 border-slate-200';
                if (estLower === 'aprobado') badgeClass = 'bg-emerald-50 text-emerald-600 border-emerald-200';
                else if (estLower === 'desembolsado') badgeClass = 'bg-emerald-800 text-white border-emerald-900';
                else if (estLower === 'rechazado' || estLower === 'anulado') badgeClass = 'bg-rose-50 text-rose-600 border-rose-200';
                return badgeClass;
            };

            const filteredClientes = useMemo(() => {
                const term = searchTerm.toLowerCase();
                const myUN = String(userPerms.un).trim().toLowerCase();
                return (db.clientes || []).filter(c => {
                    const matchName = String(c.nombre_cliente).toLowerCase().includes(term);
                    const matchAsesor = fAsesor ? String(c.asesor || '').toLowerCase() === fAsesor.toLowerCase() : true;
                    const clientUN = String(c.un || c.UN || c.UnidaddeNegocio || c['UNIDAD DE NEGOCIO'] || c['Unidad de Negocio'] || '').trim().toLowerCase();
                    const matchUN = userPerms.isGlobalAdmin ? true : (clientUN === myUN);
                    return matchName && matchAsesor && matchUN;
                });
            }, [db.clientes, searchTerm, fAsesor, userPerms]);

            const asesoresUnicos = useMemo(() => {
                const s = new Set();
                (db.clientes || []).forEach(c => { if(c.asesor) s.add(String(c.asesor).trim()); });
                return Array.from(s).sort();
            }, [db.clientes]);

            return (
                <div className="max-w-6xl mx-auto animate-fade-in w-full pb-20 flex flex-col h-full">
                    <div className="flex overflow-x-auto bg-white rounded-2xl shadow-sm border border-slate-200 mb-6 p-1.5 custom-scrollbar gap-1 shrink-0">
                        <button onClick={()=>setActiveTab('historial')} className={`px-4 py-2.5 rounded-xl text-xs font-black uppercase tracking-wider whitespace-nowrap transition-colors ${activeTab==='historial' ? 'bg-[#1e3a6d] text-white shadow-md' : 'text-slate-500 hover:bg-slate-100'}`}>Historial</button>
                        <button onClick={()=>setActiveTab('aliados')} className={`px-4 py-2.5 rounded-xl text-xs font-black uppercase tracking-wider whitespace-nowrap transition-colors ${activeTab==='aliados' ? 'bg-[#1e3a6d] text-white shadow-md' : 'text-slate-500 hover:bg-slate-100'}`}>Directorio Aliados</button>
                        {userPerms.isGlobalAdmin && (
                            <>
                                <button onClick={()=>setActiveTab('roles')} className={`px-4 py-2.5 rounded-xl text-xs font-black uppercase tracking-wider whitespace-nowrap transition-colors ${activeTab==='roles' ? 'bg-[#1e3a6d] text-white shadow-md' : 'text-slate-500 hover:bg-slate-100'}`}>Roles</button>
                                <button onClick={()=>setActiveTab('entidades')} className={`px-4 py-2.5 rounded-xl text-xs font-black uppercase tracking-wider whitespace-nowrap transition-colors ${activeTab==='entidades' ? 'bg-[#1e3a6d] text-white shadow-md' : 'text-slate-500 hover:bg-slate-100'}`}>Entidades</button>
                            </>
                        )}
                    </div>

                    <div className="bg-white p-4 md:p-6 rounded-3xl shadow-sm border border-slate-200 flex-1 flex flex-col overflow-hidden">
                        {activeTab === 'historial' && (
                            <div className="flex flex-col h-full">
                                <div className="bg-slate-50 p-4 rounded-xl border border-slate-100 mb-4 shrink-0 space-y-3">
                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                                        <div><label className="text-[10px] font-black text-slate-500 uppercase tracking-widest block mb-1 px-1">Desde</label><input type="date" value={fDesde} onChange={e=>setFDesde(e.target.value)} className="w-full bg-white border border-slate-200 py-2 px-3 rounded-lg text-xs font-bold text-slate-700 outline-none focus:border-[#1e3a6d]" /></div>
                                        <div><label className="text-[10px] font-black text-slate-500 uppercase tracking-widest block mb-1 px-1">Hasta</label><input type="date" value={fHasta} onChange={e=>setFHasta(e.target.value)} className="w-full bg-white border border-slate-200 py-2 px-3 rounded-lg text-xs font-bold text-slate-700 outline-none focus:border-[#1e3a6d]" /></div>
                                        <div>
                                            <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest block mb-1 px-1">Tienda</label>
                                            <select value={fTienda} onChange={e=>setFTienda(e.target.value)} className="w-full bg-white border border-slate-200 py-2 px-3 rounded-lg text-xs font-bold text-slate-700 outline-none focus:border-[#1e3a6d]">
                                                <option value="">Todas</option>
                                                {filteredClientes.map(c=><option key={c.id_cliente} value={c.id_cliente}>{c.nombre_cliente}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest block mb-1 px-1">Entidad</label>
                                            <select value={fEntidad} onChange={e=>setFEntidad(e.target.value)} className="w-full bg-white border border-slate-200 py-2 px-3 rounded-lg text-xs font-bold text-slate-700 outline-none focus:border-[#1e3a6d]">
                                                <option value="">Todas</option>
                                                {(db.financieras||[]).map(f=><option key={f.id_financiera} value={f.id_financiera}>{f.nombre_financiera}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest block mb-1 px-1">Asesor</label>
                                            <select value={fAsesor} onChange={e=>setFAsesor(e.target.value)} className="w-full bg-white border border-slate-200 py-2 px-3 rounded-lg text-xs font-bold text-slate-700 outline-none focus:border-[#1e3a6d]">
                                                <option value="">Todos</option>
                                                {asesoresUnicos.map(a=><option key={a} value={a}>{a}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest block mb-1 px-1">Estado</label>
                                            <select value={fEstado} onChange={e=>setFEstado(e.target.value)} className="w-full bg-white border border-slate-200 py-2 px-3 rounded-lg text-xs font-bold text-slate-700 outline-none focus:border-[#1e3a6d]">
                                                <option value="">Todos</option>
                                                <option value="Pendiente">Pendiente</option>
                                                <option value="Aprobado">Aprobado</option>
                                                <option value="Desembolsado">Desembolsado</option>
                                                <option value="Rechazado">Rechazado</option>
                                            </select>
                                        </div>
                                        <div className="col-span-2">
                                            <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest block mb-1 px-1">Búsqueda Libre</label>
                                            <div className="relative">
                                                <input type="text" placeholder="Cédula, nombre o tienda..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} className="w-full bg-white border border-slate-200 py-2 pl-8 pr-3 rounded-lg text-xs font-bold text-slate-700 outline-none focus:border-[#1e3a6d]" />
                                                <Icon name="Search" size={14} className="absolute left-2.5 top-1/2 -translate-y-1/2 text-slate-400"/>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="flex gap-2 justify-end pt-2 border-t border-slate-200">
                                        <button onClick={exportarExcel} className="flex items-center gap-1.5 px-4 py-2 bg-emerald-50 text-emerald-700 border border-emerald-200 rounded-lg hover:bg-emerald-100 transition-colors font-bold text-xs shadow-sm"><Icon name="Download" size={14}/> Excel</button>
                                        <button onClick={exportarPDF} className="flex items-center gap-1.5 px-4 py-2 bg-rose-50 text-rose-700 border border-rose-200 rounded-lg hover:bg-rose-100 transition-colors font-bold text-xs shadow-sm"><Icon name="Download" size={14}/> PDF</button>
                                    </div>
                                </div>
                                <div className="flex-1 overflow-auto custom-scrollbar border border-slate-200 rounded-xl">
                                    <table className="w-full text-left text-xs whitespace-nowrap">
                                        <thead className="bg-slate-50 text-slate-500 font-black uppercase tracking-widest sticky top-0 shadow-sm z-10">
                                            <tr>
                                                <th className="px-4 py-3">Fecha</th>
                                                <th className="px-4 py-3 text-[#1e3a6d]">Tienda</th>
                                                <th className="px-4 py-3">Entidad</th>
                                                <th className="px-4 py-3">Documento</th>
                                                <th className="px-4 py-3">Cliente</th>
                                                <th className="px-4 py-3 text-right">Crédito</th>
                                                <th className="px-4 py-3 text-right text-[#67B74D]">Utilidad</th>
                                                <th className="px-4 py-3 text-right">Cuota</th>
                                                <th className="px-4 py-3 text-center">Plazo</th>
                                                <th className="px-4 py-3 text-center">Estado</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {filteredHistory.length > 0 ? filteredHistory.map((s, i) => {
                                                const foundC = db.clientes.find(c => String(c.id_cliente).trim() === String(s.id_cliente).trim());
                                                const t = foundC ? foundC.nombre_cliente : 'Aliado';
                                                const foundE = db.financieras.find(fi => String(fi.id_financiera).trim() === String(s.id_financiera).trim());
                                                const e = foundE ? foundE.nombre_financiera : 'Entidad';
                                                const estLower = String(s.estado || s.Estado || 'Pendiente').toLowerCase();

                                                return (
                                                    <tr key={i} className="hover:bg-slate-50 transition-colors">
                                                        <td className="px-4 py-3 font-medium text-slate-500">{s.fecha || s.Fecha}</td>
                                                        <td className="px-4 py-3 font-bold text-[#1e3a6d]">{t}</td>
                                                        <td className="px-4 py-3 font-bold text-slate-700">{e}</td>
                                                        <td className="px-4 py-3 font-mono text-slate-500">{s.cc || s.CC || '-'}</td>
                                                        <td className="px-4 py-3 font-bold text-slate-700">{s.nombre || s.Nombre || '-'}</td>
                                                        <td className="px-4 py-3 text-right font-medium">{formatCurrency(s.valor_a_consignar)}</td>
                                                        <td className="px-4 py-3 text-right font-black text-[#67B74D]">{formatCurrency(s.utilidad)}</td>
                                                        <td className="px-4 py-3 text-right font-bold text-slate-600">{formatCurrency(s.valor_cuota)}</td>
                                                        <td className="px-4 py-3 text-center font-bold text-slate-600">{s.n_cuotas}</td>
                                                        <td className="px-4 py-3 text-center">
                                                            <span className={`inline-block border px-2.5 py-1 rounded-md text-[9px] font-black uppercase tracking-widest ${getStatusBadge(estLower)}`}>
                                                                {s.estado || s.Estado || 'Pendiente'}
                                                            </span>
                                                        </td>
                                                    </tr>
                                                );
                                            }) : <tr><td colSpan="10" className="px-4 py-12 text-center text-slate-400 font-bold">Sin datos en el periodo</td></tr>}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {activeTab === 'aliados' && (
                            <div className="flex flex-col h-full">
                                <div className="mb-4">
                                    <div className="relative w-full max-w-sm">
                                        <input type="text" placeholder="🔍 Buscar aliado por nombre..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} className="w-full bg-slate-50 border border-slate-200 py-2.5 pl-10 pr-4 rounded-xl text-sm outline-none focus:border-[#1e3a6d] font-medium" />
                                        <Icon name="Search" size={16} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"/>
                                    </div>
                                </div>
                                <div className="flex-1 overflow-auto custom-scrollbar border border-slate-200 rounded-xl">
                                    <table className="w-full text-left text-sm whitespace-nowrap">
                                        <thead className="bg-slate-50 text-slate-500 font-black uppercase tracking-widest sticky top-0 shadow-sm z-10 text-[10px]">
                                            <tr><th className="px-4 py-3">Nombre Aliado</th><th className="px-4 py-3">UN</th><th className="px-4 py-3">Clave Acceso</th><th className="px-4 py-3">Asesor / KAM</th><th className="px-4 py-3">Fecha Registro</th></tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {filteredClientes.map((c, i) => (
                                                <tr key={i} className="hover:bg-slate-50 transition-colors">
                                                    <td className="px-4 py-3 font-bold text-slate-800">{c.nombre_cliente}</td>
                                                    <td className="px-4 py-3"><span className="bg-blue-50 text-blue-700 border border-blue-200 px-2 py-0.5 rounded text-[9px] font-black uppercase tracking-widest">{c.un || c.UN || c.UnidaddeNegocio || c['UNIDAD DE NEGOCIO'] || c['Unidad de Negocio'] || 'N/A'}</span></td>
                                                    <td className="px-4 py-3 font-mono text-slate-500 text-xs">{c.contrasena}</td>
                                                    <td className="px-4 py-3"><span className="bg-slate-100 text-slate-600 border border-slate-200 px-2 py-0.5 rounded text-[9px] font-black uppercase tracking-widest">{c.asesor || 'SIN ASESOR'}</span></td>
                                                    <td className="px-4 py-3 text-slate-500 font-medium text-xs">{parseDate(c.fecha_registro || c.fecha || c.Fecha_registro)}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {activeTab === 'roles' && userPerms.isGlobalAdmin && (
                            <div className="flex-1 overflow-auto custom-scrollbar border border-slate-200 rounded-xl">
                                <table className="w-full text-left text-sm whitespace-nowrap">
                                    <thead className="bg-slate-50 text-slate-500 font-black uppercase tracking-widest sticky top-0 shadow-sm z-10 text-[10px]">
                                        <tr><th className="px-4 py-3">Nombre del Rol</th><th className="px-4 py-3">Estado</th></tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {(db.roles||[]).map((r, i) => (
                                            <tr key={i} className="hover:bg-slate-50 transition-colors">
                                                <td className="px-4 py-3 font-bold text-slate-800">{r.nombre_rol}</td>
                                                <td className="px-4 py-3"><span className="bg-emerald-50 text-emerald-700 border border-emerald-200 px-2 py-0.5 rounded text-[9px] font-black uppercase tracking-widest">{r.estado || 'Activo'}</span></td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}

                        {activeTab === 'entidades' && userPerms.isGlobalAdmin && (
                            <div className="flex-1 overflow-auto custom-scrollbar border border-slate-200 rounded-xl">
                                <table className="w-full text-left text-sm whitespace-nowrap">
                                    <thead className="bg-slate-50 text-slate-500 font-black uppercase tracking-widest sticky top-0 shadow-sm z-10 text-[10px]">
                                        <tr><th className="px-4 py-3">Entidad Financiera</th><th className="px-4 py-3">Factor Base</th></tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {(db.financieras||[]).map((f, i) => (
                                            <tr key={i} className="hover:bg-slate-50 transition-colors">
                                                <td className="px-4 py-3 font-bold text-slate-800">{f.nombre_financiera}</td>
                                                <td className="px-4 py-3 font-mono text-slate-600">{f.factor_financiera}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const OnlineCreditView = ({ onOpenQr, loadDistribuidorPrices }) => {
            const cards = [
                { id: 'payjoy', name: 'PayJoy', color: 'blue', url: 'retailb.html' },
                { id: 'alocredit', name: 'Alocredit', color: 'indigo', url: 'alocredit.html' },
                { id: 'krediya', name: 'Krediya', color: 'emerald', url: 'krediya.html' },
                { id: 'credismart', name: 'Credismart', color: 'rose', url: 'credismart.html' }
            ];

            return (
                <div className="space-y-6 animate-fade-in max-w-6xl mx-auto pb-20">
                    <div className="flex justify-between items-center bg-white p-6 rounded-2xl border border-slate-200 shadow-sm shrink-0">
                        <div>
                            <h2 className="text-2xl font-black text-slate-800 tracking-tight">Crédito en Línea</h2>
                            <p className="text-sm font-medium text-slate-500 mt-1">Acceso a portales de originación</p>
                        </div>
                        <button onClick={loadDistribuidorPrices} className="flex items-center gap-2 px-5 py-2.5 bg-amber-400 text-amber-900 rounded-xl font-black text-xs uppercase tracking-widest shadow-md hover:bg-amber-500 transition-colors">
                            <Icon name="Banknote" size={16}/> Precios Mayorista
                        </button>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6">
                        {cards.map(c => (
                            <div key={c.id} className={`bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden flex flex-col hover:shadow-lg transition-shadow border-t-[8px] border-t-${c.color}-500`}>
                                <div className="p-8 flex-1 flex flex-col items-center text-center">
                                    <div className={`w-20 h-20 bg-${c.color}-50 text-${c.color}-600 rounded-2xl flex items-center justify-center mb-5`}>
                                        <Icon name="Smartphone" size={40}/>
                                    </div>
                                    <h3 className="text-2xl font-black text-slate-800 uppercase tracking-tight">{c.name}</h3>
                                    <p className="text-sm text-slate-500 font-medium mt-2">Portal de originación y gestión de créditos.</p>
                                </div>
                                <div className="p-4 bg-slate-50 border-t border-slate-100 flex gap-2">
                                    <button onClick={() => onOpenQr(`https://tecnomarin.github.io/MULTIMARCAS/${c.url}`, c.name)} className="p-3.5 bg-white text-slate-600 hover:text-[#2C4C8C] rounded-xl shadow-sm border border-slate-200 transition-colors" title="Ver código QR">
                                        <Icon name="QrCode" size={20}/>
                                    </button>
                                    <button onClick={() => window.open(c.url, '_blank')} className={`flex-1 py-3.5 bg-${c.color}-500 text-white rounded-xl font-black text-xs uppercase tracking-widest shadow-md hover:bg-${c.color}-600 transition-colors flex items-center justify-center gap-2`}>
                                        Abrir Portal <Icon name="ExternalLink" size={16}/>
                                    </button>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [currentUser, setCurrentUser] = useState(null);
            const [userPerms, setUserPerms] = useState({ isGlobalAdmin: false, isRegionalAdmin: false, isSemiAdmin: false, isTesoreria: false, hasPrivileges: false, un: '' });
            
            const [db, setDb] = useState({ clientes: [], financieras: [], cuotas: [], porcentajes: [], simulaciones: [], roles: [], roles_permisos: [], bancos: [], cuentas_tesoreria: [], notificacion: null });
            const [distribuidorPrices, setDistribuidorPrices] = useState([]);
            
            const [activeView, setActiveView] = useState('sim'); 
            const [isSidebarCollapsed, setIsSidebarCollapsed] = useState(false);
            
            const [loading, setLoading] = useState(false);
            const [initialLoading, setInitialLoading] = useState(true);
            const [toast, setToast] = useState({ show: false, message: '', type: 'success' });
            
            const [qrModal, setQrModal] = useState({ show: false, url: '', title: '' });
            const [preciosModal, setPreciosModal] = useState({ show: false, loading: false });

            const showToast = useCallback((message, type = 'success') => {
                setToast({ show: true, message, type });
                setTimeout(() => setToast({ show: false, message: '', type: 'success' }), 3500);
            }, []);

            const fetchData = useCallback(async (isRefresh = false) => {
                setLoading(true);
                try {
                    const separator = SCRIPT_URL.includes('?') ? '&' : '?';
                    const response = await fetch(`${SCRIPT_URL}${separator}action=getData`, { method: 'GET', mode: 'cors' });
                    if (!response.ok) throw new Error("Network error");
                    const resJson = await response.json();
                    
                    if (resJson.status === 'success' && resJson.data) {
                        setDb(resJson.data);
                        if(isRefresh) showToast("Datos sincronizados.", "success");
                    } else {
                        throw new Error(resJson.message || "Failed to load DB");
                    }
                } catch (error) {
                    console.error("Fetch Data Error:", error);
                    showToast("Error de conexión. Intenta recargar.", "error");
                } finally {
                    setLoading(false);
                    setInitialLoading(false);
                }
            }, [showToast]);

            useEffect(() => {
                const savedSession = sessionStorage.getItem('soluciones_user_session_v3');
                if (savedSession) {
                    try {
                        const user = JSON.parse(savedSession);
                        setCurrentUser(user);
                        setupPermissions(user);
                    } catch (e) {
                        sessionStorage.removeItem('soluciones_user_session_v3');
                    }
                }
                fetchData();
            }, [fetchData]);

            useEffect(() => {
                if (currentUser) {
                    const interval = setInterval(() => { fetchData(false); }, 300000);
                    return () => clearInterval(interval);
                }
            }, [currentUser, fetchData]);

            const setupPermissions = (user) => {
                const uName = String(user.nombre_cliente).toLowerCase().trim();
                setUserPerms({
                    isGlobalAdmin: uName === 'administrador',
                    isRegionalAdmin: uName.startsWith('admin-'),
                    isSemiAdmin: uName.startsWith('cia'),
                    isTesoreria: uName === 'tesoreria' || uName === 'tesorería',
                    hasPrivileges: (uName === 'administrador' || uName.startsWith('admin-') || uName.startsWith('cia') || uName === 'tesoreria' || uName === 'tesorería'),
                    un: user.un || user.UN || user.UnidaddeNegocio || user['UNIDAD DE NEGOCIO'] || user['Unidad de Negocio'] || ''
                });
            };

            const handleLogin = (user, pass) => {
                const f = db.clientes.find(c => String(c.nombre_cliente).toLowerCase().trim() === user.toLowerCase().trim() && String(c.contrasena) === pass);
                if (f) {
                    setCurrentUser(f);
                    setupPermissions(f);
                    sessionStorage.setItem('soluciones_user_session_v3', JSON.stringify(f));
                    setActiveView('sim');
                } else {
                    showToast("Credenciales incorrectas", "error");
                }
            };

            const handleLogout = () => {
                setCurrentUser(null);
                setUserPerms({ isGlobalAdmin: false, isRegionalAdmin: false, isSemiAdmin: false, isTesoreria: false, hasPrivileges: false, un: '' });
                sessionStorage.removeItem('soluciones_user_session_v3');
                setActiveView('sim');
            };

            const apiCall = async (action, data, successMsg) => {
                setLoading(true);
                try {
                    const separator = SCRIPT_URL.includes('?') ? '&' : '?';
                    const payloadParam = data ? `&data=${encodeURIComponent(JSON.stringify(data))}` : '';
                    const response = await fetch(`${SCRIPT_URL}${separator}action=${action}${payloadParam}`, { method: 'GET', mode: 'cors' });
                    
                    if (!response.ok) throw new Error("Network error");
                    const resJson = await response.json();

                    if (resJson.status === 'success') {
                        await fetchData(false);
                        if(successMsg) showToast(successMsg, "success");
                        return true;
                    } else {
                        throw new Error(resJson.message);
                    }
                } catch (error) {
                    console.error(`API Error (${action}):`, error);
                    showToast(`Error: ${error.message}`, "error");
                    return false;
                } finally {
                    setLoading(false);
                }
            };

            const loadDistribuidorPrices = async () => {
                setPreciosModal({ show: true, loading: true });
                try {
                    const separator = SCRIPT_URL.includes('?') ? '&' : '?';
                    const response = await fetch(`${SCRIPT_URL}${separator}action=getPrecios`, { method: 'GET', mode: 'cors' });
                    if(response.ok){
                        const data = await response.json();
                        if(!data.error) setDistribuidorPrices(data);
                    }
                } catch (e) {
                    showToast("Error cargando precios.", "error");
                } finally {
                    setPreciosModal(prev => ({ ...prev, loading: false }));
                }
            };

            const NavItem = ({ id, icon, label, onClick, hidden = false }) => {
                if (hidden) return null;
                const isActive = activeView === id;
                return (
                    <button 
                        onClick={() => onClick ? onClick() : setActiveView(id)} 
                        className={`group relative flex items-center shrink-0 transition-all duration-200 overflow-hidden
                            ${isActive ? 'bg-[#2C4C8C] text-white shadow-md' : 'text-slate-500 hover:bg-slate-200 hover:text-slate-800'}
                            ${isSidebarCollapsed ? 'justify-center w-12 h-12 rounded-2xl mx-auto' : 'justify-start w-full px-4 py-3.5 rounded-xl'}`}
                        title={isSidebarCollapsed ? label : ''}
                    >
                        <Icon name={icon} size={isSidebarCollapsed ? 20 : 18} className={`shrink-0 transition-transform duration-200 ${isActive && isSidebarCollapsed ? 'scale-110' : ''} ${!isActive && 'group-hover:scale-110'}`} />
                        <span className={`whitespace-nowrap transition-all duration-300 font-black text-xs uppercase tracking-widest ${isSidebarCollapsed ? 'opacity-0 w-0 ml-0 hidden' : 'opacity-100 w-auto ml-3'}`}>
                            {label}
                        </span>
                    </button>
                );
            };

            if (initialLoading) {
                return <div className="h-screen w-screen flex flex-col items-center justify-center bg-gradient-to-br from-[#1e3a6d] to-[#2C4C8C]"><Icon name="Loader" size={48} className="text-white animate-spin mb-4" /><p className="text-white font-bold tracking-widest uppercase text-sm">Cargando Plataforma...</p></div>;
            }

            if (!currentUser) {
                return <div className="h-screen w-screen flex items-center justify-center p-4"><LoginView onLogin={handleLogin} /></div>;
            }

            return (
                <div className="h-screen w-screen flex flex-col md:flex-row bg-white relative overflow-hidden animate-fade-in">
                    <Toast show={toast.show} message={toast.message} type={toast.type} onClose={() => setToast({ ...toast, show: false })} />
                    
                    {loading && (
                        <div className="absolute top-4 right-6 z-50 bg-white/90 backdrop-blur px-3 py-1.5 rounded-full shadow-sm flex items-center gap-2 text-xs font-bold text-[#2C4C8C]">
                            <Icon name="RefreshCw" size={14} className="animate-spin" /> Sincronizando...
                        </div>
                    )}

                    {/* Header solo para móviles */}
                    <div className="md:hidden bg-white border-b border-slate-200 px-5 py-4 flex justify-between items-center shrink-0 z-20">
                        <img src="https://raw.githubusercontent.com/TECNOMARIN/MULTIMARCAS/main/SOLUCIONES%20PNG.png" alt="Logo" className="h-8 object-contain" />
                        <div className="flex items-center gap-3">
                            <div className="w-8 h-8 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center font-bold text-sm">
                                {currentUser?.nombre_cliente?.charAt(0).toUpperCase()}
                            </div>
                        </div>
                    </div>

                    <div className={`bg-slate-50 border-r border-slate-200 flex flex-col shrink-0 transition-all duration-300 relative z-30
                        ${isSidebarCollapsed ? 'w-[80px]' : 'w-64'} 
                        hidden md:flex h-full`}
                    >
                        {/* Botón de Colapsar/Expandir */}
                        <button
                            onClick={() => setIsSidebarCollapsed(!isSidebarCollapsed)}
                            className="absolute -right-3.5 top-8 bg-white border border-slate-200 rounded-full p-1.5 text-slate-400 hover:text-[#2C4C8C] shadow-md z-40 transition-transform hover:scale-110"
                        >
                            <Icon name={isSidebarCollapsed ? "ChevronRight" : "ChevronLeft"} size={16} />
                        </button>

                        {/* Logo Area */}
                        <div className={`flex justify-center items-center h-20 shrink-0 border-b border-slate-200 bg-white transition-all duration-300 overflow-hidden ${isSidebarCollapsed ? 'px-2' : 'px-6'}`}>
                            <img 
                                src="https://raw.githubusercontent.com/TECNOMARIN/MULTIMARCAS/main/SOLUCIONES%20PNG.png" 
                                alt="Logo" 
                                className={`object-contain transition-all duration-300 ${isSidebarCollapsed ? 'h-8' : 'h-10'}`} 
                            />
                        </div>

                        {/* User Info Area */}
                        <div className={`border-b border-slate-200 bg-white flex flex-col items-center text-center transition-all duration-300 overflow-hidden
                            ${isSidebarCollapsed ? 'h-0 py-0 opacity-0' : 'h-auto py-5 opacity-100 px-4'}`}
                        >
                            <div className="w-12 h-12 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center font-black text-xl mb-3 shadow-inner">
                                {currentUser?.nombre_cliente?.charAt(0).toUpperCase()}
                            </div>
                            <h3 className="text-sm font-black text-slate-800 line-clamp-2 w-full leading-tight" title={currentUser?.nombre_cliente}>{currentUser?.nombre_cliente}</h3>
                            {userPerms.hasPrivileges && !userPerms.isGlobalAdmin && (
                                <span className="bg-blue-50 text-blue-700 border border-blue-200 px-2 py-0.5 rounded text-[9px] font-black uppercase tracking-widest mt-2 w-fit mx-auto truncate max-w-full">UN: {userPerms.un}</span>
                            )}
                        </div>

                        {/* Scrollable Navigation */}
                        <div className="flex flex-col flex-1 overflow-y-auto custom-scrollbar p-3 space-y-1.5 mt-2 pb-20">
                            
                            {!isSidebarCollapsed && <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest px-3 mb-1 mt-2">Principal</p>}
                            <NavItem id="sim" icon="Calculator" label="Calculadora" />
                            <NavItem id="ext" icon="Smartphone" label="Crédito en Línea" />

                            {userPerms.hasPrivileges && (
                                <>
                                    {!isSidebarCollapsed && <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest px-3 mb-1 mt-4">Gestión y Caja</p>}
                                    <NavItem id="sol" icon="ClipboardList" label="Solicitudes" onClick={() => window.open('solicitudes.html', '_blank')} hidden={!userPerms.hasPrivileges} />
                                    <NavItem id="tes" icon="Landmark" label="Tesorería" onClick={() => window.open('tesoreria.html', '_blank')} hidden={!(userPerms.isGlobalAdmin || userPerms.isRegionalAdmin || userPerms.isTesoreria)} />
                                    <NavItem id="liq" icon="Award" label="Liquidaciones" onClick={() => window.open('liquidaciones.html', '_blank')} hidden={!userPerms.isGlobalAdmin} />
                                </>
                            )}

                            {(userPerms.hasPrivileges) && (
                                <>
                                    {!isSidebarCollapsed && <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest px-3 mb-1 mt-4">Administración</p>}
                                    <NavItem id="dash" icon="PieChart" label="Dashboard" onClick={() => window.open('dashboard.html', '_blank')} hidden={!userPerms.isGlobalAdmin} />
                                    <NavItem id="con" icon="Database" label="Consultas" hidden={!(userPerms.isGlobalAdmin || userPerms.isRegionalAdmin || userPerms.isTesoreria)} />
                                    <NavItem id="adm" icon="Settings" label="Configuración" hidden={!userPerms.hasPrivileges} />
                                </>
                            )}
                        </div>

                        {/* Botón Salir */}
                        <div className="p-3 border-t border-slate-200 bg-white shrink-0">
                            <button 
                                onClick={handleLogout} 
                                className={`flex items-center justify-center p-3 text-rose-500 hover:bg-rose-50 rounded-xl transition-colors border border-transparent hover:border-rose-100 group
                                    ${isSidebarCollapsed ? 'w-12 h-12 mx-auto' : 'w-full gap-2 px-4'}`}
                                title={isSidebarCollapsed ? "Cerrar Sesión" : ""}
                            >
                                <Icon name="LogOut" size={isSidebarCollapsed ? 20 : 16} className={`${isSidebarCollapsed && 'group-hover:scale-110 transition-transform'}`} /> 
                                {!isSidebarCollapsed && <span className="text-xs font-black uppercase tracking-widest">Cerrar Sesión</span>}
                            </button>
                        </div>
                    </div>

                    {/* Menú inferior móvil */}
                    <div className="md:hidden bg-white border-t border-slate-200 flex overflow-x-auto custom-scrollbar p-2 gap-2 shrink-0 z-20">
                        <button onClick={() => setActiveView('sim')} className={`flex-1 min-w-[100px] flex flex-col items-center justify-center p-2 rounded-xl text-[10px] font-black uppercase tracking-wider transition-all ${activeView === 'sim' ? 'bg-[#2C4C8C] text-white shadow-md' : 'text-slate-500 hover:bg-slate-100'}`}><Icon name="Calculator" size={18} className="mb-1"/> Simulador</button>
                        <button onClick={() => setActiveView('ext')} className={`flex-1 min-w-[100px] flex flex-col items-center justify-center p-2 rounded-xl text-[10px] font-black uppercase tracking-wider transition-all ${activeView === 'ext' ? 'bg-[#2C4C8C] text-white shadow-md' : 'text-slate-500 hover:bg-slate-100'}`}><Icon name="Smartphone" size={18} className="mb-1"/> Créditos</button>
                        {userPerms.hasPrivileges && <button onClick={() => setActiveView('adm')} className={`flex-1 min-w-[100px] flex flex-col items-center justify-center p-2 rounded-xl text-[10px] font-black uppercase tracking-wider transition-all ${activeView === 'adm' ? 'bg-[#2C4C8C] text-white shadow-md' : 'text-slate-500 hover:bg-slate-100'}`}><Icon name="Settings" size={18} className="mb-1"/> Config</button>}
                        {(userPerms.isGlobalAdmin || userPerms.isRegionalAdmin || userPerms.isTesoreria) && <button onClick={() => setActiveView('con')} className={`flex-1 min-w-[100px] flex flex-col items-center justify-center p-2 rounded-xl text-[10px] font-black uppercase tracking-wider transition-all ${activeView === 'con' ? 'bg-[#2C4C8C] text-white shadow-md' : 'text-slate-500 hover:bg-slate-100'}`}><Icon name="Database" size={18} className="mb-1"/> Consultas</button>}
                        <button onClick={handleLogout} className="flex-1 min-w-[100px] flex flex-col items-center justify-center p-2 rounded-xl text-[10px] font-black uppercase tracking-wider transition-all text-rose-500 hover:bg-rose-50"><Icon name="LogOut" size={18} className="mb-1"/> Salir</button>
                    </div>

                    <div className="flex-1 flex flex-col h-full overflow-hidden bg-slate-50/50 relative">
                        {db.notificacion && db.notificacion.activo && db.notificacion.mensaje && activeView === 'sim' && (
                            <div className={`px-6 py-4 border-b flex items-start gap-3 ${db.notificacion.tipo === 'urgente' ? 'bg-rose-50 border-rose-200 text-rose-800' : 'bg-blue-50 border-blue-200 text-blue-800'} shrink-0 z-10`}>
                                <Icon name={db.notificacion.tipo === 'urgente' ? 'AlertTriangle' : 'Info'} size={20} className="shrink-0 mt-0.5" />
                                <div>
                                    <strong className="text-xs uppercase tracking-widest block mb-0.5">Aviso Importante</strong>
                                    <p className="text-sm font-semibold leading-relaxed">{db.notificacion.mensaje}</p>
                                </div>
                            </div>
                        )}

                        <div className="flex-1 overflow-y-auto custom-scrollbar p-4 md:p-8 relative">
                            {activeView === 'sim' && <CalculatorView db={db} currentUser={currentUser} userPerms={userPerms} apiCall={apiCall} showToast={showToast} />}
                            {activeView === 'ext' && <OnlineCreditView onOpenQr={(url, title) => setQrModal({show: true, url, title})} loadDistribuidorPrices={loadDistribuidorPrices} />}
                            {activeView === 'adm' && userPerms.hasPrivileges && <AdminView db={db} apiCall={apiCall} showToast={showToast} />}
                            {activeView === 'con' && (userPerms.isGlobalAdmin || userPerms.isRegionalAdmin || userPerms.isTesoreria) && <QueriesView db={db} userPerms={userPerms} />}
                        </div>
                    </div>

                    {preciosModal.show && (
                        <div className="fixed inset-0 z-[7000] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm px-4 animate-in fade-in">
                            <div className="bg-white rounded-3xl shadow-2xl max-w-5xl w-full max-h-[90vh] flex flex-col animate-pop-in border border-slate-200">
                                <div className="bg-amber-400 p-6 flex justify-between items-center shrink-0">
                                    <h3 className="text-amber-900 font-black text-xl tracking-tight">Lista de Precios - Mayorista</h3>
                                    <button onClick={() => setPreciosModal({show: false, loading: false})} className="text-amber-900 hover:bg-white/30 p-2 rounded-full transition-colors"><Icon name="X" size={24}/></button>
                                </div>
                                <div className="p-6 flex-1 overflow-y-auto custom-scrollbar bg-slate-50">
                                    {preciosModal.loading ? (
                                        <div className="flex flex-col items-center justify-center py-24 text-amber-600">
                                            <Icon name="RefreshCw" size={48} className="animate-spin mb-4" />
                                            <p className="font-bold text-lg">Consultando el servidor...</p>
                                        </div>
                                    ) : (
                                        <div className="rounded-2xl border border-slate-200 overflow-hidden bg-white shadow-sm">
                                            <table className="w-full text-sm text-left">
                                                <thead className="text-[10px] uppercase tracking-widest text-slate-500 bg-slate-50 sticky top-0 shadow-sm border-b border-slate-200">
                                                    <tr>
                                                        <th className="p-4 font-black">Marca</th>
                                                        <th className="p-4 font-black">Referencia</th>
                                                        <th className="p-4 font-black text-right">Costo Neto</th>
                                                        <th className="p-4 font-black text-right">Venta Público</th>
                                                        <th className="p-4 font-black text-right text-teal-600">Inicial Plataforma</th>
                                                        <th className="p-4 font-black text-right text-orange-600">Recibe Tienda</th>
                                                        <th className="p-4 font-black text-right text-indigo-600">Utilidad ALO</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-100">
                                                    {distribuidorPrices.length > 0 ? distribuidorPrices.map((item, i) => {
                                                        const cost = parsePrice(item.cost);
                                                        const sale = parsePrice(item.sale);
                                                        const initial = parsePrice(item.initial);
                                                        const receive = parsePrice(item.receive);
                                                        const alocreditComm = Math.round((receive * 0.45) / 1000) * 1000;
                                                        
                                                        return (
                                                            <tr key={i} className="hover:bg-slate-50 transition-colors">
                                                                <td className="p-4 font-black text-[#67B74D]">{item.brand}</td>
                                                                <td className="p-4 font-bold text-slate-700">{item.ref}</td>
                                                                <td className="p-4 text-right text-slate-500 font-medium">{formatCurrency(cost)}</td>
                                                                <td className="p-4 text-right font-black text-slate-800">{formatCurrency(sale)}</td>
                                                                <td className="p-4 text-right font-black text-teal-600 bg-teal-50/30">{formatCurrency(initial)}</td>
                                                                <td className="p-4 text-right font-black text-orange-600 bg-orange-50/30">{formatCurrency(receive)}</td>
                                                                <td className="p-4 text-right font-black text-indigo-600 bg-indigo-50/30">{formatCurrency(alocreditComm)}</td>
                                                            </tr>
                                                        )
                                                    }) : <tr><td colSpan="7" className="p-12 text-center text-slate-400 font-medium">No hay precios disponibles en la base de datos.</td></tr>}
                                                </tbody>
                                            </table>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {qrModal.show && (
                        <div className="fixed inset-0 z-[8000] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm px-4 animate-in fade-in">
                            <div className="bg-white rounded-3xl shadow-2xl max-w-sm w-full overflow-hidden animate-pop-in text-center border border-slate-200">
                                <div className="bg-[#2C4C8C] p-5 flex justify-between items-center">
                                    <h3 className="text-white font-black text-lg tracking-tight">{qrModal.title}</h3>
                                    <button onClick={() => setQrModal({show: false, url: '', title: ''})} className="text-white/80 hover:bg-white/20 p-1.5 rounded-full transition-colors"><Icon name="X" size={20}/></button>
                                </div>
                                <div className="p-8 flex flex-col items-center bg-slate-50">
                                    <p className="text-xs font-bold text-slate-500 mb-6 uppercase tracking-widest text-center">Escanea para abrir el portal<br/>directo en tu celular</p>
                                    <div className="p-4 bg-white border border-slate-200 rounded-2xl shadow-sm inline-block">
                                        <img src={`https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(qrModal.url)}`} alt="QR Code" className="w-52 h-52" />
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
