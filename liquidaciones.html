<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquidación de Comisiones - Multimarcas</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const IconBase = ({ children, className, ...props }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>{children}</svg>
        );

        const Icons = {
            RefreshCw: (p) => <IconBase {...p}><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></IconBase>,
            Filter: (p) => <IconBase {...p}><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></IconBase>,
            DollarSign: (p) => <IconBase {...p}><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></IconBase>,
            Download: (p) => <IconBase {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></IconBase>,
            ArrowLeft: (p) => <IconBase {...p}><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></IconBase>,
            Calendar: (p) => <IconBase {...p}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></IconBase>,
            Wallet: (p) => <IconBase {...p}><path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4"/><path d="M4 6v12c0 1.1.9 2 2 2h14v-4"/><path d="M18 12a2 2 0 0 0-2 2c0 1.1.9 2 2 2h4v-4h-4z"/></IconBase>
        };

        // ⚠️ PEGA AQUÍ TU URL CORRECTA DE GOOGLE APPS SCRIPT
        const API_URL = 'https://script.google.com/macros/s/AKfycbz770i0j3vK5-9M2Z2EheDh9GX2x2j2KbjfFm_yNadBg5db3tEc5so58KWeIX5SwTmAZw/exec';

        function LiquidacionesApp() {
            const [brand, setBrand] = useState('payjoy');
            const [data, setData] = useState([]);
            const [headers, setHeaders] = useState([]);
            const [loading, setLoading] = useState(false);
            
            // Filtros
            const [dateFilter, setDateFilter] = useState('thisWeek');
            const [customStartDate, setCustomStartDate] = useState('');
            const [customEndDate, setCustomEndDate] = useState('');
            const [selectedPartner, setSelectedPartner] = useState(''); // Aliado/Responsable

            const formatMoney = (val) => new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', minimumFractionDigits: 0 }).format(val || 0);
            
            const parseDate = (dateVal) => {
                if (!dateVal) return null;
                let dateObj = null;
                if (typeof dateVal === 'string' && dateVal.length > 5) dateObj = new Date(dateVal);
                else if (dateVal instanceof Date) dateObj = dateVal;
                if (!dateObj || isNaN(dateObj.getTime())) return null;
                return dateObj;
            };

            const parseAmount = (val) => {
                let s = String(val || '').replace(/[^0-9.,-]/g, '').replace(/[.,]00$/, '').replace(/[.,]/g, '');
                return parseInt(s, 10) || 0;
            };

            const fetchVentasData = async () => {
                setLoading(true);
                try {
                    const separator = API_URL.includes('?') ? '&' : '?';
                    // Llamamos al endpoint de "ventas_" para que traiga la liquidación
                    const res = await fetch(`${API_URL}${separator}type=ventas_${brand}&t=${new Date().getTime()}`);
                    if (!res.ok) throw new Error("Error en el servidor.");
                    
                    const text = await res.text();
                    let jsonData = JSON.parse(text);
                    if (!Array.isArray(jsonData) || jsonData.length === 0) {
                        setData([]); setHeaders([]);
                        return;
                    }
                    
                    setHeaders(Object.keys(jsonData[0]));
                    setData(jsonData);
                } catch (error) {
                    console.error("Fetch Error:", error);
                    alert("No se pudieron cargar los datos de ventas.");
                    setData([]); setHeaders([]);
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => {
                fetchVentasData();
            }, [brand]);

            // Determinar rango de fechas
            const getDateRange = () => {
                const now = new Date();
                now.setHours(0,0,0,0);
                if (dateFilter === 'thisWeek') {
                    const currentDay = now.getDay();
                    const distanceToMonday = (currentDay === 0 ? 6 : currentDay - 1);
                    const start = new Date(now); start.setDate(now.getDate() - distanceToMonday);
                    const end = new Date(start); end.setDate(start.getDate() + 6); end.setHours(23,59,59,999);
                    return { start, end };
                }
                if (dateFilter === 'thisMonth') return { start: new Date(now.getFullYear(), now.getMonth(), 1), end: new Date(now.getFullYear(), now.getMonth() + 1, 0, 23, 59, 59, 999) };
                if (dateFilter === 'lastMonth') return { start: new Date(now.getFullYear(), now.getMonth() - 1, 1), end: new Date(now.getFullYear(), now.getMonth(), 0, 23, 59, 59, 999) };
                if (dateFilter === 'custom' && customStartDate && customEndDate) return { start: new Date(customStartDate + 'T00:00:00'), end: new Date(customEndDate + 'T23:59:59') };
                return { start: new Date(2000, 0, 1), end: new Date(2100, 0, 1) }; 
            };

            // Filtrado de Datos
            const filteredData = useMemo(() => {
                if (!data.length) return [];
                const range = getDateRange();
                
                // Encontrar la columna de fecha de venta
                const dateCol = headers.find(h => String(h).toUpperCase().includes('FECHA') && !String(h).toUpperCase().includes('NACI'));
                const partnerCol = headers.find(h => String(h).toUpperCase().includes('ASIGNADO') || String(h).toUpperCase().includes('RESPONSABLE'));

                return data.filter(row => {
                    const d = dateCol ? parseDate(row[dateCol]) : null;
                    if (!d || d < range.start || d > range.end) return false;
                    if (selectedPartner && partnerCol && String(row[partnerCol]).trim() !== selectedPartner) return false;
                    return true;
                }).sort((a, b) => {
                    const dA = dateCol ? parseDate(a[dateCol]) : 0;
                    const dB = dateCol ? parseDate(b[dateCol]) : 0;
                    return dB - dA;
                });
            }, [data, dateFilter, customStartDate, customEndDate, selectedPartner, headers]);

            // Extraer lista única de Aliados/Responsables
            const uniquePartners = useMemo(() => {
                const partnerCol = headers.find(h => String(h).toUpperCase().includes('ASIGNADO') || String(h).toUpperCase().includes('RESPONSABLE'));
                if (!partnerCol) return [];
                const s = new Set();
                data.forEach(r => { if(r[partnerCol]) s.add(String(r[partnerCol]).trim()); });
                return Array.from(s).sort();
            }, [data, headers]);

            // Extraer Columnas Financieras para el reporte
            const financeCols = useMemo(() => {
                const findCol = (kw) => headers.find(h => String(h).toUpperCase().includes(kw));
                return {
                    date: headers.find(h => String(h).toUpperCase().includes('FECHA') && !String(h).toUpperCase().includes('NACI')),
                    client: findCol('NOMBRE'),
                    device: findCol('REFERENCIA') || findCol('EQUIPO'),
                    assigned: findCol('ASIGNADO') || findCol('RESPONSABLE'),
                    saleAmount: findCol('VENTA') || findCol('PRECIO DE VENTA'),
                    initial: findCol('CUOTA INICIAL'),
                    admin112: findCol('ADMIN 112'),
                    pipe: findCol('PIPE'),
                    ricardo: findCol('RICARDO'),
                    retailB: findCol('RETAIL B') || findCol('PROMOTORA'), // Detecta Promotora o Retail B Aliados
                    executives: findCol('EJECUTIVOS') || findCol('JUAN CAMILO') // Juan Camilo u otros ejecutivos
                };
            }, [headers]);

            // Totales
            const totals = useMemo(() => {
                let tSales = 0, tAdmin = 0, tPipe = 0, tRic = 0, tRetail = 0, tExec = 0;
                filteredData.forEach(r => {
                    if (financeCols.saleAmount) tSales += parseAmount(r[financeCols.saleAmount]);
                    if (financeCols.admin112) tAdmin += parseAmount(r[financeCols.admin112]);
                    if (financeCols.pipe) tPipe += parseAmount(r[financeCols.pipe]);
                    if (financeCols.ricardo) tRic += parseAmount(r[financeCols.ricardo]);
                    if (financeCols.retailB) tRetail += parseAmount(r[financeCols.retailB]);
                    if (financeCols.executives) tExec += parseAmount(r[financeCols.executives]);
                });
                return { tSales, tAdmin, tPipe, tRic, tRetail, tExec, count: filteredData.length };
            }, [filteredData, financeCols]);

            // Exportar a PDF
            const handleExportPDF = () => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF('landscape');
                
                const tableColumn = ["Fecha", "Cliente", "Responsable", "Referencia", "Venta Total", "Retail / Promotora", "Admin 112", "Pipe", "Ricardo", "Ejecutivos"];
                const tableRows = [];

                filteredData.forEach(row => {
                    const dateStr = financeCols.date && row[financeCols.date] ? parseDate(row[financeCols.date]).toLocaleDateString('es-ES') : '';
                    tableRows.push([
                        dateStr,
                        String(row[financeCols.client] || '').substring(0, 20),
                        String(row[financeCols.assigned] || ''),
                        String(row[financeCols.device] || '').substring(0, 20),
                        formatMoney(parseAmount(row[financeCols.saleAmount])),
                        formatMoney(parseAmount(row[financeCols.retailB])),
                        formatMoney(parseAmount(row[financeCols.admin112])),
                        formatMoney(parseAmount(row[financeCols.pipe])),
                        formatMoney(parseAmount(row[financeCols.ricardo])),
                        formatMoney(parseAmount(row[financeCols.executives]))
                    ]);
                });

                doc.setFontSize(16);
                doc.text(`Liquidación de Comisiones - ${brand.toUpperCase()}`, 14, 15);
                doc.setFontSize(10);
                const pName = selectedPartner || "TODOS";
                doc.text(`Aliado / Responsable: ${pName} | Total Créditos: ${totals.count}`, 14, 22);

                doc.autoTable({
                    head: [tableColumn],
                    body: tableRows,
                    startY: 28,
                    theme: 'grid',
                    headStyles: { fillColor: [15, 23, 42] },
                    styles: { fontSize: 8 },
                    foot: [["", "", "", "TOTALES:", formatMoney(totals.tSales), formatMoney(totals.tRetail), formatMoney(totals.tAdmin), formatMoney(totals.tPipe), formatMoney(totals.tRic), formatMoney(totals.tExec)]],
                    footStyles: { fillColor: [241, 245, 249], textColor: [15, 23, 42], fontStyle: 'bold' }
                });

                doc.save(`Liquidacion_${brand}_${pName}_${new Date().toISOString().slice(0,10)}.pdf`);
            };

            // Exportar a Excel
            const handleExportExcel = () => {
                const exportData = filteredData.map(row => {
                    return {
                        "Fecha": financeCols.date && row[financeCols.date] ? parseDate(row[financeCols.date]).toLocaleDateString('es-ES') : '',
                        "Cliente": row[financeCols.client] || '',
                        "Responsable": row[financeCols.assigned] || '',
                        "Referencia": row[financeCols.device] || '',
                        "Venta Total": parseAmount(row[financeCols.saleAmount]),
                        "Retail / Promotora": parseAmount(row[financeCols.retailB]),
                        "Admin 112": parseAmount(row[financeCols.admin112]),
                        "Pipe / Chamorro": parseAmount(row[financeCols.pipe]),
                        "Ricardo": parseAmount(row[financeCols.ricardo]),
                        "Ejecutivos": parseAmount(row[financeCols.executives])
                    };
                });
                
                const worksheet = window.XLSX.utils.json_to_sheet(exportData);
                const workbook = window.XLSX.utils.book_new();
                window.XLSX.utils.book_append_sheet(workbook, worksheet, "Liquidaciones");
                window.XLSX.writeFile(workbook, `Liquidacion_${brand}_${new Date().toISOString().slice(0,10)}.xlsx`);
            };

            return (
                <div className="max-w-7xl mx-auto p-4 md:p-8 space-y-6">
                    {/* Header */}
                    <div className="bg-white px-6 py-6 rounded-3xl shadow-sm border border-slate-200 flex flex-col lg:flex-row justify-between items-start lg:items-center gap-6">
                        <div className="flex items-center gap-5">
                            <button onClick={() => window.location.href = 'dashboard.html'} className="p-3 bg-slate-50 text-slate-500 hover:text-indigo-600 hover:bg-indigo-50 rounded-full transition-all shadow-sm border border-slate-200" title="Volver al Dashboard">
                                <Icons.ArrowLeft className="w-5 h-5"/>
                            </button>
                            <div className="p-3 bg-gradient-to-br from-emerald-400 to-teal-500 text-white rounded-2xl shadow-md hidden sm:block">
                                <Icons.Wallet className="w-8 h-8" />
                            </div>
                            <div>
                                <h2 className="text-2xl lg:text-3xl font-black text-slate-800 tracking-tight">Liquidación de Comisiones</h2>
                                <p className="text-sm font-medium text-slate-500 mt-1">Calculadora financiera por cortes y aliados</p>
                            </div>
                        </div>

                        <div className="flex flex-wrap items-center gap-3 w-full lg:w-auto">
                            <select value={brand} onChange={(e) => setBrand(e.target.value)} className="bg-slate-100 border border-slate-200 text-slate-700 font-bold text-sm py-2.5 px-4 rounded-xl outline-none cursor-pointer hover:bg-slate-200 transition-colors">
                                <option value="payjoy">PAYJOY</option>
                                <option value="alocredit">ALOCREDIT</option>
                                <option value="krediya">KREDIYA</option>
                                <option value="credismart">CREDISMART</option>
                            </select>
                            
                            <div className="relative">
                                <select value={dateFilter} onChange={(e) => setDateFilter(e.target.value)} className="bg-slate-100 border border-slate-200 text-slate-700 font-bold text-sm py-2.5 pl-10 pr-4 rounded-xl outline-none cursor-pointer hover:bg-slate-200 transition-colors">
                                    <option value="thisWeek">Esta Semana</option>
                                    <option value="thisMonth">Este Mes</option>
                                    <option value="lastMonth">Mes Anterior</option>
                                    <option value="custom">Personalizado</option>
                                    <option value="all">Todo Histórico</option>
                                </select>
                                <Icons.Calendar className="w-4 h-4 text-slate-500 absolute left-3 top-1/2 -translate-y-1/2 pointer-events-none" />
                            </div>

                            <button onClick={fetchVentasData} disabled={loading} className="p-2.5 bg-slate-100 text-slate-500 hover:text-indigo-600 rounded-xl transition-all shadow-sm disabled:opacity-50 border border-slate-200">
                                <Icons.RefreshCw className={`w-5 h-5 ${loading ? 'animate-spin text-indigo-600' : ''}`} />
                            </button>
                        </div>
                    </div>

                    {/* Filtro Especial */}
                    <div className="flex flex-col md:flex-row gap-4">
                        <div className="flex-1 bg-white p-4 rounded-2xl shadow-sm border border-slate-200 flex items-center gap-3">
                            <Icons.Filter className="w-5 h-5 text-slate-400"/>
                            <div className="w-full">
                                <label className="text-[10px] font-bold text-slate-400 uppercase tracking-wider block mb-1">Filtrar por Aliado / Responsable</label>
                                <select value={selectedPartner} onChange={e=>setSelectedPartner(e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-lg p-2 text-sm font-bold text-slate-700 outline-none">
                                    <option value="">TODOS LOS ASIGNADOS</option>
                                    {uniquePartners.map((p, i) => <option key={i} value={p}>{p}</option>)}
                                </select>
                            </div>
                        </div>

                        {dateFilter === 'custom' && (
                            <div className="bg-indigo-50 px-6 py-4 rounded-2xl border border-indigo-100 flex gap-4 items-center flex-wrap">
                                <span className="text-sm font-black text-indigo-800 uppercase tracking-widest">Rango:</span>
                                <input type="date" value={customStartDate} onChange={e=>setCustomStartDate(e.target.value)} className="text-sm font-bold text-slate-700 px-3 py-1.5 rounded-lg border border-indigo-200 outline-none" />
                                <span className="text-indigo-400 font-bold">hasta</span>
                                <input type="date" value={customEndDate} onChange={e=>setCustomEndDate(e.target.value)} className="text-sm font-bold text-slate-700 px-3 py-1.5 rounded-lg border border-indigo-200 outline-none" />
                            </div>
                        )}
                    </div>

                    {loading ? (
                        <div className="flex justify-center py-20"><Icons.RefreshCw className="w-10 h-10 animate-spin text-indigo-500" /></div>
                    ) : (
                        <>
                            {/* Tarjetas de Resumen (Cuentas Claras) */}
                            <div className="grid grid-cols-2 lg:grid-cols-5 gap-4">
                                <div className="bg-slate-800 p-5 rounded-3xl shadow-sm border border-slate-700 text-white flex flex-col justify-center">
                                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Total Ventas</p>
                                    <p className="text-2xl font-black">{formatMoney(totals.tSales)}</p>
                                    <p className="text-xs text-slate-400 mt-1">{totals.count} equipos vendidos</p>
                                </div>
                                <div className="bg-white p-5 rounded-3xl shadow-sm border border-slate-200 flex flex-col justify-center border-l-[4px] border-l-emerald-500">
                                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Retail B / Promotora</p>
                                    <p className="text-2xl font-black text-slate-800">{formatMoney(totals.tRetail)}</p>
                                </div>
                                <div className="bg-white p-5 rounded-3xl shadow-sm border border-slate-200 flex flex-col justify-center border-l-[4px] border-l-indigo-500">
                                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Admin 112</p>
                                    <p className="text-2xl font-black text-slate-800">{formatMoney(totals.tAdmin)}</p>
                                </div>
                                <div className="bg-white p-5 rounded-3xl shadow-sm border border-slate-200 flex flex-col justify-center border-l-[4px] border-l-blue-500">
                                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Pipe y Chamorro</p>
                                    <p className="text-2xl font-black text-slate-800">{formatMoney(totals.tPipe)}</p>
                                </div>
                                <div className="bg-white p-5 rounded-3xl shadow-sm border border-slate-200 flex flex-col justify-center border-l-[4px] border-l-orange-500">
                                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Ricardo / Ejecutivos</p>
                                    <p className="text-xl font-black text-slate-800">R: {formatMoney(totals.tRic)}</p>
                                    <p className="text-sm font-bold text-slate-500 border-t border-slate-100 pt-1 mt-1">E: {formatMoney(totals.tExec)}</p>
                                </div>
                            </div>

                            {/* Tabla de Detalle */}
                            <div className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden flex flex-col">
                                <div className="bg-slate-50 px-6 py-4 border-b border-slate-200 flex justify-between items-center flex-wrap gap-4">
                                    <h3 className="font-black text-slate-800 flex items-center gap-2">
                                        <Icons.DollarSign className="w-5 h-5 text-emerald-500" /> Desglose de Liquidación
                                    </h3>
                                    <div className="flex gap-2">
                                        <button onClick={handleExportExcel} className="flex items-center gap-1.5 px-4 py-2 bg-white text-emerald-700 border border-emerald-200 rounded-xl hover:bg-emerald-50 transition-colors font-bold text-xs shadow-sm">
                                            <Icons.Download className="w-4 h-4"/> EXCEL
                                        </button>
                                        <button onClick={handleExportPDF} className="flex items-center gap-1.5 px-4 py-2 bg-slate-800 text-white rounded-xl hover:bg-slate-700 transition-colors font-bold text-xs shadow-sm">
                                            <Icons.Download className="w-4 h-4"/> RECIBO PDF
                                        </button>
                                    </div>
                                </div>
                                <div className="overflow-x-auto custom-scrollbar max-h-[500px]">
                                    <table className="w-full text-sm text-left">
                                        <thead className="text-[10px] text-slate-500 uppercase tracking-widest bg-white sticky top-0 shadow-sm z-10 border-b border-slate-200">
                                            <tr>
                                                <th className="px-4 py-3 font-black">Fecha</th>
                                                <th className="px-4 py-3 font-black">Asignado</th>
                                                <th className="px-4 py-3 font-black">Cliente</th>
                                                <th className="px-4 py-3 font-black">Venta</th>
                                                <th className="px-4 py-3 font-black text-emerald-600 bg-emerald-50/50">Retail / Prom.</th>
                                                <th className="px-4 py-3 font-black text-indigo-600 bg-indigo-50/50">Admin 112</th>
                                                <th className="px-4 py-3 font-black text-blue-600 bg-blue-50/50">Pipe</th>
                                                <th className="px-4 py-3 font-black text-orange-600 bg-orange-50/50">Ricardo</th>
                                                <th className="px-4 py-3 font-black text-slate-600 bg-slate-50/50">Ejecutivos</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {filteredData.length > 0 ? filteredData.map((row, idx) => (
                                                <tr key={idx} className="hover:bg-slate-50 transition-colors">
                                                    <td className="px-4 py-3 font-medium text-xs text-slate-500">
                                                        {financeCols.date && row[financeCols.date] ? parseDate(row[financeCols.date]).toLocaleDateString('es-ES') : '-'}
                                                    </td>
                                                    <td className="px-4 py-3 font-bold text-slate-700 text-xs truncate max-w-[120px]">{row[financeCols.assigned] || '-'}</td>
                                                    <td className="px-4 py-3 font-medium text-slate-600 text-xs truncate max-w-[150px]">{row[financeCols.client] || '-'}</td>
                                                    <td className="px-4 py-3 font-bold text-slate-800 text-xs">{formatMoney(parseAmount(row[financeCols.saleAmount]))}</td>
                                                    
                                                    <td className="px-4 py-3 font-bold text-emerald-700 bg-emerald-50/30 text-xs">
                                                        {formatMoney(parseAmount(row[financeCols.retailB]))}
                                                    </td>
                                                    <td className="px-4 py-3 font-bold text-indigo-700 bg-indigo-50/30 text-xs">
                                                        {formatMoney(parseAmount(row[financeCols.admin112]))}
                                                    </td>
                                                    <td className="px-4 py-3 font-bold text-blue-700 bg-blue-50/30 text-xs">
                                                        {formatMoney(parseAmount(row[financeCols.pipe]))}
                                                    </td>
                                                    <td className="px-4 py-3 font-bold text-orange-700 bg-orange-50/30 text-xs">
                                                        {formatMoney(parseAmount(row[financeCols.ricardo]))}
                                                    </td>
                                                    <td className="px-4 py-3 font-bold text-slate-700 bg-slate-50/30 text-xs">
                                                        {formatMoney(parseAmount(row[financeCols.executives]))}
                                                    </td>
                                                </tr>
                                            )) : (
                                                <tr><td colSpan="9" className="px-6 py-10 text-center text-slate-400">No hay ventas registradas para este filtro.</td></tr>
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<LiquidacionesApp />);
    </script>
</body>
</html>
