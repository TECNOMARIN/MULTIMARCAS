<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquidación de Comisiones - Multimarcas</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
    <!-- VERSIÓN DE BABEL FIJADA PARA EVITAR PANTALLA BLANCA -->
    <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- PRESET DE REACT AÑADIDO OBLIGATORIAMENTE AQUÍ -->
    <script type="text/babel" data-presets="react">
        const { useState, useEffect, useMemo, useCallback } = React;

        const IconBase = ({ children, className, ...props }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>{children}</svg>
        );

        const Icons = {
            RefreshCw: (p) => <IconBase {...p}><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></IconBase>,
            Filter: (p) => <IconBase {...p}><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></IconBase>,
            DollarSign: (p) => <IconBase {...p}><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></IconBase>,
            Download: (p) => <IconBase {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></IconBase>,
            ArrowLeft: (p) => <IconBase {...p}><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></IconBase>,
            Calendar: (p) => <IconBase {...p}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></IconBase>,
            Wallet: (p) => <IconBase {...p}><path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4"/><path d="M4 6v12c0 1.1.9 2 2 2h14v-4"/><path d="M18 12a2 2 0 0 0-2 2c0 1.1.9 2 2 2h4v-4h-4z"/></IconBase>,
            AlertCircle: (p) => <IconBase {...p}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></IconBase>,
            CheckCircle: (p) => <IconBase {...p}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></IconBase>,
            Search: (p) => <IconBase {...p}><circle cx="11" cy="11" r="8"/><line x1="21" x2="16.65" y1="21" y2="16.65"/></IconBase>,
            Database: (p) => <IconBase {...p}><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></IconBase>
        };

        // ⚠️ PEGA AQUÍ TU URL CORRECTA DE GOOGLE APPS SCRIPT
        const API_URL = 'https://script.google.com/macros/s/AKfycbz770i0j3vK5-9M2Z2EheDh9GX2x2j2KbjfFm_yNadBg5db3tEc5so58KWeIX5SwTmAZw/exec';

        // UTILIDADES
        const parseAmount = (val) => {
            let s = String(val || '');
            s = s.replace(/[^0-9.,-]/g, '');
            s = s.replace(/[.,]00$/, '');
            s = s.replace(/[.,]/g, '');
            return parseInt(s, 10) || 0;
        };

        const formatCurrency = (val) => {
            return new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', minimumFractionDigits: 0 }).format(val || 0);
        };

        const parseDate = (dateVal) => {
            if (!dateVal) return null;
            let dateObj = null;
            
            if (typeof dateVal === 'number') {
                if (dateVal > 30000 && dateVal < 60000) return new Date(Math.round((dateVal - 25569) * 86400 * 1000));
            }

            if (typeof dateVal === 'string' && dateVal.length > 5) {
                // 🛡️ CORRECCIÓN ZONA HORARIA
                if (dateVal.includes('T')) {
                    const cleanDate = dateVal.split('T')[0]; 
                    const parts = cleanDate.split('-');
                    return new Date(parts[0], parseInt(parts[1], 10) - 1, parts[2]); 
                }
                
                if (dateVal.match(/^\d{4}-\d{2}-\d{2}/)) {
                    const parts = dateVal.substring(0,10).split('-');
                    return new Date(parts[0], parseInt(parts[1], 10) - 1, parts[2]);
                }
                
                dateObj = new Date(dateVal);
                
                if (!isNaN(dateObj.getTime())) {
                    const offset = dateObj.getTimezoneOffset() * 60000;
                    dateObj = new Date(dateObj.getTime() + offset);
                }

            } else if (dateVal instanceof Date) {
                dateObj = dateVal;
            }
            
            if (!dateObj || isNaN(dateObj.getTime())) return null;
            return dateObj;
        };

        function LiquidacionesApp() {
            const [brand, setBrand] = useState('payjoy'); 
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            
            // Filtros
            const [dateFilter, setDateFilter] = useState('thisMonth');
            const [customStartDate, setCustomStartDate] = useState('');
            const [customEndDate, setCustomEndDate] = useState('');
            const [selectedPartner, setSelectedPartner] = useState('');
            const [selectedConvenio, setSelectedConvenio] = useState('');
            const [searchTerm, setSearchTerm] = useState('');
            
            const [selectedTiendas, setSelectedTiendas] = useState([]);
            const [isTiendaDropdownOpen, setIsTiendaDropdownOpen] = useState(false);

            useEffect(() => {
                if (selectedTiendas.length > 0 && selectedConvenio !== '') {
                    setSelectedConvenio('');
                }
            }, [selectedTiendas, selectedConvenio]);

            const fetchVentasData = useCallback(async () => {
                setLoading(true);
                setError(null);
                try {
                    const separator = API_URL.includes('?') ? '&' : '?';
                    const brandsToFetch = brand === 'todas' ? ['payjoy', 'alocredit', 'krediya', 'credismart'] : [brand];
                    
                    let combinedData = [];

                    const promises = [
                        fetch(`${API_URL}${separator}type=usuarios_payjoy&t=${new Date().getTime()}`),
                        ...brandsToFetch.map(b => fetch(`${API_URL}${separator}type=ventas_${b}&t=${new Date().getTime()}`))
                    ];

                    const responses = await Promise.all(promises);
                    
                    const usuariosRes = responses[0];
                    let conveniosMap = {}; 
                    
                    if (usuariosRes.ok) {
                        try {
                            const jsonUsu = JSON.parse(await usuariosRes.text());
                            if (Array.isArray(jsonUsu) && jsonUsu.length > 0) {
                                
                                const headerRowObj = jsonUsu.find(r => Object.values(r).some(v => String(v).toUpperCase().includes('CONVENIO')));
                                let nameKey, asigKey, convKey, tiendaKey;

                                if (headerRowObj) {
                                    nameKey = Object.keys(headerRowObj).find(k => String(headerRowObj[k]).toUpperCase().includes('NOMBRE') || String(headerRowObj[k]).toUpperCase().includes('APELLIDO'));
                                    asigKey = Object.keys(headerRowObj).find(k => String(headerRowObj[k]).toUpperCase().includes('ASINGACION') || String(headerRowObj[k]).toUpperCase().includes('ASIGNACION'));
                                    convKey = Object.keys(headerRowObj).find(k => String(headerRowObj[k]).toUpperCase().includes('CONVENIO'));
                                    tiendaKey = Object.keys(headerRowObj).find(k => String(headerRowObj[k]).toUpperCase() === 'TIENDA');
                                    
                                    jsonUsu.forEach(r => {
                                        let convRaw = String(r[convKey] || '').trim().toUpperCase();
                                        let conv = convRaw === '' ? 'SIN CONVENIO' : convRaw;
                                        if (conv !== 'CONVENIO') {
                                            if (nameKey && r[nameKey]) conveniosMap[String(r[nameKey]).toLowerCase().trim()] = conv;
                                            if (tiendaKey && r[tiendaKey]) conveniosMap[String(r[tiendaKey]).toLowerCase().trim()] = conv; 
                                        }
                                    });
                                } else {
                                    const keys = Object.keys(jsonUsu[0]);
                                    nameKey = keys.find(k => k.toUpperCase().includes('NOMBRE') || k.toUpperCase().includes('APELLIDO'));
                                    asigKey = keys.find(k => k.toUpperCase().includes('ASINGACION') || k.toUpperCase().includes('ASIGNACION'));
                                    convKey = keys.find(k => k.toUpperCase().includes('CONVENIO'));
                                    tiendaKey = keys.find(k => k.toUpperCase() === 'TIENDA');

                                    if (convKey) {
                                        jsonUsu.forEach(r => {
                                            let convRaw = String(r[convKey] || '').trim().toUpperCase();
                                            let conv = convRaw === '' ? 'SIN CONVENIO' : convRaw;
                                            if (nameKey && r[nameKey]) conveniosMap[String(r[nameKey]).toLowerCase().trim()] = conv;
                                            if (tiendaKey && r[tiendaKey]) conveniosMap[String(r[tiendaKey]).toLowerCase().trim()] = conv; 
                                        });
                                    }
                                }
                            }
                        } catch(e) { console.error("Error al procesar convenios", e); }
                    }

                    for (let i = 1; i < responses.length; i++) {
                        const res = responses[i];
                        const currentBrand = brandsToFetch[i-1];
                        
                        if (res.ok) {
                            try {
                                const jsonVentas = JSON.parse(await res.text());
                                if (Array.isArray(jsonVentas) && jsonVentas.length > 0) {
                                    const parsedRows = jsonVentas.map(row => {
                                        const findVal = (keywords) => {
                                            let k = Object.keys(row).find(key => keywords.some(kw => String(key).toUpperCase().trim() === kw));
                                            if(!k) k = Object.keys(row).find(key => keywords.some(kw => String(key).toUpperCase().includes(kw)));
                                            return k ? row[k] : undefined;
                                        };
                                        
                                        const dateKey = Object.keys(row).find(k => {
                                            const upper = String(k).toUpperCase();
                                            return upper.includes('FECHA') && !upper.includes('NACI');
                                        });

                                        let asignadoRaw = findVal(['RESPONSABLE', 'ASIGNADO']) || findVal(['VENDEDOR', 'ASESOR']) || '';
                                        let vendedorRaw = findVal(['VENDEDOR', 'ASESOR']) || '';
                                        let tiendaRaw = findVal(['TIENDA', 'PUNTO DE VENTA', 'SUCURSAL', 'SEDE', 'PUNTO']) || '';
                                        
                                        let searchAsig = String(asignadoRaw).toLowerCase().trim();
                                        let searchVend = String(vendedorRaw).toLowerCase().trim();
                                        let searchTienda = String(tiendaRaw).toLowerCase().trim();
                                        
                                        let convenioFound = conveniosMap[searchTienda] || conveniosMap[searchVend] || 'SIN CONVENIO';

                                        let aConsignarTotal = 0;
                                        Object.keys(row).forEach(k => {
                                            const u = k.toUpperCase().trim();
                                            if (
                                                (u.includes('CONSIGNAR') && !u.includes('MONTO') && !u.includes('TOTAL')) || 
                                                u.includes('PIPE') || u.includes('RICARDO') || 
                                                u.includes('EJECUTIVOS') || u.includes('JUAN CAMILO')
                                            ) {
                                                aConsignarTotal += parseAmount(row[k]);
                                            }
                                        });

                                        let financed = parseAmount(findVal(['SALDO A FINANCIAR', 'SALDO A FINACIAR', 'MONTO A FINANCIAR', 'MONTO TOTAL A FINANCIAR', 'MONTO TOTAL A CONSIGNAR', 'MONTO A CONSIGNAR', 'VALOR CREDITO']));

                                        if (financed === 0 || isNaN(financed)) {
                                            let totalVenta = parseAmount(findVal(['TOTAL VENTA', 'PRECIO DE VENTA', 'VALOR VENTA', 'VENTA', 'MONTO TOTAL']));
                                            let cuotaInicial = parseAmount(findVal(['CUOTA INICIAL', 'VALOR CUOTA INICIAL', 'INICIAL']));
                                            if (totalVenta > 0 && cuotaInicial >= 0) financed = totalVenta - cuotaInicial;
                                        }

                                        return {
                                            _brandName: currentBrand.toUpperCase(),
                                            _date: dateKey ? row[dateKey] : undefined,
                                            _client: findVal(['NOMBRE COMPLETO', 'NOMBRE DEL CLIENTE', 'NOMBRE CLIENTE', 'NOMBRES', 'CLIENTE']),
                                            _tienda: tiendaRaw,
                                            _assigned: asignadoRaw,
                                            _convenio: convenioFound,
                                            _device: findVal(['REFERENCIA EQUIPO', 'REFERENCIA', 'MODELO', 'EQUIPO']),
                                            _venta: parseAmount(findVal(['TOTAL VENTA', 'PRECIO DE VENTA', 'VALOR VENTA', 'VENTA', 'MONTO TOTAL'])),
                                            _financed: financed, 
                                            _costo: parseAmount(findVal(['COSTOS EQUIPOS', 'COSTO EQUIPO', 'COSTO'])),
                                            _cartera: parseAmount(findVal(['CARTERA', 'COSTO CARTERA', 'FEE CARTERA'])),
                                            _admin112: parseAmount(findVal(['UTILIDADES ADMIN 112', 'ADMIN 112', 'UTILIDAD ADMIN'])),
                                            _pipe: parseAmount(findVal(['PIPE Y CHAMORRO', 'LIQUIDACION PIPE'])),
                                            _ricardo: parseAmount(findVal(['RICARDO MARIN', 'CONSIGNAR RICARDO'])),
                                            _jc: parseAmount(findVal(['JUAN CAMILO'])),
                                            _ejec: parseAmount(findVal(['EJECUTIVOS'])),
                                            _remanente: parseAmount(findVal(['EXCEDENTE DE INICIAL', 'REMANENTE DE INICIAL', 'REMANENTE'])),
                                            _aConsignar: aConsignarTotal
                                        };
                                    });
                                    combinedData = combinedData.concat(parsedRows);
                                }
                            } catch(e) { console.error("Error parseando ventas", e); }
                        }
                    }
                    
                    setData(combinedData);
                } catch (error) {
                    console.error("Fetch Error:", error);
                    setError("No se pudieron cargar los datos de ventas.");
                    setData([]);
                } finally {
                    setLoading(false);
                }
            }, [brand]);

            useEffect(() => {
                fetchVentasData();
            }, [brand, fetchVentasData]);

            const getDateRange = () => {
                const now = new Date();
                now.setHours(0,0,0,0);
                if (dateFilter === 'thisWeek') {
                    const currentDay = now.getDay();
                    const distanceToMonday = (currentDay === 0 ? 6 : currentDay - 1);
                    const start = new Date(now); start.setDate(now.getDate() - distanceToMonday);
                    const end = new Date(start); end.setDate(start.getDate() + 6); end.setHours(23,59,59,999);
                    return { start, end };
                }
                if (dateFilter === 'thisMonth') return { start: new Date(now.getFullYear(), now.getMonth(), 1), end: new Date(now.getFullYear(), now.getMonth() + 1, 0, 23, 59, 59, 999) };
                if (dateFilter === 'lastMonth') return { start: new Date(now.getFullYear(), now.getMonth() - 1, 1), end: new Date(now.getFullYear(), now.getMonth(), 0, 23, 59, 59, 999) };
                if (dateFilter === 'custom' && customStartDate && customEndDate) return { start: new Date(customStartDate + 'T00:00:00'), end: new Date(customEndDate + 'T23:59:59') };
                return { start: new Date(2000, 0, 1), end: new Date(2100, 0, 1) }; 
            };

            const filteredData = useMemo(() => {
                if (!data.length) return [];
                const range = getDateRange();
                
                return data.filter(row => {
                    const d = parseDate(row._date);
                    if (!d || d < range.start || d > range.end) return false;
                    
                    if (selectedPartner && String(row._assigned || '').trim().toUpperCase() !== selectedPartner.toUpperCase()) return false;
                    
                    if (selectedTiendas.length > 0) {
                        const rowTienda = String(row._tienda || '').trim().toUpperCase();
                        if (!selectedTiendas.includes(rowTienda)) return false;
                    }

                    if (selectedTiendas.length === 0 && selectedConvenio && row._convenio !== selectedConvenio) return false;
                    
                    if (searchTerm) {
                        const s = searchTerm.toLowerCase();
                        if (
                            !String(row._client || '').toLowerCase().includes(s) &&
                            !String(row._assigned || '').toLowerCase().includes(s) &&
                            !String(row._tienda || '').toLowerCase().includes(s) &&
                            !String(row._device || '').toLowerCase().includes(s)
                        ) return false;
                    }

                    return true;
                }).sort((a, b) => {
                    const dA = parseDate(a._date) || 0;
                    const dB = parseDate(b._date) || 0;
                    return dB - dA;
                });
            }, [data, dateFilter, customStartDate, customEndDate, selectedPartner, selectedTiendas, selectedConvenio, searchTerm]);

            const uniquePartners = useMemo(() => {
                const s = new Set();
                data.forEach(r => { if(r._assigned) s.add(String(r._assigned).trim().toUpperCase()); });
                return Array.from(s).sort();
            }, [data]);

            const uniqueTiendas = useMemo(() => {
                const s = new Set();
                data.forEach(r => { if(r._tienda) s.add(String(r._tienda).trim().toUpperCase()); });
                return Array.from(s).sort();
            }, [data]);

            const uniqueConvenios = useMemo(() => {
                const s = new Set();
                data.forEach(r => { if(r._convenio && r._convenio !== 'SIN CONVENIO') s.add(r._convenio); });
                return Array.from(s).sort();
            }, [data]);

            // 🎯 LÓGICA DE KPIS ACTUALIZADA
            const kpis = useMemo(() => {
                let stats = {
                    ventasTotales: 0,
                    creditoTotal: 0, 
                    costoTotal: 0,
                    utilidadAdmin: 0,
                    aConsignarSocioTotal: 0,
                    cuatroPorMilTotal: 0,
                    cartera: 0,
                    remanente: 0,
                    cantidad: filteredData.length,
                    inicial: 0,
                    utilidad: 0
                };

                filteredData.forEach(row => {
                    const assignedLower = String(row._assigned || '').toLowerCase();
                    const storeLower = String(row._tienda || '').toLowerCase();
                    
                    // 🛡️ Lógica Exclusión 4x1000 para vitrinas
                    const isVitrina = assignedLower.includes('vitrina') || storeLower.includes('vitrina');
                    
                    const consignarMontoBruto = (row._pipe || 0) + (row._ricardo || 0) + (row._jc || 0) + (row._ejec || 0);
                    const cuatroPorMil = isVitrina ? 0 : consignarMontoBruto * 0.004;
                    const consignarMontoNeto = consignarMontoBruto - cuatroPorMil;

                    stats.ventasTotales += (row._venta || 0);
                    stats.creditoTotal += (row._financed || 0);
                    stats.costoTotal += (row._costo || 0);
                    stats.utilidadAdmin += (row._admin112 || 0);
                    stats.aConsignarSocioTotal += consignarMontoNeto;
                    stats.cuatroPorMilTotal += cuatroPorMil;
                    
                    stats.cartera += (row._cartera || 0);
                    stats.remanente += (row._remanente || 0);
                });

                // Cálculos adicionales
                stats.inicial = stats.ventasTotales - stats.creditoTotal;
                stats.porcentajeInicial = stats.ventasTotales > 0 ? ((stats.inicial / stats.ventasTotales) * 100).toFixed(1) : "0.0";
                
                // Utilidad = Venta Bruta - Costo Equipo
                stats.utilidad = stats.ventasTotales - stats.costoTotal;

                return stats;
            }, [filteredData]);

            // 🎯 EXPORTACIÓN PDF ACTUALIZADA
            const handleExportPDF = () => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF('landscape'); 
                
                doc.setFontSize(18);
                const titleStr = brand === 'todas' ? 'TODAS LAS FINANCIERAS' : brand.toUpperCase();
                doc.text(`Liquidación Financiera - ${titleStr}`, 14, 15);
                
                const { start, end } = getDateRange();
                let dateRangeStr = dateFilter === 'all' ? "Todo el Histórico" : `${start.toLocaleDateString('es-ES')} al ${end.toLocaleDateString('es-ES')}`;
                
                doc.setFontSize(10);
                const cName = selectedTiendas.length > 0 ? "DESACTIVADO (Filtro Tienda)" : (selectedConvenio || "TODOS");
                const pName = selectedPartner || "TODOS";
                const tNameRaw = selectedTiendas.length > 0 ? selectedTiendas.join(', ') : "TODAS";
                const tName = tNameRaw.length > 30 ? tNameRaw.substring(0, 27) + '...' : tNameRaw;
                
                doc.text(`Convenio: ${cName} | Aliado: ${pName} | Tiendas: ${tName} | Periodo: ${dateRangeStr}`, 14, 22);

                const tableColumn = brand === 'todas' 
                    ? ["Marca", "Fecha", "Convenio", "Asignado", "Cliente", "Venta Bruta", "Inicial", "Saldo Finan.", "Costo", "Cartera", "Admin 112", "4x1000", "A Consignar"]
                    : ["Fecha", "Convenio", "Asignado", "Cliente", "Venta Bruta", "Inicial", "Saldo Finan.", "Costo", "Cartera", "Admin 112", "4x1000", "A Consignar"];
                
                const tableRows = [];

                filteredData.forEach(row => {
                    const d = parseDate(row._date);
                    const fechaStr = d ? d.toLocaleDateString('es-ES') : '-';
                    
                    const assignedLower = String(row._assigned || '').toLowerCase();
                    const storeLower = String(row._tienda || '').toLowerCase();
                    const isVitrina = assignedLower.includes('vitrina') || storeLower.includes('vitrina');
                    
                    const consignarMontoBruto = (row._pipe || 0) + (row._ricardo || 0) + (row._jc || 0) + (row._ejec || 0);
                    const cuatroPorMil = isVitrina ? 0 : consignarMontoBruto * 0.004;
                    const consignarMontoNeto = consignarMontoBruto - cuatroPorMil;
                    
                    const inicialValor = (row._venta || 0) - (row._financed || 0);
                    const porcentajeInicialFila = row._venta > 0 ? ((inicialValor / row._venta) * 100).toFixed(1) : "0.0";

                    const rowData = [
                        fechaStr,
                        String(row._convenio || '').substring(0, 15),
                        String(row._assigned || '').substring(0, 15),
                        String(row._client || '').substring(0, 20),
                        formatCurrency(row._venta),
                        `${formatCurrency(inicialValor)} (${porcentajeInicialFila}%)`,
                        formatCurrency(row._financed),
                        formatCurrency(row._costo),
                        formatCurrency(row._cartera), 
                        formatCurrency(row._admin112),
                        formatCurrency(cuatroPorMil),
                        formatCurrency(consignarMontoNeto)
                    ];

                    if (brand === 'todas') rowData.unshift(row._brandName);
                    tableRows.push(rowData);
                });

                const footRow = brand === 'todas'
                    ? [["", "", "", "", "TOTALES:", formatCurrency(kpis.ventasTotales), formatCurrency(kpis.inicial), formatCurrency(kpis.creditoTotal), formatCurrency(kpis.costoTotal), formatCurrency(kpis.cartera), formatCurrency(kpis.utilidadAdmin), formatCurrency(kpis.cuatroPorMilTotal), formatCurrency(kpis.aConsignarSocioTotal)]]

                                                            </td>
                                                        )}
                                                        <td className="px-4 py-3 whitespace-nowrap text-xs font-mono text-slate-500">{fechaStr}</td>
                                                        <td className="px-4 py-3 border-r border-slate-100">
                                                            <div className="font-bold text-slate-800 text-xs truncate max-w-[150px]" title={row._assigned}>{row._assigned || '-'}</div>
                                                            <div className="flex items-center gap-1.5 mt-0.5">
                                                                <div className="text-[9px] font-black text-indigo-500 tracking-wider uppercase" title={row._convenio}>
                                                                    {row._convenio !== 'SIN CONVENIO' ? row._convenio : <span className="text-slate-300 font-normal italic">Sin Convenio</span>}
                                                                </div>
                                                                {isNewRule && (
                                                                    <span className="bg-emerald-500 text-white px-1.5 py-[1px] rounded text-[8px] font-black tracking-widest shadow-sm" title="Aplica nueva regla de liquidación (40% Admin / 60% Asesor - Peaje)">
                                                                        40/60
                                                                    </span>
                                                                )}
                                                            </div>
                                                        </td>
                                                        <td className="px-4 py-3 border-r border-slate-100">
                                                            <div className="font-bold text-slate-700 text-xs truncate max-w-[180px]" title={row._client}>{row._client || '-'}</div>
                                                            <div className="text-[10px] text-slate-400 mt-0.5 truncate max-w-[180px]">{row._device || '-'}</div>
                                                        </td>
                                                        <td className="px-4 py-3 whitespace-nowrap text-right font-medium text-slate-500">{row._venta > 0 ? formatCurrency(row._venta) : '-'}</td>
                                                        <td className="px-4 py-3 whitespace-nowrap text-right bg-emerald-50/20">
                                                            <div className="flex flex-col items-end">
                                                                <span className="font-bold text-emerald-600">{inicialValor > 0 ? formatCurrency(inicialValor) : '-'}</span>
                                                                {inicialValor > 0 && <span className="text-[9px] font-black text-emerald-500/80 leading-none mt-0.5">{porcentajeInicialFila}%</span>}
                                                            </div>
                                                        </td>
                                                        <td className="px-4 py-3 whitespace-nowrap text-right font-bold text-blue-700 bg-blue-50/30">{row._financed > 0 ? formatCurrency(row._financed) : '-'}</td>
                                                        <td className="px-4 py-3 whitespace-nowrap text-right font-medium text-rose-500 bg-rose-50/10">{row._costo > 0 ? formatCurrency(row._costo) : '-'}</td>
                                                        
                                                        <td className="px-4 py-3 whitespace-nowrap text-right font-bold text-amber-600 bg-amber-50/20">{row._cartera > 0 ? formatCurrency(row._cartera) : '-'}</td>
                                                        
                                                        <td className="px-4 py-3 whitespace-nowrap text-right bg-indigo-50/30 font-black text-indigo-700">
                                                            <div className="flex flex-col items-end">
                                                                <span>{row._admin112 !== 0 ? formatCurrency(row._admin112) : '-'}</span>
                                                                {isNewRule && row._admin112 !== 0 && <span className="text-[8px] text-indigo-400 font-bold leading-none mt-0.5" title="Se aplica 40% directo sobre la Utilidad Real">40% Utilidad</span>}
                                                            </div>
                                                        </td>

                                                        <td className="px-4 py-3 whitespace-nowrap text-right bg-rose-50/20 font-bold text-xs text-rose-700">
                                                            {cuatroPorMil > 0 ? formatCurrency(cuatroPorMil) : '-'}
                                                        </td>

                                                        <td className="px-4 py-3 whitespace-nowrap text-right bg-emerald-50/20 font-black text-emerald-700">
                                                            <div className="flex flex-col items-end">
                                                                <span>{consignarMontoNeto > 0 ? formatCurrency(consignarMontoNeto) : '-'}</span>
                                                                {isNewRule && consignarMontoNeto > 0 && <span className="text-[8px] text-emerald-500 font-bold leading-none mt-0.5" title="Se aplica 60% sobre Utilidad Real menos peaje de cartera y 4x1000">60% (-Impuestos)</span>}
                                                            </div>
                                                        </td>
                                                    </tr>
                                                );
                                            }) : (
                                                <tr>
                                                    <td colSpan={brand === 'todas' ? "12" : "11"} className="px-6 py-20 text-center text-slate-400">
                                                        <div className="flex flex-col items-center gap-3">
                                                            <Icons.Database className="w-8 h-8 opacity-20"/>
                                                            <p>No se encontraron liquidaciones para los filtros aplicados.</p>
                                                        </div>
                                                    </td>
                                                </tr>
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<LiquidacionesApp />);
    </script>
</body>
</html>
