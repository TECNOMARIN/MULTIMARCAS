<body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
        const { useState, useEffect, useMemo, useCallback } = React;

        const IconBase = ({ children, className, ...props }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>{children}</svg>
        );

        const Icons = {
            RefreshCw: (p) => <IconBase {...p}><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></IconBase>,
            Filter: (p) => <IconBase {...p}><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></IconBase>,
            DollarSign: (p) => <IconBase {...p}><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></IconBase>,
            Download: (p) => <IconBase {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></IconBase>,
            ArrowLeft: (p) => <IconBase {...p}><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></IconBase>,
            Calendar: (p) => <IconBase {...p}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></IconBase>,
            Wallet: (p) => <IconBase {...p}><path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4"/><path d="M4 6v12c0 1.1.9 2 2 2h14v-4"/><path d="M18 12a2 2 0 0 0-2 2c0 1.1.9 2 2 2h4v-4h-4z"/></IconBase>,
            AlertCircle: (p) => <IconBase {...p}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></IconBase>,
            CheckCircle: (p) => <IconBase {...p}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></IconBase>,
            Search: (p) => <IconBase {...p}><circle cx="11" cy="11" r="8"/><line x1="21" x2="16.65" y1="21" y2="16.65"/></IconBase>,
            Database: (p) => <IconBase {...p}><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></IconBase>,
            Settings: (p) => <IconBase {...p}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1-2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></IconBase>,
            X: (p) => <IconBase {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></IconBase>,
            User: (p) => <IconBase {...p}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></IconBase>,
            Users: (p) => <IconBase {...p}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></IconBase>,
            Globe: (p) => <IconBase {...p}><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></IconBase>,
            Building: (p) => <IconBase {...p}><rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><line x1="9" y1="22" x2="9" y2="16"/><line x1="15" y1="22" x2="15" y2="16"/><path d="M9 16h6"/><path d="M12 2v4"/></IconBase>,
            Award: (p) => <IconBase {...p}><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></IconBase>,
            Save: (p) => <IconBase {...p}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></IconBase>,
            Copy: (p) => <IconBase {...p}><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></IconBase>
        };

        const API_URL = 'https://script.google.com/macros/s/AKfycbz770i0j3vK5-9M2Z2EheDh9GX2x2j2KbjfFm_yNadBg5db3tEc5so58KWeIX5SwTmAZw/exec';

        // ============================================================================
        // ⚙️ CONFIGURACIÓN LOCAL (MEMORIA DEL NAVEGADOR)
        // ============================================================================
        const DEFAULT_ALLY_BRAND_CONFIG = {
            type: 'estandar', 
            adminPct: 0.40,
            gestorPct: 0.60,
            comisionFija: 40000,
            utilidadFijaAdmin: 70000, 
            peaje: 40000,
            aplica4x1000: true,
            aliadoPoneInventario: false 
        };

        const parseAmount = (val) => {
            if (val === null || val === undefined || String(val).trim() === '') return null;
            let s = String(val).replace(/[^0-9.,-]/g, '').replace(/[.,]00$/, '').replace(/[.,]/g, '');
            return parseInt(s, 10) || 0;
        };

        const formatCurrency = (val) => {
            return new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', minimumFractionDigits: 0 }).format(val || 0);
        };

        const parseDate = (dateVal) => {
            if (!dateVal) return null;
            let dateObj = null;
            
            if (typeof dateVal === 'number') {
                if (dateVal > 30000 && dateVal < 60000) return new Date(Math.round((dateVal - 25569) * 86400 * 1000));
            }

            if (typeof dateVal === 'string' && dateVal.length > 5) {
                // 🛡️ CORRECCIÓN ZONA HORARIA: Si la fecha viene como 2026-06-16T05... la forzamos
                if (dateVal.includes('T')) {
                    const cleanDate = dateVal.split('T')[0]; 
                    const parts = cleanDate.split('-');
                    return new Date(parts[0], parseInt(parts[1], 10) - 1, parts[2]); 
                }
                
                if (dateVal.match(/^\d{4}-\d{2}-\d{2}/)) {
                    const parts = dateVal.split('-');
                    return new Date(parts[0], parseInt(parts[1], 10) - 1, parts[2]);
                }
                dateObj = new Date(dateVal);
                // Si aún así la parseó con desfase, le sumamos el offset
                const offset = dateObj.getTimezoneOffset() * 60000;
                dateObj = new Date(dateObj.getTime() + offset);

            } else if (dateVal instanceof Date) {
                dateObj = dateVal;
            }
            if (!dateObj || isNaN(dateObj.getTime())) return null;
            return dateObj;
        };

        function LiquidacionesApp() {
            const [allyConfigs, setAllyConfigs] = useState(() => {
                const saved = localStorage.getItem('liquidacionesAllyConfigs_v3');
                if (saved) {
                    try { return JSON.parse(saved); } catch(e) {}
                }
                return {};
            });

            const [configModal, setConfigModal] = useState({ show: false, allyName: '', config: {}, activeTab: 'PAYJOY' });

            const [brand, setBrand] = useState('todas'); 
            const [data, setData] = useState([]);
            const [rawUsuarios, setRawUsuarios] = useState([]); 
            const [headersList, setHeadersList] = useState([]); 
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            
            const [activeTab, setActiveTab] = useState('aliados');
            const [dateFilter, setDateFilter] = useState('thisMonth');
            const [customStartDate, setCustomStartDate] = useState('');
            const [customEndDate, setCustomEndDate] = useState('');
            const [selectedPartner, setSelectedPartner] = useState('');
            const [selectedConvenio, setSelectedConvenio] = useState('');
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedTiendas, setSelectedTiendas] = useState([]);
            const [isTiendaDropdownOpen, setIsTiendaDropdownOpen] = useState(false);

            const [editSaleModal, setEditSaleModal] = useState({ show: false, row: null, gestor: '', equipo: '', costo: '', remanente: '' });
            const [isSavingEdit, setIsSavingEdit] = useState(false);

            useEffect(() => {
                if (selectedTiendas.length > 0 && selectedConvenio !== '') {
                    setSelectedConvenio('');
                }
            }, [selectedTiendas, selectedConvenio]);

            // =========================================================================
            // 🛡️ REGLAS DEL NEGOCIO (CALCULADOR EN VIVO OVERRIDE DEL BACKEND)
            // =========================================================================
            const applyRules = (row, configs) => {
                const allyName = String(row._assigned || 'SIN ASIGNAR').trim().toUpperCase();
                const rowBrand = String(row._brandName || 'PAYJOY').toUpperCase();
                
                const inicialValor = (row._venta || 0) - (row._financed || 0);
                
                // Lógica de Remanente
                let remanente = row._remanente;
                if (remanente === null || remanente === undefined || remanente === '') {
                    remanente = (inicialValor > (row._venta * 0.30)) ? (inicialValor - (row._venta * 0.30)) : 0;
                } else {
                    remanente = Number(remanente);
                }

                const montoAConsignar = row._financed || 0; 
                const costoEqNum = row._costo || 0;
                const utilidadBase = montoAConsignar + remanente - costoEqNum;
                
                const allyConfig = configs[allyName] || {};
                const config = allyConfig[rowBrand] || DEFAULT_ALLY_BRAND_CONFIG;

                let calcAdmin = 0;
                let calcGestorBruto = 0;
                let calcCartera = Number(config.peaje || 40000);
                let aplica4x1000 = config.aplica4x1000 ?? true;
                let aliadoPoneInventario = config.aliadoPoneInventario ?? false;
                let reglaAplicada = "Estándar";

                if (config.type === 'porcentajes') {
                    reglaAplicada = `Porcentajes ${config.adminPct*100}/${config.gestorPct*100}`;
                    calcAdmin = utilidadBase * Number(config.adminPct);
                    calcGestorBruto = (utilidadBase * Number(config.gestorPct)) - calcCartera;
                } else if (config.type === 'inversionista') {
                    reglaAplicada = `Invers. ${config.adminPct*100}/${config.gestorPct*100}`;
                    calcAdmin = (utilidadBase * Number(config.adminPct)) - (calcCartera / 2);
                    calcGestorBruto = (utilidadBase * Number(config.gestorPct)) - (calcCartera / 2) + costoEqNum;
                    aliadoPoneInventario = false; 
                } else if (config.type === 'fija') {
                    reglaAplicada = "Comisión Fija (Aliado)";
                    calcGestorBruto = Number(config.comisionFija);
                    calcAdmin = utilidadBase - Number(config.comisionFija) - calcCartera;
                } else if (config.type === 'fija_admin') {
                    reglaAplicada = "Fija Admin";
                    calcAdmin = Number(config.utilidadFijaAdmin || 70000);
                    // 🛡️ CORRECCIÓN: Si el cobro es fijo al aliado, ignoramos Costos y Remanentes.
                    // Simplemente se transfiere el Monto a Consignar, restándole tu Fijo y la Cartera.
                    calcGestorBruto = montoAConsignar - calcAdmin - calcCartera;
                    aliadoPoneInventario = false; 
                } else {
                    calcAdmin = utilidadBase - calcCartera;
                    calcGestorBruto = 0;
                    aplica4x1000 = false;
                }

                if (aliadoPoneInventario) {
                    calcGestorBruto += costoEqNum;
                    reglaAplicada += " (+ Eq)";
                }

                const calc4x1000 = aplica4x1000 ? (calcGestorBruto * 0.004) : 0;
                const calcConsignarNeto = calcGestorBruto - calc4x1000;

                return {
                    ...row,
                    _remanenteCalc: remanente,
                    _utilidadBase: utilidadBase,
                    _calcAdmin: calcAdmin,
                    _calcGestorBruto: calcGestorBruto,
                    _calcCartera: calcCartera,
                    _calc4x1000: calc4x1000,
                    _calcConsignarNeto: calcConsignarNeto,
                    _reglaAplicada: reglaAplicada
                };
            };

            const fetchVentasData = useCallback(async () => {
                setLoading(true);
                setError(null);
                try {
                    const separator = API_URL.includes('?') ? '&' : '?';
                    const brandsToFetch = brand === 'todas' ? ['payjoy', 'alocredit', 'krediya', 'credismart'] : [brand];
                    
                    let combinedData = [];
                    let globalHeaders = [];

                    // 🌟 MODIFICACIÓN: Hacemos fetch a Ventas Y a Cartera para tener el respaldo de la fecha
                    const promises = [
                        fetch(`${API_URL}${separator}type=usuarios_payjoy&t=${new Date().getTime()}`)
                    ];
                    
                    brandsToFetch.forEach(b => {
                        promises.push(fetch(`${API_URL}${separator}type=ventas_${b}&t=${new Date().getTime()}`));
                        promises.push(fetch(`${API_URL}${separator}type=${b}&t=${new Date().getTime()}`)); // Endpoint de Cartera
                    });

                    const responses = await Promise.all(promises);
                    
                    const usuariosRes = responses[0];
                    let conveniosMap = {}; 
                    
                    if (usuariosRes.ok) {
                        try {
                            const jsonUsu = JSON.parse(await usuariosRes.text());
                            if (Array.isArray(jsonUsu) && jsonUsu.length > 0) {
                                setRawUsuarios(jsonUsu);
                                
                                const headerRowObj = jsonUsu.find(r => Object.values(r).some(v => String(v).toUpperCase().includes('CONVENIO')));
                                let nameKey, asigKey, convKey, tiendaKey;

                                if (headerRowObj) {
                                    nameKey = Object.keys(headerRowObj).find(k => String(headerRowObj[k]).toUpperCase().includes('NOMBRE') || String(headerRowObj[k]).toUpperCase().includes('APELLIDO'));
                                    asigKey = Object.keys(headerRowObj).find(k => String(headerRowObj[k]).toUpperCase().includes('ASINGACION') || String(headerRowObj[k]).toUpperCase().includes('ASIGNACION'));
                                    convKey = Object.keys(headerRowObj).find(k => String(headerRowObj[k]).toUpperCase().includes('CONVENIO'));
                                    tiendaKey = Object.keys(headerRowObj).find(k => String(headerRowObj[k]).toUpperCase() === 'TIENDA');
                                    
                                    jsonUsu.forEach(r => {
                                        let convRaw = String(r[convKey] || '').trim().toUpperCase();
                                        let conv = convRaw === '' ? 'SIN CONVENIO' : convRaw;
                                        if (conv !== 'CONVENIO') {
                                            if (nameKey && r[nameKey]) conveniosMap[String(r[nameKey]).toLowerCase().trim()] = conv;
                                            if (tiendaKey && r[tiendaKey]) conveniosMap[String(r[tiendaKey]).toLowerCase().trim()] = conv; 
                                        }
                                    });
                                } else {
                                    const keys = Object.keys(jsonUsu[0]);
                                    nameKey = keys.find(k => k.toUpperCase().includes('NOMBRE') || k.toUpperCase().includes('APELLIDO'));
                                    asigKey = keys.find(k => k.toUpperCase().includes('ASINGACION') || k.toUpperCase().includes('ASIGNACION'));
                                    convKey = keys.find(k => k.toUpperCase().includes('CONVENIO'));
                                    tiendaKey = keys.find(k => k.toUpperCase() === 'TIENDA');

                                    if (convKey) {
                                        jsonUsu.forEach(r => {
                                            let convRaw = String(r[convKey] || '').trim().toUpperCase();
                                            let conv = convRaw === '' ? 'SIN CONVENIO' : convRaw;
                                            if (nameKey && r[nameKey]) conveniosMap[String(r[nameKey]).toLowerCase().trim()] = conv;
                                            if (tiendaKey && r[tiendaKey]) conveniosMap[String(r[tiendaKey]).toLowerCase().trim()] = conv; 
                                        });
                                    }
                                }
                            }
                        } catch(e) { console.error("Error al procesar convenios", e); }
                    }

                    // Iterar por cada marca
                    for (let i = 0; i < brandsToFetch.length; i++) {
                        const currentBrand = brandsToFetch[i];
                        const ventasRes = responses[1 + (i * 2)];
                        const carteraRes = responses[2 + (i * 2)];
                        
                        let dateFallbackMap = {};
                        
                        // 1. Procesar Cartera (Solo para extraer fechas por ID)
                        if (carteraRes.ok) {
                            try {
                                const jsonCartera = JSON.parse(await carteraRes.text());
                                if (Array.isArray(jsonCartera) && jsonCartera.length > 0) {
                                    const cKeys = Object.keys(jsonCartera[0]);
                                    const cIdCol = cKeys.find(k => ['CEDULA', 'CC', 'DOCUMENTO', 'IDENTIFICACION'].includes(String(k).toUpperCase().trim()));
                                    const cDateCol = cKeys.find(k => {
                                        const upper = String(k).toUpperCase();
                                        return upper.includes('FECHA') && !upper.includes('NACI');
                                    });
                                    
                                    if (cIdCol && cDateCol) {
                                        jsonCartera.forEach(r => {
                                            const idStr = String(r[cIdCol] || '').replace(/\D/g, '');
                                            if (idStr) {
                                                dateFallbackMap[idStr] = r[cDateCol];
                                            }
                                        });
                                    }
                                }
                            } catch (e) { console.warn("Error leyendo fechas de cartera", e); }
                        }
                        
                        // 2. Procesar Ventas (Datos principales)
                        if (ventasRes.ok) {
                            try {
                                const jsonVentas = JSON.parse(await ventasRes.text());
                                if (Array.isArray(jsonVentas) && jsonVentas.length > 0) {
                                    if (globalHeaders.length === 0) globalHeaders = Object.keys(jsonVentas[0]);

                                    const findConfigColumnLocal = (possibleNames, hList) => {
                                        for (const name of possibleNames) {
                                            const found = hList.find(h => h.toLowerCase().trim() === name.toLowerCase().trim());
                                            if (found) return found;
                                        }
                                        for (const name of possibleNames) {
                                            const found = hList.find(h => {
                                                const lowerH = h.toLowerCase().trim();
                                                return lowerH.includes(name.toLowerCase()) && !lowerH.includes('#') && !lowerH.includes('fecha');
                                            });
                                            if (found) return found;
                                        }
                                        return null;
                                    };

                                    const parsedRows = jsonVentas.map(row => {
                                        const keysLocal = Object.keys(row);
                                        
                                        const colAsignado = findConfigColumnLocal(['ASIGNADO', 'RESPONSABLE', 'GESTOR'], keysLocal);
                                        const colVendedor = findConfigColumnLocal(['VENDEDOR', 'ASESOR'], keysLocal);
                                        const colTienda = findConfigColumnLocal(['TIENDA', 'PUNTO DE VENTA', 'SUCURSAL', 'SEDE', 'PUNTO'], keysLocal);

                                        let asignadoRaw = colAsignado ? (row[colAsignado] || '') : '';
                                        let vendedorRaw = colVendedor ? (row[colVendedor] || '') : '';
                                        let tiendaRaw = colTienda ? (row[colTienda] || '') : '';

                                        const findVal = (keywords) => {
                                            const col = findConfigColumnLocal(keywords, keysLocal);
                                            return col ? row[col] : undefined;
                                        };

                                        const dateKey = keysLocal.find(k => {
                                            const upper = String(k).toUpperCase();
                                            return upper.includes('FECHA') && !upper.includes('NACI');
                                        });

                                        let searchTienda = String(tiendaRaw).toLowerCase().trim();
                                        let searchVend = String(vendedorRaw).toLowerCase().trim();
                                        
                                        let convenioFound = conveniosMap[searchTienda] || conveniosMap[searchVend] || 'SIN CONVENIO';

                                        let financed = parseAmount(findVal(['SALDO A FINANCIAR', 'SALDO A FINACIAR', 'MONTO A FINANCIAR', 'MONTO TOTAL A FINANCIAR', 'MONTO TOTAL A CONSIGNAR', 'MONTO A CONSIGNAR', 'VALOR CREDITO']));

                                        if (financed === 0 || financed === null || isNaN(financed)) {
                                            let totalVenta = parseAmount(findVal(['TOTAL VENTA', 'PRECIO DE VENTA', 'VALOR VENTA', 'VENTA', 'MONTO TOTAL']));
                                            let cuotaInicial = parseAmount(findVal(['CUOTA INICIAL', 'VALOR CUOTA INICIAL', 'INICIAL']));
                                            if (totalVenta > 0 && cuotaInicial >= 0) financed = totalVenta - cuotaInicial;
                                        }

                                        const rawRem = findVal(['EXCEDENTE DE INICIAL', 'REMANENTE DE INICIAL', 'REMANENTE']);
                                        let remanenteVal = null;
                                        if (rawRem !== undefined && rawRem !== null && String(rawRem).trim() !== "") {
                                            remanenteVal = parseAmount(rawRem);
                                            if (remanenteVal === null && String(rawRem).trim() === "0") {
                                                remanenteVal = 0;
                                            } else if (remanenteVal !== null) {
                                                remanenteVal = Number(remanenteVal);
                                            }
                                        }

                                        // 🌟 LÓGICA DE RESPALDO DE FECHA 🌟
                                        let finalDate = dateKey ? row[dateKey] : undefined;
                                        const idRaw = findVal(['CEDULA', 'CC', 'DOCUMENTO', 'IDENTIFICACION']);
                                        const idClean = idRaw ? String(idRaw).replace(/\D/g, '') : '';

                                        if ((!finalDate || String(finalDate).trim() === '') && idClean && dateFallbackMap[idClean]) {
                                            finalDate = dateFallbackMap[idClean];

                                            _remanente: remanenteVal
                                        };

            useEffect(() => {

            const getDateRange = useCallback(() => {
                const now = new Date();
                now.setHours(0,0,0,0);
                if (dateFilter === 'thisWeek') {
                    const currentDay = now.getDay();
                    const distanceToMonday = (currentDay === 0 ? 6 : currentDay - 1);
                    const start = new Date(now); start.setDate(now.getDate() - distanceToMonday);
                    const end = new Date(start); end.setDate(start.getDate() + 6); end.setHours(23,59,59,999);
                    return { start, end };
                }
                if (dateFilter === 'thisMonth') return { start: new Date(now.getFullYear(), now.getMonth(), 1), end: new Date(now.getFullYear(), now.getMonth() + 1, 0, 23, 59, 59, 999) };
                if (dateFilter === 'lastMonth') return { start: new Date(now.getFullYear(), now.getMonth() - 1, 1), end: new Date(now.getFullYear(), now.getMonth(), 0, 23, 59, 59, 999) };
                if (dateFilter === 'custom' && customStartDate && customEndDate) return { start: new Date(customStartDate + 'T00:00:00'), end: new Date(customEndDate + 'T23:59:59') };

                    if (selectedPartner && String(row._assigned || '').trim().toUpperCase() !== selectedPartner.toUpperCase()) return false;

                        if (!selectedTiendas.includes(rowTienda)) return false;
                    }

                    if (selectedTiendas.length === 0 && selectedConvenio && row._convenio !== selectedConvenio) return false;
                    
                    if (searchTerm) {
                        const s = searchTerm.toLowerCase();
                        if (
                            !String(row._client || '').toLowerCase().includes(s) &&
                            !String(row._assigned || '').toLowerCase().includes(s) &&
                            !String(row._tienda || '').toLowerCase().includes(s) &&
                            !String(row._device || '').toLowerCase().includes(s)
                        ) return false;
                    }

                    return true;
                }).sort((a, b) => {
                    const dA = parseDate(a._date) || 0;
                    const dB = parseDate(b._date) || 0;
                    return dB - dA;

                                nit: idKey ? String(uRow[idKey] || '').trim() : ''

                                        onClick={handleSaveSaleEdit}
                                        disabled={isSavingEdit || !editSaleModal.gestor}
                                        className="flex items-center gap-2 px-8 py-2.5 bg-[#3b62ff] text-white font-black rounded-full hover:bg-blue-700 transition-colors shadow-md disabled:opacity-50 text-sm"
                                    >
                                        {isSavingEdit ? <><Icons.RefreshCw className="w-4 h-4 animate-spin"/> Guardando...</> : 'Guardar Cambios'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<LiquidacionesApp />);
    </script>
</body>
</html>
