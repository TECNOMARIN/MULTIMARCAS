<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Soluciones CTG | Quick Install</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap');

        :root {
            --primary-gradient: linear-gradient(135deg, #1e3a6d 0%, #2C4C8C 100%);
            --action-gradient: linear-gradient(135deg, #74c456 0%, #58a33f 100%);
            --brand-blue: #2C4C8C;
            --brand-green: #67B74D;
        }

        body { 
            background: var(--primary-gradient); 
            min-height: 100vh; 
            font-family: 'Montserrat', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .app-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        .btn-install {
            background: var(--action-gradient);
            box-shadow: 0 8px 20px rgba(103, 183, 77, 0.3);
        }

        .console-mini {
            background: #1e293b;
            font-family: 'Courier New', monospace;
            font-size: 10px;
        }

        .step-bubble {
            background: #f1f5f9;
            border-radius: 12px;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .dot-pulse {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        /* Ocultar scrollbar en consola */
        .console-mini::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-3 sm:p-6">

    <div class="app-card w-full max-w-md overflow-hidden flex flex-col">
        <!-- Header Minimalista -->
        <div class="bg-white px-6 py-4 flex items-center justify-between border-b border-slate-100">
            <img src="https://raw.githubusercontent.com/TECNOMARIN/MULTIMARCAS/refs/heads/main/SOLUCIONES%20PNG.png" alt="Logo" class="h-10 w-auto">
            <div class="flex items-center gap-2 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">
                <div id="status-dot" class="dot-pulse bg-slate-300"></div>
                <span id="status-text" class="text-[9px] font-bold text-slate-500 uppercase tracking-tighter">OFFLINE</span>
            </div>
        </div>

        <div class="p-5 space-y-5">
            <!-- Instrucciones Compactas -->
            <div class="space-y-2">
                <div class="step-bubble">
                    <span class="text-emerald-600 font-black text-xs">01</span>
                    <p class="text-[10px] font-bold text-slate-600 uppercase tracking-tight">Cuentas eliminadas</p>
                </div>
                <div class="step-bubble">
                    <span class="text-emerald-600 font-black text-xs">02</span>
                    <p class="text-[10px] font-bold text-slate-600 uppercase tracking-tight">Depuración USB ON</p>
                </div>
                <div class="step-bubble">
                    <span class="text-emerald-600 font-black text-xs">03</span>
                    <p class="text-[10px] font-bold text-slate-600 uppercase tracking-tight">Sin bloqueo de pantalla</p>
                </div>
            </div>

            <!-- Botón Principal -->
            <button id="btn-start" class="btn-install w-full py-4 rounded-xl text-white font-black text-sm flex items-center justify-center gap-3 active:scale-95 transition-transform">
                <i class="fas fa-bolt-lightning"></i>
                VINCULAR Y CONFIGURAR
            </button>

            <!-- Monitor y Progreso -->
            <div class="space-y-2">
                <div class="flex justify-between items-end px-1">
                    <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Monitor ADB</span>
                    <span id="progress-percent" class="text-[10px] font-black text-emerald-600">0%</span>
                </div>
                <div class="w-full h-1.5 bg-slate-100 rounded-full overflow-hidden">
                    <div id="progress-bar" class="w-0 h-full bg-emerald-500 transition-all duration-500"></div>
                </div>
                <div id="console" class="console-mini w-full h-32 p-4 rounded-xl overflow-y-auto leading-relaxed text-slate-400">
                    <div># SYSTEM_STANDBY</div>
                    <div># READY_FOR_HANDSHAKE...</div>
                </div>
            </div>
        </div>

        <div class="bg-slate-50 py-3 text-center border-t border-slate-100">
            <p class="text-[8px] font-bold text-slate-400 uppercase tracking-[0.2em]">
                TECNOMARIN & SOLUCIONES CTG
            </p>
        </div>
    </div>

    <!-- WebADB Library -->
    <script src="https://cdn.jsdelivr.net/gh/tcode2k16/webadb.js@master/webadb.js"></script>

    <script>
        const consoleEl = document.getElementById('console');
        const btnStart = document.getElementById('btn-start');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const progressBar = document.getElementById('progress-bar');
        const progressPercent = document.getElementById('progress-percent');

        const APK_URL = 'https://github.com/TECNOMARIN/MULTIMARCAS/raw/refs/heads/main/nuovopay.apk';

        function updateProgress(p) {
            progressBar.style.width = p + '%';
            progressPercent.innerText = Math.round(p) + '%';
        }

        function log(msg, type = 'info') {
            const colors = {
                info: 'text-slate-500',
                success: 'text-emerald-400 font-bold',
                error: 'text-red-400',
                process: 'text-blue-400'
            };
            const div = document.createElement('div');
            div.className = `mb-0.5 ${colors[type]}`;
            div.innerHTML = `<span class="opacity-30">></span> ${msg}`;
            consoleEl.appendChild(div);
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        btnStart.onclick = async () => {
            btnStart.disabled = true;
            updateProgress(5);
            log("Iniciando handshake WebUSB...", "process");

            try {
                const adb = new Adb();
                const webusb = await Adb.WebUsb.requestDevice();
                
                if (!webusb) {
                    log("Cancelado por usuario.", "error");
                    btnStart.disabled = false;
                    updateProgress(0);
                    return;
                }

                log("Hardware OK. Conectando...", "process");
                const transport = await Adb.WebUsb.Transport.open(webusb);
                await adb.connect(transport);
                updateProgress(30);

                statusDot.className = "dot-pulse bg-emerald-500 shadow-[0_0_8px_#10b981]";
                statusText.innerText = "ONLINE";
                statusText.classList.replace('text-slate-500', 'text-emerald-600');
                
                log("CONEXIÓN ESTABLECIDA.", "success");

                log("Descargando APK de MULTIMARCAS...", "info");
                const response = await fetch(APK_URL);
                const apkBlob = await response.blob();
                const apkBuffer = await apkBlob.arrayBuffer();
                updateProgress(55);

                log("Inyectando aplicación...", "process");
                await adb.install(apkBuffer);
                updateProgress(75);
                log("APK INSTALADA.", "success");

                log("Configurando Device Owner...", "process");
                const shell = await adb.shell("dpm set-device-owner com.promobitech.nuovo/com.promobitech.mobilock.component.MobilockDeviceAdmin");
                const result = await shell.receive();
                const decoded = new TextDecoder().decode(result.data);
                updateProgress(90);
                
                if (decoded.includes("Success")) {
                    log("ADMINISTRADOR OK.", "success");
                } else {
                    log("SYSTEM: " + (decoded.substring(0,25)) + "...", "info");
                }

                log("Optimizando sistema...", "info");
                await adb.shell("settings put global verifier_verify_adb_installs 0");
                await adb.shell("dumpsys deviceidle whitelist +com.promobitech.nuovo");
                await adb.shell("am start com.promobitech.nuovo/com.promobitech.mobilock.ui.activities.NavigationActivity");

                updateProgress(100);
                log("PROCESO TERMINADO EXITOSAMENTE.", "success");

            } catch (err) {
                log("ERROR: " + err.message.substring(0,30), "error");
                statusDot.className = "dot-pulse bg-red-500";
                statusText.innerText = "ERROR";
            } finally {
                btnStart.disabled = false;
            }
        };
    </script>
</body>
</html>
