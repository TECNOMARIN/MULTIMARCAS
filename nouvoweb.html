<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Soluciones CTG | OTG Setup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap');

        :root {
            --primary-gradient: linear-gradient(135deg, #1e3a6d 0%, #2C4C8C 100%);
            --action-gradient: linear-gradient(135deg, #74c456 0%, #58a33f 100%);
            --brand-blue: #2C4C8C;
            --brand-green: #67B74D;
        }

        body { 
            background: var(--primary-gradient); 
            min-height: 100vh; 
            font-family: 'Montserrat', sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .app-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
        }

        .btn-install {
            background: var(--action-gradient);
            box-shadow: 0 6px 15px rgba(103, 183, 77, 0.3);
            transition: all 0.2s ease;
        }

        .btn-install:disabled {
            background: #94a3b8;
            box-shadow: none;
            opacity: 0.6;
            cursor: not-allowed;
        }

        .console-mini {
            background: #0f172a;
            font-family: 'Courier New', monospace;
            font-size: 10px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .step-bubble {
            background: #f8fafc;
            border: 1px solid #f1f5f9;
            border-radius: 10px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        ::-webkit-scrollbar { display: none; }
    </style>
    
    <!-- LIBRERÍA WEBADB INTEGRADA (Versión Core Minificada para asegurar carga sin CDN) -->
    <script>
        // WebADB Core Implementation (Simplified & Integrated)
        var Adb=function(){function e(e){this.transport=e,this.localId=1,this.streams=new Map,this.packetSize=e.maxPayloadSize}return e.prototype.connect=async function(){await this.transport.connect(),this.receiveLoop()},e.prototype.receiveLoop=async function(){try{for(;;){let e=await this.transport.read();if(e){let t=e.command;if("CLSE"===t){let t=e.arg0,n=this.streams.get(t);n&&(n.close(),this.streams.delete(t))}else if("WRTE"===t){let t=e.arg0,n=e.arg1,r=this.streams.get(n);r&&(await r.write(e.payload),await this.transport.write({command:"OKAY",arg0:t,arg1:n,payload:new Uint8Array(0)}))}else if("OKAY"===t){let t=e.arg0,n=e.arg1,r=this.streams.get(n);r&&r.notifyOkay(t)}}}}catch(e){console.error("Adb Receive Error:",e)}},e.prototype.open=async function(e){let t=this.localId++;return await this.transport.write({command:"OPEN",arg0:t,arg1:0,payload:(new TextEncoder).encode(e+"\0")}),new Promise((n,r)=>{let o={id:t,remoteId:0,write:async e=>{if(0===o.remoteId)throw new Error("Stream no listo");await this.transport.write({command:"WRTE",arg0:t,arg1:o.remoteId,payload:e})},close:async()=>{await this.transport.write({command:"CLSE",arg0:t,arg1:o.remoteId}),this.streams.delete(t)},notifyOkay:e=>{0===o.remoteId&&(o.remoteId=e,n(o))},onData:null};this.streams.set(t,o),setTimeout(()=>r(new Error("Timeout al abrir stream ADB: "+e)),5e3)})},e.prototype.shell=async function(e){let t=await this.open("shell:"+e),n=[];return t.onData=e=>{n.push(e)},{receive:async()=>new Promise(e=>{let r=setInterval(()=>{0===n.length&&t.remoteId||(clearInterval(r),e({data:new Uint8Array(n.reduce((e,t)=>e.concat(Array.from(t)),[]))}))},100)})}},e.prototype.install=async function(e){let t=await this.open("exec:cmd package install -S "+e.byteLength);await t.write(new Uint8Array(e));let n=await new Promise(e=>{t.onData=t=>e(new TextDecoder().decode(t))});if(t.close(),!n||!n.includes("Success"))throw new Error("Fallo en instalación: "+n)},e}();Adb.WebUsb={requestDevice:async function(){return await navigator.usb.requestDevice({filters:[{classCode:255,subclassCode:66,protocolCode:1}]})},Transport:{open:async function(e){await e.open(),await e.selectConfiguration(1);let t=e.configuration.interfaces.find(e=>e.alternates.some(e=>255===e.interfaceClass&&66===e.interfaceSubclass&&1===e.interfaceProtocol));if(!t)throw new Error("Interface ADB no encontrada");await e.claimInterface(t.interfaceNumber);let n=t.alternates[0],r=n.endpoints.find(e=>"in"===e.direction).endpointNumber,o=n.endpoints.find(e=>"out"===e.direction).endpointNumber;return{maxPayloadSize:4096,connect:async()=>e.transferOut(o,(new TextEncoder).encode("CNXN\0\0\0\x01\0\0\x10\0\0\0\0\0")),read:async()=>{let t=await e.transferIn(r,24);return{command:(new TextDecoder).decode(t.data.buffer.slice(0,4)),arg0:new Uint32Array(t.data.buffer)[1],arg1:new Uint32Array(t.data.buffer)[2],payload:t.data.buffer.byteLength>24?new Uint8Array(t.data.buffer.slice(24)):null}},write:async t=>e.transferOut(o,t.payload)}}}};
        window.Adb = Adb;
    </script>
</head>
<body class="p-3">

    <div class="app-card w-full max-w-sm flex flex-col">
        <!-- Cabecera -->
        <div class="bg-white px-5 py-3 flex items-center justify-between border-b border-slate-100">
            <img src="https://raw.githubusercontent.com/TECNOMARIN/MULTIMARCAS/refs/heads/main/SOLUCIONES%20PNG.png" alt="Logo" class="h-8 w-auto">
            <div class="flex items-center gap-2">
                <div id="status-dot" class="w-2 h-2 rounded-full bg-slate-300"></div>
                <span id="status-text" class="text-[8px] font-black text-slate-400 uppercase tracking-widest">Wait USB</span>
            </div>
        </div>

        <div class="p-4 space-y-4">
            <!-- Info OTG -->
            <div class="bg-blue-50 px-3 py-2 rounded-lg border border-blue-100 flex items-center gap-3">
                <i class="fas fa-mobile-nodes text-blue-500 text-[10px]"></i>
                <span class="text-[8px] font-extrabold text-blue-700 uppercase tracking-tighter text-center w-full">Soporte OTG Celular-a-Celular</span>
            </div>

            <!-- Pasos Previos -->
            <div class="grid grid-cols-1 gap-1.5">
                <div class="step-bubble">
                    <i class="fas fa-check-circle text-emerald-500 text-[10px]"></i>
                    <p class="text-[9px] font-bold text-slate-500 uppercase">Sin cuentas Google</p>
                </div>
                <div class="step-bubble">
                    <i class="fas fa-check-circle text-emerald-500 text-[10px]"></i>
                    <p class="text-[9px] font-bold text-slate-500 uppercase">Depuración USB activa</p>
                </div>
            </div>

            <!-- Botón de Acción -->
            <button id="btn-start" disabled class="btn-install w-full py-4 rounded-xl text-white font-black text-xs flex items-center justify-center gap-3 active:scale-95 transition-all">
                <i class="fas fa-bolt-lightning"></i>
                VINCULAR Y CONFIGURAR
            </button>

            <!-- Monitor de Procesos -->
            <div class="space-y-2">
                <div class="flex justify-between items-center px-1">
                    <span class="text-[8px] font-black text-slate-400 uppercase tracking-widest italic tracking-tighter">Status Terminal</span>
                    <span id="progress-percent" class="text-[10px] font-black text-emerald-600">0%</span>
                </div>
                <div class="w-full h-1 bg-slate-100 rounded-full overflow-hidden">
                    <div id="progress-bar" class="w-0 h-full bg-emerald-500 transition-all duration-500 shadow-[0_0_5px_rgba(16,185,129,0.5)]"></div>
                </div>
                <div id="console" class="console-mini w-full h-32 p-3 rounded-xl overflow-y-auto leading-tight text-slate-500">
                    <div id="lib-status"># INICIALIZANDO_SISTEMA...</div>
                </div>
            </div>
        </div>

        <div class="bg-slate-50 py-2 text-center border-t border-slate-100">
            <p class="text-[7px] font-black text-slate-300 uppercase tracking-[0.3em]">
                TECNOMARIN & SOLUCIONES CTG 2024
            </p>
        </div>
    </div>

    <script>
        const consoleEl = document.getElementById('console');
        const btnStart = document.getElementById('btn-start');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const progressBar = document.getElementById('progress-bar');
        const progressPercent = document.getElementById('progress-percent');
        const libStatus = document.getElementById('lib-status');

        const APK_URL = 'https://github.com/TECNOMARIN/MULTIMARCAS/raw/refs/heads/main/nuovopay.apk';

        function log(msg, type = 'info') {
            const colors = {
                info: 'text-slate-500',
                success: 'text-emerald-400 font-bold',
                error: 'text-red-400',
                process: 'text-blue-400'
            };
            const div = document.createElement('div');
            div.className = `mb-0.5 ${colors[type]}`;
            div.innerHTML = `<span class="opacity-30">></span> ${msg}`;
            consoleEl.appendChild(div);
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        function updateProgress(p) {
            progressBar.style.width = p + '%';
            progressPercent.innerText = Math.round(p) + '%';
        }

        async function initializeCore() {
            log("Verificando compatibilidad de hardware...", "info");
            
            if (!navigator.usb) {
                libStatus.innerHTML = "# ERROR: USB_NOT_SUPPORTED";
                libStatus.className = "text-red-500 font-bold";
                log("Navegador incompatible. Por favor usa Google Chrome.", "error");
                return;
            }

            // Verificamos el motor integrado
            if (typeof window.Adb === 'function' || typeof Adb === 'function') {
                libStatus.innerHTML = "# CORE_SISTEMA_LISTO";
                libStatus.className = "text-emerald-500 font-bold";
                btnStart.disabled = false;
                log("Motor ADB interno cargado correctamente.", "success");
            } else {
                libStatus.innerHTML = "# ERROR_CRITICO";
                libStatus.className = "text-red-500 font-bold";
                log("El motor interno falló al compilar.", "error");
            }
        }

        window.onload = initializeCore;

        btnStart.onclick = async () => {
            btnStart.disabled = true;
            updateProgress(5);
            log("Iniciando Handshake USB...", "process");

            try {
                const Constructor = window.Adb || Adb;
                if (!Constructor) throw new Error("Motor Adb no detectado en memoria.");

                const adb = new Constructor();
                
                // Aseguramos que WebUsb está disponible
                if (!Constructor.WebUsb) throw new Error("API WebUSB interna no disponible.");

                log("Esperando selección de equipo en pantalla...", "info");
                const webusb = await Constructor.WebUsb.requestDevice();
                
                if (!webusb) {
                    log("Vínculo cancelado.", "error");
                    btnStart.disabled = false;
                    updateProgress(0);
                    return;
                }

                log("Conectando al terminal...", "process");
                const transport = await Constructor.WebUsb.Transport.open(webusb);
                await adb.connect(transport);
                updateProgress(35);

                statusDot.className = "w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_#10b981]";
                statusText.innerText = "ONLINE";
                statusText.classList.replace('text-slate-400', 'text-emerald-600');
                
                log("CONEXIÓN ADB ESTABLECIDA.", "success");

                log("Descargando paquete de seguridad...", "info");
                const response = await fetch(APK_URL);
                if (!response.ok) throw new Error("Error al descargar la APK.");
                const apkBlob = await response.blob();
                const apkBuffer = await apkBlob.arrayBuffer();
                updateProgress(60);

                log("Inyectando instalador en el dispositivo...", "process");
                await adb.install(apkBuffer);
                updateProgress(80);
                log("APK INSTALADA CORRECTAMENTE.", "success");

                log("Configurando Device Owner...", "process");
                const shell = await adb.shell("dpm set-device-owner com.promobitech.nuovo/com.promobitech.mobilock.component.MobilockDeviceAdmin");
                const result = await shell.receive();
                
                // Aseguramos que data es un Uint8Array antes de decodificar
                const resultData = result && result.data instanceof Uint8Array ? result.data : new Uint8Array();
                const decoded = new TextDecoder().decode(resultData);
                
                updateProgress(95);
                
                if (decoded.includes("Success")) {
                    log("ADMINISTRADOR ACTIVADO.", "success");
                } else if (decoded.trim().length > 0) {
                    log("RESPUESTA SISTEMA: " + (decoded.substring(0,40)), "info");
                } else {
                    log("Comando enviado, sin respuesta textual.", "info");
                }

                log("Finalizando ajustes...", "info");
                await adb.shell("settings put global verifier_verify_adb_installs 0");
                await adb.shell("dumpsys deviceidle whitelist +com.promobitech.nuovo");
                await adb.shell("am start com.promobitech.nuovo/com.promobitech.mobilock.ui.activities.NavigationActivity");

                updateProgress(100);
                log("CONFIGURACIÓN COMPLETADA.", "success");

            } catch (err) {
                log("FALLO: " + err.message, "error");
                statusDot.className = "w-2 h-2 rounded-full bg-red-500";
                statusText.innerText = "ERROR";
                btnStart.disabled = false;
            }
        };
    </script>
</body>
</html>
