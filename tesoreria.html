<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Módulo de Tesorería - Dispersión de Créditos</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap');
        
        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: #f1f5f9;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f8fafc; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .animate-spin-slow { animation: spin 2s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        /* Animaciones para el modal y notificaciones */
        @keyframes popIn {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop-in { animation: popIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        @keyframes slideInDown {
            from { transform: translate(-50%, -100%); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }
        .toast-enter { animation: slideInDown 0.4s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <div id="root" class="flex-1 flex flex-col"></div>

    <script type="text/babel" data-presets="react">
        const { useState, useEffect, useMemo } = React;

        // ⚠️ API URL ACTUALIZADA AL BACKEND DE PRODUCCIÓN (Tomada de tu index.html)
        const API_URL = 'https://script.google.com/macros/s/AKfycbzH2a6_gdBJ6uEzmms8qneHg5XnpThtWALqEjgZ9YYcEyMdG1ikYWb68POhtVELJdrdRA/exec';

        // --- Componente de Iconos ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                ShieldCheck: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10zM9 12l2 2 4-4" />,
                LogIn: <><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></>,
                LogOut: <><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></>,
                Key: <><path d="m15.5 7.5 2.3 2.3a1 1 0 0 0 1.4 0l2.1-2.1a1 1 0 0 0 0-1.4L19 4"/><path d="m21 2-9.6 9.6"/><circle cx="7.5" cy="15.5" r="5.5"/></>,
                Store: <><path d="m2 7 4.41-4.41A2 2 0 0 1 7.83 2h8.34a2 2 0 0 1 1.42.59L22 7"/><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><path d="M15 22v-4a2 2 0 0 0-2-2h-2a2 2 0 0 0-2 2v4"/><path d="M2 7h20"/><path d="M22 7v3a2 2 0 0 1-2 2v0a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 16 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 12 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 8 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 4 12v0a2 2 0 0 1-2-2V7"/></>,
                RefreshCw: <><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></>,
                Search: <><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>,
                AlertCircle: <><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>,
                CheckCircle: <><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>,
                DollarSign: <><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></>,
                Wallet: <><path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4"/><path d="M4 6v12c0 1.1.9 2 2 2h14v-4"/><path d="M18 12a2 2 0 0 0-2 2c0 1.1.9 2 2 2h4v-4h-4z"/></>,
                X: <><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>,
                Landmark: <><line x1="3" y1="22" x2="21" y2="22"/><line x1="6" y1="18" x2="6" y2="11"/><line x1="10" y1="18" x2="10" y2="11"/><line x1="14" y1="18" x2="14" y2="11"/><line x1="18" y1="18" x2="18" y2="11"/><polygon points="12 2 20 7 4 7"/></>,
                User: <><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></>,
                Send: <><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></>,
                FileText: <><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></>,
                ArrowLeft: <><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        // --- Utilidades ---
        const formatCurrency = (val) => {
            return new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', minimumFractionDigits: 0 }).format(Number(val) || 0);
        };

        const parseDate = (val) => {
            if (!val) return '-';
            const d = new Date(val);
            return isNaN(d.getTime()) ? val : d.toLocaleString('es-CO', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
        };

        // --- Componente Toast (Notificaciones) ---
        const Toast = ({ show, message, type, onClose }) => {
            if (!show) return null;
            return (
                <div className={`fixed top-4 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-xl shadow-lg z-[100] flex items-center gap-3 toast-enter border ${type === 'error' ? 'bg-red-50 border-red-200 text-red-700' : 'bg-emerald-50 border-emerald-200 text-emerald-700'}`}>
                    {type === 'error' ? <Icon name="AlertCircle" size={20} className="text-red-500 shrink-0"/> : <Icon name="CheckCircle" size={20} className="text-emerald-500 shrink-0"/>}
                    <span className="font-bold text-sm">{message}</span>
                    <button onClick={onClose} className="ml-2 hover:bg-black/5 p-1 rounded-full transition-colors shrink-0">
                        <Icon name="X" size={16}/>
                    </button>
                </div>
            );
        };

        function TesoreriaApp() {
            // --- ESTADOS ---
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [user, setUser] = useState(null);
            
            const [loginData, setLoginData] = useState({ username: '', password: '' });
            const [loginLoading, setLoginLoading] = useState(false);
            
            const [loading, setLoading] = useState(false);
            const [simulaciones, setSimulaciones] = useState([]);
            const [financieras, setFinancieras] = useState([]);
            const [clientes, setClientes] = useState([]); // Base de Aliados (Tiendas)
            
            const [searchTerm, setSearchTerm] = useState('');
            const [toast, setToast] = useState({ show: false, message: '', type: 'success' });
            
            const [confirmModal, setConfirmModal] = useState({ show: false, row: null });
            const [isSaving, setIsSaving] = useState(false);

            const showToast = (message, type = 'success') => {
                setToast({ show: true, message, type });
                setTimeout(() => setToast(prev => ({ ...prev, show: false })), 4000);
            };

            // --- LOGIN Y CARGA DE DATOS INICIAL ---
            const handleLogin = async (e) => {
                e.preventDefault();
                if (!loginData.username || !loginData.password) return;
                
                setLoginLoading(true);
                try {
                    const separator = API_URL.includes('?') ? '&' : '?';
                    const response = await fetch(`${API_URL}${separator}action=getData`, {
                        method: 'GET',
                        mode: 'cors',
                    });
                    
                    if (!response.ok) throw new Error("Error de conexión con el servidor");
                    
                    const resJson = await response.json();
                    if (resJson.status === 'success' && resJson.data) {
                        const db = resJson.data;
                        const u = loginData.username.trim().toLowerCase();
                        const p = loginData.password;
                        
                        const foundUser = db.clientes.find(c => String(c.nombre_cliente).toLowerCase().trim() === u && String(c.contrasena) === p);
                        
                        if (foundUser) {
                            // Validar permisos
                            const uName = String(foundUser.nombre_cliente).toLowerCase().trim();
                            const isGlobalAdmin = uName === 'administrador';
                            const isRegionalAdmin = uName.startsWith('admin-');
                            const isSemiAdmin = uName.startsWith('cia'); 
                            
                            // 🔒 RESTRICCIÓN DE SEGURIDAD: Solo Admins
                            if (isGlobalAdmin || isRegionalAdmin || isSemiAdmin) {
                                setUser(foundUser);
                                setFinancieras(db.financieras || []);
                                setClientes(db.clientes || []);
                                setIsAuthenticated(true);
                                fetchSolicitudesAprobadas(db.simulaciones || []);
                            } else {
                                showToast("Acceso Denegado. Este módulo es exclusivo para Tesorería y Administración.", "error");
                            }
                        } else {
                            showToast("Credenciales incorrectas", "error");
                        }
                    } else {
                        throw new Error(resJson.message || "Error al cargar la base de datos");
                    }
                } catch (error) {
                    showToast(error.message, "error");
                } finally {
                    setLoginLoading(false);
                }
            };

            // --- CARGAR SOLICITUDES APROBADAS ---
            const fetchSolicitudesAprobadas = async (simulationsData = null) => {
                setLoading(true);
                try {
                    let simData = simulationsData;
                    if (!simData) {
                        const separator = API_URL.includes('?') ? '&' : '?';
                        const response = await fetch(`${API_URL}${separator}action=getData`, {
                            method: 'GET',
                            mode: 'cors'
                        });
                        if (!response.ok) throw new Error("Error al recargar datos");
                        const resJson = await response.json();
                        simData = resJson.data.simulaciones;
                        setClientes(resJson.data.clientes || []);
                        setFinancieras(resJson.data.financieras || []);
                    }

                    if (Array.isArray(simData)) {
                        // 🎯 FILTRO ESTRICTO: Solo simulaciones en estado "Aprobado"
                        const aprobadas = simData.filter(s => {
                            const est = String(s.estado || s.Estado || '').toLowerCase().trim();
                            return est === 'aprobado';
                        });
                        setSimulaciones(aprobadas.reverse()); // Más recientes primero
                    }
                } catch (error) {
                    showToast(error.message, "error");
                } finally {
                    setLoading(false);
                }
            };

            const handleLogout = () => {
                setIsAuthenticated(false);
                setUser(null);
                setSimulaciones([]);
                setLoginData({ username: '', password: '' });
            };

            // --- AYUDANTES DE VISTA ---
            const getNombreFinanciera = (idFin) => {
                const fin = financieras.find(f => String(f.id_financiera).trim() === String(idFin).trim());
                return fin ? fin.nombre_financiera : idFin;
            };

            // 🌟 LÓGICA DE CRUCE (IGUAL QUE EN TU HISTORIAL DE INDEX.HTML)
            const getNombreTienda = (idCli) => {
                const cli = clientes.find(c => String(c.id_cliente).trim() === String(idCli).trim());
                return cli ? cli.nombre_cliente : 'Aliado / Tienda no encontrada';
            };

            const getDatosBancarios = (idCli) => {
                const cli = clientes.find(c => String(c.id_cliente).trim() === String(idCli).trim());
                if (!cli) return null;
                
                const banco = cli.banco || cli.Banco || '';
                const tipo = cli.tipo_cuenta || cli.Tipo_Cuenta || '';
                const cuenta = cli.cuenta_bancaria || cli.Cuenta_Bancaria || '';
                const nit = cli.cedula_nit || cli.Cedula_Nit || '';
                const nombreComercio = cli.nombre_comercio || cli.Nombre_Comercio || cli.nombre_cliente;

                if (!banco && !cuenta) return null;

                return { 
                    titular: nombreComercio, 
                    nit: nit, 
                    banco: banco, 
                    tipo: tipo, 
                    cuenta: cuenta,
                    nombre_tienda: cli.nombre_cliente 
                };
            };

            // --- DATOS FILTRADOS EN TABLA ---
            const filteredData = useMemo(() => {
                if (!searchTerm) return simulaciones;
                const lowerSearch = searchTerm.toLowerCase();
                return simulaciones.filter(row => {
                    const nombreTienda = getNombreTienda(row.id_cliente);
                    return (
                        String(row.nombre || row.Nombre || '').toLowerCase().includes(lowerSearch) ||
                        String(row.cc || row.CC || '').includes(lowerSearch) ||
                        nombreTienda.toLowerCase().includes(lowerSearch) ||
                        String(getNombreFinanciera(row.id_financiera)).toLowerCase().includes(lowerSearch)
                    );
                });
            }, [simulaciones, searchTerm, financieras, clientes]);

            // --- ACCIÓN: DESEMBOLSAR ---
            const openConfirmModal = (row) => {
                setConfirmModal({ show: true, row });
            };

            const executeDesembolso = async () => {
                if (!confirmModal.row) return;
                setIsSaving(true);
                
                try {
                    const rowId = confirmModal.row.id_simulacion || confirmModal.row.id || confirmModal.row.cc;
                    
                    const payload = {
                        id_simulacion: rowId,
                        cc: confirmModal.row.cc || confirmModal.row.CC,
                        estado: 'Desembolsado'
                    };

                    const separator = API_URL.includes('?') ? '&' : '?';
                    const fetchUrl = `${API_URL}${separator}action=actualizarEstadoSimulacion&data=${encodeURIComponent(JSON.stringify(payload))}`;
                    
                    const response = await fetch(fetchUrl, {
                        method: 'GET',
                        mode: 'cors'
                    });
                    
                    if (!response.ok) throw new Error("Fallo en la comunicación con el servidor");
                    
                    const resJson = await response.json();
                    if (resJson.status === 'error') throw new Error(resJson.message);

                    // Si tuvo éxito, quitamos la fila de la vista
                    setSimulaciones(prev => prev.filter(s => (s.id_simulacion || s.id || s.cc) !== rowId));
                    showToast("Dinero dispersado y estado actualizado correctamente", "success");
                    setConfirmModal({ show: false, row: null });
                    
                } catch (error) {
                    showToast(error.message, "error");
                } finally {
                    setIsSaving(false);
                }
            };

            // ==========================================
            // VISTA 1: LOGIN (PANTALLA DE ACCESO)
            // ==========================================
            if (!isAuthenticated) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 relative overflow-hidden bg-gradient-to-br from-[#1e3a6d] to-[#2C4C8C]">
                        {/* Decoración de fondo */}
                        <div className="absolute top-0 left-0 w-full h-full overflow-hidden z-0 pointer-events-none">
                            <div className="absolute -top-40 -right-40 w-96 h-96 bg-white opacity-5 rounded-full blur-3xl"></div>
                            <div className="absolute top-40 -left-20 w-72 h-72 bg-emerald-400 opacity-10 rounded-full blur-3xl"></div>
                        </div>
                        
                        <Toast show={toast.show} message={toast.message} type={toast.type} onClose={() => setToast(prev => ({ ...prev, show: false }))} />

                        <div className="bg-white w-full max-w-md rounded-[24px] shadow-2xl overflow-hidden relative z-10 animate-in fade-in zoom-in duration-300">
                            <div className="pt-10 pb-6 px-8 text-center flex flex-col items-center">
                                <img src="https://raw.githubusercontent.com/TECNOMARIN/MULTIMARCAS/main/SOLUCIONES%20PNG.png" alt="Logo" className="h-20 object-contain mb-6 drop-shadow-sm" />
                                
                                <div className="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mb-4 shadow-inner ring-4 ring-emerald-50">
                                    <Icon name="Wallet" size={32} />
                                </div>
                                <h2 className="text-2xl font-black text-[#1e3a6d] tracking-tight">Tesorería y Caja</h2>
                                <p className="text-sm font-bold text-emerald-600 mt-1 uppercase tracking-widest">Acceso Restringido</p>
                            </div>

                            <form onSubmit={handleLogin} className="px-8 pb-10 space-y-5">
                                <div>
                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2 px-1">Usuario Administrador</label>
                                    <div className="relative">
                                        <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
                                            <Icon name="Store" size={18} />
                                        </div>
                                        <input 
                                            type="text" 
                                            value={loginData.username}
                                            onChange={e => setLoginData({...loginData, username: e.target.value})}
                                            className="w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none text-sm font-bold text-slate-700 transition-all placeholder:text-slate-300"
                                            placeholder="Nombre del Administrador"
                                            required
                                        />
                                    </div>
                                </div>
                                <div>
                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2 px-1">Contraseña</label>
                                    <div className="relative">
                                        <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
                                            <Icon name="Key" size={18} />
                                        </div>
                                        <input 
                                            type="password" 
                                            value={loginData.password}
                                            onChange={e => setLoginData({...loginData, password: e.target.value})}
                                            className="w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none text-sm font-bold text-slate-700 transition-all placeholder:text-slate-300"
                                            placeholder="••••••••"
                                            required
                                        />
                                    </div>
                                </div>
                                <button 
                                    type="submit" 
                                    disabled={loginLoading}
                                    className="w-full py-4 mt-2 bg-gradient-to-r from-emerald-500 to-emerald-600 text-white rounded-xl font-black text-sm tracking-widest uppercase hover:from-emerald-600 hover:to-emerald-700 transition-all shadow-lg hover:shadow-emerald-500/30 flex items-center justify-center gap-2 disabled:opacity-70 disabled:cursor-not-allowed"
                                >
                                    {loginLoading ? <><Icon name="RefreshCw" className="animate-spin" size={18}/> Conectando...</> : <><Icon name="LogIn" size={18}/> Ingresar a Caja</>}
                                </button>
                            </form>
                            
                            <div className="bg-slate-50 p-4 text-center border-t border-slate-100">
                                <a href="index.html" className="text-[10px] font-bold text-slate-400 hover:text-[#1e3a6d] uppercase tracking-widest transition-colors flex items-center justify-center gap-1.5">
                                    <Icon name="ArrowLeft" size={12}/> Volver a la App Principal
                                </a>
                            </div>
                        </div>
                    </div>
                );
            }

            // ==========================================
            // VISTA 2: DASHBOARD DE TESORERÍA (LISTADO)
            // ==========================================
            return (
                <div className="flex-1 flex flex-col h-screen overflow-hidden">
                    <Toast show={toast.show} message={toast.message} type={toast.type} onClose={() => setToast(prev => ({ ...prev, show: false }))} />

                    {/* ENCABEZADO */}
                    <header className="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between shadow-sm shrink-0 z-20">
                        <div className="flex items-center gap-5">
                            <button onClick={handleLogout} className="p-2.5 bg-slate-50 text-slate-400 hover:text-rose-600 hover:bg-rose-50 rounded-full transition-colors border border-slate-200" title="Cerrar Sesión">
                                <Icon name="LogOut" size={20}/>
                            </button>
                            <img src="https://raw.githubusercontent.com/TECNOMARIN/MULTIMARCAS/main/SOLUCIONES%20PNG.png" alt="Logo" className="h-10 object-contain hidden sm:block" />
                            <div className="h-8 w-px bg-slate-200 hidden sm:block"></div>
                            <div>
                                <h1 className="text-xl font-black text-[#1e3a6d] leading-none tracking-tight flex items-center gap-2">
                                    Módulo de Tesorería <span className="bg-emerald-100 text-emerald-700 text-[10px] px-2 py-0.5 rounded uppercase tracking-widest hidden md:inline-block">Activo</span>
                                </h1>
                                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Dispersión de Créditos Aprobados</p>
                            </div>
                        </div>
                        
                        <div className="flex items-center gap-3">
                            <div className="hidden md:flex items-center gap-2 mr-4 text-right">
                                <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Usuario:</span>
                                <span className="text-sm font-black text-[#1e3a6d]">{user?.nombre_cliente}</span>
                            </div>
                            <button 
                                onClick={() => fetchSolicitudesAprobadas()} 
                                disabled={loading} 
                                className="flex items-center gap-2 px-4 py-2 bg-slate-100 text-slate-600 rounded-lg hover:bg-slate-200 transition-colors font-bold text-xs border border-slate-200 disabled:opacity-50"
                            >
                                <Icon name="RefreshCw" size={16} className={loading ? 'animate-spin' : ''} /> <span className="hidden sm:inline">Recargar</span>
                            </button>
                        </div>
                    </header>

                    {/* CONTENIDO PRINCIPAL */}
                    <div className="flex-1 p-4 md:p-6 overflow-y-auto custom-scrollbar bg-slate-50">
                        <div className="max-w-7xl mx-auto space-y-6">
                            
                            {/* BARRA DE HERRAMIENTAS */}
                            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-white p-4 rounded-2xl border border-slate-200 shadow-sm">
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 bg-emerald-100 rounded-xl flex items-center justify-center text-emerald-600">
                                        <Icon name="FileText" size={20} />
                                    </div>
                                    <div>
                                        <h2 className="font-black text-slate-800">Cola de Pagos Pendientes</h2>
                                        <p className="text-xs text-slate-500 font-medium">Tienes <strong className="text-emerald-600">{simulaciones.length}</strong> solicitudes listas para dispersar.</p>
                                    </div>
                                </div>
                                <div className="relative w-full sm:w-72">
                                    <input 
                                        type="text" 
                                        placeholder="Buscar por cédula o nombre..." 
                                        value={searchTerm} 
                                        onChange={e => setSearchTerm(e.target.value)} 
                                        className="w-full bg-slate-50 border border-slate-200 py-2.5 pl-10 pr-4 rounded-xl text-sm outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white font-medium transition-all"
                                    />
                                    <Icon name="Search" size={18} className="text-slate-400 absolute left-3 top-1/2 -translate-y-1/2 pointer-events-none"/>
                                </div>
                            </div>

                            {/* TABLA DE PAGOS */}
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                {loading && simulaciones.length === 0 ? (
                                    <div className="py-24 flex flex-col items-center justify-center text-slate-400">
                                        <Icon name="RefreshCw" size={40} className="animate-spin text-emerald-500 mb-4" />
                                        <p className="font-bold text-lg">Buscando solicitudes aprobadas...</p>
                                    </div>
                                ) : filteredData.length > 0 ? (
                                    <div className="overflow-x-auto custom-scrollbar">
                                        <table className="w-full text-left whitespace-nowrap">
                                            <thead className="bg-slate-800 text-white text-[10px] uppercase tracking-widest">
                                                <tr>
                                                    <th className="px-5 py-4 font-bold rounded-tl-xl">Expediente (Cliente y Tienda)</th>
                                                    <th className="px-5 py-4 font-bold text-center border-l border-slate-700">Entidad</th>
                                                    <th className="px-5 py-4 font-bold border-l border-slate-700">Datos Bancarios del Aliado</th>
                                                    <th className="px-5 py-4 font-black text-right text-emerald-400 border-l border-slate-700">Valor a Dispersar</th>
                                                    <th className="px-5 py-4 font-bold text-center border-l border-slate-700 rounded-tr-xl">Acción</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100 text-sm">
                                                {filteredData.map((row, idx) => {
                                                    // Extraer datos bancarios cruzando el id del aliado creador
                                                    const bankData = getDatosBancarios(row.id_cliente);
                                                    
                                                    // 🎯 EXTRACCIÓN CORRECTA: Nombre Cliente y Nombre Tienda
                                                    const nombreTienda = getNombreTienda(row.id_cliente);
                                                    const nombreClienteFinal = row.nombre || row.Nombre || 'Desconocido';
                                                    const cedulaClienteFinal = row.cc || row.CC || '-';
                                                    
                                                    return (
                                                        <tr key={idx} className="hover:bg-slate-50/50 transition-colors group">
                                                            {/* EXPEDIENTE */}
                                                            <td className="px-5 py-4 align-top">
                                                                <div className="flex flex-col gap-1.5">
                                                                    <div className="flex items-center gap-1.5 mb-1">
                                                                        <span className="inline-flex items-center gap-1 text-[10px] font-black text-indigo-600 uppercase tracking-widest bg-indigo-50 border border-indigo-100 px-2 py-0.5 rounded-md shadow-sm" title="Tienda que originó la venta">
                                                                            <Icon name="Store" size={12} /> {nombreTienda}
                                                                        </span>
                                                                    </div>
                                                                    <div className="font-black text-slate-800 leading-tight text-base">{nombreClienteFinal}</div>
                                                                    <div className="flex items-center gap-2">
                                                                        <span className="text-[10px] font-mono font-bold text-slate-500 bg-slate-100 px-1.5 py-0.5 rounded border border-slate-200">C.C. {cedulaClienteFinal}</span>
                                                                        <span className="text-[10px] text-slate-400 font-medium">{parseDate(row.fecha || row.Fecha)}</span>
                                                                    </div>
                                                                </div>
                                                            </td>
                                                            
                                                            {/* ENTIDAD */}
                                                            <td className="px-5 py-4 align-top text-center border-l border-slate-100">
                                                                <span className="inline-flex items-center justify-center bg-indigo-50 text-indigo-700 border border-indigo-200 px-2.5 py-1 rounded-md text-[10px] font-black tracking-widest shadow-sm mt-1">
                                                                    {getNombreFinanciera(row.id_financiera)}
                                                                </span>
                                                            </td>

                                                            {/* DATOS BANCARIOS */}
                                                            <td className="px-5 py-4 align-top border-l border-slate-100">
                                                                {bankData ? (
                                                                    <div className="flex flex-col gap-1.5 bg-slate-50 border border-slate-200 rounded-lg p-2.5">
                                                                        <div className="flex justify-between items-center gap-4">
                                                                            <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Titular</span>
                                                                            <span className="font-bold text-slate-800 text-xs truncate max-w-[200px]" title={bankData.titular}>{bankData.titular}</span>
                                                                        </div>
                                                                        <div className="flex justify-between items-center gap-4">
                                                                            <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">C.C. / NIT</span>
                                                                            <span className="font-mono font-bold text-slate-600 text-xs">{bankData.nit || 'No registra'}</span>
                                                                        </div>
                                                                        <div className="h-px bg-slate-200 my-0.5 w-full"></div>
                                                                        <div className="flex justify-between items-center">
                                                                            <div className="flex flex-col">
                                                                                <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">{bankData.banco}</span>
                                                                                <span className="text-[9px] font-bold text-slate-500 uppercase">{bankData.tipo}</span>
                                                                            </div>
                                                                            <span className="font-black text-[#1e3a6d] tracking-wider bg-white px-2 py-1 rounded border border-slate-200 shadow-sm text-sm">{bankData.cuenta}</span>
                                                                        </div>
                                                                    </div>
                                                                ) : (
                                                                    <div className="bg-orange-50 border border-orange-200 rounded-lg p-3 flex flex-col items-center justify-center text-orange-600 h-full mt-1">
                                                                        <Icon name="AlertCircle" size={16} className="mb-1" />
                                                                        <span className="text-[10px] font-bold uppercase tracking-widest text-center">Sin Datos<br/>Bancarios</span>
                                                                    </div>
                                                                )}
                                                            </td>

                                                            {/* MONTO A DISPERSAR */}
                                                            <td className="px-5 py-4 align-middle text-right border-l border-slate-100 bg-emerald-50/30">
                                                                <div className="text-2xl font-black text-emerald-600 tracking-tight">
                                                                    {formatCurrency(row.valor_a_consignar || row.total_credito)}
                                                                </div>
                                                            </td>

                                                            {/* ACCIÓN */}
                                                            <td className="px-5 py-4 align-middle text-center border-l border-slate-100">
                                                                <button 
                                                                    onClick={() => openConfirmModal(row)}
                                                                    className="w-full px-4 py-3 bg-emerald-500 text-white rounded-xl font-black text-xs uppercase tracking-widest shadow-md hover:bg-emerald-600 hover:shadow-lg hover:-translate-y-0.5 transition-all flex items-center justify-center gap-2"
                                                                >
                                                                    <Icon name="Send" size={16} /> Desembolsar
                                                                </button>
                                                            </td>
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                ) : (
                                    <div className="py-24 flex flex-col items-center justify-center text-slate-400">
                                        <div className="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center mb-4 border border-slate-100">
                                            <Icon name="CheckCircle" size={32} className="text-slate-300" />
                                        </div>
                                        <p className="font-bold text-xl text-slate-500">Bandeja Vacía</p>
                                        <p className="text-sm mt-1">No hay solicitudes aprobadas pendientes por pagar.</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>

                    {/* MODAL DE CONFIRMACIÓN */}
                    {confirmModal.show && confirmModal.row && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center bg-slate-900/70 p-4 backdrop-blur-sm animate-in fade-in duration-200">
                             <div className="bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden flex flex-col animate-pop-in">
                                <div className="p-6 bg-emerald-500 text-white text-center relative">
                                    <button onClick={() => !isSaving && setConfirmModal({ show: false, row: null })} className="absolute top-4 right-4 p-1.5 bg-black/10 hover:bg-black/20 rounded-full transition-colors">
                                        <Icon name="X" size={18} />
                                    </button>
                                    <div className="w-16 h-16 bg-white text-emerald-500 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg">
                                        <Icon name="Landmark" size={32} />
                                    </div>
                                    <h3 className="font-black text-2xl tracking-tight">Confirmar Desembolso</h3>
                                    <p className="text-emerald-100 font-medium text-sm mt-1">Esta acción actualizará la base de datos.</p>
                                </div>
                                
                                <div className="p-8 bg-slate-50 space-y-4">
                                    <div className="text-center">
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Valor Transferido</p>
                                        <p className="text-4xl font-black text-slate-800">{formatCurrency(confirmModal.row.valor_a_consignar || confirmModal.row.total_credito)}</p>
                                    </div>
                                    
                                    <div className="bg-white border border-slate-200 rounded-2xl p-4 shadow-sm mt-4">
                                        <div className="flex justify-between items-center border-b border-slate-100 pb-2 mb-2">
                                            <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Tienda Aliada</span>
                                            <span className="font-black text-indigo-600 text-xs uppercase truncate max-w-[200px]" title="A quien se le envió el dinero">
                                                {getNombreTienda(confirmModal.row.id_cliente)}
                                            </span>
                                        </div>
                                        <div className="flex justify-between items-center border-b border-slate-100 pb-2 mb-2">
                                            <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Cliente Final</span>
                                            <span className="font-bold text-slate-700 text-sm truncate max-w-[200px]">{confirmModal.row.nombre || confirmModal.row.Nombre}</span>
                                        </div>
                                        <div className="flex justify-between items-center">
                                            <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Cédula</span>
                                            <span className="font-mono font-bold text-slate-600 text-xs">{confirmModal.row.cc || confirmModal.row.CC}</span>
                                        </div>
                                    </div>
                                    
                                    <p className="text-xs text-slate-500 text-center px-4 pt-2">
                                        Al presionar aceptar, esta solicitud pasará a estado <strong className="text-emerald-600">Desembolsado</strong> y saldrá de esta bandeja.
                                    </p>
                                </div>
                                
                                <div className="p-6 bg-white border-t border-slate-100 flex gap-3">
                                    <button 
                                        onClick={() => setConfirmModal({ show: false, row: null })} 
                                        disabled={isSaving}
                                        className="flex-1 py-3.5 bg-slate-100 text-slate-600 font-bold rounded-xl hover:bg-slate-200 transition-colors disabled:opacity-50 text-sm"
                                    >
                                        Cancelar
                                    </button>
                                    <button 
                                        onClick={executeDesembolso}
                                        disabled={isSaving}
                                        className="flex-[2] py-3.5 bg-emerald-500 text-white font-black rounded-xl hover:bg-emerald-600 shadow-md hover:shadow-lg transition-all flex items-center justify-center gap-2 disabled:opacity-50 text-sm uppercase tracking-wide"
                                    >
                                        {isSaving ? <><Icon name="RefreshCw" size={18} className="animate-spin" /> Procesando...</> : <><Icon name="CheckCircle" size={18} /> Sí, Dinero Enviado</>}
                                    </button>
                                </div>
                             </div>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TesoreriaApp />);
    </script>
</body>
</html>
