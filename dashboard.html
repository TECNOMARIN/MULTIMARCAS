</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo } = React;

        const IconBase = ({ children, className, ...props }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>{children}</svg>
        );

        const Icons = {
            AlertCircle: (p) => <IconBase {...p}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></IconBase>,
            CheckCircle: (p) => <IconBase {...p}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></IconBase>,
            CreditCard: (p) => <IconBase {...p}><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></IconBase>,
            Search: (p) => <IconBase {...p}><circle cx="11" cy="11" r="8"/><line x1="21" x2="16.65" y1="21" y2="16.65"/></IconBase>,
            RefreshCw: (p) => <IconBase {...p}><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></IconBase>,
            FileText: (p) => <IconBase {...p}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></IconBase>,
            XCircle: (p) => <IconBase {...p}><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></IconBase>,
            HelpCircle: (p) => <IconBase {...p}><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></IconBase>,
            BellRing: (p) => <IconBase {...p}><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></IconBase>,
            Filter: (p) => <IconBase {...p}><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></IconBase>,
            User: (p) => <IconBase {...p}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></IconBase>,
            Users: (p) => <IconBase {...p}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></IconBase>,
            TrendingDown: (p) => <IconBase {...p}><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></IconBase>,
            DollarSign: (p) => <IconBase {...p}><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></IconBase>,
            X: (p) => <IconBase {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></IconBase>,
            Target: (p) => <IconBase {...p}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></IconBase>,
            Handshake: (p) => <IconBase {...p}><path d="m11 17 2 2a1 1 0 1 0 3-3"/><path d="m14 14 2.5 2.5a1 1 0 1 0 3-3l-3.88-3.88a3 3 0 0 0-4.24 0l-.88.88a1 1 0 1 1-1.42-1.42l4.82-4.82a1 1 0 0 1 1.42 0l2.12 2.12a1 1 0 0 0 1.42 0l1.29-1.29a3 3 0 0 0 0-4.24l-2.12-2.12a3 3 0 0 0-4.24 0l-3.65 3.65a3 3 0 0 0 0 4.24l.88.88a1 1 0 0 1-1.42 1.42l-4.24-4.24a1 1 0 0 0-1.42 0l-2.12 2.12a3 3 0 0 0 0 4.24l2.12 2.12"/><path d="m7 13 2.5 2.5a1 1 0 1 0 3-3l-3.88-3.88a3 3 0 0 0-4.24 0l-.88.88a1 1 0 1 1-1.42-1.42l4.82-4.82a1 1 0 0 1 1.42 0l2.12 2.12a1 1 0 0 0 1.42 0l1.29-1.29a3 3 0 0 0 0-4.24l-2.12-2.12a3 3 0 0 0-4.24 0l-3.65 3.65a3 3 0 0 0 0 4.24l.88.88a1 1 0 0 1-1.42 1.42l-4.24-4.24a1 1 0 0 0-1.42 0l-2.12 2.12a3 3 0 0 0 0 4.24l2.12 2.12"/></IconBase>,
            Smartphone: (p) => <IconBase {...p}><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></IconBase>,
            ShieldAlert: (p) => <IconBase {...p}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></IconBase>,
            AlertTriangle: (p) => <IconBase {...p}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></IconBase>,
            Phone: (p) => <IconBase {...p}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></IconBase>,
            MessageCircle: (p) => <IconBase {...p}><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></IconBase>,
            BarChart4: (p) => <IconBase {...p}><line x1="12" x2="12" y1="20" y2="10"/><line x1="18" x2="18" y1="20" y2="4"/><line x1="6" x2="6" y1="20" y2="16"/></IconBase>,
            Download: (p) => <IconBase {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></IconBase>,
            Edit2: (p) => <IconBase {...p}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></IconBase>,
            ArrowLeft: (p) => <IconBase {...p}><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></IconBase>,
            ArrowRight: (p) => <IconBase {...p}><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 19"/></IconBase>,
            Clock: (p) => <IconBase {...p}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></IconBase>,
            Database: (p) => <IconBase {...p}><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></IconBase>,
            Globe: (p) => <IconBase {...p}><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></IconBase>,
            Calendar: (p) => <IconBase {...p}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></IconBase>
        };

        const API_URL = 'https://script.google.com/macros/s/AKfycbz770i0j3vK5-9M2Z2EheDh9GX2x2j2KbjfFm_yNadBg5db3tEc5so58KWeIX5SwTmAZw/exec';
        const ALL_BRANDS = ['payjoy', 'alocredit', 'krediya', 'credismart'];

        const PORTFOLIO_CONFIG = {
            alocredit: { columns: { assigned: ['asignado', 'responsable', 'gestor', 'cobrador'], seller: ['vendedor', 'asesor'], client: ['cliente', 'nombre', 'nombres', 'nombre cliente'], date: ['fecha venta', 'fecha desembolso', 'fecha creacion', 'fecha'], paymentStatus: ['pagos'], comments: ['comentarios', 'observaciones', 'gestion'], id: ['cedula', 'documento', 'cc', 'nit', 'id'] } },
            krediya: { columns: { assigned: ['asignado', 'responsable', 'gestor', 'cobrador'], seller: ['vendedor', 'asesor'], client: ['cliente', 'nombre', 'nombres', 'nombre cliente'], date: ['fecha venta', 'fecha desembolso', 'fecha creacion', 'fecha'], paymentStatus: ['pagos'], comments: ['comentarios', 'observaciones', 'gestion'], id: ['cedula', 'documento', 'cc', 'nit', 'id'] } },
            payjoy: { columns: { assigned: ['asignado', 'responsable', 'gestor', 'cobrador'], seller: ['vendedor', 'asesor', 'ejecutivo'], client: ['cliente', 'nombre', 'nombres', 'nombre cliente'], date: ['fecha venta', 'fecha desembolso', 'fecha'], paymentStatus: ['pagos'], comments: ['comentarios', 'notas', 'gestion'], id: ['cedula', 'documento', 'cc', 'nit', 'id'] } },
            credismart: { columns: { assigned: ['asignado', 'responsable', 'gestor', 'cobrador'], seller: ['vendedor', 'asesor', 'ejecutivo'], client: ['cliente', 'nombre', 'nombres', 'nombre cliente'], date: ['fecha venta', 'fecha desembolso', 'fecha'], paymentStatus: ['pagos'], comments: ['comentarios', 'notas', 'gestion'], id: ['cedula', 'documento', 'cc', 'nit', 'id'] } }
        };

        function Dashboard() {
            const [globalLoading, setGlobalLoading] = useState(true);
            const [globalData, setGlobalData] = useState([]);
            const [globalDateFilter, setGlobalDateFilter] = useState('thisMonth');
            const [customStartDate, setCustomStartDate] = useState('');
            const [customEndDate, setCustomEndDate] = useState('');
            
            const [showTopRepsModal, setShowTopRepsModal] = useState(false);
            const [showLoansByRepModal, setShowLoansByRepModal] = useState(false);
            const [selectedLoanRep, setSelectedLoanRep] = useState('');

            const parseDate = (dateVal) => {
                if (!dateVal) return null;
                let dateObj = null;
                if (typeof dateVal === 'string' && dateVal.length > 5) dateObj = new Date(dateVal);
                else if (dateVal instanceof Date) dateObj = dateVal;
                if (!dateObj || isNaN(dateObj.getTime())) return null;
                return dateObj;
            };

            const findConfigColumn = (possibleNames, headersList) => {
                if (!possibleNames || !headersList) return null;
                for (const name of possibleNames) {
                    const found = headersList.find(h => h.toLowerCase().includes(name));
                    if (found) return found;
                }
                return null;
            };

            const findColumnName = (keyword1, keyword2, headersList) => {
                if (!headersList) return null;
                return headersList.find(h => {
                    const lower = String(h).toLowerCase();
                    return lower.includes(keyword1) && (keyword2 ? lower.includes(keyword2) : true);
                });
            };

            const parseAmount = (val) => {
                let s = String(val || '').replace(/[^0-9.,]/g, '').replace(/[.,]00$/, '').replace(/[.,]/g, '');
                return parseInt(s, 10) || 0;
            };

            const fetchGlobalData = useCallback(async () => {
                setGlobalLoading(true);
                try {
                    const fetchPromises = ALL_BRANDS.map(async (b) => {
                        const separator = API_URL.includes('?') ? '&' : '?';
                        const res = await fetch(`${API_URL}${separator}type=${b}&t=${new Date().getTime()}`);
                        if(!res.ok) return [];
                        const text = await res.text();
                        let jsonData = [];
                        try { jsonData = JSON.parse(text); } catch(e) { return []; }
                        if (!Array.isArray(jsonData) || jsonData.length === 0) return [];
                        
                        const keys = Object.keys(jsonData[0]);
                        const bConfig = PORTFOLIO_CONFIG[b];
                        
                        return jsonData.map(row => {
                            const dateCol = findConfigColumn(bConfig.columns.date, keys);
                            const assignedCol = findConfigColumn(bConfig.columns.assigned, keys) || findConfigColumn(bConfig.columns.seller, keys);
                            const clientCol = findConfigColumn(bConfig.columns.client, keys);
                            const idCol = findConfigColumn(bConfig.columns.id, keys);
                            const amountCol = keys.find(h => String(h).toLowerCase().includes('valor cuota') || String(h).toLowerCase() === 'cuota');
                            const commentsCol = findConfigColumn(bConfig.columns.comments, keys);
                            
                            let statusCol = findColumnName(bConfig.columns.paymentStatus, 'primera', keys) || findColumnName(bConfig.columns.paymentStatus, '', keys);
                            let rawStatus = statusCol ? String(row[statusCol]).toLowerCase().trim() : '';
                            let isPrestamo = rawStatus.includes('pago con gestion') || rawStatus.includes('pago con gestión');
                            
                            let rawDate = dateCol ? row[dateCol] : null;
                            let parsedDate = parseDate(rawDate);

                            // Extraer fecha de pago de la columna comentarios usando Regex \[DD/MM\]
                            let paymentDate = null;
                            if (commentsCol && row[commentsCol]) {
                                const rawComments = String(row[commentsCol]);
                                const match = rawComments.match(/\[(\d{1,2})\/(\d{1,2})\]/);
                                if (match) {
                                    const day = parseInt(match[1], 10);
                                    const month = parseInt(match[2], 10) - 1; // Meses en JS son 0-11
                                    const year = parsedDate ? parsedDate.getFullYear() : new Date().getFullYear();
                                    paymentDate = new Date(year, month, day);
                                }
                            }

                            return {
                                _brand: b.toUpperCase(),
                                _salesDate: parsedDate, // Para filtrar ventas
                                _paymentDate: paymentDate || parsedDate, // Para filtrar cartera (Fallback a fecha de venta si no hay regex)
                                _assigned: assignedCol && row[assignedCol] ? String(row[assignedCol]).trim().toUpperCase() : 'SIN ASIGNAR',
                                _client: clientCol && row[clientCol] ? String(row[clientCol]).trim() : '-',
                                _id: idCol && row[idCol] ? String(row[idCol]).trim() : '-',
                                _amountNum: amountCol ? parseAmount(row[amountCol]) : 0,
                                _isLoan: isPrestamo
                            };
                        });
                    });
                    
                    const results = await Promise.all(fetchPromises);
                    const combinedData = results.flat();
                    setGlobalData(combinedData);
                } catch (error) {
                    console.error("Error global fetch:", error);
                    alert("Hubo un error al intentar consolidar las 4 financieras.");
                } finally {
                    setGlobalLoading(false);
                }
            }, []);

            useEffect(() => {
                fetchGlobalData();
            }, [fetchGlobalData]);

            const getGlobalDateRange = useCallback(() => {
                const now = new Date();
                now.setHours(0,0,0,0);
                if (globalDateFilter === 'thisWeek') {
                    const currentDay = now.getDay();
                    const distanceToMonday = (currentDay === 0 ? 6 : currentDay - 1);
                    const start = new Date(now);
                    start.setDate(now.getDate() - distanceToMonday);
                    const end = new Date(start);
                    end.setDate(start.getDate() + 6);
                    end.setHours(23,59,59,999);
                    return { start, end };
                }
                if (globalDateFilter === 'thisMonth') {
                    return { start: new Date(now.getFullYear(), now.getMonth(), 1), end: new Date(now.getFullYear(), now.getMonth() + 1, 0, 23, 59, 59, 999) };
                }
                if (globalDateFilter === 'lastMonth') {
                    return { start: new Date(now.getFullYear(), now.getMonth() - 1, 1), end: new Date(now.getFullYear(), now.getMonth(), 0, 23, 59, 59, 999) };
                }
                if (globalDateFilter === 'custom' && customStartDate && customEndDate) {
                    const start = new Date(customStartDate + 'T00:00:00');
                    const end = new Date(customEndDate + 'T23:59:59');
                    return { start, end };
                }
                return { start: new Date(2000, 0, 1), end: new Date(2100, 0, 1) }; // All
            }, [globalDateFilter, customStartDate, customEndDate]);

            // Datos Filtrados Exclusivamente por Fecha de Venta (Para KPIs de Ventas)
            const filteredSalesData = useMemo(() => {
                if(!globalData.length) return [];
                const range = getGlobalDateRange();
                return globalData.filter(row => {
                    if(!row._salesDate) return false;
                    return row._salesDate >= range.start && row._salesDate <= range.end;
                });
            }, [globalData, getGlobalDateRange]);

            // Datos Filtrados Exclusivamente por Fecha de Pago/Gestión (Para KPIs de Cartera/Caja)
            const filteredLoansData = useMemo(() => {
                if(!globalData.length) return [];
                const range = getGlobalDateRange();
                return globalData.filter(row => {
                    if(!row._paymentDate || !row._isLoan) return false;
                    return row._paymentDate >= range.start && row._paymentDate <= range.end;
                });
            }, [globalData, getGlobalDateRange]);

            const globalKpis = useMemo(() => {
                // KPIs de VENTAS (Basados en filteredSalesData)
                let sales = filteredSalesData.length;
                let brands = { PAYJOY: 0, ALOCREDIT: 0, KREDIYA: 0, CREDISMART: 0 };
                let repCount = {};
                
                filteredSalesData.forEach(r => {
                    brands[r._brand] = (brands[r._brand] || 0) + 1;
                    let rep = r._assigned;
                    repCount[rep] = (repCount[rep] || 0) + 1;
                });
                
                let topRep = { name: '-', count: 0 };
                Object.keys(repCount).forEach(k => {
                    if(repCount[k] > topRep.count && k !== 'SIN ASIGNAR') {
                        topRep = { name: k, count: repCount[k] };
                    }
                });

                let allReps = Object.keys(repCount)
                    .map(k => ({ name: k, count: repCount[k] }))
                    .sort((a, b) => b.count - a.count);

                // KPIs de CARTERA (Basados en filteredLoansData)
                let totalCaja = 0;
                let loansRepCount = {};
                filteredLoansData.forEach(r => {
                    totalCaja += r._amountNum;
                    let rep = r._assigned;
                    loansRepCount[rep] = (loansRepCount[rep] || 0) + r._amountNum;
                });

                let allLoansReps = Object.keys(loansRepCount)
                    .map(k => ({ name: k, amount: loansRepCount[k] }))
                    .sort((a, b) => b.amount - a.amount);
                
                return { sales, brands, totalCaja, topRep, allReps, allLoansReps };
            }, [filteredSalesData, filteredLoansData]);

            // LISTA DE ASESORES CON PRÉSTAMOS PARA EL FILTRO
            const uniqueLoanReps = useMemo(() => {
                const reps = new Set(filteredLoansData.map(r => r._assigned));
                return Array.from(reps).sort();
            }, [filteredLoansData]);

            // DATOS FILTRADOS POR RESPONSABLE PARA LA TABLA
            const displayedLoansData = useMemo(() => {
                if (!selectedLoanRep) return filteredLoansData;
                return filteredLoansData.filter(r => r._assigned === selectedLoanRep);
            }, [filteredLoansData, selectedLoanRep]);

            const handleExportGlobalXLSX = () => {
                const loans = displayedLoansData;
                if(loans.length === 0) return alert("No hay préstamos para exportar en este periodo.");
                
                const exportData = loans.map(row => ({
                    "Responsable / Asignado": row._assigned,
                    "Financiera": row._brand,
                    "Cédula": row._id,
                    "Nombre Cliente": row._client,
                    "Fecha Venta": row._salesDate ? row._salesDate.toLocaleDateString('es-ES') : '',
                    "Fecha Pago / Gestión": row._paymentDate ? row._paymentDate.toLocaleDateString('es-ES') : '',
                    "Valor Prestado": row._amountNum
                }));
                
                const worksheet = window.XLSX.utils.json_to_sheet(exportData);
                const workbook = window.XLSX.utils.book_new();
                window.XLSX.utils.book_append_sheet(workbook, worksheet, "Prestamos");
                window.XLSX.writeFile(workbook, `Caja_Consolidada_${new Date().toISOString().slice(0,10)}.xlsx`);
            };

            const handleExportGlobalPDF = () => {
                const loans = displayedLoansData;
                if(loans.length === 0) return alert("No hay préstamos para exportar en este periodo.");

                const { jsPDF } = window.jspdf;
                const doc = new jsPDF('landscape');
                const tableColumn = ["Responsable / Asignado", "Financiera", "Cédula", "Nombre Cliente", "Fecha Venta", "Fecha Pago", "Valor Prestado"];
                const tableRows = [];
                
                loans.forEach(r => {
                    const salesDateStr = r._salesDate ? r._salesDate.toLocaleDateString('es-ES') : '';
                    const paymentDateStr = r._paymentDate ? r._paymentDate.toLocaleDateString('es-ES') : '';
                    tableRows.push([r._assigned, r._brand, r._id, r._client, salesDateStr, paymentDateStr, new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', minimumFractionDigits: 0 }).format(r._amountNum)]);
                });
                
                doc.setFontSize(16);
                doc.text(`Consolidado de Préstamos (Caja) - Multi-Marca`, 14, 15);
                doc.setFontSize(10);
                doc.text(`Periodo Generado: ${new Date().toLocaleDateString()} | Total Préstamos: ${loans.length}`, 14, 22);
                
                let currentTotal = loans.reduce((acc, row) => acc + row._amountNum, 0);
                
                doc.setFont(undefined, 'bold');
                doc.text(`Capital Total Prestado en el reporte: ${new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', minimumFractionDigits: 0 }).format(currentTotal)}`, 14, 28);
                doc.setFont(undefined, 'normal');
                
                doc.autoTable({
                    head: [tableColumn],
                    body: tableRows,
                    startY: 33,
                    theme: 'grid',
                    headStyles: { fillColor: [15, 23, 42] }, 
                    styles: { fontSize: 8 },
                    didParseCell: function(data) {
                        if (data.section === 'body' && data.column.index === 1) { 
                            const val = data.cell.raw;
                            if(val === 'PAYJOY') data.cell.styles.textColor = [37, 99, 235]; 
                            else if(val === 'ALOCREDIT') data.cell.styles.textColor = [79, 70, 229]; 
                            else if(val === 'KREDIYA') data.cell.styles.textColor = [16, 185, 129]; 
                            else if(val === 'CREDISMART') data.cell.styles.textColor = [225, 29, 72]; 
                        }
                    }
                });
                doc.save(`Caja_Consolidada_MultiMarca_${new Date().toISOString().slice(0,10)}.pdf`);
            };

            return (
                <div className="max-w-7xl mx-auto p-4 md:p-8 space-y-6">
                    {/* Header del Dashboard Global */}
                    <div className="bg-white px-6 py-6 rounded-3xl shadow-sm border border-slate-200 flex flex-col lg:flex-row justify-between items-start lg:items-center gap-6">
                        <div className="flex items-center gap-5">
                            <button onClick={() => window.location.href = 'index.html'} className="p-3 bg-slate-50 text-slate-500 hover:text-indigo-600 hover:bg-indigo-50 rounded-full transition-all shadow-sm border border-slate-200" title="Volver al Inicio">
                                <Icons.ArrowLeft className="w-5 h-5"/>
                            </button>
                            <div className="p-3 bg-gradient-to-br from-amber-400 to-orange-500 text-white rounded-2xl shadow-md hidden sm:block">
                                <Icons.Globe className="w-8 h-8" />
                            </div>
                            <div>
                                <h2 className="text-2xl lg:text-3xl font-black text-slate-800 tracking-tight">Visión Global Multi-Marca</h2>
                                <p className="text-sm font-medium text-slate-500 mt-1">Consolidado general de ventas y caja de préstamos en tiempo real</p>
                            </div>
                        </div>
                        
                        <div className="flex flex-wrap items-center gap-4 w-full lg:w-auto">
                            <div className="flex items-center bg-slate-100 rounded-full p-1.5 border border-slate-200 w-full lg:w-auto">
                                <div className="relative w-full">
                                    <Icons.Calendar className="w-5 h-5 text-slate-500 absolute left-4 top-1/2 -translate-y-1/2 pointer-events-none" />
                                    <select 
                                        value={globalDateFilter} 
                                        onChange={(e) => setGlobalDateFilter(e.target.value)}
                                        className="appearance-none w-full bg-transparent pl-11 pr-10 py-2.5 text-sm font-bold text-slate-700 outline-none cursor-pointer"
                                    >
                                        <option value="thisWeek">Esta Semana</option>
                                        <option value="thisMonth">Este Mes</option>
                                        <option value="lastMonth">Mes Anterior</option>
                                        <option value="custom">Personalizado</option>
                                        <option value="all">Histórico (Todo)</option>
                                    </select>
                                    <Icons.Filter className="w-4 h-4 text-slate-400 absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none" />
                                </div>
                            </div>
                            <button onClick={fetchGlobalData} disabled={globalLoading} className="p-3 bg-slate-100 text-slate-500 hover:text-indigo-600 hover:bg-indigo-50 rounded-full transition-all shadow-sm disabled:opacity-50" title="Recargar datos">
                                <Icons.RefreshCw className={`w-5 h-5 ${globalLoading ? 'animate-spin text-indigo-600' : ''}`} />
                            </button>
                        </div>
                    </div>

                    {/* Filtro Personalizado */}
                    {globalDateFilter === 'custom' && (
                        <div className="bg-indigo-50 px-6 py-4 rounded-2xl border border-indigo-100 flex flex-wrap gap-4 items-center">
                            <span className="text-sm font-black text-indigo-800 uppercase tracking-widest">Rango Personalizado:</span>
                            <input type="date" value={customStartDate} onChange={e=>setCustomStartDate(e.target.value)} className="text-sm font-bold text-slate-700 px-4 py-2 rounded-xl border border-indigo-200 outline-none focus:ring-2 focus:ring-indigo-500 shadow-sm" />
                            <span className="text-indigo-400 font-bold">hasta</span>
                            <input type="date" value={customEndDate} onChange={e=>setCustomEndDate(e.target.value)} className="text-sm font-bold text-slate-700 px-4 py-2 rounded-xl border border-indigo-200 outline-none focus:ring-2 focus:ring-indigo-500 shadow-sm" />
                        </div>
                    )}

                    {globalLoading ? (
                        <div className="flex flex-col items-center justify-center py-32 text-slate-400 space-y-4 bg-white rounded-3xl border border-slate-200 shadow-sm">
                            <Icons.RefreshCw className="w-14 h-14 animate-spin text-amber-500" />
                            <p className="font-bold text-xl text-slate-600">Consolidando las 4 financieras...</p>
                            <p className="text-sm">Esto puede tomar unos segundos, estamos procesando mucha información.</p>
                        </div>
                    ) : (
                        <div className="space-y-6">
                            {/* KPIs Globales */}
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6">
                                <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 flex flex-col justify-center transition-transform hover:-translate-y-1 hover:shadow-md">
                                    <div className="flex justify-between items-start">
                                        <p className="text-xs font-black text-slate-400 uppercase tracking-widest mb-2">Ventas Totales</p>
                                        <span className="text-[9px] bg-slate-100 text-slate-500 px-2 py-1 rounded-md font-bold">Filtro: Fecha Venta</span>
                                    </div>
                                    <div className="flex items-end gap-3">
                                        <span className="text-5xl font-black text-slate-800">{globalKpis.sales}</span>
                                        <span className="text-sm font-bold text-slate-500 mb-1.5">equipos</span>
                                    </div>
                                </div>
                                
                                <div className="bg-gradient-to-br from-slate-900 to-slate-800 p-6 rounded-3xl shadow-sm border border-slate-700 flex flex-col justify-center relative overflow-hidden transition-transform hover:-translate-y-1 hover:shadow-lg">
                                    <div className="absolute right-0 top-0 opacity-10 pointer-events-none">
                                        <Icons.Target className="w-40 h-40 -mt-6 -mr-6" />
                                    </div>
                                    <p className="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">Distribución Marcas</p>
                                    <div className="grid grid-cols-2 gap-x-2 gap-y-4 relative z-10">
                                        <div className="flex items-center gap-2"><div className="w-2.5 h-2.5 rounded-full bg-blue-400 shadow-[0_0_8px_rgba(96,165,250,0.8)]"></div><span className="text-sm font-bold text-white">PJ: {globalKpis.brands.PAYJOY || 0}</span></div>
                                        <div className="flex items-center gap-2"><div className="w-2.5 h-2.5 rounded-full bg-indigo-400 shadow-[0_0_8px_rgba(129,140,248,0.8)]"></div><span className="text-sm font-bold text-white">ALO: {globalKpis.brands.ALOCREDIT || 0}</span></div>
                                        <div className="flex items-center gap-2"><div className="w-2.5 h-2.5 rounded-full bg-emerald-400 shadow-[0_0_8px_rgba(52,211,153,0.8)]"></div><span className="text-sm font-bold text-white">KRE: {globalKpis.brands.KREDIYA || 0}</span></div>
                                        <div className="flex items-center gap-2"><div className="w-2.5 h-2.5 rounded-full bg-rose-400 shadow-[0_0_8px_rgba(251,113,133,0.8)]"></div><span className="text-sm font-bold text-white">CS: {globalKpis.brands.CREDISMART || 0}</span></div>
                                    </div>
                                </div>

                                <div

                                    title="Ver capital prestado por asesor"
                                >
                                    <div className="flex justify-between items-start">
                                        <p className="text-xs font-black text-emerald-600 uppercase tracking-widest mb-2 flex items-center gap-1.5"><Icons.DollarSign className="w-4 h-4"/> Capital Prestado (Caja)</p>
                                        <span className="text-[9px] bg-emerald-100 text-emerald-600 px-2 py-1 rounded-md font-bold group-hover:hidden">Filtro: Fecha Pago</span>
                                        <span className="p-1.5 bg-emerald-200/50 text-emerald-600 rounded-lg hidden group-hover:block transition-opacity"><Icons.Search className="w-3.5 h-3.5"/></span>
                                    </div>
                                    <div className="flex items-end gap-3 mt-1">
                                        <span className="text-3xl lg:text-4xl font-black text-emerald-900 truncate" title={new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', minimumFractionDigits: 0 }).format(globalKpis.totalCaja)}>
                                            {new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', minimumFractionDigits: 0 }).format(globalKpis.totalCaja)}
                                        </span>
                                    </div>
                                </div>

                                <div 
                                    className="bg-amber-50 p-6 rounded-3xl shadow-sm border border-amber-200 flex flex-col justify-center transition-all hover:-translate-y-1 hover:shadow-lg cursor-pointer group"
                                    onClick={() => setShowTopRepsModal(true)}
                                    title="Ver ranking completo de asesores"
                                >
                                    <div className="flex justify-between items-start">
                                        <p className="text-xs font-black text-amber-600 uppercase tracking-widest mb-2 flex items-center gap-1.5"><Icons.Target className="w-4 h-4"/> Top Responsable</p>
                                        <span className="p-1.5 bg-amber-200/50 text-amber-600 rounded-lg opacity-0 group-hover:opacity-100 transition-opacity"><Icons.Search className="w-3.5 h-3.5"/></span>
                                    </div>
                                    <div className="flex flex-col justify-center h-full mt-2">
                                        <span className="text-2xl font-black text-amber-900 truncate" title={globalKpis.topRep.name}>{globalKpis.topRep.name}</span>
                                        <span className="text-sm font-bold text-amber-700 mt-1 bg-amber-100/50 py-1 px-2 rounded-lg self-start">{globalKpis.topRep.count} ventas aportadas</span>
                                    </div>
                                </div>
                            </div>

                            {/* Reporte de Caja / Préstamos */}
                            <div className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden flex flex-col">
                                <div className="bg-slate-50 px-6 py-5 border-b border-slate-200 flex justify-between items-center flex-wrap gap-4">
                                    <div className="flex items-center gap-4 flex-wrap">
                                        <h3 className="font-black text-slate-800 flex items-center gap-2 text-xl">
                                            <Icons.FileText className="w-6 h-6 text-indigo-500" /> Reporte de Préstamos (Caja Activa)
                                        </h3>
                                        <div className="flex items-center bg-white rounded-lg p-1 border border-slate-200 shadow-sm">
                                            <div className="relative">
                                                <Icons.Filter className="w-4 h-4 text-indigo-500 absolute left-3 top-1/2 -translate-y-1/2 pointer-events-none" />
                                                <select 
                                                    value={selectedLoanRep} 
                                                    onChange={(e) => setSelectedLoanRep(e.target.value)}
                                                    className="appearance-none bg-transparent pl-9 pr-8 py-1.5 text-xs font-bold text-slate-700 outline-none cursor-pointer min-w-[150px]"
                                                >
                                                    <option value="">Todos los Asesores</option>
                                                    {uniqueLoanReps.map(rep => (
                                                        <option key={rep} value={rep}>{rep}</option>
                                                    ))}
                                                </select>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="flex gap-3">
                                        <button onClick={handleExportGlobalXLSX} className="flex items-center gap-2 px-5 py-2.5 bg-emerald-50 text-emerald-700 border border-emerald-200 rounded-xl hover:bg-emerald-600 hover:text-white transition-colors font-bold text-sm shadow-sm hover:shadow">
                                            <Icons.Download className="w-4 h-4"/> Excel (XLSX)
                                        </button>
                                        <button onClick={handleExportGlobalPDF} className="flex items-center gap-2 px-5 py-2.5 bg-slate-800 text-white border border-slate-700 rounded-xl hover:bg-indigo-600 hover:border-indigo-500 transition-colors font-bold text-sm shadow-sm hover:shadow">
                                            <Icons.Download className="w-4 h-4"/> Descargar PDF
                                        </button>
                                    </div>
                                </div>
                                <div className="overflow-x-auto max-h-[600px] custom-scrollbar">
                                    <table className="w-full text-sm text-left relative">
                                        <thead className="text-[11px] text-slate-500 uppercase tracking-widest bg-white sticky top-0 shadow-sm z-10 border-b border-slate-200">
                                            <tr>
                                                <th className="px-6 py-5 font-black">Responsable / Asignado</th>
                                                <th className="px-6 py-5 font-black">Financiera</th>
                                                <th className="px-6 py-5 font-black">Cédula</th>
                                                <th className="px-6 py-5 font-black">Nombre del Cliente</th>
                                                <th className="px-6 py-5 font-black text-slate-400">Fecha Venta</th>
                                                <th className="px-6 py-5 font-black text-indigo-600">Fecha Gestión</th>
                                                <th className="px-6 py-5 font-black text-emerald-600 text-right">Valor Prestado</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {displayedLoansData.length > 0 ? displayedLoansData.map((row, idx) => (
                                                <tr key={idx} className="hover:bg-slate-50 transition-colors">
                                                    <td className="px-6 py-4 font-bold text-slate-800 bg-slate-50/50">{row._assigned}</td>
                                                    <td className="px-6 py-4">
                                                        <span className={`inline-block px-3 py-1.5 rounded-md text-[10px] font-black tracking-widest border shadow-sm
                                                            ${row._brand === 'PAYJOY' ? 'bg-blue-50 text-blue-700 border-blue-200' : 
                                                              row._brand === 'ALOCREDIT' ? 'bg-indigo-50 text-indigo-700 border-indigo-200' : 
                                                              row._brand === 'KREDIYA' ? 'bg-emerald-50 text-emerald-700 border-emerald-200' : 
                                                              'bg-rose-50 text-rose-700 border-rose-200'}`}>
                                                            {row._brand}
                                                        </span>
                                                    </td>
                                                    <td className="px-6 py-4 font-mono text-xs text-slate-500 font-medium">{row._id}</td>
                                                    <td className="px-6 py-4 font-bold text-slate-700">{row._client}</td>
                                                    <td className="px-6 py-4 text-slate-400 font-medium text-sm">{row._salesDate ? row._salesDate.toLocaleDateString('es-ES') : '-'}</td>
                                                    <td className="px-6 py-4 text-indigo-600 font-bold text-sm bg-indigo-50/30">{row._paymentDate ? row._paymentDate.toLocaleDateString('es-ES') : '-'}</td>
                                                    <td className="px-6 py-4 text-right font-black text-emerald-700 text-base">
                                                        {new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', minimumFractionDigits: 0 }).format(row._amountNum)}
                                                    </td>
                                                </tr>
                                            )) : (
                                                <tr><td colSpan="7" className="px-6 py-16 text-center text-slate-400">
                                                    <div className="flex flex-col items-center gap-3">
                                                        <Icons.CheckCircle className="w-12 h-12 text-slate-300" />
                                                        <p className="font-bold text-lg text-slate-500">Todo en orden</p>
                                                        <p className="text-sm">No se encontraron préstamos o pagos con gestión en las 4 financieras para el periodo seleccionado.</p>
                                                    </div>
                                                </td></tr>
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                                <div className="bg-slate-50 px-6 py-4 border-t border-slate-200 text-xs text-slate-500 font-medium">
                                    * Nota: La tabla filtra automáticamente y muestra <strong>únicamente</strong> a los clientes cuyo estado actual indique un <strong>Préstamo (Pago con Gestión)</strong>. La fecha de gestión se extrae del formato <strong>[DD/MM]</strong> en los comentarios.
                                </div>
                            </div>
                            
                        </div>
                    )}

                    {/* NUEVO MODAL: PRESTAMOS POR ASESOR (CAJA) */}
                    {showLoansByRepModal && (
                        <div className="fixed inset-0 z-[150] flex items-center justify-center bg-slate-900/60 p-4 backdrop-blur-sm animate-in fade-in duration-200">
                            <div className="bg-white w-full max-w-lg rounded-3xl shadow-2xl flex flex-col max-h-[85vh] overflow-hidden border border-slate-200">
                                <div className="p-5 border-b border-slate-100 bg-emerald-50 flex justify-between items-center">
                                    <div className="flex items-center gap-3">
                                        <div className="p-2 bg-emerald-100 text-emerald-600 rounded-xl shadow-sm"><Icons.DollarSign className="w-5 h-5"/></div>
                                        <div>
                                            <h3 className="font-black text-slate-800 text-lg leading-tight">Caja por Asesor</h3>
                                            <p className="text-[10px] text-emerald-700 font-bold">Capital prestado en el filtro actual</p>
                                        </div>
                                    </div>
                                    <button onClick={() => setShowLoansByRepModal(false)} className="p-2 text-slate-400 hover:bg-slate-200 hover:text-slate-700 rounded-full transition-colors">
                                        <Icons.X className="w-5 h-5"/>
                                    </button>
                                </div>
                                <div className="flex-1 overflow-auto p-0 custom-scrollbar">
                                    <table className="w-full text-sm text-left">
                                        <thead className="text-[10px] text-slate-400 uppercase tracking-widest bg-white sticky top-0 shadow-sm border-b border-slate-100">
                                            <tr>
                                                <th className="px-6 py-4 font-black w-16 text-center">#</th>
                                                <th className="px-6 py-4 font-black">Asesor / Responsable</th>
                                                <th className="px-6 py-4 font-black text-right">Capital Prestado</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-50">
                                            {globalKpis.allLoansReps.length > 0 ? globalKpis.allLoansReps.map((rep, idx) => (
                                                <tr key={idx} className="hover:bg-emerald-50/30 transition-colors">
                                                    <td className="px-6 py-4 font-bold text-slate-400 text-center">{idx + 1}</td>
                                                    <td className="px-6 py-4 font-bold text-slate-700">{rep.name}</td>
                                                    <td className="px-6 py-4 font-black text-emerald-600 text-right text-base">
                                                        {new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', minimumFractionDigits: 0 }).format(rep.amount)}
                                                    </td>
                                                </tr>
                                            )) : (
                                                <tr><td colSpan="3" className="px-6 py-8 text-center text-slate-400">No hay caja registrada en este periodo.</td></tr>
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                                <div className="p-4 bg-slate-50 border-t border-slate-200 flex justify-between items-center text-xs text-slate-500">
                                    <span>Total Asesores con préstamos: <strong>{globalKpis.allLoansReps.length}</strong></span>
                                    <button onClick={() => setShowLoansByRepModal(false)} className="px-5 py-2.5 bg-slate-200 hover:bg-slate-300 text-slate-700 rounded-xl font-bold transition-colors shadow-sm">Cerrar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* NUEVO MODAL: RANKING DE ASESORES */}
                    {showTopRepsModal && (
                        <div className="fixed inset-0 z-[150] flex items-center justify-center bg-slate-900/60 p-4 backdrop-blur-sm animate-in fade-in duration-200">
                            <div className="bg-white w-full max-w-lg rounded-3xl shadow-2xl flex flex-col max-h-[85vh] overflow-hidden border border-slate-200">
                                <div className="p-5 border-b border-slate-100 bg-amber-50 flex justify-between items-center">
                                    <div className="flex items-center gap-3">
                                        <div className="p-2 bg-amber-100 text-amber-600 rounded-xl shadow-sm"><Icons.Target className="w-5 h-5"/></div>
                                        <div>
                                            <h3 className="font-black text-slate-800 text-lg leading-tight">Ranking de Asesores</h3>
                                            <p className="text-[10px] text-amber-700 font-bold">Según las ventas del filtro actual</p>
                                        </div>
                                    </div>
                                    <button onClick={() => setShowTopRepsModal(false)} className="p-2 text-slate-400 hover:bg-slate-200 hover:text-slate-700 rounded-full transition-colors">
                                        <Icons.X className="w-5 h-5"/>
                                    </button>
                                </div>
                                <div className="flex-1 overflow-auto p-0 custom-scrollbar">
                                    <table className="w-full text-sm text-left">
                                        <thead className="text-[10px] text-slate-400 uppercase tracking-widest bg-white sticky top-0 shadow-sm border-b border-slate-100">
                                            <tr>
                                                <th className="px-6 py-4 font-black w-16 text-center">#</th>
                                                <th className="px-6 py-4 font-black">Asesor / Responsable</th>
                                                <th className="px-6 py-4 font-black text-right">Equipos Vendidos</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-50">
                                            {globalKpis.allReps.length > 0 ? globalKpis.allReps.map((rep, idx) => (
                                                <tr key={idx} className="hover:bg-amber-50/30 transition-colors">
                                                    <td className="px-6 py-4 font-bold text-slate-400 text-center">{idx + 1}</td>
                                                    <td className="px-6 py-4 font-bold text-slate-700">{rep.name}</td>
                                                    <td className="px-6 py-4 font-black text-amber-600 text-right text-base">{rep.count}</td>
                                                </tr>
                                            )) : (
                                                <tr><td colSpan="3" className="px-6 py-8 text-center text-slate-400">No hay ventas registradas.</td></tr>
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                                <div className="p-4 bg-slate-50 border-t border-slate-200 flex justify-between items-center text-xs text-slate-500">
                                    <span>Total Vendedores activos: <strong>{globalKpis.allReps.length}</strong></span>
                                    <button onClick={() => setShowTopRepsModal(false)} className="px-5 py-2.5 bg-slate-200 hover:bg-slate-300 text-slate-700 rounded-xl font-bold transition-colors shadow-sm">Cerrar</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
