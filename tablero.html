            0%, 100% { opacity: 1; }
            50% { opacity: .8; }

            animation: pulse-slow 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;

<body class="bg-slate-50 text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo } = React;

        // --- ICONOS INTEGRADOS (SVG Nativos) ---
        const IconBase = ({ children, className, ...props }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>{children}</svg>
        );

        const Icons = {
            AlertCircle: (p) => <IconBase {...p}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></IconBase>,
            CheckCircle: (p) => <IconBase {...p}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></IconBase>,
            CreditCard: (p) => <IconBase {...p}><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></IconBase>,
            Search: (p) => <IconBase {...p}><circle cx="11" cy="11" r="8"/><line x1="21" x2="16.65" y1="21" y2="16.65"/></IconBase>,

            FileText: (p) => <IconBase {...p}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></IconBase>,
            XCircle: (p) => <IconBase {...p}><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></IconBase>,
            HelpCircle: (p) => <IconBase {...p}><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></IconBase>,
            BellRing: (p) => <IconBase {...p}><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></IconBase>,
            Filter: (p) => <IconBase {...p}><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></IconBase>,
            User: (p) => <IconBase {...p}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></IconBase>,
            Users: (p) => <IconBase {...p}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></IconBase>,
            TrendingDown: (p) => <IconBase {...p}><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></IconBase>,
            DollarSign: (p) => <IconBase {...p}><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></IconBase>,
            X: (p) => <IconBase {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></IconBase>,
            Target: (p) => <IconBase {...p}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></IconBase>,
            Handshake: (p) => <IconBase {...p}><path d="m11 17 2 2a1 1 0 1 0 3-3"/><path d="m14 14 2.5 2.5a1 1 0 1 0 3-3l-3.88-3.88a3 3 0 0 0-4.24 0l-.88.88a1 1 0 1 1-1.42-1.42l4.82-4.82a1 1 0 0 1 1.42 0l2.12 2.12a1 1 0 0 0 1.42 0l1.29-1.29a3 3 0 0 0 0-4.24l-2.12-2.12a3 3 0 0 0-4.24 0l-3.65 3.65a3 3 0 0 0 0 4.24l.88.88a1 1 0 0 1-1.42 1.42l-4.24-4.24a1 1 0 0 0-1.42 0l-2.12 2.12a3 3 0 0 0 0 4.24l2.12 2.12"/><path d="m7 13 2.5 2.5a1 1 0 1 0 3-3l-3.88-3.88a3 3 0 0 0-4.24 0l-.88.88a1 1 0 1 1-1.42-1.42l4.82-4.82a1 1 0 0 1 1.42 0l2.12 2.12a1 1 0 0 0 1.42 0l1.29-1.29a3 3 0 0 0 0-4.24l-2.12-2.12a3 3 0 0 0-4.24 0l-3.65 3.65a3 3 0 0 0 0 4.24l.88.88a1 1 0 0 1-1.42 1.42l-4.24-4.24a1 1 0 0 0-1.42 0l-2.12 2.12a3 3 0 0 0 0 4.24l2.12 2.12"/></IconBase>,
            Smartphone: (p) => <IconBase {...p}><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></IconBase>,
            ShieldAlert: (p) => <IconBase {...p}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></IconBase>,
            AlertTriangle: (p) => <IconBase {...p}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></IconBase>,
            Phone: (p) => <IconBase {...p}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></IconBase>,
            MessageCircle: (p) => <IconBase {...p}><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></IconBase>,
            BarChart4: (p) => <IconBase {...p}><line x1="12" x2="12" y1="20" y2="10"/><line x1="18" x2="18" y1="20" y2="4"/><line x1="6" x2="6" y1="20" y2="16"/></IconBase>,
            Download: (p) => <IconBase {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></IconBase>,
            Edit2: (p) => <IconBase {...p}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></IconBase>,
            ArrowLeft: (p) => <IconBase {...p}><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></IconBase>,
            ArrowRight: (p) => <IconBase {...p}><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 19"/></IconBase>,
            Clock: (p) => <IconBase {...p}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></IconBase>,
            Database: (p) => <IconBase {...p}><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></IconBase>
        };

        // --- CONFIGURACIÓN ---
        const API_URL = 'https://script.google.com/macros/s/AKfycbz770i0j3vK5-9M2Z2EheDh9GX2x2j2KbjfFm_yNadBg5db3tEc5so58KWeIX5SwTmAZw/exec';
        const APP_VERSION = "v6.2.5 (Eliminado Cont. 8 y 9)";

        // ETIQUETAS DE CUOTAS
        const QUOTA_LABELS = {
            q1: { id: 'primera', label: 'Primera Cuota', weeksAgo: 3 },
            fpd3: { id: 'primera', label: 'FPD3 (Hace 2 Semanas)', weeksAgo: 2 },  
            fpd7: { id: 'primera', label: 'FPD7 (Hace 3 Semanas)', weeksAgo: 3 }, 
            fpd10: { id: 'primera', label: 'Continuidad (10 Sem.)', weeksAgo: 10 },
            fpd11: { id: 'primera', label: 'Continuidad (11 Sem.)', weeksAgo: 11 },
            fpd12: { id: 'primera', label: 'Continuidad (12 Sem.)', weeksAgo: 12 },
            fpd15: { id: 'primera', label: 'FPD15 (Hace 4 Semanas)', weeksAgo: 4 }
        };

        // CONFIGURACIÓN DE CARTERAS
        const PORTFOLIO_CONFIG = {
            alocredit: {
                name: "ALOCREDIT",
                theme: "indigo",
                quotas: ['fpd3', 'fpd7', 'fpd15', 'fpd10', 'fpd11', 'fpd12'], 
                columns: {
                    seller: ['vendedor', 'asesor'],
                    assigned: ['asignado', 'responsable', 'gestor', 'cobrador'],
                    client: ['cliente', 'nombre', 'nombres', 'nombre cliente'], 
                    device: ['modelo - equipo', 'equipo', 'modelo'],
                    phone: ['celular', 'telefono', 'teléfono', 'movil', 'contacto', 'tlf'], 
                    date: ['fecha venta', 'fecha desembolso', 'fecha creacion', 'fecha'],
                    quotaDate: 'cuota',
                    paymentStatus: ['pagos'], 
                    comments: ['comentarios', 'observaciones', 'gestion'],
                    id: ['cedula', 'documento', 'cc', 'nit', 'id'],
                    email: ['email', 'correo', 'mail'],
                    store: ['tienda', 'almacen', 'sucursal', 'sede', 'punto'],
                    editableText: ['celular', 'telefono', 'teléfono', 'movil', 'contacto', 'tlf', 'ref', 'referencia', 'valor cuota']
                }
            },
            payjoy: {
                name: "PAYJOY",
                theme: "blue",
                quotas: ['fpd3', 'fpd7', 'fpd15', 'fpd10', 'fpd11', 'fpd12'], 
                columns: {
                    seller: ['vendedor', 'asesor', 'ejecutivo'],
                    assigned: ['asignado', 'responsable', 'gestor', 'cobrador'],
                    client: ['cliente', 'nombre', 'nombres', 'nombre cliente'], 
                    device: ['equipo', 'modelo', 'celular'],
                    phone: ['celular', 'telefono', 'teléfono', 'movil', 'contacto', 'tlf'], 
                    date: ['fecha venta', 'fecha desembolso', 'fecha'],
                    quotaDate: 'cuota',
                    paymentStatus: ['pagos'], 
                    comments: ['comentarios', 'notas', 'gestion'],
                    id: ['cedula', 'documento', 'cc', 'nit', 'id'],
                    email: ['email', 'correo', 'mail'],
                    store: ['tienda', 'almacen', 'sucursal', 'sede', 'punto'],
                    editableText: ['celular', 'telefono', 'teléfono', 'movil', 'contacto', 'tlf', 'ref', 'referencia', 'valor cuota']
                }
            }
        };

        // --- COMPONENTE PRINCIPAL ---
        function App() {
            const [portfolio, setPortfolio] = useState('payjoy');
            const activeConfig = PORTFOLIO_CONFIG[portfolio];

            const [data, setData] = useState([]);
            const [headers, setHeaders] = useState([]);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            
            // Filtros
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedSeller, setSelectedSeller] = useState('');
            const [selectedAssigned, setSelectedAssigned] = useState('');
            const [selectedDevice, setSelectedDevice] = useState('');
            const [selectedStore, setSelectedStore] = useState(''); 
            
            const [showOnlyAlerts, setShowOnlyAlerts] = useState(false);
            const [showOnlyEarly, setShowOnlyEarly] = useState(false); 
            const [showOnlyCritical, setShowOnlyCritical] = useState(false); 
            
            // Filtros interactivos
            const [fpdQuotaFilter, setFpdQuotaFilter] = useState(null); 
            const [breakdownFilter, setBreakdownFilter] = useState(null);

            // Reporte Vendedores / Asignados
            const [showSellerModal, setShowSellerModal] = useState(false);
            const [reportFilter, setReportFilter] = useState('fpd7');
            const [detailSeller, setDetailSeller] = useState(null); 
            const [detailFilter, setDetailFilter] = useState('all'); // 'all' | 'loans'

            // Edición
            const [editModal, setEditModal] = useState({ show: false, row: null, colName: null, currentValue: '' });
            const [cleanEditModal, setCleanEditModal] = useState({ show: false, row: null, colName: null, currentValue: '' });
            const [confirmModal, setConfirmModal] = useState({ show: false, row: null, actionType: null, message: '', amount: '' });
            const [isSaving, setIsSaving] = useState(false);

            // Paginación
            const [currentPage, setCurrentPage] = useState(1);
            const itemsPerPage = 50;

            // --- UTILS ---
            const parseDate = (dateVal) => {
                if (!dateVal) return null;
                let dateObj = null;
                if (typeof dateVal === 'string' && dateVal.length > 5) {
                    dateObj = new Date(dateVal);
                } else if (dateVal instanceof Date) {
                    dateObj = dateVal;
                }
                if (!dateObj || isNaN(dateObj.getTime())) return null;
                return dateObj;
            };

            const checkDateAlert = (dateVal) => {
                const dateObj = parseDate(dateVal);
                if (!dateObj) return false;
                const now = new Date();
                const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                const due = new Date(dateObj.getFullYear(), dateObj.getMonth(), dateObj.getDate());
                const diffTime = today - due;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 
                return diffDays === 5 || diffDays === 6;
            };

            const findColumnName = useCallback((keyword1, keyword2, headersList) => {
                if (!headersList) return null;
                return headersList.find(h => {
                    const lower = String(h).toLowerCase();
                    return lower.includes(keyword1) && (keyword2 ? lower.includes(keyword2) : true);
                });
            }, []);

            const findConfigColumn = useCallback((possibleNames, headersList) => {
                if (!possibleNames || !headersList) return null;
                for (const name of possibleNames) {
                    const found = headersList.find(h => h.toLowerCase().includes(name));
                    if (found) return found;
                }
                return null;
            }, []);

            const formatCellData = (value) => {
                if (typeof value !== 'string') {
                    if (typeof value === 'object' && value !== null) return JSON.stringify(value);
                    return String(value);
                }
                if (value.length > 5 && value.length < 30 && (value.includes('-') || value.includes('/'))) {
                    const d = parseDate(value);
                    if (d && !isNaN(d.getTime())) return d.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric' });
                }
                return value;
            };

            const cleanPhoneNumber = (phone) => {
                if (!phone) return '';
                return String(phone).replace(/\D/g, '');
            };

            const getWhatsAppLink = (phone, clientName, deviceName) => {
                const clean = cleanPhoneNumber(phone);
                if (!clean) return '#';
                
                const isPayjoy = portfolio === 'payjoy';
                const companyName = isPayjoy ? 'Payjoy' : 'Alocredit';
                
                let name = "Cliente";
                if (clientName && typeof clientName === 'string' && clientName.trim().length > 1) name = clientName.trim(); 
                let deviceRef = "equipo";
                if (deviceName && typeof deviceName === 'string' && deviceName.trim().length > 1) deviceRef = `equipo ${deviceName.trim()}`;

                let paymentChannels = isPayjoy 
                    ? "🏦 Bancolombia: Convenio 85786\n🟡 Efecty: Convenio 112090" 
                    : "🏦 Bancolombia: Convenio 92380\n🟡 Efecty: Convenio 112978";

                const message = `¡AVISO IMPORTANTE! Cuota vencida - ${companyName} ⚠️\n\nHola, ${name}. Te informamos que tu crédito presenta un retraso. Evita bloqueos en tu ${deviceRef} realizando tu pago hoy mismo a través de nuestros canales autorizados:\n\n${paymentChannels}\n\nUna vez realizado, envíanos la foto del soporte para registrarlo de inmediato en el sistema. ✅`;
                
                return `https://wa.me/${clean}?text=${encodeURIComponent(message)}`;
            };

            const getCohortRange = (weeksAgo) => {
                const now = new Date();
                const currentDay = now.getDay(); 
                const distanceToMonday = (currentDay === 0 ? 6 : currentDay - 1); 
                const currentMonday = new Date(now);
                currentMonday.setDate(now.getDate() - distanceToMonday);
                currentMonday.setHours(0, 0, 0, 0);

                const start = new Date(currentMonday);
                start.setDate(currentMonday.getDate() - (weeksAgo * 7));
                
                const end = new Date(start);
                end.setDate(start.getDate() + 6);
                end.setHours(23, 59, 59, 999);
                return { start, end };
            };

            const isObsUnpaid = (val) => {
                const v = String(val || '').toLowerCase().trim();
                // 1. Si es explícitamente negativo, es Mora
                if (v.includes('no se') || v.includes('no cancelo') || v.includes('no pago')) return true; 
                // 2. Si es un préstamo (pago con gestion), NO es mora para la empresa
                if (v.includes('pago con gestion') || v.includes('pago con gestión')) return false; 
                // 3. Si es un pago normal, NO es mora
                if (v.includes('pago') || v.includes('pagó') || v.includes('cancelo') || v.includes('canceló')) return false;
                // 4. Todo lo demás (vacío, compromiso, en proceso) es Mora
                return true; 
            };

            const getStatus = (val) => {
                const v = String(val || '').toLowerCase().trim();
                if (!v) return 'empty';
                if (v.includes('no se') || v.includes('no cancelo') || v.includes('no pago')) return 'unpaid';
                if (v.includes('pago con gestion') || v.includes('pago con gestión')) return 'managed';
                if (v.includes('pago') || v.includes('pagó') || v.includes('cancelo') || v.includes('canceló')) return 'clean';
                if (v.includes('compromiso') || v.includes('gestion') || v.includes('gestión')) return 'managed';
                return 'unpaid'; 
            };

            // Convertir texto de moneda a número
            const parseAmount = (val) => {
                let s = String(val || '');
                s = s.replace(/[^0-9.,]/g, '');
                s = s.replace(/[.,]00$/, ''); // Limpia decimales .00 o ,00
                s = s.replace(/[.,]/g, '');   // Limpia puntos/comas de miles
                return parseInt(s, 10) || 0;
            };

            // --- LÓGICA DE ALERTA TEMPRANA (12 a 14 DÍAS DE LA VENTA) ---
            const getRowEarlyStatus = useCallback((row, headersList) => {
                const dateCol = findConfigColumn(activeConfig.columns.date, headersList);
                let statusCol = findColumnName(activeConfig.columns.paymentStatus, 'primera', headersList);
                if (!statusCol) statusCol = findColumnName(activeConfig.columns.paymentStatus, '', headersList);
                
                if (!dateCol || !statusCol) return false;
                
                const saleDate = parseDate(row[dateCol]);
                if (!saleDate) return false;
                
                const today = new Date();
                today.setHours(0,0,0,0);
                const sDate = new Date(saleDate);
                sDate.setHours(0,0,0,0);

                const diffTime = today.getTime() - sDate.getTime();
                const diffDays = Math.round(diffTime / (1000 * 60 * 60 * 24));

                if (diffDays >= 12 && diffDays <= 14) {
                    const obsVal = String(row[statusCol] || '').trim();
                    return isObsUnpaid(obsVal);
                }
                return false;
            }, [activeConfig, findConfigColumn, findColumnName]);

            // --- LÓGICA DE MORA CRÍTICA EXACTA (7 DÍAS DESPUÉS DEL VENCIMIENTO) ---
            const getRowCriticalStatus = useCallback((row, headersList) => {
                const dateCol = findConfigColumn(activeConfig.columns.date, headersList);
                let statusCol = findColumnName(activeConfig.columns.paymentStatus, 'primera', headersList);
                if (!statusCol) statusCol = findColumnName(activeConfig.columns.paymentStatus, '', headersList);
                
                if (!dateCol || !statusCol) return false;
                
                const saleDate = parseDate(row[dateCol]);
                if (!saleDate) return false;
                
                const today = new Date();
                today.setHours(0,0,0,0);
                
                const dueDate = new Date(saleDate);
                dueDate.setDate(dueDate.getDate() + 14); // Vencimiento = Venta + 14 días
                dueDate.setHours(0,0,0,0);

                const diffTime = today.getTime() - dueDate.getTime();
                const diffDaysFromDue = Math.round(diffTime / (1000 * 60 * 60 * 24));

                // 🚨 Solo si han pasado EXACTAMENTE 7 días desde el vencimiento
                if (diffDaysFromDue === 7) {
                    const obsVal = String(row[statusCol] || '').trim();
                    return isObsUnpaid(obsVal);
                }
                return false;
            }, [activeConfig, findConfigColumn, findColumnName]);

            // --- LÓGICA DE ALERTAS (5-6 DÍAS DESPUÉS DEL VENCIMIENTO DE CUOTA) ---
            const checkSpecificQuotaAlert = useCallback((row, headersList, quotaId) => {
                const qName = QUOTA_LABELS[quotaId]?.id; 
                if (!qName) return false;
                const colFecha = findColumnName(qName, activeConfig.columns.quotaDate, headersList);
                let colStatus = findColumnName(activeConfig.columns.paymentStatus, qName, headersList);
                if (!colStatus) colStatus = findColumnName(activeConfig.columns.paymentStatus, '', headersList);

                if (colFecha && colStatus) {
                    const fechaVal = row[colFecha];
                    const obsVal = String(row[colStatus] || '').trim();
                    if (checkDateAlert(fechaVal) && isObsUnpaid(obsVal)) return true;
                }
                return false;
            }, [activeConfig, findColumnName]);

            const getRowAlertStatus = useCallback((row, headersList) => {
                return ['fpd3', 'fpd7', 'fpd15'].some(qId => checkSpecificQuotaAlert(row, headersList, qId));
            }, [checkSpecificQuotaAlert]);

            // --- FETCH DATA ---
            const fetchData = useCallback(async () => {
                setLoading(true);
                setError(null);
                setSelectedSeller('');
                setSelectedAssigned('');
                setSelectedDevice('');
                setSelectedStore(''); 
                setFpdQuotaFilter(null);
                setBreakdownFilter(null);
                setShowOnlyAlerts(false);
                setShowOnlyEarly(false);
                setShowOnlyCritical(false);

                try {
                    const separator = API_URL.includes('?') ? '&' : '?';
                    const cacheBusterUrl = `${API_URL}${separator}type=${portfolio}&t=${new Date().getTime()}`;
                    const response = await fetch(cacheBusterUrl, { method: "GET", redirect: "follow" });
                    
                    if (!response.ok) throw new Error(`Error servidor: ${response.status}`);
                    
                    const text = await response.text();
                    let jsonData;
                    try { jsonData = JSON.parse(text); } catch (e) { throw new Error('Respuesta no válida del servidor.'); }
                    
                    if (!Array.isArray(jsonData) || jsonData.length === 0) {
                         if (jsonData && jsonData.result === 'error') throw new Error(jsonData.error);
                         throw new Error('La hoja está vacía.');
                    }

                    const keys = Object.keys(jsonData[0]);
                    setHeaders(keys);
                    setData(jsonData);
                } catch (err) {
                    console.error(err);
                    setError(String(err.message || 'Error desconocido.'));
                    setData([]);
                    setHeaders([]);
                } finally {
                    setLoading(false);
                }
            }, [portfolio]); 

            useEffect(() => { 
                fetchData(); 
            }, [fetchData]);

            // --- MEMOS DE DATOS ---
            const { sellers, sellerColumn, assignees, assignedColumn, devices, deviceColumn, phoneColumn, clientColumn, stores, storeColumn, idColumn } = useMemo(() => {
                const sCol = findConfigColumn(activeConfig.columns.seller, headers);
                const aCol = findConfigColumn(activeConfig.columns.assigned, headers);
                const dCol = findConfigColumn(activeConfig.columns.device, headers);
                const pCol = findConfigColumn(activeConfig.columns.phone, headers);
                const cCol = findConfigColumn(activeConfig.columns.client, headers); 
                const stCol = findConfigColumn(activeConfig.columns.store, headers);
                const idCol = findConfigColumn(activeConfig.columns.id, headers);

                const uniqueSellers = new Set();
                const uniqueAssignees = new Set();
                const uniqueDevices = new Set();
                const uniqueStores = new Set(); 

                data.forEach(row => {
                    if (sCol && row[sCol]) uniqueSellers.add(String(row[sCol]).trim());
                    if (aCol && row[aCol]) uniqueAssignees.add(String(row[aCol]).trim());
                    if (dCol && row[dCol]) uniqueDevices.add(String(row[dCol]).trim());
                    if (stCol && row[stCol]) uniqueStores.add(String(row[stCol]).trim());
                });
                return { 
                    sellers: Array.from(uniqueSellers).sort(), sellerColumn: sCol,
                    assignees: Array.from(uniqueAssignees).sort(), assignedColumn: aCol,
                    devices: Array.from(uniqueDevices).sort(), deviceColumn: dCol,
                    stores: Array.from(uniqueStores).sort(), storeColumn: stCol, 
                    phoneColumn: pCol, clientColumn: cCol, idColumn: idCol
                };
            }, [data, headers, activeConfig, findConfigColumn]);

            // --- REPORTE DE GESTORES Y PRÉSTAMOS ---
            const sellerReportData = useMemo(() => {
                if (!showSellerModal) return [];
                const dateCol = findConfigColumn(activeConfig.columns.date, headers);
                if (!dateCol) return [];

                // IMPORTANTE: Ahora agrupamos por Asignado/Gestor de forma predeterminada
                const reportCol = assignedColumn || sellerColumn;

                let filterRanges = [];
                const now = new Date();

                if (reportFilter === 'fpd7') filterRanges = [getCohortRange(3)];
                else if (reportFilter === 'current') filterRanges = [{start: new Date(now.getFullYear(), now.getMonth(), 1), end: new Date(now.getFullYear(), now.getMonth() + 1, 0, 23, 59, 59)}];
                else if (reportFilter === 'last') filterRanges = [{start: new Date(now.getFullYear(), now.getMonth() - 1, 1), end: new Date(now.getFullYear(), now.getMonth(), 0, 23, 59, 59)}];
                else filterRanges = [{start: new Date(2000, 0, 1), end: new Date(2100, 0, 1)}];

                const report = {}; 

                data.forEach(row => {
                    const d = parseDate(row[dateCol]);
                    if (!d) return;
                    const isInRange = filterRanges.some(r => d >= r.start && d <= r.end);
                    if (!isInRange) return;

                    const personName = String(row[reportCol] || 'Sin Asignar').trim().toUpperCase();
                    
                    if (!report[personName]) {
                        report[personName] = { name: personName, total: 0, pagas: 0, gestion: 0, noCancelo: 0, vacio: 0, porVencer: 0, prestamos: 0, prestamosDinero: 0 };
                    }
                    report[personName].total++;
                    
                    const qName = 'primera';
                    let statusCol = findColumnName(activeConfig.columns.paymentStatus, qName, headers);
                    if (!statusCol) statusCol = findColumnName(activeConfig.columns.paymentStatus, '', headers);
                    
                    const rawStatus = statusCol ? String(row[statusCol]).toLowerCase().trim() : '';
                    const isPrestamo = rawStatus.includes('pago con gestion') || rawStatus.includes('pago con gestión');
                    
                    const status = getStatus(rawStatus);

                    const dueDate = new Date(d);
                    dueDate.setDate(d.getDate() + 14);
                    
                    const today = new Date();
                    today.setHours(0,0,0,0);
                    const dueDateCheck = new Date(dueDate);
                    dueDateCheck.setHours(0,0,0,0);

                    if (status === 'clean') {
                        report[personName].pagas++;
                    } else if (status === 'managed') {
                        report[personName].gestion++;
                    } else {
                        if (dueDateCheck >= today) {
                            report[personName].porVencer++;
                        } else if (status === 'unpaid') {
                            report[personName].noCancelo++;
                        } else {
                            report[personName].vacio++; 
                        }
                    }

                    // Contabilizar dinero de los Préstamos
                    if (isPrestamo) {
                        report[personName].prestamos++;
                        const valCuotaCol = headers.find(h => h.toLowerCase().includes('valor cuota') || h.toLowerCase() === 'cuota');
                        if (valCuotaCol) {
                            report[personName].prestamosDinero += parseAmount(row[valCuotaCol]);
                        }
                    }
                });

                return Object.values(report).map(r => {
                    const numerator = r.noCancelo + r.gestion;
                    const index = r.total > 0 ? (numerator / r.total) * 100 : 0;
                    return { ...r, index: index.toFixed(1) };
                }).sort((a, b) => b.index - a.index);
            }, [showSellerModal, reportFilter, data, headers, activeConfig, findColumnName, findConfigColumn, portfolio, sellerColumn, assignedColumn]);

            const sellerDetailData = useMemo(() => {
                if (!detailSeller) return [];
                const dateCol = findConfigColumn(activeConfig.columns.date, headers);
                
                const idCol = findConfigColumn(activeConfig.columns.id, headers);
                const emailCol = findConfigColumn(activeConfig.columns.email, headers);
                const phoneCol = findConfigColumn(activeConfig.columns.phone, headers);
                const clientCol = findConfigColumn(activeConfig.columns.client, headers);
                const deviceCol = findConfigColumn(activeConfig.columns.device, headers);
                const commentsCol = findConfigColumn(activeConfig.columns.comments, headers);
                const valCuotaCol = headers.find(h => h.toLowerCase().includes('valor cuota') || h.toLowerCase() === 'cuota');

                const reportCol = assignedColumn || sellerColumn;

                let filterRanges = [];
                const now = new Date();
                if (reportFilter === 'fpd7') filterRanges = [getCohortRange(3)];
                else if (reportFilter === 'current') filterRanges = [{start: new Date(now.getFullYear(), now.getMonth(), 1), end: new Date(now.getFullYear(), now.getMonth() + 1, 0, 23, 59, 59)}];
                else if (reportFilter === 'last') filterRanges = [{start: new Date(now.getFullYear(), now.getMonth() - 1, 1), end: new Date(now.getFullYear(), now.getMonth(), 0, 23, 59, 59)}];
                else filterRanges = [{start: new Date(2000, 0, 1), end: new Date(2100, 0, 1)}];

                const result = [];

                data.forEach(row => {
                    const d = parseDate(row[dateCol]);
                    if (!d) return;
                    const isInRange = filterRanges.some(r => d >= r.start && d <= r.end);
                    if (!isInRange) return;

                    const rowPerson = String(row[reportCol] || 'Sin Asignar').trim().toUpperCase();
                    if (rowPerson !== detailSeller) return;

                    const qName = 'primera';
                    let statusCol = findColumnName(activeConfig.columns.paymentStatus, qName, headers);
                    if (!statusCol) statusCol = findColumnName(activeConfig.columns.paymentStatus, '', headers);
                    
                    const rawStatus = statusCol ? String(row[statusCol]).toLowerCase().trim() : '';
                    let status = getStatus(rawStatus);
                    const isPrestamo = rawStatus.includes('pago con gestion') || rawStatus.includes('pago con gestión');

                    const dueDate = new Date(d);
                    dueDate.setDate(d.getDate() + 14);
                    const dueDateStr = dueDate.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric' });

                    const today = new Date();
                    today.setHours(0,0,0,0);
                    const dueDateCheck = new Date(dueDate);
                    dueDateCheck.setHours(0,0,0,0);

                    if ((status === 'unpaid' || status === 'empty') && dueDateCheck >= today) {
                        status = 'upcoming';
                    }

                    result.push({
                        name: clientCol ? row[clientCol] : '-',
                        id: idCol ? row[idCol] : '-',
                        phone: phoneCol ? row[phoneCol] : '-',
                        email: emailCol ? row[emailCol] : '-',
                        device: deviceCol ? row[deviceCol] : '-',
                        dueDate: dueDateStr, 
                        status: isPrestamo ? 'Gestión($)' : status === 'clean' ? 'Pagó' : 
                                status === 'managed' ? 'Gestión' : 
                                status === 'upcoming' ? 'Por Vencer' : 
                                status === 'unpaid' ? 'Mora' : 'Sin Dato',
                        statusCode: status,
                        isLoan: isPrestamo,
                        amountStr: valCuotaCol && row[valCuotaCol] ? String(row[valCuotaCol]) : '$0',
                        amountNum: valCuotaCol ? parseAmount(row[valCuotaCol]) : 0,
                        originalRow: row, 
                        commentColName: commentsCol, 
                        currentComment: commentsCol ? row[commentsCol] : '' 
                    });
                });
                
                return result.sort((a,b) => {
                    const weight = { 'Mora': 5, 'Gestión': 4, 'Gestión($)': 3, 'Por Vencer': 2, 'Sin Dato': 1, 'Pagó': 0 };
                    return weight[b.status] - weight[a.status];
                });

            }, [detailSeller, reportFilter, data, headers, activeConfig, findColumnName, findConfigColumn, portfolio, sellerColumn, assignedColumn]);

            // --- ESTADISTICAS Y DATA TOP-LEVEL ---
            const dataForStats = useMemo(() => {
                let result = data;
                if (selectedSeller && sellerColumn) result = result.filter(row => String(row[sellerColumn]).trim() === selectedSeller);
                if (selectedAssigned && assignedColumn) result = result.filter(row => String(row[assignedColumn]).trim() === selectedAssigned);
                if (selectedDevice && deviceColumn) result = result.filter(row => String(row[deviceColumn]).trim() === selectedDevice);
                if (selectedStore && storeColumn) result = result.filter(row => String(row[storeColumn]).trim() === selectedStore); 
                return result;
            }, [data, selectedSeller, sellerColumn, selectedAssigned, assignedColumn, selectedDevice, deviceColumn, selectedStore, storeColumn]);

            // --- RENDERIZADO TABLA PRINCIPAL Y PAGINACIÓN ---
            const filteredData = useMemo(() => {
                let result = dataForStats;
                
                if (searchTerm) result = result.filter(row => headers.some(header => String(row[header]).toLowerCase().includes(searchTerm.toLowerCase())));
                
                if (showOnlyAlerts) result = result.filter(row => getRowAlertStatus(row, headers));
                if (showOnlyEarly) result = result.filter(row => getRowEarlyStatus(row, headers));
                if (showOnlyCritical) result = result.filter(row => getRowCriticalStatus(row, headers));

                if (fpdQuotaFilter || breakdownFilter) {
                    const activeFilter = fpdQuotaFilter || breakdownFilter?.quota;
                    const dateCol = findConfigColumn(activeConfig.columns.date, headers);
                    if (dateCol) {
                        const weeksAgo = QUOTA_LABELS[activeFilter].weeksAgo;
                        const range = getCohortRange(weeksAgo);
                        result = result.filter(row => {
                            const d = parseDate(row[dateCol]);
                            if (!d || d < range.start || d > range.end) return false;
                            
                            if (['fpd10', 'fpd11', 'fpd12'].includes(activeFilter)) {
                                let commentsCol = findConfigColumn(activeConfig.columns.comments, headers);
                                const val = String(row[commentsCol] || '').toLowerCase().trim();
                                
                                if (breakdownFilter) {
                                    if (breakdownFilter.type === 'yaCancelo') return val.includes('completado');
                                    if (breakdownFilter.type === 'conGestion') return !val.includes('completado') && val !== '';
                                    if (breakdownFilter.type === 'vacio') return val === '';
                                    return false; 
                                }
                                return !val.includes('completado'); 
                            } else {
                                let quotaName = QUOTA_LABELS[activeFilter].id;
                                let statusCol = findColumnName(activeConfig.columns.paymentStatus, quotaName, headers);
                                if (!statusCol) statusCol = findColumnName(activeConfig.columns.paymentStatus, '', headers);
                                
                                const val = String(row[statusCol] || '').toLowerCase().trim();

                                if (breakdownFilter) {
                                     const isUnpaidExplicit = val.includes('no se') || val.includes('no cancelo') || val.includes('no pago');
                                     const isLoan = val.includes('pago con gestion') || val.includes('pago con gestión') || val.includes('prestamo');
                                     const isPaid = !isUnpaidExplicit && !isLoan && (val.includes('pago') || val.includes('cancelo') || val.includes('canceló'));
                                     const isManaged = isLoan || (!isPaid && !isUnpaidExplicit && (val.includes('compromiso') || val.includes('gestion') || val.includes('gestión')));

                                     if (breakdownFilter.type === 'yaCancelo') return isPaid;
                                     if (breakdownFilter.type === 'conGestion') return isManaged;
                                     if (breakdownFilter.type === 'vacio') return val === '';
                                     if (breakdownFilter.type === 'noCancelo') return val !== '' && !isPaid && !isManaged;
                                }
                                
                                return statusCol ? isObsUnpaid(row[statusCol]) : false;
                            }
                        });
                    }
                }
                return result;
            }, [dataForStats, headers, searchTerm, showOnlyAlerts, showOnlyEarly, showOnlyCritical, fpdQuotaFilter, breakdownFilter, activeConfig, findColumnName, findConfigColumn, portfolio, getRowEarlyStatus, getRowAlertStatus, getRowCriticalStatus]);

            useEffect(() => {
                setCurrentPage(1);
            }, [filteredData.length, searchTerm, showOnlyAlerts, showOnlyEarly, showOnlyCritical, fpdQuotaFilter, breakdownFilter]);

            const paginatedData = useMemo(() => {
                const startIndex = (currentPage - 1) * itemsPerPage;
                return filteredData.slice(startIndex, startIndex + itemsPerPage);
            }, [filteredData, currentPage, itemsPerPage]);

            const totalPages = Math.ceil(filteredData.length / itemsPerPage);

            const alertStats = useMemo(() => {
                let stats = { total: 0 };
                dataForStats.forEach(row => { if (getRowAlertStatus(row, headers)) stats.total++; });
                return stats;
            }, [dataForStats, headers, getRowAlertStatus]);

            const earlyStats = useMemo(() => {
                let stats = { total: 0 };
                dataForStats.forEach(row => { if (getRowEarlyStatus(row, headers)) stats.total++; });
                return stats;
            }, [dataForStats, headers, getRowEarlyStatus]);

            const criticalStats = useMemo(() => {
                let stats = { total: 0 };
                dataForStats.forEach(row => { if (getRowCriticalStatus(row, headers)) stats.total++; });
                return stats;
            }, [dataForStats, headers, getRowCriticalStatus]);

            // --- FPD STATS ---
            const fpdStats = useMemo(() => {
                const dateCol = findConfigColumn(activeConfig.columns.date, headers);
                if (!dateCol) return { found: false };
                const formatDateShort = (d) => d.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit' });
                const now = new Date(); now.setHours(0,0,0,0);
                
                const calculateFPD = (quotaKey) => {
                    const weeksAgo = QUOTA_LABELS[quotaKey].weeksAgo;
                    const range = getCohortRange(weeksAgo);
                    const cohortSales = dataForStats.filter(row => {
                        const d = parseDate(row[dateCol]);
                        return d && d >= range.start && d <= range.end;
                    });
                    const totalSales = cohortSales.length;
                    const rangeStr = `${formatDateShort(range.start)} - ${formatDateShort(range.end)}`;
                    if (totalSales === 0) return { totalSales: 0, unpaid: 0, upcoming: 0, rangeStr };
                    
                    let unpaid = 0;
                    let upcoming = 0; 

                    if (['fpd10', 'fpd11', 'fpd12'].includes(quotaKey)) {
                        let commentsCol = findConfigColumn(activeConfig.columns.comments, headers);
                        if (commentsCol) {
                            cohortSales.forEach(row => {
                                const val = String(row[commentsCol] || '').toLowerCase().trim();
                                if (!val.includes('completado')) unpaid++; 
                            });
                        }
                    } else {
                        let statusCol = findColumnName(activeConfig.columns.paymentStatus, QUOTA_LABELS[quotaKey].id, headers);
                        if (!statusCol) statusCol = findColumnName(activeConfig.columns.paymentStatus, '', headers);
                        
                        if (statusCol) {
                            cohortSales.forEach(row => {
                                if (!isObsUnpaid(row[statusCol])) return;

                                const saleDate = parseDate(row[dateCol]);
                                if (!saleDate) return;

                                const dueDate = new Date(saleDate);
                                dueDate.setDate(saleDate.getDate() + 14); 
                                
                                const today = new Date();
                                today.setHours(0,0,0,0);
                                dueDate.setHours(0,0,0,0);

                                if (dueDate < today) {
                                    unpaid++;
                                } else {
                                    upcoming++; 
                                }
                            });
                        }
                    }
                    
                    return { totalSales, unpaid, upcoming, rangeStr };
                };
                
                const statsObj = { found: true, colUsed: String(dateCol) };
                let totalUnpaid = 0, totalSales = 0;
                
                activeConfig.quotas.forEach(qId => {
                    const s = calculateFPD(qId);
                    statsObj[qId] = s;
                    if (!['fpd10', 'fpd11', 'fpd12'].includes(qId)) { 
                        totalUnpaid += s.unpaid; 
                        totalSales += s.totalSales; 
                    }
                });
                
                statsObj.generalFPD = totalSales > 0 ? ((totalUnpaid / totalSales) * 100).toFixed(1) : 0;
                statsObj.totalSalesAll = totalSales;
                return statsObj;
            }, [dataForStats, headers, activeConfig, findColumnName, findConfigColumn, portfolio]);

            // SE CORRIGIÓ: Ahora el cálculo de los botones usa los datos reales de esa cohorte (fecha exacta),
            // en lugar de usar "filteredData" que reducía la muestra cuando hacías clic en el header del FPD.
            const observationStats = useMemo(() => {
                const statsObj = { found: true };
                const dateCol = findConfigColumn(activeConfig.columns.date, headers);
                
                const calc = (quotaKey) => {
                    let s = { conGestion: 0, noCancelo: 0, yaCancelo: 0, vacio: 0 };
                    if (!dateCol) return s;

                    // Filtramos SOLO a los clientes de las fechas de esa cohorte (Ej. las 89 ventas)
                    const weeksAgo = QUOTA_LABELS[quotaKey].weeksAgo;
                    const range = getCohortRange(weeksAgo);
                    const cohortSales = dataForStats.filter(row => {
                        const d = parseDate(row[dateCol]);
                        return d && d >= range.start && d <= range.end;
                    });
                    
                    if (['fpd10', 'fpd11', 'fpd12'].includes(quotaKey)) {
                        let col = findConfigColumn(activeConfig.columns.comments, headers);
                        if (!col) return s;
                        cohortSales.forEach(row => {
                            const val = String(row[col] || '').toLowerCase().trim();
                            if (val.includes('completado')) {
                                s.yaCancelo++;
                            } else if (val !== '') {
                                s.conGestion++;
                            } else {
                                s.vacio++;
                            }
                        });
                        return s;
                    } else {
                        const qName = QUOTA_LABELS[quotaKey].id;
                        let col = findColumnName(activeConfig.columns.paymentStatus, qName, headers);
                        if (!col) col = findColumnName(activeConfig.columns.paymentStatus, '', headers);
                        if(!col) return s;

                        cohortSales.forEach(row => {
                            const val = String(row[col] || '').toLowerCase().trim();
                            if (val === '') {
                                s.vacio++;
                            } else if (val.includes('no se') || val.includes('no cancelo') || val.includes('no pago')) {
                                s.noCancelo++;
                            } else if (val.includes('pago con gestion') || val.includes('pago con gestión')) {
                                s.conGestion++; // Es un préstamo (No sumarlo a Ya Canceló)
                            } else if (val.includes('pago') || val.includes('cancelo') || val.includes('canceló')) {
                                s.yaCancelo++;
                            } else if (val.includes('compromiso') || val.includes('gestion') || val.includes('gestión')) {
                                s.conGestion++;
                            } else {
                                s.noCancelo++;
                            }
                        });
                        return s;
                    }
                }

                activeConfig.quotas.forEach(qId => {
                    statsObj[qId] = calc(qId);
                });
                
                return statsObj;
            }, [dataForStats, headers, findColumnName, findConfigColumn, activeConfig, portfolio]);

            const getColumnStyles = (headerName) => {
                if (!headerName) return null;
                const lowerHeader = String(headerName).toLowerCase().trim();
                if (lowerHeader.includes("primera cuota")) return { head: "bg-blue-100 text-blue-900 border-b-2 border-blue-300", cellBase: "border-l border-r border-blue-100", bgColor: "bg-blue-50/50" };
                return null;
            };

            const StatCard = ({ title, stats, quotaId, fpdInfo }) => {
                if (!stats) return null;
                let fpdPercent = "0.0", recoverNeeded = 0, targetPercent = 10;
                let hasSales = fpdInfo && fpdInfo.totalSales > 0;
                if (hasSales) {
                    fpdPercent = ((fpdInfo.unpaid / fpdInfo.totalSales) * 100).toFixed(1);
                    const maxAllowed = Math.floor((fpdInfo.totalSales * targetPercent) / 100);
                    recoverNeeded = Math.max(0, fpdInfo.unpaid - maxAllowed);
                }
                let fpdColor = hasSales ? (parseFloat(fpdPercent) > 30 ? "text-red-700 bg-red-100" : parseFloat(fpdPercent) > 15 ? "text-yellow-700 bg-yellow-100" : "text-green-700 bg-green-100") : "text-slate-500 bg-slate-100";
                const isFpdActive = fpdQuotaFilter === quotaId;
                const isActive = (t) => breakdownFilter && breakdownFilter.quota === quotaId && breakdownFilter.type === t;
                const baseRow = "flex justify-between items-center p-2 rounded cursor-pointer transition-colors hover:ring-1 hover:ring-indigo-300";
                
                const isContinuity = ['fpd10', 'fpd11', 'fpd12'].includes(quotaId);
                const headerColor = isContinuity ? "text-violet-700" : "text-slate-700";
                const headerIconColor = isContinuity ? "text-violet-600" : "text-slate-600";

                return (
                    <div className={`p-4 rounded-2xl shadow-sm bg-white border ${isFpdActive ? 'border-indigo-400 ring-2 ring-indigo-100' : 'border-slate-200'}`}>
                        <div className="flex items-center gap-2 mb-3 border-b border-slate-100 pb-2">
                             <Icons.FileText className={`w-4 h-4 ${headerIconColor}`} />
                             <h3 className={`text-sm font-bold uppercase tracking-wide ${headerColor}`}>{title}</h3>
                        </div>
                        <div onClick={() => { if(hasSales) { setFpdQuotaFilter(isFpdActive ? null : quotaId); setBreakdownFilter(null); setShowOnlyAlerts(false); setShowOnlyEarly(false); setShowOnlyCritical(false); }}} className={`mb-3 p-3 rounded-xl ${fpdColor} shadow-sm transition-all ${hasSales ? 'cursor-pointer hover:-translate-y-0.5 hover:shadow-md' : ''} ${isFpdActive ? 'ring-2 ring-indigo-500' : ''}`}>
                            <div className="flex justify-between mb-2">
                                <span className="text-[10px] font-bold uppercase opacity-80 flex items-center gap-1">{isFpdActive && <Icons.Filter className="w-3 h-3 animate-pulse"/>} Semanas -{QUOTA_LABELS[quotaId].weeksAgo}</span>
                                <span className="text-xl font-bold">{hasSales ? `${fpdPercent}%` : 'N/A'}</span>
                            </div>
                            {hasSales && fpdInfo ? (
                                <div className="text-[11px] space-y-1 border-t border-black/10 pt-2">
                                    <div className="flex justify-between"><span className="opacity-80">Ventas:</span><span className="font-bold">{fpdInfo.totalSales}</span></div>
                                    <div className={`flex justify-between p-1 -mx-1 rounded ${isFpdActive ? 'bg-white/40 font-bold' : ''}`}>
                                        <span className="opacity-80">{isContinuity ? 'Pendientes:' : 'Mora Real:'}</span><span className="font-bold underline">{fpdInfo.unpaid}</span>
                                    </div>
                                    {!isContinuity && (

            const triggerQuickAction = (row, actionType) => {
                let msg = "";
                let defaultAmount = "";

                if (actionType === 'COMPLETADO') msg = "¿Marcar cliente como COMPLETADO en Continuidad?";
                else if (actionType === 'PAGO_GESTION') {
                    msg = "¿Registrar PAGO CON GESTIÓN (préstamo) para este cliente?";
                    const valCuotaCol = headers.find(h => h.toLowerCase().includes('valor cuota') || h.toLowerCase() === 'cuota');
                    if (valCuotaCol && row[valCuotaCol]) {
                        defaultAmount = String(row[valCuotaCol]);
                    }
                }
                else msg = "¿Registrar PAGO para este cliente de forma rápida?";
                
                setConfirmModal({ show: true, row, actionType, message: msg, amount: defaultAmount });
            };

            const executeQuickAction = async () => {
                const { row, actionType, amount } = confirmModal;
                const phone = phoneColumn ? row[phoneColumn] : '';
                const idVal = idColumn ? row[idColumn] : '';
                
                if (!phone && !idVal) {
                    setError("Cliente sin número de celular ni cédula, no se puede actualizar.");
                    setConfirmModal({ show: false, row: null, actionType: null, message: '', amount: '' });
                    return;
                }

                let commentsCol = findConfigColumn(activeConfig.columns.comments, headers);
                let paymentCol = findColumnName(activeConfig.columns.paymentStatus, 'primera', headers) || findColumnName(activeConfig.columns.paymentStatus, '', headers);

                setIsSaving(true);
                try {
                    let updatedRow = { ...row };
                    let updatesPayload = [];
                    
                    // FALLBACKS para Código Google Apps Script Viejo
                    let fallbackComment = "";
                    let fallbackCol = "";
                    let fallbackAppend = false;
                    let fallbackClean = false;
                    
                    if (actionType === 'COMPLETADO') {
                        if (!commentsCol) throw new Error("No se encontró la columna de comentarios en el Excel.");
                        
                        updatesPayload.push({ column: commentsCol, value: "Completado", append: true, cleanWrite: false });
                        
                        fallbackComment = "Completado";
                        fallbackCol = commentsCol;
                        fallbackAppend = true;
                        fallbackClean = false;
                        
                        const dateStr = new Date().toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit' });
                        const oldVal = updatedRow[commentsCol] || '';
                        updatedRow[commentsCol] = oldVal ? `[${dateStr}] Completado | ${oldVal}` : `[${dateStr}] Completado`;

                    } else {
                        // Es PAGO o PAGO_GESTION
                        const isGestion = actionType === 'PAGO_GESTION';
                        const valStatus = isGestion ? "PAGO CON GESTION" : "PAGO";
                        const valComment = isGestion ? `Pago registrado con Gestión (Préstamo: $${amount || 0})` : "Pago registrado";

                        // 1. Actualizar la columna de PAGOS (Status) - ESTE SERÁ EL FALLBACK PRINCIPAL
                        if (paymentCol) {
                            updatesPayload.push({ column: paymentCol, value: valStatus, append: false, cleanWrite: true });
                            updatedRow[paymentCol] = valStatus;
                            
                            fallbackComment = valStatus;
                            fallbackCol = paymentCol;
                            fallbackAppend = false;
                            fallbackClean = true;
                        }

                        // 2. Actualizar la columna de COMENTARIOS (Historial visible)
                        if (commentsCol) {
                            updatesPayload.push({ column: commentsCol, value: valComment, append: true, cleanWrite: false });
                            
                            const dateStr = new Date().toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit' });
                            const oldVal = updatedRow[commentsCol] || '';
                            updatedRow[commentsCol] = oldVal ? `[${dateStr}] ${valComment} | ${oldVal}` : `[${dateStr}] ${valComment}`;
                        }

                        // 3. Actualizar el VALOR CUOTA (Solo si es PAGO_GESTION)
                        if (isGestion) {
                            const valCuotaCol = headers.find(h => h.toLowerCase().includes('valor cuota') || h.toLowerCase() === 'cuota');
                            if (valCuotaCol && amount !== undefined && amount !== '') {
                                updatesPayload.push({ column: valCuotaCol, value: amount, append: false, cleanWrite: true });
                                updatedRow[valCuotaCol] = amount;
                            }
                        }
                    }

                    if (updatesPayload.length === 0) {
                        throw new Error("No hay columnas destino válidas para actualizar.");
                    }

                    // ENVIAR TODAS LAS ACTUALIZACIONES EN UN SOLO VIAJE AL SERVIDOR
                    const payload = { 
                        type: portfolio, 
                        id: idVal, 
                        phone: phone || '', 
                        // Variables de retrocompatibilidad (por si el script viejo corre)
                        comment: fallbackComment,
                        column: fallbackCol,
                        append: fallbackAppend,
                        cleanWrite: fallbackClean,
                        // Nuevo paquete de actualización masiva
                        updates: updatesPayload 
                    };
                    
                    await fetch(API_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(payload) });

                    // Actualizar tabla en pantalla
                    const newData = data.map(r => {
                         const matchId = idVal && idColumn ? r[idColumn] === idVal : false;
                         const matchPhone = phone && phoneColumn ? String(r[phoneColumn]).replace(/\D/g, '') === String(phone).replace(/\D/g, '') : false;
                         
                         if (matchId || matchPhone) {
                             return updatedRow;
                         }
                         return r;
                    });
                    setData(newData);
                } catch(e) {
                    setError("Error: " + e.message);
                } finally {
                    setIsSaving(false);
                    setConfirmModal({ show: false, row: null, actionType: null, message: '', amount: '' });

            };

            const saveCleanEdit = async () => {
                const { row, colName, currentValue } = cleanEditModal;
                const oldVal = row[colName] || '';
                const newVal = currentValue.trim();
                
                if (newVal === oldVal) {
                    setCleanEditModal({ show: false, row: null, colName: null, currentValue: '' });
                    return;
                }

                const phone = phoneColumn ? row[phoneColumn] : '';
                const idVal = idColumn ? row[idColumn] : '';

                    setError("El cliente no tiene Cédula ni Celular para ser identificado.");
                    setCleanEditModal({ show: false, row: null, colName: null, currentValue: '' });
                    return;
                }

                setIsSaving(true);
                try {
                    const payload = { 
                        type: portfolio, 
                        id: idVal, 
                        phone: phone || '', 
                        comment: newVal, // Backwards compatible
                        column: colName, // Backwards compatible
                        append: false,   // Backwards compatible
                        cleanWrite: true,// Backwards compatible
                        updates: [{ column: colName, value: newVal, append: false, cleanWrite: true }] 
                    };
                    await fetch(API_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(payload) });
                    
                    const newData = data.map(r => {
                         const matchId = idVal && idColumn ? r[idColumn] === idVal : false;
                         const matchPhone = phone && phoneColumn ? String(r[phoneColumn]).replace(/\D/g, '') === String(phone).replace(/\D/g, '') : false;
                         
                         if (matchId || matchPhone) {
                             return { ...r, [colName]: newVal };
                         }
                         return r;
                    });
                    setData(newData);

                    setError("Error al actualizar dato: " + e.message);
                } finally {
                    setIsSaving(false);
                    setCleanEditModal({ show: false, row: null, colName: null, currentValue: '' });
                }
            };

                setIsSaving(true);

                const idVal = idColumn ? editModal.row[idColumn] : '';
                
                const payload = {

                    phone: phone || '', 
                    comment: editModal.currentValue, // Backwards compatible
                    column: editModal.colName,       // Backwards compatible
                    append: true,                    // Backwards compatible
                    cleanWrite: false,               // Backwards compatible
                    updates: [{ column: editModal.colName, value: editModal.currentValue, append: true, cleanWrite: false }] 
                };

                try {
                    await fetch(API_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(payload) });

                    const newData = data.map(r => {
                         const matchId = idVal && idColumn ? r[idColumn] === idVal : false;
                         const matchPhone = phone && phoneColumn ? String(r[phoneColumn]).replace(/\D/g, '') === String(phone).replace(/\D/g, '') : false;
                         
                         if (matchId || matchPhone) {
                             const dateStr = new Date().toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit' });
                             const newEntry = `[${dateStr}] ${editModal.currentValue}`;
                             const oldVal = r[editModal.colName] || '';
                             return { ...r, [editModal.colName]: oldVal ? `${newEntry} | ${oldVal}` : newEntry };

                } catch (e) {
                    setError("Error al guardar: " + e.message);
                } finally {
                    setIsSaving(false);
                }
            };

            const commentsColName = useMemo(() => {
                return headers.find(h => {
                    const lowerH = h.toLowerCase();
                    return activeConfig.columns.comments && (
                        (typeof activeConfig.columns.comments === 'string' && lowerH.includes(activeConfig.columns.comments)) ||
                        (Array.isArray(activeConfig.columns.comments) && activeConfig.columns.comments.some(n => lowerH.includes(n)))
                    );
                });
            }, [headers, activeConfig.columns.comments]);

            return (
                <div className="max-w-7xl mx-auto p-4 space-y-6">

                            <button 
                                onClick={() => window.location.href = 'index.html'}

                            >

                            <div className="h-10 w-px bg-slate-200 hidden md:block"></div>
                            <div>
                                <h1 className="text-2xl font-black text-slate-900 tracking-tight">Dashboard de Gestión</h1>
                                <div className="flex items-center gap-2 mt-1">
                                    <span className={`inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-bold shadow-sm ${loading || isSaving ? 'bg-amber-100 text-amber-700' : 'bg-emerald-100 text-emerald-700'}`}>
                                        <span className={`w-2 h-2 rounded-full ${loading || isSaving ? 'bg-amber-500 animate-pulse' : 'bg-emerald-500'}`}></span>
                                        {loading ? 'Sincronizando con nube...' : isSaving ? 'Guardando...' : `Actualizado: ${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`}
                                    </span>
                                </div>
                            </div>
