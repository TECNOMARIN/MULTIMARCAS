                                        <Icons.X className="w-5 h-5"/>
                                    </button>
                                </div>
                                <div className="p-6">
                                    <div className="mb-5">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-wider block mb-2 px-1">Historial Reciente</label>
                                        <div className="bg-slate-50 p-4 rounded-xl border border-slate-100 text-sm text-slate-600 max-h-32 overflow-y-auto italic custom-scrollbar">
                                            {editModal.currentValue || "Aún no hay comentarios para este cliente."}
                                        </div>
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-wider block mb-2 px-1">Nueva Anotación</label>
                                        <textarea 
                                            value={editModal.currentValue === (editModal.row[editModal.colName] || '') ? '' : editModal.currentValue}
                                            onChange={(e) => setEditModal({ ...editModal, currentValue: e.target.value })}
                                            className="w-full p-4 border border-slate-200 rounded-xl focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none text-sm min-h-[120px] transition-all bg-slate-50 focus:bg-white"
                                            placeholder="Escribe la gestión... (Tip: Para pagar o completar usa el botón rápido en la tabla)"
                                            autoFocus
                                        />
                                    </div>
                                </div>
                                <div className="p-5 border-t border-slate-100 bg-slate-50 flex justify-end gap-3 rounded-b-2xl">
                                    <button 
                                        onClick={() => setEditModal({ ...editModal, show: false })} 
                                        className="px-5 py-2.5 text-slate-600 font-bold text-sm hover:bg-slate-200 rounded-full transition-colors"
                                        disabled={isSaving}
                                    >
                                        Cancelar
                                    </button>
                                    <button 
                                        onClick={handleSaveComment}
                                        disabled={isSaving || !editModal.currentValue.trim()}
                                        className="px-6 py-2.5 bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold text-sm rounded-full hover:from-blue-700 hover:to-indigo-700 transition-all shadow-lg hover:shadow-xl hover:-translate-y-0.5 disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:translate-y-0 flex items-center gap-2"
                                    >
                                        {isSaving ? <><Icons.RefreshCw className="w-4 h-4 animate-spin"/> Guardando...</> : 'Guardar y Sincronizar'}
                                    </button>
                                </div>
                             </div>
                        </div>
                    )}

                    {/* --- MODAL EDICIÓN LIMPIA (TELÉFONO/REFERENCIAS) --- */}
                    {cleanEditModal.show && (
                        <div className="fixed inset-0 z-[90] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 animate-in fade-in duration-200">
                             <div className="bg-white w-full max-w-sm rounded-2xl shadow-2xl overflow-hidden flex flex-col transform transition-all scale-100 border border-slate-100">
                                <div className="p-5 border-b border-slate-100 bg-slate-50 flex justify-between items-center">
                                    <h3 className="font-bold text-slate-800 flex items-center gap-3">
                                        <div className="p-2 bg-indigo-100 rounded-xl text-indigo-600 shadow-sm"><Icons.Edit2 className="w-4 h-4"/></div>
                                        Editar {cleanEditModal.colName}
                                    </h3>
                                    <button onClick={() => !isSaving && setCleanEditModal({ ...cleanEditModal, show: false })} className="p-2 text-slate-400 hover:bg-slate-200 rounded-full transition-colors">
                                        <Icons.X className="w-5 h-5"/>
                                    </button>
                                </div>
                                <div className="p-6">
                                    <div>
                                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-wider block mb-2 px-1">Nuevo Valor</label>
                                        <input 
                                            type="text"
                                            value={cleanEditModal.currentValue}
                                            onChange={(e) => setCleanEditModal({ ...cleanEditModal, currentValue: e.target.value })}
                                            className="w-full p-4 border border-slate-200 rounded-xl focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none text-sm transition-all bg-slate-50 focus:bg-white"
                                            placeholder="Escribe aquí..."
                                            autoFocus
                                        />
                                    </div>
                                </div>
                                <div className="p-5 border-t border-slate-100 bg-slate-50 flex justify-end gap-3 rounded-b-2xl">
                                    <button 
                                        onClick={() => setCleanEditModal({ ...cleanEditModal, show: false })} 
                                        className="px-5 py-2.5 text-slate-600 font-bold text-sm hover:bg-slate-200 rounded-full transition-colors"
                                        disabled={isSaving}
                                    >
                                        Cancelar
                                    </button>
                                    <button 
                                        onClick={saveCleanEdit}
                                        disabled={isSaving}
                                        className="px-6 py-2.5 bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold text-sm rounded-full hover:from-blue-700 hover:to-indigo-700 transition-all shadow-lg hover:shadow-xl hover:-translate-y-0.5 disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2"
                                    >
                                        {isSaving ? <><Icons.RefreshCw className="w-4 h-4 animate-spin"/> Guardando...</> : 'Guardar'}
                                    </button>
                                </div>
                             </div>
                        </div>
                    )}

                    {/* --- MODAL CONFIRMACIÓN ACCIÓN RÁPIDA --- */}
                    {confirmModal.show && (
                        <div className="fixed inset-0 z-[90] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 animate-in fade-in duration-200">
                             <div className="bg-white w-full max-w-sm rounded-2xl shadow-2xl overflow-hidden flex flex-col transform transition-all scale-100 border border-slate-100">
                                <div className="p-6 text-center">
                                    <div className={`w-16 h-16 mx-auto rounded-full flex items-center justify-center mb-4 
                                        ${confirmModal.actionType === 'COMPLETADO' ? 'bg-violet-100 text-violet-600' : 
                                          confirmModal.actionType === 'PAGO_GESTION' ? 'bg-blue-100 text-blue-600' :
                                          'bg-emerald-100 text-emerald-600'}`}>
                                        {confirmModal.actionType === 'COMPLETADO' ? <Icons.CheckCircle className="w-8 h-8"/> : 
                                         confirmModal.actionType === 'PAGO_GESTION' ? <Icons.Handshake className="w-8 h-8"/> :
                                         <Icons.DollarSign className="w-8 h-8"/>}
                                    </div>
                                    <h3 className="text-lg font-black text-slate-800 mb-2">Confirmar Acción</h3>
                                    <p className="text-sm text-slate-500 mb-4">{confirmModal.message}</p>

                                    {/* NUEVO INPUT PARA PAGO GESTIÓN */}
                                    {confirmModal.actionType === 'PAGO_GESTION' && (
                                        <div className="text-left bg-blue-50 p-3 rounded-xl border border-blue-100 mb-4">
                                            <label className="text-[10px] font-bold text-blue-800 uppercase tracking-wider block mb-1">Valor Prestado / Gestión</label>
                                            <input 
                                                type="text" 
                                                value={confirmModal.amount} 
                                                onChange={(e) => setConfirmModal({...confirmModal, amount: e.target.value})}
                                                className="w-full p-2.5 border border-blue-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm font-bold text-blue-900 bg-white"
                                                placeholder="Ej: 50000"
                                            />
                                        </div>
                                    )}
                                </div>
                                <div className="p-5 border-t border-slate-100 bg-slate-50 flex justify-center gap-3 rounded-b-2xl">
                                    <button 
                                        onClick={() => setConfirmModal({ show: false, row: null, actionType: null, message: '', amount: '' })} 
                                        className="px-6 py-2.5 text-slate-600 font-bold text-sm hover:bg-slate-200 rounded-full transition-colors"
                                        disabled={isSaving}
                                    >
                                        Cancelar
                                    </button>
                                    <button 
                                        onClick={executeQuickAction}
                                        disabled={isSaving}
                                        className={`px-6 py-2.5 text-white font-bold text-sm rounded-full transition-all shadow-lg hover:shadow-xl hover:-translate-y-0.5 disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2
                                            ${confirmModal.actionType === 'COMPLETADO' ? 'bg-gradient-to-r from-violet-500 to-indigo-600 hover:from-violet-600 hover:to-indigo-700' : 
                                              confirmModal.actionType === 'PAGO_GESTION' ? 'bg-gradient-to-r from-blue-500 to-cyan-600 hover:from-blue-600 hover:to-cyan-700' :
                                              'bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700'}`}
                                    >
                                        {isSaving ? <><Icons.RefreshCw className="w-4 h-4 animate-spin"/> Procesando...</> : 'Sí, Confirmar'}
                                    </button>
                                </div>
                             </div>
                        </div>
                    )}

                    {/* --- MODAL REPORTE VENDEDORES (NIVEL 1) --- */}
                    {showSellerModal && (
                        <div id="printable-modal-content" className="fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4 backdrop-blur-sm animate-in fade-in duration-200">
                            <div className="bg-white w-full max-w-6xl rounded-3xl shadow-2xl flex flex-col max-h-[90vh] border border-slate-100 overflow-hidden transform scale-100 transition-transform">
                                <div className="p-6 border-b border-slate-100 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-slate-50 no-print">
                                    <div className="flex items-center gap-4">
                                        <div className="p-3 bg-indigo-100 text-indigo-600 rounded-xl shadow-sm hidden sm:block">
                                            <Icons.BarChart4 className="w-6 h-6"/>
                                        </div>
                                        <div>
                                            <h3 className="text-xl font-black text-slate-800 tracking-tight">Rendimiento por Gestor</h3>
                                            <p className="text-xs text-slate-500 font-medium mt-0.5">Métricas de recaudo, morosidad y préstamos (Caja)</p>
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-3 w-full sm:w-auto">
                                        <div className="relative flex-1 sm:flex-none">
                                            <select value={reportFilter} onChange={(e) => setReportFilter(e.target.value)} className="w-full appearance-none bg-white border border-slate-200 text-slate-700 text-sm py-2 pl-4 pr-10 rounded-full shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 cursor-pointer font-bold transition-all hover:border-indigo-300">
                                                <option value="fpd7">🎯 FPD7 (3 Semanas)</option>
                                                <option value="current">📅 Mes Actual</option>
                                                <option value="last">⏮️ Mes Anterior</option>
                                                <option value="all">📂 Histórico Total</option>
                                            </select>
                                            <div className="pointer-events-none absolute inset-y-0 right-3 flex items-center text-indigo-500"><svg className="fill-current h-4 w-4" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg></div>
                                        </div>
                                        <div className="flex gap-2">
                                            <button type="button" onClick={handleExportPDF} className="flex items-center justify-center p-2.5 bg-blue-50 text-blue-600 rounded-full hover:bg-blue-100 transition-colors shadow-sm" title="Descargar PDF"><Icons.Download className="w-5 h-5"/></button>
                                            <button onClick={() => setShowSellerModal(false)} className="p-2.5 bg-slate-100 hover:bg-slate-200 rounded-full text-slate-500 transition-colors"><Icons.X className="w-5 h-5"/></button>
                                        </div>
                                    </div>
                                </div>
                                <div className="flex-1 overflow-auto p-0 custom-scrollbar">
                                    <table className="w-full text-sm text-left border-collapse">
                                        <thead className="text-[11px] text-slate-400 uppercase tracking-widest bg-white sticky top-0 z-10 shadow-sm border-b border-slate-100">
                                            <tr>
                                                <th className="px-6 py-4 font-black">Gestor / Asignado</th>
                                                <th className="px-4 py-4 text-center font-black">Ventas</th>
                                                <th className="px-4 py-4 text-center font-black text-emerald-500">Pagas</th>
                                                <th className="px-4 py-4 text-center font-black text-indigo-500" title="Cantidad de cuotas prestadas por la empresa">Préstamos</th>
                                                <th className="px-4 py-4 text-right font-black text-indigo-500" title="Dinero total prestado">$ Gest. / Prestado</th>
                                                <th className="px-4 py-4 text-center font-black text-blue-500">Gestión</th>
                                                <th className="px-4 py-4 text-center font-black text-rose-500">Mora</th>
                                                <th className="px-4 py-4 text-center font-black text-amber-500">Por Vencer</th>
                                                <th className="px-4 py-4 text-center font-black">S/D</th>
                                                <th className="px-6 py-4 text-right font-black">Índice %</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-50">
                                            {sellerReportData.length > 0 ? sellerReportData.map((row, idx) => (
                                                <tr key={idx} className="hover:bg-indigo-50/30 transition-colors group">
                                                    <td className="px-6 py-3.5 font-bold text-slate-700">{row.name}</td>
                                                    <td className="px-4 py-3.5 text-center font-bold text-slate-800">{row.total}</td>
                                                    <td className="px-4 py-3.5 text-center"><span className="inline-block px-2.5 py-1 bg-emerald-50 text-emerald-700 rounded-lg font-bold text-xs">{row.pagas}</span></td>
                                                    
                                                    {/* NUEVAS COLUMNAS DE PRÉSTAMO (CAJA) */}
                                                    <td className="px-4 py-3.5 text-center"><span className="inline-block px-2.5 py-1 bg-indigo-50 text-indigo-700 rounded-lg font-bold text-xs">{row.prestamos}</span></td>
                                                    <td className="px-4 py-3.5 text-right font-bold text-slate-700">
                                                        {new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', minimumFractionDigits: 0 }).format(row.prestamosDinero)}
                                                    </td>

                                                    <td className="px-4 py-3.5 text-center"><span className="inline-block px-2.5 py-1 bg-blue-50 text-blue-700 rounded-lg font-bold text-xs">{row.gestion}</span></td>
                                                    <td className="px-4 py-3.5 text-center"><span className="inline-block px-2.5 py-1 bg-rose-50 text-rose-700 rounded-lg font-bold text-xs">{row.noCancelo}</span></td>
                                                    <td className="px-4 py-3.5 text-center"><span className="inline-block px-2.5 py-1 bg-amber-50 text-amber-700 rounded-lg font-bold text-xs">{row.porVencer}</span></td>
                                                    <td className="px-4 py-3.5 text-center text-slate-400 text-xs font-medium">{row.vacio}</td>
                                                    <td className="px-6 py-3.5 text-right">
                                                        <button 
                                                            onClick={() => { setDetailSeller(row.name); setDetailFilter('all'); }}
                                                            className={`px-4 py-1.5 rounded-full text-xs font-black border transition-all shadow-sm group-hover:shadow hover:scale-105 active:scale-95 ${parseFloat(row.index) > 20 ? 'bg-rose-100 text-rose-700 border-rose-200 hover:bg-rose-500 hover:text-white' : parseFloat(row.index) > 10 ? 'bg-amber-100 text-amber-700 border-amber-200 hover:bg-amber-500 hover:text-white' : 'bg-emerald-100 text-emerald-700 border-emerald-200 hover:bg-emerald-500 hover:text-white'}`}
                                                            title="Clic para auditar detalles"
                                                        >
                                                            {row.index}%
                                                        </button>
                                                    </td>
                                                </tr>
                                            )) : <tr><td colSpan="10" className="px-6 py-16 text-center text-slate-400 font-medium">No hay ventas registradas para los filtros actuales.</td></tr>}
                                        </tbody>
                                    </table>
                                </div>
                                <div className="p-4 bg-slate-50 border-t border-slate-100 text-[10px] text-slate-500 flex justify-between rounded-b-3xl font-medium no-print">
                                    <span>Fórmula: (Mora Real + Gestión) ÷ Total Ventas. "Por Vencer" no penaliza.</span>
                                    <span className="flex items-center gap-1 text-indigo-500"><Icons.AlertCircle className="w-3 h-3"/> Clic en el porcentaje para ver detalle de Préstamos o Moras.</span>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- MODAL DETALLE CLIENTES (NIVEL 2 - DRILL DOWN) --- */}
                    {detailSeller && (
                        <div className="fixed inset-0 z-[70] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 animate-in fade-in duration-200">
                            <div className="bg-white w-full max-w-6xl rounded-3xl shadow-2xl flex flex-col max-h-[90vh] border border-slate-100 overflow-hidden transform scale-100 transition-transform">
                                <div className="p-5 border-b border-slate-100 bg-slate-50 flex justify-between items-center rounded-t-3xl">
                                    <div className="flex items-center gap-4">
                                        <button onClick={() => setDetailSeller(null)} className="p-2 bg-white hover:bg-slate-200 rounded-full text-slate-600 shadow-sm border border-slate-200 transition-all hover:scale-105 active:scale-95 mr-1">
                                            <Icons.ArrowLeft className="w-5 h-5"/>
                                        </button>
                                        <div>
                                            <h3 className="text-xl font-black text-slate-800 flex items-center gap-2 tracking-tight">
                                                <span className="bg-gradient-to-r from-blue-600 to-indigo-600 text-white px-3 py-1 rounded-md text-xs tracking-widest">Auditoría</span> 
                                                {detailSeller}
                                            </h3>
                                        </div>
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={handleExportDetailPDF} className="flex items-center gap-2 px-4 py-2 bg-white border border-slate-200 text-slate-700 rounded-full hover:border-indigo-300 hover:text-indigo-600 transition-all font-bold text-sm shadow-sm hover:shadow">
                                            <Icons.Download className="w-4 h-4"/> Exportar a PDF
                                        </button>
                                        <button onClick={() => setDetailSeller(null)} className="p-2 hover:bg-slate-200 rounded-full text-slate-400 transition-colors">
                                            <Icons.X className="w-6 h-6"/>
                                        </button>
                                    </div>
                                </div>

                                {/* FILTRO DE PRÉSTAMOS DENTRO DEL DETALLE */}
                                <div className="px-5 py-3 border-b border-slate-100 bg-white flex items-center gap-3">
                                    <span className="text-xs font-bold text-slate-400 uppercase">Filtro de Vista:</span>
                                    <button 
                                        onClick={() => setDetailFilter('all')} 
                                        className={`px-4 py-1.5 rounded-full text-xs font-bold transition-colors ${detailFilter === 'all' ? 'bg-slate-800 text-white' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}
                                    >
                                        Ver Toda la Cartera
                                    </button>
                                    <button 
                                        onClick={() => setDetailFilter('loans')} 
                                        className={`px-4 py-1.5 rounded-full text-xs font-bold transition-colors flex gap-1.5 items-center ${detailFilter === 'loans' ? 'bg-indigo-600 text-white' : 'bg-indigo-50 text-indigo-600 hover:bg-indigo-100'}`}
                                    >
                                        <Icons.Handshake className="w-3.5 h-3.5"/> Mostrar solo Pagos con Gestión (Préstamos)
                                    </button>
                                </div>

                                <div className="flex-1 overflow-auto p-0 custom-scrollbar">
                                    <table className="w-full text-sm text-left border-collapse">
                                        <thead className="text-[10px] text-slate-400 uppercase tracking-widest bg-white sticky top-0 z-10 shadow-sm border-b border-slate-100">
                                            <tr>
                                                <th className="px-5 py-4 font-black">Cliente / Titular</th>
                                                <th className="px-4 py-4 font-black">Identificación</th>
                                                <th className="px-4 py-4 font-black">Contacto</th>
                                                <th className="px-4 py-4 font-black">Dispositivo</th>
                                                <th className="px-4 py-4 text-center font-black">Vencimiento</th>
                                                <th className="px-4 py-4 text-center font-black text-indigo-600">Valor Cuota</th>
                                                <th className="px-4 py-4 text-center font-black">Status</th>
                                                <th className="px-5 py-4 text-center font-black bg-slate-50 rounded-bl-lg">Acción Rápida</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-50">
                                            {(detailFilter === 'loans' ? sellerDetailData.filter(r => r.isLoan) : sellerDetailData).length > 0 ? 
                                                (detailFilter === 'loans' ? sellerDetailData.filter(r => r.isLoan) : sellerDetailData).map((row, idx) => {
                                                const cleanPhone = cleanPhoneNumber(row.phone);
                                                return (
                                                    <tr key={idx} className="hover:bg-slate-50 transition-colors group">
                                                        <td className="px-5 py-3 font-bold text-slate-700 max-w-[180px] truncate" title={row.name}>{row.name}</td>
                                                        <td className="px-4 py-3 text-slate-500 font-mono text-xs">{row.id}</td>
                                                        <td className="px-4 py-3 text-slate-500 font-mono text-xs font-medium">{row.phone}</td>
                                                        <td className="px-4 py-3 text-slate-600 text-xs">{row.device}</td>
                                                        <td className="px-4 py-3 text-center text-slate-500 text-xs font-medium">{row.dueDate}</td>
                                                        
                                                        {/* CELDA DE VALOR CUOTA */}
                                                        <td className={`px-4 py-3 text-center font-mono text-xs font-bold ${row.isLoan ? 'text-indigo-600 bg-indigo-50/50' : 'text-slate-500'}`}>
                                                            {row.amountStr}
                                                        </td>

                                                        <td className="px-4 py-3 text-center">
                                                            <span className={`inline-block px-3 py-1 rounded-md text-[10px] font-black uppercase tracking-widest shadow-sm border
                                                                ${row.statusCode === 'unpaid' ? 'bg-rose-50 text-rose-600 border-rose-100' : 
                                                                row.statusCode === 'managed' ? 'bg-blue-50 text-blue-600 border-blue-100' : 
                                                                row.statusCode === 'upcoming' ? 'bg-amber-50 text-amber-600 border-amber-100' : 
                                                                row.isLoan ? 'bg-indigo-100 text-indigo-700 border-indigo-200' :
                                                                row.statusCode === 'clean' ? 'bg-emerald-50 text-emerald-600 border-emerald-100' : 'bg-slate-50 text-slate-500 border-slate-200'}`}>
                                                                {row.status}
                                                            </span>
                                                        </td>
                                                        <td className="px-5 py-3 text-center bg-slate-50/30 group-hover:bg-white transition-colors">
                                                            <div className="flex justify-center gap-1.5">
                                                                {cleanPhone && (
                                                                    <>
                                                                        <a href={getWhatsAppLink(row.phone, row.name, row.device)} target="_blank" className="p-2 bg-white border border-emerald-200 text-emerald-600 rounded-lg hover:bg-emerald-500 hover:text-white transition-all shadow-sm hover:shadow" title="Enviar WhatsApp"><Icons.MessageCircle className="w-4 h-4"/></a>
                                                                        <a href={`tel:${cleanPhone}`} className="p-2 bg-white border border-blue-200 text-blue-600 rounded-lg hover:bg-blue-500 hover:text-white transition-all shadow-sm hover:shadow" title="Llamar Cliente"><Icons.Phone className="w-4 h-4"/></a>
                                                                    </>
                                                                )}
                                                                {row.commentColName && (
                                                                    <button 
                                                                        onClick={() => setEditModal({ show: true, row: row.originalRow, colName: row.commentColName, currentValue: String(row.currentComment || '') })}
                                                                        className="p-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition-all shadow-sm hover:shadow hover:-translate-y-0.5"
                                                                        title="Anotar Gestión"
                                                                    >
                                                                        <Icons.Edit2 className="w-4 h-4"/>
                                                                    </button>
                                                                )}
                                                            </div>
                                                        </td>
                                                    </tr>
                                                );
                                            }) : <tr><td colSpan="8" className="px-6 py-16 text-center text-slate-400 font-medium">No se encontraron clientes para este filtro.</td></tr>}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
