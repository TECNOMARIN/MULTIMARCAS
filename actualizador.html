<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sincronizador Alocredit - Multimarcas</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Librería para leer archivos Excel en el navegador -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #f8fafc; }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #e0e7ff; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #818cf8; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        const Icons = {
            UploadCloud: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/><polyline points="16 16 12 12 8 16"/></svg>,
            Database: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>,
            CheckCircle: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>,
            ArrowRight: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 19"/></svg>,
            RefreshCw: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>,
            ArrowLeft: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>,
            Shield: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
            Settings: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
            X: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        };

        // ASEGÚRATE DE PEGAR AQUÍ TU URL DEL WEB APP DE GOOGLE APPS SCRIPT
        const API_URL = 'https://script.google.com/macros/s/AKfycbz770i0j3vK5-9M2Z2EheDh9GX2x2j2KbjfFm_yNadBg5db3tEc5so58KWeIX5SwTmAZw/exec';
        
        // Columnas exactas sacadas de la imagen de tu hoja "actualizar cartera"
        const TARGET_COLUMNS = [
            "Fecha de Contrato", "cc", "Nombre del Cliente", "Celular del Cliente", "Números de Telefono", "Email",
            "Cuotas Pagadas", "Cuotas Atrasadas", "Cuotas Totales", "Fecha de Siguiente Pago", "Fecha de Última",
            "% Cuota Inicial", "Valor Cuota Inicial", "Valor Cuota", "Cantidad de Accesorios", "Valor de los accesorios",
            "Valor Credito", "Valor Total", "Número de Contrato", "Tienda", "Vendedor", "Modelo", "IMEI", "Estado Contrato"
        ];

        function SyncApp() {
            const [step, setStep] = useState(1);
            const [fileData, setFileData] = useState([]);
            const [excelHeaders, setExcelHeaders] = useState([]);
            const [mapping, setMapping] = useState({});
            
            const [showMappingModal, setShowMappingModal] = useState(false);
            const [isSyncing, setIsSyncing] = useState(false);
            const fileInputRef = useRef(null);

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const data = evt.target.result;
                        const workbook = window.XLSX.read(data, { type: 'binary' });
                        const firstSheetName = workbook.SheetNames[0];
                        const worksheet = workbook.Sheets[firstSheetName];
                        const json = window.XLSX.utils.sheet_to_json(worksheet, { defval: "" });

                        if (json.length === 0) throw new Error("El archivo Excel está vacío.");

                        const headers = Object.keys(json[0]);
                        setExcelHeaders(headers);
                        setFileData(json);
                        
                        // Auto-mapeo inteligente PRIORIZANDO MATCH EXACTO
                        let initialMap = {};
                        headers.forEach(h => {
                            const upperH = h.toUpperCase().trim();
                            
                            // 1. Buscamos primero coincidencia exacta por nombre
                            let exactMatch = TARGET_COLUMNS.find(tc => tc.toUpperCase().trim() === upperH);
                            
                            if (exactMatch) {
                                initialMap[h] = exactMatch;
                            } else {
                                // 2. Si no es exacto, buscamos similitudes lógicas
                                TARGET_COLUMNS.forEach(tc => {
                                    const upperTc = tc.toUpperCase().trim();
                                    if (upperH.includes(upperTc) || upperTc.includes(upperH) ||
                                       (upperTc === 'CC' && (upperH.includes('CEDULA') || upperH.includes('DOCUMENTO') || upperH === 'CC' || upperH.includes('IDENTIFICACION'))) ||
                                       (upperTc === 'CELULAR DEL CLIENTE' && (upperH.includes('CELULAR') || upperH.includes('TELEFONO')))) {
                                        if (!Object.values(initialMap).includes(tc)) {
                                            initialMap[h] = tc;
                                        }
                                    }
                                });
                            }
                        });
                        setMapping(initialMap);
                        setStep(2);
                    } catch (err) {
                        alert("Error al leer el archivo: " + err.message);
                    }
                };
                reader.readAsBinaryString(file);
            };

            const handleMapChange = (excelHeader, targetCol) => {
                setMapping(prev => ({ ...prev, [excelHeader]: targetCol }));
            };

            const executeSync = async () => {
                // Verificar que CC esté mapeado
                if (!Object.values(mapping).includes("cc")) {
                    alert("¡ADVERTENCIA! Debes asegurarte de que una columna esté asignada a 'cc' (Cédula) en el Mapeo de Columnas. El sistema usa esta identificación para buscar y actualizar a los clientes en la base de datos.");
                    setShowMappingModal(true); // Abrimos el modal si falta la cédula
                    return;
                }

                setIsSyncing(true);
                setShowMappingModal(false);

                // Preparar datos con los nombres correctos
                const payloadData = fileData.map(row => {
                    let newRow = {};
                    Object.keys(row).forEach(excelHeader => {
                        const targetName = mapping[excelHeader];
                        if (targetName && targetName !== "IGNORAR") {
                            newRow[targetName] = row[excelHeader];
                        }
                    });
                    return newRow;
                });

                const payload = {
                    action: "bulk", 
                    type: "actualizar cartera", 
                    data: payloadData
                };

                try {
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        mode: 'no-cors', 
                        headers: { 'Content-Type': 'text/plain' },
                        body: JSON.stringify(payload)
                    });
                    
                    setStep(3);
                } catch (error) {
                    alert("Error en la conexión con el servidor: " + error.message);
                } finally {
                    setIsSyncing(false);
                }
            };

            return (
                <div className="min-h-screen bg-slate-50 p-6 font-sans text-slate-800 flex flex-col items-center">
                    
                    {/* ENCABEZADO */}
                    <div className="w-full max-w-5xl flex justify-between items-center mb-8">
                        <div className="flex items-center gap-4">
                            <button onClick={() => window.location.href = 'tablero.html'} className="p-3 bg-white border border-slate-200 text-slate-600 rounded-full hover:bg-slate-100 transition-all shadow-sm" title="Volver al Tablero">
                                <Icons.ArrowLeft className="w-5 h-5"/>
                            </button>
                            <div>
                                <h1 className="text-2xl font-black tracking-tight text-indigo-900 flex items-center gap-2">
                                    <Icons.Database className="w-6 h-6 text-indigo-600"/> Sincronizador <span className="bg-indigo-600 text-white px-3 py-1 rounded-lg text-sm ml-2">ALOCREDIT</span>
                                </h1>
                                <p className="text-sm text-slate-500 font-medium mt-1">Cruce masivo directo a la hoja 'actualizar cartera'</p>
                            </div>
                        </div>
                        
                        <div className="flex gap-2">
                            <div className={`h-2 w-12 rounded-full transition-colors duration-300 ${step >= 1 ? 'bg-indigo-600' : 'bg-slate-200'}`}></div>
                            <div className={`h-2 w-12 rounded-full transition-colors duration-300 ${step >= 2 ? 'bg-indigo-600' : 'bg-slate-200'}`}></div>
                            <div className={`h-2 w-12 rounded-full transition-colors duration-300 ${step >= 3 ? 'bg-emerald-500' : 'bg-slate-200'}`}></div>
                        </div>
                    </div>

                    <div className="w-full max-w-5xl bg-white rounded-3xl shadow-xl border border-indigo-100 overflow-hidden relative min-h-[400px]">
                        
                        {/* PASO 1: SUBIR ARCHIVO */}
                        {step === 1 && (
                            <div className="p-10 flex flex-col items-center justify-center animate-in fade-in zoom-in duration-300 h-full py-20">
                                <h2 className="text-xl font-bold mb-2 text-indigo-950">Sube el reporte de la consola de Alocredit</h2>
                                <p className="text-sm text-slate-500 mb-8 text-center max-w-lg">El sistema procesará tu Excel y cruzará los datos automáticamente por <strong>Cédula (cc)</strong> con tu base de datos.</p>

                                <div 
                                    className="w-full max-w-md border-4 border-dashed border-indigo-100 bg-indigo-50/50 rounded-3xl p-10 flex flex-col items-center justify-center text-center hover:bg-indigo-50 hover:border-indigo-400 transition-all cursor-pointer group"
                                    onClick={() => fileInputRef.current.click()}
                                >
                                    <div className="p-5 bg-white text-indigo-600 rounded-full mb-4 group-hover:scale-110 transition-transform shadow-sm border border-indigo-100">
                                        <Icons.UploadCloud className="w-10 h-10"/>
                                    </div>
                                    <p className="font-black text-indigo-900 text-lg mb-1">Haz clic para subir el Excel</p>
                                    <p className="text-xs text-indigo-400 font-bold uppercase tracking-widest">Formatos: .xlsx, .csv</p>
                                    <input 
                                        type="file" 
                                        ref={fileInputRef} 
                                        accept=".xlsx, .xls, .csv" 
                                        className="hidden" 
                                        onChange={handleFileUpload} 
                                    />
                                </div>
                            </div>
                        )}

                        {/* PASO 2: CONFIRMACIÓN Y BOTÓN DE MAPEO */}
                        {step === 2 && (
                            <div className="p-10 flex flex-col items-center justify-center text-center animate-in fade-in duration-300 py-16">
                                <div className="w-20 h-20 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mb-6 shadow-sm border border-indigo-200">
                                    <Icons.Database className="w-10 h-10"/>
                                </div>
                                <h2 className="text-2xl font-black text-indigo-950 mb-2">Archivo Listo para Sincronizar</h2>
                                <p className="text-slate-600 mb-8 max-w-md text-sm">
                                    Hemos detectado <strong>{fileData.length} filas</strong> en tu archivo. Las columnas se han emparejado automáticamente con tu hoja "actualizar cartera" por defecto.
                                </p>
                                
                                <div className="flex flex-col gap-4 w-full max-w-sm">
                                    <button 
                                        onClick={executeSync}
                                        disabled={isSyncing}
                                        className="px-6 py-3.5 bg-gradient-to-r from-indigo-600 to-blue-700 text-white font-bold rounded-xl shadow-lg hover:shadow-xl hover:-translate-y-0.5 transition-all flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-wait"
                                    >
                                        {isSyncing ? <><Icons.RefreshCw className="w-5 h-5 animate-spin"/> Procesando...</> : 'Iniciar Sincronización'}
                                    </button>

                                    <button 
                                        onClick={() => setShowMappingModal(true)}
                                        disabled={isSyncing}
                                        className="px-6 py-3 bg-white border-2 border-slate-200 text-slate-700 font-bold rounded-xl hover:bg-slate-50 hover:border-indigo-300 transition-all shadow-sm flex items-center justify-center gap-2 disabled:opacity-50"
                                    >
                                        <Icons.Settings className="w-4 h-4 text-slate-400"/> Revisar Mapeo de Columnas
                                    </button>
                                    
                                    <button onClick={() => setStep(1)} className="text-xs text-slate-400 hover:text-slate-600 mt-2 underline transition-colors" disabled={isSyncing}>
                                        Volver y subir otro archivo
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* PASO 3: ÉXITO */}
                        {step === 3 && (
                            <div className="p-16 flex flex-col items-center text-center animate-in zoom-in duration-500 py-20">
                                <div className="w-24 h-24 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mb-6 shadow-inner ring-4 ring-emerald-50">
                                    <Icons.CheckCircle className="w-12 h-12"/>
                                </div>
                                <h2 className="text-3xl font-black text-slate-800 mb-2">¡Sincronización Completada!</h2>
                                <p className="text-lg text-slate-500 mb-8 max-w-md">La base de datos "actualizar cartera" ha recibido las instrucciones. Los contratos existentes fueron actualizados y los nuevos fueron añadidos al final de la hoja.</p>
                                
                                <div className="flex gap-4">
                                    <button onClick={() => { setStep(1); setFileData([]); setMapping({}); }} className="px-6 py-3 bg-slate-100 text-slate-600 font-bold rounded-xl hover:bg-slate-200 transition-colors">Subir Nuevo Archivo</button>
                                    <button onClick={() => window.location.href = 'tablero.html'} className="px-6 py-3 bg-indigo-600 text-white font-bold rounded-xl shadow-md hover:bg-indigo-700 transition-colors">Volver al Tablero</button>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* MODAL OCULTO DE MAPEO */}
                    {showMappingModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/60 p-4 backdrop-blur-sm animate-in fade-in duration-200">
                            <div className="bg-white w-full max-w-3xl rounded-3xl shadow-2xl flex flex-col max-h-[85vh] overflow-hidden border border-slate-200">
                                <div className="p-5 border-b border-indigo-100 bg-indigo-50 flex justify-between items-center">
                                    <div className="flex items-center gap-3">
                                        <div className="p-2 bg-indigo-100 text-indigo-600 rounded-xl shadow-sm"><Icons.Settings className="w-5 h-5"/></div>
                                        <div>
                                            <h3 className="font-black text-slate-800 text-lg leading-tight">Revisión de Mapeo</h3>
                                            <p className="text-[10px] text-indigo-700 font-bold">Verifica las equivalencias entre las columnas</p>
                                        </div>
                                    </div>
                                    <button onClick={() => setShowMappingModal(false)} className="p-2 text-slate-400 hover:bg-slate-200 hover:text-slate-700 rounded-full transition-colors">
                                        <Icons.X className="w-5 h-5"/>
                                    </button>
                                </div>
                                
                                <div className="flex-1 overflow-y-auto p-6 bg-white custom-scrollbar">
                                    <div className="bg-indigo-50 border border-indigo-200 p-4 rounded-xl mb-6 text-sm text-indigo-800 font-medium flex gap-3 shadow-sm">
                                        <Icons.Shield className="w-6 h-6 flex-shrink-0 text-indigo-600"/>
                                        <p>Asegúrate de que la columna <strong>cc</strong> esté asignada a tu columna de cédulas. Las columnas que marquen "Ignorar" no subirán a la base de datos.</p>
                                    </div>

                                    <table className="w-full text-left text-sm border-collapse rounded-xl overflow-hidden shadow-sm">
                                        <thead className="bg-slate-800 text-white">
                                            <tr>
                                                <th className="p-4 font-bold">Columna en tu Archivo (Consola)</th>
                                                <th className="p-4 text-center"><Icons.ArrowRight className="w-4 h-4 mx-auto opacity-50"/></th>
                                                <th className="p-4 font-bold">Destino en 'actualizar cartera'</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100 border border-slate-200">
                                            {excelHeaders.map((eh, idx) => (
                                                <tr key={idx} className="hover:bg-slate-50">
                                                    <td className="p-4 font-mono text-slate-700 font-bold bg-slate-50/50 w-2/5">{eh}</td>
                                                    <td className="p-4 w-10"></td>
                                                    <td className="p-4">
                                                        <select 
                                                            value={mapping[eh] || "IGNORAR"}
                                                            onChange={(e) => handleMapChange(eh, e.target.value)}
                                                            className={`w-full p-2.5 rounded-lg border font-bold text-xs outline-none focus:ring-2 focus:ring-indigo-500 transition-colors ${mapping[eh] && mapping[eh] !== 'IGNORAR' ? 'bg-indigo-50 border-indigo-300 text-indigo-900 shadow-inner' : 'bg-slate-50 border-slate-200 text-slate-400'}`}
                                                        >
                                                            <option value="IGNORAR">-- Ignorar / No Subir --</option>
                                                            {TARGET_COLUMNS.map(tc => (
                                                                <option key={tc} value={tc}>{tc}</option>
                                                            ))}
                                                        </select>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>

                                <div className="p-5 border-t border-slate-100 bg-slate-50 flex justify-end">
                                    <button 
                                        onClick={() => setShowMappingModal(false)} 
                                        className="px-6 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-bold transition-colors shadow-sm"
                                    >
                                        Confirmar y Cerrar
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SyncApp />);
    </script>
</body>
</html>
